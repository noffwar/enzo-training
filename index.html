          const { data, error } = await supabase.from('notes')
            .update({
              note_title: editingNoteTitle.trim() || null,
              content: editingNoteContent.trim(),
              kind: editingNoteKind,
              updated_at: new Date().toISOString()
            })
            .eq('id', note.id)
            .eq('user_id', session.user.id)
            .select()
            .single();
          if(error) throw error;
          setNotes(prev => prev.map(n => n.id === note.id ? data : n));
          setEditingNoteId(null);
          setEditingNoteKindLocked(false);
        } catch(e) {
          setError(e.message || 'No se pudo editar el pensamiento.');
        } finally {
          setSaving('');
        }
      };

      const deleteNote = async (note) => {
        try {
          const { error } = await supabase.from('notes')
            .delete()
            .eq('id', note.id)
            .eq('user_id', session.user.id);
          if(error) throw error;
          setNotes(prev => prev.filter(n => n.id !== note.id));
          setAiReplies(prev => {
            const next = { ...prev };
            delete next[note.id];
            return next;
          });
          setAiDrafts(prev => {
            const next = { ...prev };
            delete next[note.id];
            return next;
          });
          clearTimeout(aiDraftTimersRef.current[note.id]);
          delete aiDraftTimersRef.current[note.id];
        } catch(e) {
          setError(e.message || 'No se pudo borrar el pensamiento.');
        }
      };

      const exportNote = (note) => {
        try {
          const title = noteDisplayTitle(note);
          const thread = aiReplies[note.id] || [];
          const lines = [
            `Titulo: ${title}`,
            `Categoria: ${noteKindMeta(note.kind || 'idea').label}`,
            `Fecha: ${formatTaskDate(note.created_at)}`,
            '',
            'Contenido:',
            String(note.content || '').trim(),
            ''
          ];
          if(thread.length){
            lines.push('Debate IA:', '');
            thread.forEach((item, idx) => {
              lines.push(`${idx + 1}. Pregunta: ${item.question}`);
              lines.push(`Respuesta: ${item.reply}`);
              lines.push('');
            });
          }
          const blob = new Blob([lines.join('\n')], { type:'text/plain;charset=utf-8' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          const safeName = title.toLowerCase().replace(/[^a-z0-9]+/gi, '-').replace(/^-+|-+$/g, '') || 'pensamiento';
          a.href = url;
          a.download = `${safeName}.txt`;
          document.body.appendChild(a);
          a.click();
          a.remove();
          setTimeout(() => URL.revokeObjectURL(url), 1000);
        } catch(e) {
          setError(e.message || 'No se pudo exportar el pensamiento.');
        }
      };

      const convertNoteToTask = async (note) => {
        setSaving(`convert-${note.id}`);
        setError('');
        try {
          const { data: taskRow, error: taskErr } = await supabase.from('tasks').insert({
            user_id: session.user.id,
            title: note.content.slice(0, 120),
            details: note.content,
            priority: 'normal',
            category: 'personal',
            status: 'pending'
          }).select().single();
          if(taskErr) throw taskErr;
          const { data: noteRow, error: noteErr } = await supabase.from('notes')
            .update({ kind: 'converted', updated_at: new Date().toISOString() })
            .eq('id', note.id)
            .eq('user_id', session.user.id)
            .select()
            .single();
          if(noteErr) throw noteErr;
          setTasks(prev => [taskRow, ...prev]);
          setNotes(prev => prev.map(n => n.id === note.id ? noteRow : n));
        } catch(e) {
          setError(e.message || 'No se pudo convertir la nota en tarea.');
        } finally {
          setSaving('');
        }
      };

      const mailtoForTask = (task) => {
        const subject = encodeURIComponent(`Recordatorio: ${task.title}`);
        const body = encodeURIComponent(`${task.details || task.title}\n\nVencimiento: ${task.due_at ? formatTaskDate(task.due_at) : 'Sin fecha'}`);
        return `mailto:?subject=${subject}&body=${body}`;
      };

      const calendarLinkForTask = (task) => {
        const start = task.due_at ? new Date(task.due_at) : new Date();
        const end = new Date(start.getTime() + (30 * 60000));
        const fmt = (d) => {
          const y = d.getUTCFullYear();
          const m = String(d.getUTCMonth()+1).padStart(2,'0');
          const day = String(d.getUTCDate()).padStart(2,'0');
          const h = String(d.getUTCHours()).padStart(2,'0');
          const min = String(d.getUTCMinutes()).padStart(2,'0');
          const s = String(d.getUTCSeconds()).padStart(2,'0');
          return `${y}${m}${day}T${h}${min}${s}Z`;
        };
        const text = encodeURIComponent(task.title);
        const details = encodeURIComponent(task.details || 'Recordatorio creado desde Enzo Training');
        return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${text}&details=${details}&dates=${fmt(start)}/${fmt(end)}`;
      };

      const sendTaskEmail = async (task) => {
        setSaving(`mail-${task.id}`);
        setError('');
        try {
          const res = await fetch('/.netlify/functions/send-task-email', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              title: task.title,
              details: task.details || '',
              dueAt: task.due_at ? formatTaskDate(task.due_at) : '',
              priority: task.priority || 'normal'
            })
          });
          const data = await res.json().catch(() => ({}));
          if(!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
          setError('Correo enviado correctamente.');
          setTimeout(() => setError(''), 2500);
        } catch(e) {
          setError(e.message || 'No se pudo enviar el correo.');
        } finally {
          setSaving('');
        }
      };

      const askThoughtAI = async (note) => {
        setAiLoadingNoteId(note.id);
        setError('');
        try {
          const currentQuestion = (aiDrafts[note.id] || '').trim();
          const res = await fetch('/.netlify/functions/thought-chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              thought: note.content,
              question: currentQuestion || 'Quiero debatir esta idea. Analizala con argumentos a favor, en contra y una conclusion provisoria.'
            })
          });
          const data = await res.json().catch(() => ({}));
          if(!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
          const nextThread = [
            ...(aiReplies[note.id] || []),
            {
              question: currentQuestion || 'Debate general',
              reply: data.reply || 'No hubo respuesta.'
            }
          ];
          setAiReplies(prev => ({ ...prev, [note.id]: nextThread }));
          try {
            await persistAiThread(note.id, nextThread);
          } catch(syncErr) {
            setAiNotice('Se guardo local, pero no se pudo sincronizar el debate.');
            setTimeout(() => setAiNotice(''), 3000);
          }
          setAiDrafts(prev => ({ ...prev, [note.id]: '' }));
          persistAiDraft(note.id, '').catch(() => {});
          setAiOpenNoteId(note.id);
        } catch(e) {
          setError(e.message || 'No se pudo consultar la IA.');
        } finally {
          setAiLoadingNoteId(null);
        }
      };

      const summarizeThoughtDebate = async (note) => {
        setAiLoadingNoteId(note.id);
        setError('');
        try {
          const thread = aiReplies[note.id] || [];
          if(thread.length === 0) throw new Error('Todavia no hay debate para resumir.');
          const historyText = thread.map((item, idx) => `${idx + 1}. Pregunta: ${item.question}\nRespuesta: ${item.reply}`).join('\n\n');
          const res = await fetch('/.netlify/functions/thought-chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              thought: note.content,
              question: `Resumi este debate en 5 puntos concretos, una conclusion breve y una siguiente pregunta util.\n\n${historyText}`
            })
          });
          const data = await res.json().catch(() => ({}));
          if(!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
          const nextThread = [
            ...thread,
            {
              question: 'Resumen del debate',
              reply: data.reply || 'No hubo resumen.'
            }
          ];
          setAiReplies(prev => ({ ...prev, [note.id]: nextThread }));
          try {
            await persistAiThread(note.id, nextThread);
          } catch(_) {}
          setAiOpenNoteId(note.id);
        } catch(e) {
          setError(e.message || 'No se pudo resumir el debate.');
        } finally {
          setAiLoadingNoteId(null);
        }
      };

      const removeAiReply = async (note, idxToRemove) => {
        try {
          const currentThread = aiReplies[note.id] || [];
          const nextThread = currentThread.filter((_, idx) => idx !== idxToRemove);
          setAiReplies(prev => ({ ...prev, [note.id]: nextThread }));
          await persistAiThread(note.id, nextThread);
        } catch(e) {
          setError(e.message || 'No se pudo borrar ese bloque del debate.');
        }
      };

      const openInGemini = async (note) => {
        const thread = aiReplies[note.id] || [];
        const draft = (aiDrafts[note.id] || '').trim();
        const prompt = [
          'Quiero seguir este debate en Gemini.',
          '',
          `Pensamiento original: ${note.content}`,
          '',
          ...(thread.length ? ['Historial del debate:', '', ...thread.flatMap((item, idx) => [
            `${idx + 1}. Usuario: ${item.question}`,
            `Gemini: ${item.reply}`,
            ''
          ])] : []),
          `Nueva consigna: ${draft || 'Segui cuestionando esta idea y llevandola a una conclusion mas fuerte.'}`
        ].join('\n').trim();

        try {
          if(navigator.clipboard?.writeText) {
            await navigator.clipboard.writeText(prompt);
          }
          setAiNotice('Contexto copiado. Gemini abierto.');
          setTimeout(() => setAiNotice(''), 3000);
        } catch(_) {
          setAiNotice('No se pudo copiar, pero igual abrimos Gemini.');
          setTimeout(() => setAiNotice(''), 3000);
        }

        window.open('https://gemini.google.com/app', '_blank', 'noopener,noreferrer');
      };

      const searchNeedle = taskSearch.trim().toLowerCase();
      const filteredTasks = tasks.filter(task => {
        const text = `${task.title || ''} ${task.details || ''}`.toLowerCase();
        if(searchNeedle && !text.includes(searchNeedle)) return false;
        if(priorityFilter !== 'all' && (task.priority || 'normal') !== priorityFilter) return false;
        if(statusFilter !== 'all' && task.status !== statusFilter) return false;
        if(categoryFilter !== 'all' && (task.category || 'personal') !== categoryFilter) return false;
        return true;
      });
      const filteredNotes = notes.filter(note => {
        if(note.kind === 'converted') return false;
        if(noteKindFilter !== 'all' && (note.kind || 'idea') !== noteKindFilter) return false;
        if(!searchNeedle) return true;
        return String(note.content || '').toLowerCase().includes(searchNeedle);
      });
      const archivedTasks = filteredTasks.filter(t => t.status === 'archived');
      const pendingTasks = filteredTasks.filter(t => t.status !== 'done' && t.status !== 'archived');
      const doneTasks = filteredTasks.filter(t => t.status === 'done');
      const activeNotes = filteredNotes;
      const now = new Date();
      const endOfToday = new Date(now); endOfToday.setHours(23,59,59,999);
      const endOfTomorrow = new Date(now); endOfTomorrow.setDate(now.getDate() + 1); endOfTomorrow.setHours(23,59,59,999);
      const endOfWeek = new Date(now); endOfWeek.setDate(now.getDate() + 7); endOfWeek.setHours(23,59,59,999);
      const groupedPending = {
        today: pendingTasks.filter(t => t.due_at && new Date(t.due_at) <= endOfToday),
        tomorrow: pendingTasks.filter(t => t.due_at && new Date(t.due_at) > endOfToday && new Date(t.due_at) <= endOfTomorrow),
        week: pendingTasks.filter(t => t.due_at && new Date(t.due_at) > endOfTomorrow && new Date(t.due_at) <= endOfWeek),
        later: pendingTasks.filter(t => t.due_at && new Date(t.due_at) > endOfWeek),
        someday: pendingTasks.filter(t => !t.due_at)
      };
      const todayFocus = tasks.filter(t => t.status !== 'done' && t.status !== 'archived' && t.due_at && new Date(t.due_at) <= endOfToday);
      const urgentCount = tasks.filter(t => t.status !== 'done' && t.status !== 'archived' && (t.priority || 'normal') === 'high').length;
      const byCategory = CATEGORY_OPTIONS.map(cat => ({
        ...cat,
        count: tasks.filter(t => t.status !== 'done' && t.status !== 'archived' && (t.category || 'personal') === cat.value).length
      }));

      useEffect(() => {
        const runTaskReminderCheck = () => {
          const pending = tasks.filter(t => t.status !== 'done' && t.status !== 'archived' && t.due_at);
          if(pending.length === 0) return;
          const now = Date.now();
          const alerts = loadTaskAlerts();
          const candidate = pending
            .map(task => ({ task, dueMs: new Date(task.due_at).getTime() }))
            .filter(item => !Number.isNaN(item.dueMs))
            .sort((a,b) => a.dueMs - b.dueMs)
            .find(item => item.dueMs <= (now + 15 * 60000));
          if(!candidate) return;
          const key = `${candidate.task.id}:${candidate.task.due_at}`;
          if(alerts[key]) return;
          alerts[key] = new Date().toISOString();
          saveTaskAlerts(alerts);
          const diffMin = Math.round((candidate.dueMs - now) / 60000);
          const timing = diffMin <= 0 ? 'ya vencio' : diffMin === 1 ? 'vence en 1 minuto' : `vence en ${diffMin} minutos`;
          const message = `Tarea: ${candidate.task.title} - ${timing}.`;
          setTaskNotice(message);
          setTimeout(() => setTaskNotice(''), 6000);
          if(typeof Notification !== 'undefined' && Notification.permission === 'granted' && 'serviceWorker' in navigator) {
            navigator.serviceWorker.ready.then(reg => {
              if(reg?.showNotification) {
                reg.showNotification('Tarea cercana', {
                  body: message,
                  icon: './icon-192.png',
                  badge: './icon-192.png',
                  tag: `task-${candidate.task.id}`,
                  requireInteraction: false
                });
              }
            }).catch(() => {});
          }
        };
        runTaskReminderCheck();
        const timer = setInterval(runTaskReminderCheck, 60000);
        return () => clearInterval(timer);
      }, [tasks]);

      return html`
        <div style="display:flex;flex-direction:column;gap:12px;">
          <${Card}>
            <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px;">
              <div>
                <p style="margin:0;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#6366F1;">Tareas y pensamientos</p>
                <p style="margin:4px 0 0;font-size:12px;color:#64748b;">Anota rapido, ordena despues y manda recordatorios al calendario o mail.</p>
              </div>
              <button class="btn-icon" style="background:#162035;border:1px solid #1E2D45;" onClick=${loadData}>
                <${ISync} s=${16}/>
              </button>
            </div>
            ${taskNotice && html`<div style="margin-bottom:10px;padding:8px 10px;border-radius:8px;background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.25);color:#FCD34D;font-size:12px;">${taskNotice}</div>`}
            ${aiNotice && html`<div style="margin-bottom:10px;padding:8px 10px;border-radius:8px;background:rgba(56,189,248,0.08);border:1px solid rgba(56,189,248,0.25);color:#7DD3FC;font-size:12px;">${aiNotice}</div>`}
            ${error && html`<div style="margin-bottom:10px;padding:8px 10px;border-radius:8px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);color:#FCA5A5;font-size:12px;">${error}</div>`}
            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;text-align:center;">
              ${[
                { label:'Pendientes', val: pendingTasks.length, color:'#10B981' },
                { label:'Hechas', val: doneTasks.length, color:'#6366F1' },
                { label:'Ideas', val: activeNotes.length, color:'#F59E0B' }
              ].map(item => html`
                <div style="padding:10px;border-radius:10px;background:rgba(10,15,30,0.45);border:1px solid #1E2D45;">
                  <p style="margin:0;font-size:9px;color:#64748b;text-transform:uppercase;">${item.label}</p>
                  <p style=${`margin:4px 0 0;font-size:18px;font-weight:700;font-family:'JetBrains Mono',monospace;color:${item.color};`}>${item.val}</p>
                </div>
              `)}
            </div>
            <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:12px;">
              <div style="padding:10px;border-radius:10px;background:rgba(10,15,30,0.45);border:1px solid #1E2D45;">
                <p style="margin:0;font-size:9px;color:#64748b;text-transform:uppercase;">Vencen hoy</p>
                <p style="margin:4px 0 0;font-size:18px;font-weight:700;font-family:'JetBrains Mono',monospace;color:#EF4444;">${todayFocus.length}</p>
              </div>
              <div style="padding:10px;border-radius:10px;background:rgba(10,15,30,0.45);border:1px solid #1E2D45;">
                <p style="margin:0;font-size:9px;color:#64748b;text-transform:uppercase;">Alta prioridad</p>
                <p style="margin:4px 0 0;font-size:18px;font-weight:700;font-family:'JetBrains Mono',monospace;color:#F59E0B;">${urgentCount}</p>
              </div>
            </div>
            <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;">
              ${byCategory.map(cat => html`
                <div style=${`padding:6px 10px;border-radius:999px;background:${cat.color}18;border:1px solid ${cat.color}55;color:${cat.color};font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;`}>
                  ${cat.label}: ${cat.count}
                </div>
              `)}
            </div>
            <div style="display:flex;flex-direction:column;gap:8px;margin-top:12px;">
              <input class="inp" placeholder="Buscar tarea o pensamiento..."
                value=${taskSearch} onInput=${e=>setTaskSearch(e.target.value)} />
              <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;">
                <select class="inp" value=${priorityFilter} onChange=${e=>setPriorityFilter(e.target.value)}>
                  <option value="all">Todas las prioridades</option>
                  <option value="high">Alta</option>
                  <option value="normal">Normal</option>
                  <option value="low">Baja</option>
                </select>
                <select class="inp" value=${categoryFilter} onChange=${e=>setCategoryFilter(e.target.value)}>
                  <option value="all">Todas las categorías</option>
                  ${CATEGORY_OPTIONS.map(cat => html`<option value=${cat.value}>${cat.label}</option>`)}
                </select>
                <select class="inp" value=${statusFilter} onChange=${e=>setStatusFilter(e.target.value)}>
                  <option value="all">Todos los estados</option>
                  <option value="pending">Pendientes</option>
                  <option value="done">Hechas</option>
                  <option value="archived">Archivadas</option>
                </select>
              </div>
              <select class="inp" value=${noteKindFilter} onChange=${e=>setNoteKindFilter(e.target.value)}>
                <option value="all">Todos los pensamientos</option>
                ${NOTE_KIND_OPTIONS.map(opt => html`<option value=${opt.value}>${opt.label}</option>`)}
              </select>
            </div>
          <//>

          <${Card}>
            <p style="margin:0 0 10px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#10B981;">Nueva tarea</p>
            <div style="display:flex;flex-direction:column;gap:8px;">
              <input class="inp" placeholder="Ej: revisar Termodinamica o pagar algo..."
                value=${taskTitle} onInput=${e=>setTaskTitle(e.target.value)} />
              <div style="display:grid;grid-template-columns:1fr 120px;gap:8px;">
                <input class="inp" type="datetime-local" value=${taskDue} onInput=${e=>setTaskDue(e.target.value)} />
                <select class="inp" value=${taskPriority} onChange=${e=>setTaskPriority(e.target.value)}>
                  <option value="high">Alta</option>
                  <option value="normal">Normal</option>
                  <option value="low">Baja</option>
                </select>
              </div>
              <select class="inp" value=${taskCategory} onChange=${e=>setTaskCategory(e.target.value)}>
                ${CATEGORY_OPTIONS.map(cat => html`<option value=${cat.value}>${cat.label}</option>`)}
              </select>
              <select class="inp" value=${taskRecurrence} onChange=${e=>setTaskRecurrence(e.target.value)}>
                ${RECURRENCE_OPTIONS.map(opt => html`<option value=${opt.value}>${opt.label}</option>`)}
              </select>
              <label style="display:flex;align-items:center;gap:8px;font-size:12px;color:#cbd5e1;cursor:pointer;">
                <input type="checkbox" checked=${taskAutoEmail} onChange=${e=>setTaskAutoEmail(e.target.checked)} />
                <span>Enviar recordatorio automatico por email cuando venza</span>
              </label>
              <button onClick=${addTask}
                style="width:100%;padding:10px;border-radius:10px;border:none;background:#10B981;color:#041018;font-size:13px;font-weight:800;font-family:'Barlow Condensed',sans-serif;letter-spacing:0.06em;cursor:pointer;">
                ${saving === 'task' ? 'GUARDANDO...' : 'AGREGAR TAREA'}
              </button>
            </div>
          <//>

          <${Card}>
            <p style="margin:0 0 10px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#F59E0B;">Pensamiento rapido</p>
            <div style="display:flex;flex-direction:column;gap:8px;">
              <input class="inp" placeholder="Titulo opcional"
                value=${noteTitle} onInput=${e=>setNoteTitle(e.target.value)} />
              <select class="inp" value=${noteKind} onChange=${e=>{ setNoteKind(e.target.value); setNoteKindLocked(true); }}>
                ${NOTE_KIND_OPTIONS.map(opt => html`<option value=${opt.value}>${opt.label}</option>`)}
              </select>
              <textarea
                value=${noteText}
                onInput=${e=>{ const value = e.target.value; setNoteText(value); if(!noteKindLocked) setNoteKind(classifyThoughtKind(value)); }}
                placeholder="Ej: idea, pendiente, algo que no quiero olvidarme..."
                style="width:100%;background:#0F1729;border:1px solid #1E2D45;border-radius:8px;padding:10px;font-size:13px;color:#cbd5e1;font-family:'Barlow',sans-serif;resize:vertical;min-height:88px;"></textarea>
              <p style="margin:0;font-size:11px;color:#64748b;">Categoria sugerida automaticamente segun lo que escribis. Si cambias el selector, se respeta tu eleccion.</p>
              <button onClick=${addNote}
                style="width:100%;padding:10px;border-radius:10px;border:none;background:#F59E0B;color:#080D1A;font-size:13px;font-weight:800;font-family:'Barlow Condensed',sans-serif;letter-spacing:0.06em;cursor:pointer;">
                ${saving === 'note' ? 'GUARDANDO...' : 'GUARDAR PENSAMIENTO'}
              </button>
            </div>
          <//>

          <${Card}>
            <p style="margin:0 0 10px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#94A3B8;">Pendientes</p>
            ${loading ? html`<p style="margin:0;color:#64748b;font-size:12px;">Cargando...</p>` : pendingTasks.length === 0 ? html`<p style="margin:0;color:#64748b;font-size:12px;">Todavia no tenes tareas pendientes.</p>` : html`
              <div style="display:flex;flex-direction:column;gap:12px;">
                ${[
                  ['Hoy', groupedPending.today],
                  ['Mañana', groupedPending.tomorrow],
                  ['Esta semana', groupedPending.week],
                  ['Mas adelante', groupedPending.later],
                  ['Sin fecha', groupedPending.someday]

      const [email,  setEmail]  = useState('');

      const [msg,    setMsg]    = useState('');

      const handleLogin = async () => {
        if(!email.trim()) return;
        setStatus('sending');
        const { error } = await supabase.auth.signInWithOtp({
          email: email.trim(),
          options: { emailRedirectTo: window.location.origin + window.location.pathname }
        });
        if(error) { setStatus('error'); setMsg(error.message); }
        else       { setStatus('sent'); setMsg('✓ Revisá tu email — el link expira en 1 hora.'); }
      };

      return html`
        <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:#080D1A;">

    const DebugPanel = ({ session, syncLog, outboxCount }) => {
      const [open,    setOpen]    = useState(false);
      const [swDebug, setSwDebug] = useState(null);
      const conflictInfo = metaGet('last_conflict');

      // Consultar SW al abrir el panel
      useEffect(() => {
        if(!open || !('serviceWorker' in navigator)) return;
        const onMsg = (e) => {
          if(e.data?.type === 'SW_DEBUG_RESPONSE') setSwDebug(e.data);
        };
        navigator.serviceWorker.addEventListener('message', onMsg);
        navigator.serviceWorker.ready.then(reg => {
          if(reg.active) reg.active.postMessage({ type: 'SW_DEBUG_REQUEST' });
        }).catch(() => {});
        return () => navigator.serviceWorker.removeEventListener('message', onMsg);
      }, [open]);

      if(!open) return html`
        <button onClick=${()=>setOpen(true)}
          style="position:fixed;bottom:90px;left:8px;z-index:999;width:24px;height:24px;border-radius:50%;background:rgba(99,102,241,0.3);border:1px solid rgba(99,102,241,0.5);font-size:10px;cursor:pointer;color:#6366F1;padding:0;">
          🔧
        </button>`;

      const swCtrl = navigator.serviceWorker?.controller ? '✓ Controlando' : '⚠ No controla';
      const rows = [
        ['— Auth —',    ''],
        ['User',        session?.user?.email || '—'],
        ['UID',         (session?.user?.id || '—').slice(0,8)+'...'],
        ['— Sync —',    ''],
        ['Device',      DEVICE_ID],
        ['Online',      navigator.onLine ? '✓' : '✗'],
        ['Outbox',      outboxCount + ' items'],
        ['Last sync',   syncLog.lastSync  || 'nunca'],
        ['Last error',  syncLog.lastError || '—'],
        ['— SW —',      ''],
        ['SW API',      'serviceWorker' in navigator ? '✓' : '✗'],
        ['SW estado',   'serviceWorker' in navigator ? swCtrl : '—'],
        ['SW version',  swDebug?.cacheVersion || '—'],
        ['Auth en SW',  swDebug ? (swDebug.authValid ? '✓ válida' : '✗ sin token') : '—'],
        ['Auth expiry', swDebug?.authExpiry ? new Date(swDebug.authExpiry*1000).toLocaleTimeString('es-AR') : '—'],
        ['Alertas SW',  swDebug?.scheduledCount != null ? swDebug.scheduledCount+' programadas' : '—'],
        ['Notif perm',  typeof Notification!=='undefined' ? Notification.permission : 'N/A'],
        ['— Conflictos —', ''],
        ['Último conf.', conflictInfo ? `${conflictInfo.count||1} items — ${conflictInfo.at?.slice(0,10)||'?'}` : '—'],
        ['Conf. fechas', conflictInfo?.items ? conflictInfo.items.slice(0,3).join(', ') + (conflictInfo.items.length>3?'…':'') : '—'],
      ];

      return html`
        <div style="position:fixed;bottom:90px;left:8px;z-index:999;background:#0F1729;border:1px solid #2A3F5F;border-radius:10px;padding:12px;font-size:10px;font-family:'JetBrains Mono',monospace;color:#94a3b8;min-width:220px;max-width:280px;max-height:70vh;overflow-y:auto;">
          <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
            <span style="color:#6366F1;font-weight:700;">DEBUG</span>
            <div style="display:flex;gap:6px;">
              <button onClick=${()=>flushOutbox().catch(()=>{})}
                style="background:rgba(16,185,129,0.2);border:1px solid rgba(16,185,129,0.4);border-radius:4px;color:#10B981;font-size:9px;cursor:pointer;padding:2px 5px;">
                Retry sync
              </button>
              <button onClick=${()=>setOpen(false)} style="background:none;border:none;color:#64748b;cursor:pointer;font-size:12px;">✕</button>
            </div>
          </div>
          ${rows.map(([k,v])=> k.startsWith('—') ? html`
            <div style="padding:4px 0 2px;color:#6366F1;font-size:9px;text-transform:uppercase;letter-spacing:0.1em;">${k.replace(/—/g,'').trim()}</div>
          ` : html`
            <div style="display:flex;justify-content:space-between;gap:8px;padding:2px 0;border-bottom:1px solid #1E2D45;">
              <span style="color:#64748b;flex-shrink:0;">${k}</span>
              <span style="color:${v==='✗'||v.startsWith('✗')?'#EF4444':v==='✓'||v.startsWith('✓')?'#10B981':v.startsWith('⚠')?'#F59E0B':'white'};text-align:right;word-break:break-all;">${v}</span>
            </div>
          `)}
        </div>
      `;
    };

    // ═══════════════════════════════════════════════════
    //  APP PRINCIPAL
    // ═══════════════════════════════════════════════════
    const App = () => {
      // ── Auth state
      const [session,     setSession]     = useState(null);
      const [authLoading, setAuthLoading] = useState(true);
      const [outboxCount, setOutboxCount] = useState(0);
      const [syncLog,     setSyncLog]     = useState({ lastSync: null, lastError: null });
      const showDebug = new URLSearchParams(window.location.search).get('debug') === '1';

      // Listen for auth changes
      useEffect(()=>{
        supabase.auth.getSession().then(({ data }) => {
          setSession(data.session);
          setAuthLoading(false);
        });
        const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, sess) => {
          setSession(sess);
          setAuthLoading(false);
        });
        return () => subscription.unsubscribe();
      }, []);

      // Show login if not authenticated
      if(authLoading) return html`
        <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#080D1A;">
          <span class="spin" style="display:inline-block;width:28px;height:28px;border:3px solid rgba(16,185,129,0.3);border-top-color:#10B981;border-radius:50%;"></span>
        </div>`;
      if(!session) return html`<${LoginView}/>`;

      const handleLogout = () => supabase.auth.signOut();
      const [view, setView] = useState(()=>{
        // Leer ?view=X de la URL para que los shortcuts del manifest funcionen
        const p = new URLSearchParams(window.location.search).get('view');
        return (p && ['today','week','progress','tasks','recipes','notif','routines'].includes(p)) ? p : 'today';
      });
      const [chartsReady, setChartsReady] = useState(()=>!!window.Recharts);

      // Lazy load Recharts al abrir una tab con gráficos
      const navigateTo = (tab) => {
        setView(tab);
        if(!chartsReady && (tab === 'week' || tab === 'progress')) {
          window._loadRecharts && window._loadRecharts().then(()=>{
            window._RC = window.Recharts || {};
            setChartsReady(true);
          }).catch(()=>{});
        }
      };

      // Bug 12 fix: si la app arranca con ?view=week o ?view=progress, cargar Recharts al inicio
      useEffect(()=>{
        const initView = new URLSearchParams(window.location.search).get('view');
        if(initView === 'week' || initView === 'progress') {
          window._loadRecharts && window._loadRecharts().then(()=>{
            window._RC = window.Recharts || {};
            setChartsReady(true);
          }).catch(()=>{});
        }
      },[]);
      const [routineData, setRoutineData] = useState(()=>loadRoutines());
      const [currentWk, setCurrentWk] = useState(()=>getWeekKey(new Date()));
      const [activeDay, setActiveDay] = useState(()=>String(new Date().getDay()));
      const activeDayRef = useRef(activeDay);
      useEffect(()=>{ activeDayRef.current = activeDay; }, [activeDay]);
      const [allWeeks, setAllWeeks] = useState({});
      const [syncSaveStatus, setSyncSaveStatus] = useState('idle');
      const [hasUnsaved, setHasUnsaved] = useState(false);
      const [syncLoadStatus, setSyncLoadStatus] = useState('idle');
      const [syncLoadMsg,    setSyncLoadMsg]    = useState('');
      const [timerLeft, setTimerLeft] = useState(0);
      const [timerActive, setTimerActive] = useState(false);
      const timerRef = useRef(null);

      useEffect(() => {
        if(metaGet('training_plan_version') === TRAINING_PLAN_VERSION) return;
        metaSet('training_plan_version', TRAINING_PLAN_VERSION);
        setRoutineData(trainingPlanRoutines);
        saveRoutines(trainingPlanRoutines).catch(()=>{});
        setAllWeeks(prev => {
          const next = { ...prev };
          Object.keys(next).forEach(wkKey => {
            if(!isDateKey(wkKey) || wkKey < TRAINING_PLAN_EFFECTIVE_WEEK) return;
            const hydrated = hydrate(next[wkKey] || newWeek(wkKey));
            const nextMapping = buildPlanDayMapping(getPlanMode(hydrated), wkKey);
            next[wkKey] = { ...hydrated, dayMapping: { ...hydrated.dayMapping, ...nextMapping }, sessions: {} };
          });
          if(!next[TRAINING_PLAN_EFFECTIVE_WEEK]) {
            next[TRAINING_PLAN_EFFECTIVE_WEEK] = newWeek(TRAINING_PLAN_EFFECTIVE_WEEK);
          }
          return next;
        });
      }, []);
      const prevTimerLeftRef = useRef(0);
      // Audio silencioso — necesario para que MediaSession funcione en background (Android)
      const audioRef = useRef(typeof Audio !== 'undefined'
        ? new Audio('data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAgD4AAAB9AAACABAAZGF0YQAAAAA=')
        : null
      );
      const [moduleAlerts, setModuleAlerts] = useState({ study:0, health:false, books:false, recipes:0, notif:false });

      const refreshModuleAlerts = useCallback(async () => {
        try {
          const [
            { data: invRows, error: invErr },
            { data: studyRows, error: studyErr },
            { data: recipeRows, error: recipeErr }
          ] = await Promise.all([
            supabase.from('app_inventory').select('key,data').in('key', ['meds_stock', 'reading_progress']),
            supabase.from('study_plan').select('subject,topics'),
            supabase.from('user_recipes').select('stock_qty,low_stock_threshold')
          ]);
          if(invErr) throw invErr;
          if(studyErr) throw studyErr;
          if(recipeErr) throw recipeErr;

          const inventory = Object.fromEntries((invRows || []).map(row => [row.key, row.data || {}]));
          const meds = { ...MEDS_STOCK_DEFAULT, ...(inventory.meds_stock || {}) };
          const book = { ...BOOK_DEFAULT, ...(inventory.reading_progress || {}) };
          const studyPending = (studyRows || [])
            .flatMap(row => Array.isArray(row.topics) ? row.topics : [])
            .filter(topic => !topic?.done).length;
          const recipesLow = (recipeRows || []).filter(row => {
            const qty = pn(row.stock_qty);
            const threshold = pn(row.low_stock_threshold);
            return qty > 0 && threshold > 0 && qty <= threshold;
          }).length;

          const lastBackupAt = metaGet('last_backup_at');
          const lastBackupMs = lastBackupAt ? new Date(lastBackupAt).getTime() : 0;
          const backupDue = !lastBackupMs || Math.floor((Date.now() - lastBackupMs) / 3600000) >= 72;

          setModuleAlerts({
            study: studyPending,
            health: pn(meds.roaccutan) <= 2 || pn(meds.minoxidil_finasteride) <= 2,
            books: pn(book.current_page) > 0 && pn(book.current_page) < pn(book.total_pages),
            recipes: recipesLow,
            notif: backupDue
          });
        } catch(_) {}
      }, []);

      // ── Auto-sync al arrancar: usa bootstrapRemoteState (no selects directos)
      const fetchCloudData = useCallback(async () => {
        setSyncLoadStatus('loading');
        setSyncLoadMsg('');
        try {
          // BUG FIX: usar bootstrapRemoteState (RPC) en vez de selects directos prohibidos
          const bootstrapData = await bootstrapRemoteState();
          const { weeklyCache: wc, dailyCache: dc, routinesCache: rc } =
            applyBootstrapToState(bootstrapData, {}, {});

          setAllWeeks(buildAllWeeks(wc, dc));
          if(Object.keys(rc).length > 0) setRoutineData(prev => ({ ...prev, ...rc }));

          setSyncLoadStatus('ok');
          setSyncLog(prev => ({ ...prev, lastSync: new Date().toLocaleTimeString('es-AR') }));
        } catch(e) {
          console.warn('[AutoSync]', e.message);
          setSyncLoadStatus('idle');
          setSyncLog(prev => ({ ...prev, lastError: e.message.slice(0,60) }));
        }
        setTimeout(()=>{ setSyncLoadStatus('idle'); setSyncLoadMsg(''); }, 4000);
      }, []);

      // ── AUTO-SYNC AL INICIO (v3)
      useEffect(()=>{
        // 0. Migrar localStorage legacy (enzo_v2_ → enzo_v3_*) — idempotente
        migrateLegacyLocalStorage();

        // 1. Carga local instantánea — local-first, sin esperar red
        const { weeklyCache, dailyCache, routinesCache } = loadLocalCaches();
        const initWk = currentWk >= START_WEEK ? currentWk : START_WEEK;
        if(!weeklyCache[initWk]) weeklyCache[initWk] = { dayMapping: {}, bodyWeight: '' };

        const localAllWeeks = buildAllWeeks(weeklyCache, dailyCache);
        if(!localAllWeeks[initWk]) localAllWeeks[initWk] = newWeek(initWk);
        setAllWeeks(localAllWeeks);

        // Rutinas locales
        const localRoutines = Object.fromEntries(
          Object.entries(routinesCache).map(([id, d]) => [id, d])
        );
        if(Object.keys(localRoutines).length > 0) setRoutineData(prev => ({ ...prev, ...localRoutines }));

        // 2. Bootstrap remoto en background (solo si hay sesión)
        supabase.auth.getSession().then(async ({ data: { session } }) => {
          if(!session) return;

          // claim_legacy_rows: migra filas viejas de Supabase al nuevo esquema (idempotente)
          supabase.rpc('claim_legacy_rows').then(()=>{}).catch(()=>{});

          try {
            const bootstrapData = await bootstrapRemoteState();
            const { weeklyCache: wc2, dailyCache: dc2, routinesCache: rc2, conflicts } =
              applyBootstrapToState(bootstrapData, weeklyCache, dailyCache);

            setAllWeeks(buildAllWeeks(wc2, dc2));
            bootstrapAppliedRef.current = true; // suppress auto-persist for this setState

            if(Object.keys(rc2).length > 0) setRoutineData(prev => ({ ...prev, ...rc2 }));

            // Cargar notification_settings del bootstrap para este device
            const remoteNotifSettings = (bootstrapData.notification_settings||[]).find(n => n.device_id === DEVICE_ID);
            if(remoteNotifSettings?.data?.notifs) {
              const localNotifs = lsNotifLoad(DEVICE_ID);
              const localTs  = localNotifs?._updatedAt || null;
              const remoteTs = remoteNotifSettings.updated_at;
              // Remoto gana si es más nuevo o no hay local
              if(!localTs || (remoteTs && remoteTs > localTs)) {
                lsNotifSave(DEVICE_ID, remoteNotifSettings.data.notifs);
              }
            }

            if(conflicts.length > 0) {
              console.warn('[Bootstrap] Conflictos detectados:', conflicts.length);
              metaSet('last_conflict', { count: conflicts.length, items: conflicts.map(c=>c.date), at: new Date().toISOString() });
              setSyncLoadMsg(`⚠ ${conflicts.length} conflicto(s) — ver debug`);
              setSyncLoadStatus('error');
              setTimeout(()=>{ setSyncLoadStatus('idle'); setSyncLoadMsg(''); }, 6000);
            } else {
              setSyncLog(prev => ({ ...prev, lastSync: new Date().toLocaleTimeString('es-AR') }));
            }
          } catch(e) {
            console.warn('[Bootstrap] error:', e.message);
            metaSet('last_error', e.message?.slice(0,100));
            setSyncLog(prev => ({ ...prev, lastError: e.message?.slice(0,60) }));
          }
        });

        // 3. Flush outbox al arrancar y cuando vuelve la red
        flushOutbox().catch(()=>{});
        window.addEventListener('online', flushOutbox);

        // 6. Suscripción Realtime — actualiza automáticamente desde cualquier dispositivo
        const channel = supabase.channel('enzo-sync')
          .on('postgres_changes', { event: '*', schema: 'public', table: 'daily_logs' }, (payload) => {
            const row = payload.new;
            if(!row?.date || isBeforeStart(row.date) || row.last_device_id === DEVICE_ID) return;
            const dateObj = new Date(row.date + 'T12:00:00');
            const wkKey   = getWeekKey(dateObj);
            const dayIdx  = dateObj.getDay();
            setAllWeeks(prev => {
              // Conflict resolution: local gana si es más nuevo
              const localTs  = prev[wkKey]?.tracker?.[dayIdx]?._updatedAt;
              if(localTs && row.updated_at && localTs > row.updated_at) return prev;
              const next = { ...prev };
              if(!next[wkKey]) next[wkKey] = hydrate(newWeek(wkKey));
              // BUG FIX: usar row.tracker/row.session (schema nuevo) en vez de row.data (schema viejo)
              const tracker = row.tracker || {};
              const sess    = row.session  || null;
              if(sess) next[wkKey] = { ...next[wkKey], sessions: { ...next[wkKey].sessions, [dayIdx]: sess } };
              next[wkKey] = { ...next[wkKey], tracker: { ...next[wkKey].tracker, [dayIdx]: { ...newDay(), ...tracker, meals: Array.isArray(tracker?.meals) ? tracker.meals : newDay().meals } } };
              // BUG FIX: lsDaySave (no lsSaveDay — función no existía)
              lsDaySave(row.date, { ...tracker, _session: sess, _revision: row.revision, _updatedAt: row.updated_at });
              return next;
            });
          })
          .on('postgres_changes', { event: '*', schema: 'public', table: 'weekly_configs' }, (payload) => {
            const row = payload.new;
            if(!row?.week_key || row.last_device_id === DEVICE_ID) return;
            if(isBeforeStart(row.week_key)) return;
            setAllWeeks(prev => {
              const next = { ...prev };
              const existing = prev[row.week_key] || newWeek(row.week_key);
              // BUG FIX: usar row.day_mapping/row.body_weight (schema nuevo)
              const bwStr = (row.body_weight !== undefined && row.body_weight !== null)
                ? String(row.body_weight).replace('.', ',') : existing.bodyWeight;
              const newWkData = {
                ...existing,
                dayMapping: row.day_mapping || existing.dayMapping,
                bodyWeight: bwStr,
                _revision:  row.revision,
                _updatedAt: row.updated_at,
              };
              next[row.week_key] = newWkData;
              lsWeekSave(row.week_key, newWkData);
              return next;
            });
          })
          .on('postgres_changes', { event: '*', schema: 'public', table: 'routines' }, (payload) => {
            const row = payload.new;
            if(!row?.routine_id || row.last_device_id === DEVICE_ID) return;
            // Routine updated from another device — apply to local state
            lsRoutineSave(row.routine_id, { ...row.data, _revision: row.revision, _updatedAt: row.updated_at });
            setRoutineData(prev => ({ ...prev, [row.routine_id]: { ...row.data, _revision: row.revision } }));
          })
          .subscribe();

        // 7. Mensajes del Service Worker
        const onSwMessage = (event) => {
          if(event.data?.type === 'MEDS_DONE') {
            const medId  = event.data.id;
            const medMap = { meds:'roacuttan', meds2:'dinner_combo' };
            const medKey = medMap[medId];
            if(medKey) {
              const todayWk  = getWeekKey(new Date());
              const todayIdx = String(new Date().getDay());
              const dateKey  = getDayDate(todayWk, parseInt(todayIdx));

              // Actualizar UI inmediatamente (optimista)
              setAllWeeks(prev => {
            const wk  = prev[todayWk] || newWeek(todayWk);
                const tr  = { ...wk.tracker };
                const updatedDay = medKey === 'dinner_combo'
                  ? { ...tr[todayIdx], meds: { ...(tr[todayIdx]?.meds||{}), finasteride: true, minoxidil: true } }
                  : { ...tr[todayIdx], meds: { ...(tr[todayIdx]?.meds||{}), [medKey]: true } };
                tr[todayIdx] = updatedDay;
                lsDaySave(dateKey, { ...updatedDay, _updatedAt: new Date().toISOString() });
                return { ...prev, [todayWk]: { ...wk, tracker: tr } };
              });

              const patchPromise = medKey === 'dinner_combo'
                ? Promise.all([
                    supabase.rpc('patch_med_status', { p_date: dateKey, p_med: 'finasteride', p_val: true, p_device_id: DEVICE_ID }),
                    supabase.rpc('patch_med_status', { p_date: dateKey, p_med: 'minoxidil', p_val: true, p_device_id: DEVICE_ID })
                  ])
                : supabase.rpc('patch_med_status', {
                    p_date:      dateKey,
                    p_med:       medKey,
                    p_val:       true,
                    p_device_id: DEVICE_ID
                  }).then(result => [result]);
              patchPromise.then((results) => {
                const firstError = results.find(r => r?.error)?.error;
                if(firstError) {
                  console.warn('[MEDS_DONE] patch_med_status falló, encolando:', firstError.message);
                  // Si falla por red, encolar en outbox
                  const wk = allWeeks[todayWk] || newWeek(todayWk);
                  const dayData = wk.tracker?.[todayIdx];
                  if(dayData) {
                    enqueueOutboxOp({
                      entity_type: 'daily_log',
                      entity_id:   dateKey,
                      payload:     { tracker: medKey === 'dinner_combo' ? { ...dayData, meds: { ...(dayData.meds||{}), finasteride: true, minoxidil: true } } : { ...dayData, meds: { ...(dayData.meds||{}), [medKey]: true } }, session: null },
                      base_revision: dayData._revision || null
                    }).catch(()=>{});
                  }
                } else {
                  metaSet('last_sync', new Date().toISOString());
                }
              }).catch(()=>{});
            }
          }

          // Acción pendiente del SW cuando la app se reabre sin auth fresca
          if(event.data?.type === 'PENDING_MED_ACTION') {
            const { medId, date } = event.data;
            const medMap = { meds:'roacuttan', meds2:'dinner_combo' };
            const medKey = medMap[medId];
            if(medKey && date) {
              const patchPromise = medKey === 'dinner_combo'
                ? Promise.all([
                    supabase.rpc('patch_med_status', { p_date: date, p_med: 'finasteride', p_val: true, p_device_id: DEVICE_ID }),
                    supabase.rpc('patch_med_status', { p_date: date, p_med: 'minoxidil', p_val: true, p_device_id: DEVICE_ID })
                  ])
                : supabase.rpc('patch_med_status', {
                    p_date: date, p_med: medKey, p_val: true, p_device_id: DEVICE_ID
                  });
              Promise.resolve(patchPromise).then(()=>{}).catch(()=>{});
            }
          }

          // SW avisa que hay red disponible → flush outbox
          if(event.data?.type === 'FLUSH_OUTBOX') {
            flushOutbox().catch(()=>{});
          }
        };
        if('serviceWorker' in navigator) navigator.serviceWorker.addEventListener('message', onSwMessage);

        // Manejar ?pending_med= en URL (app reabierta por el SW tras mark_done sin auth)
        const urlParams = new URLSearchParams(window.location.search);
        const pendingMedId   = urlParams.get('pending_med');
        const pendingMedDate = urlParams.get('pending_date');
        if(pendingMedId && pendingMedDate) {
          const medMap = { meds:'roacuttan', meds2:'dinner_combo' };
          const medKey = medMap[pendingMedId];
          if(medKey) {
            // Esperar a que haya sesión activa antes de persistir
            supabase.auth.getSession().then(({ data: { session: sess } }) => {
              if(!sess) return;
              const patchPromise = medKey === 'dinner_combo'
                ? Promise.all([
                    supabase.rpc('patch_med_status', { p_date: pendingMedDate, p_med: 'finasteride', p_val: true, p_device_id: DEVICE_ID }),
                    supabase.rpc('patch_med_status', { p_date: pendingMedDate, p_med: 'minoxidil', p_val: true, p_device_id: DEVICE_ID })
                  ])
                : supabase.rpc('patch_med_status', {
                    p_date: pendingMedDate, p_med: medKey, p_val: true, p_device_id: DEVICE_ID
                  });
              Promise.resolve(patchPromise).then(() => {
                // Limpiar params de URL sin recargar
                const clean = window.location.pathname + (window.location.search.replace(/[?&]pending_med=[^&]*/g,'').replace(/[?&]pending_date=[^&]*/g,'').replace(/^&/,'?') || '');
                window.history.replaceState({}, '', clean);
              }).catch(()=>{});
            });
          }
        }

        // Polling de outbox para el debug panel
        const outboxInterval = setInterval(async () => {
          try {
            const db = await openOutboxDB();
            const keys = await db.getAllKeys('outbox');
            setOutboxCount(keys.length);
          } catch(e) {}
        }, 5000);

        return () => {
          window.removeEventListener('online', flushOutbox);
          supabase.removeChannel(channel);
          if('serviceWorker' in navigator) navigator.serviceWorker.removeEventListener('message', onSwMessage);
          clearInterval(outboxInterval);
        };
      }, []);

      // ── Auto-persist (v3): localStorage inmediato + Supabase vía RPC con debounce
      const saveTimerRef        = useRef(null);
      const prevTrackerRef      = useRef(null);
      const prevWeeklyRef       = useRef(null);
      // Guard: evitar writes remotos innecesarios cuando allWeeks viene de bootstrap
      const bootstrapAppliedRef = useRef(false);

      useEffect(()=>{
        if(Object.keys(allWeeks).length===0) return;

        // 1. localStorage — namespace v3 (siempre, independiente de la fuente)
        Object.entries(allWeeks).forEach(([wkKey, wkData]) => {
          if(!isDateKey(wkKey)) return;
          lsWeekSave(wkKey, { dayMapping: wkData.dayMapping, bodyWeight: wkData.bodyWeight||'' });
          Object.entries(wkData.tracker||{}).forEach(([dayIdx, dayData]) => {
            const dateKey    = getDayDate(wkKey, parseInt(dayIdx));
            const daySession = wkData.sessions?.[dayIdx] || null;

      };
      const normalizeInventoryUnit = (unit='') => {
        const u = String(unit || '').trim().toLowerCase();
        if(!u) return '';
        if(['g','gramo','gramos'].includes(u)) return 'g';
        if(u === 'kg') return 'kg';
        if(['porcion','porciones'].includes(u)) return 'porcion';
        if(['unidad','unidades','u'].includes(u)) return 'unidad';
        return u;
      };
      const normalizeRecipeTextApp = (s='') =>
        String(s)
          .normalize('NFD')
          .replace(/[\u0300-\u036f]/g, '')
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, ' ')
          .trim()
          .replace(/\s+/g, ' ');
      const singularizeRecipeWordApp = (word='') => {
        const w = String(word || '').trim();
        if(!w) return '';
        if(w.endsWith('es') && w.length > 4) return w.slice(0, -2);
        if(w.endsWith('s') && w.length > 3) return w.slice(0, -1);
        return w;
      };
      const normalizeRecipeKeyApp = (text='') =>
        normalizeRecipeTextApp(text)
          .split(' ')
          .filter(Boolean)
          .map(singularizeRecipeWordApp)
          .join(' ');
      const unitToGramsApp = (value, unit) => {
        const u = String(unit || '').toLowerCase();
        if(u === 'kg') return value * 1000;
        if(u === 'g' || u === 'gramo' || u === 'gramos') return value;
        return null;
      };
      const unitToPortionsApp = (value, unit) => {
        const u = String(unit || '').toLowerCase();
        if(u === 'porcion' || u === 'porciones') return value;
        return null;
      };
      const scaleRecipeMacrosApp = (recipe, factor) => {
        const macrosBase = recipe.macros || {};
        return {
          cals: Math.round((parseFloat(macrosBase.cals) || 0) * factor),
          prot: Math.round((parseFloat(macrosBase.prot) || 0) * factor),
          carb: Math.round((parseFloat(macrosBase.carb) || 0) * factor),
          fat: Math.round((parseFloat(macrosBase.fat) || 0) * factor)
        };
      };
      const getRecipeUsageFactorApp = (recipe, item) => {
        const baseQty = parseFloat(recipe?.base_qty) || 1;
        const baseUnit = normalizeInventoryUnit(recipe?.base_unit || '');
        const stockUnit = normalizeInventoryUnit(recipe?.stock_unit || '');
        const delta = parseFloat(item?.stock_delta);
        const deltaUnit = normalizeInventoryUnit(item?.stock_delta_unit || item?.stock_unit || '');
        if(delta > 0 && deltaUnit) {
          const deltaGrams = unitToGramsApp(delta, deltaUnit);
          const baseGrams = unitToGramsApp(baseQty, baseUnit);
          if(deltaGrams && baseGrams) return deltaGrams / baseGrams;
          const deltaPortions = unitToPortionsApp(delta, deltaUnit);
          const basePortions = unitToPortionsApp(baseQty, baseUnit);
          if(deltaPortions && basePortions) return deltaPortions / basePortions;
          if(deltaUnit === 'unidad' && (baseUnit === 'unidad' || stockUnit === 'unidad')) return delta / baseQty;
          if(deltaUnit === 'porcion' && baseUnit === 'porcion') return delta / baseQty;
        }
        const baseCals = parseFloat(recipe?.macros?.cals) || 0;
        const itemCals = parseFloat(item?.cals) || 0;
        if(baseCals > 0 && itemCals > 0) return itemCals / baseCals;
        return 1;
      };
      const rebuildMealItemFromRecipeApp = (recipe, item) => {
        const factor = getRecipeUsageFactorApp(recipe, item);

          ...item,

          recipe_name: recipe.recipe_name || item.recipe_name,

          stock_unit: recipe.stock_unit || '',
          low_stock_threshold: recipe.low_stock_threshold,

      const mealItemUsesRecipeApp = (recipe, item) => {

        const recipeKeys = [recipe.recipe_name, ...((Array.isArray(recipe.aliases) ? recipe.aliases : []))]

          .map(normalizeRecipeKeyApp);
        const itemKeys = [item.recipe_name, item.name]
          .filter(Boolean)
          .map(normalizeRecipeKeyApp);
        return itemKeys.some(key =>

      const recalculateMealsUsingRecipe = useCallback((updatedRecipe) => {
