  <style>
    *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body { font-family: 'Barlow', sans-serif; -webkit-font-smoothing: antialiased; }
    :root {
      --green: #10B981; --green-dim: rgba(16,185,129,0.15); --green-glow: rgba(16,185,129,0.35);
      --indigo: #6366F1; --indigo-dim: rgba(99,102,241,0.15);
      --amber: #F59E0B;
      --red: #EF4444;
      --bg: #080D1A; --surface: #0F1729; --surface2: #162035; --border: #1E2D45;
    }
    /* Scrollbar */
    .hide-scroll { scrollbar-width: none; -ms-overflow-style: none; }
    .hide-scroll::-webkit-scrollbar { display: none; }
    /* Inputs */
    input[type="checkbox"] { accent-color: var(--green); width: 18px; height: 18px; cursor: pointer; flex-shrink:0; }
    input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(0.5); cursor: pointer; }
    input:focus, select:focus { outline: none; border-color: var(--indigo) !important; box-shadow: 0 0 0 2px rgba(99,102,241,0.2); }
    input, select { font-family: 'Barlow', sans-serif; }
    /* Layout */
    .pb-safe { padding-bottom: calc(76px + env(safe-area-inset-bottom, 8px)); }
    .pt-safe { padding-top: env(safe-area-inset-top, 0px); }
    /* Animations */
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.4)} }
    @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes urgentPulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
    .spin { animation: spin 0.9s linear infinite; }
    .fade-up { animation: fadeUp 0.2s ease-out forwards; }
    .timer-urgent { animation: urgentPulse 0.7s ease-in-out infinite; }
    /* Components */
    .glass-card { background: rgba(15,23,41,0.85); border: 1px solid #1E2D45; border-radius: 12px; }
    .set-row-done { border-left: 3px solid var(--green) !important; background: rgba(16,185,129,0.08) !important; }
    .bottom-nav { background: rgba(8,13,26,0.97); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid #1E2D45; }
    .section-toggle { width:100%; padding:12px 16px; display:flex; align-items:center; justify-content:space-between; background:rgba(22,32,53,0.4); border:none; cursor:pointer; color:white; }
    .section-toggle:hover { background:rgba(30,45,69,0.4); }
    /* Form elements */
    .inp { width:100%; background:#0F1729; border:1px solid #1E2D45; border-radius:8px; padding:8px 12px; font-size:14px; color:white; }
    .inp-xs { width:100%; background:#0F1729; border:1px solid #1E2D45; border-radius:6px; padding:4px 6px; font-size:12px; color:white; text-align:center; font-family:'JetBrains Mono',monospace; }
    .inp-sm { background:#0F1729; border:1px solid #1E2D45; border-radius:6px; padding:5px 8px; font-size:13px; color:white; }
    select.inp { appearance:none; }
    /* Table */
    .table-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; }
    table { width:100%; border-collapse:collapse; min-width:460px; }
    th { font-size:9px; text-transform:uppercase; letter-spacing:0.08em; color:#475569; padding:8px 6px; border-bottom:1px solid #1E2D45; font-weight:600; }
    td { padding:5px 6px; border-bottom:1px solid rgba(30,45,69,0.4); vertical-align:middle; }
    /* Buttons */
    .btn-icon { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; border:none; cursor:pointer; transition:all 0.15s; }
    .btn-icon:active { transform:scale(0.92); }
    .check-btn { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; border:none; cursor:pointer; margin:0 auto; transition:all 0.15s; }
    .check-btn:active { transform:scale(0.88); }
    /* Misc */
    .tag-rir { font-size:10px; font-family:'JetBrains Mono',monospace; font-weight:600; padding:2px 8px; border-radius:4px; background:rgba(10,15,30,0.8); border:1px solid #1E2D45; }
    .tag-rir.fallo { color:#EF4444; border-color:rgba(239,68,68,0.3); }
    .badge { display:inline-flex; align-items:center; gap:4px; font-size:11px; font-family:'JetBrains Mono',monospace; padding:3px 8px; border-radius:6px; }
    /* Accordion chevron */
    .chev { transition: transform 0.2s ease; }
    .chev.open { transform: rotate(180deg); }
    /* RPE Slider */
    .rpe-slider { width:100%; height:6px; border-radius:3px; appearance:none; -webkit-appearance:none; cursor:pointer;
      background: linear-gradient(to right, #6366F1, #10B981, #F59E0B, #EF4444); }
    .rpe-slider::-webkit-slider-thumb { appearance:none; width:18px; height:18px; background:white; border-radius:50%; border:2px solid #6366F1; }

    .recharts-tooltip-wrapper { font-family:'JetBrains Mono',monospace !important; }

  <!-- React shim: Recharts usa window.React internamente. Este shim mínimo

       cuando Recharts carga antes que cualquier React/Preact compat layer. -->
  <script>

    __noopValidator.isRequired = __noopValidator;

      useRef: function(v){return {current:v};},

  <!-- Recharts (UMD) — carga diferida: solo cuando se necesitan los gráficos -->
  <script>
    window._rechartsLoaded = false;
    window._loadRecharts = function() {
      if(window._rechartsLoaded) return Promise.resolve();
      // Bug 12 fix: NO marcar como cargado hasta que el script realmente cargue
      return new Promise(function(res, rej) {
        var s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/recharts@2.12.7/umd/Recharts.js';
        s.crossOrigin = 'anonymous';
        s.onload = function() {
          window._rechartsLoaded = true; // marcar DESPUÉS del éxito
          window._RC = window.Recharts || {};
          res();
        };
        s.onerror = function(e) {
          // No marcar como loaded → permite reintentar
          document.head.removeChild(s);
          rej(e);
        };
        document.head.appendChild(s);
      });
    };

    // html2canvas — carga diferida: solo al presionar exportar
    window._loadHtml2Canvas = function() {
      if(window.html2canvas) return Promise.resolve();
      return new Promise(function(res, rej) {
        var s = document.createElement('script');
        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
        s.onload = res;
        s.onerror = function(e) { document.head.removeChild(s); rej(e); };
        document.head.appendChild(s);
      });
    };
  </script>
  <!-- idb helper: wrapper mínimo nativo para la cola de Background Sync -->
  <script>
    window.idb = {
      openDB: function(name, version, callbacks) {
        return new Promise(function(res, rej) {
          var req = indexedDB.open(name, version);
          req.onupgradeneeded = function(e) {
            if(callbacks && callbacks.upgrade) callbacks.upgrade(e.target.result);
          };
          req.onsuccess = function(e) {
            var db = e.target.result;

            db.add = function(store, val) {
              return new Promise(function(r, j) {
                var tx = db.transaction(store, 'readwrite');
                var req2 = tx.objectStore(store).add(val);
                req2.onsuccess = function() { r(req2.result); };
                req2.onerror   = function() { j(req2.error); };
              });
            };

            // BUG FIX: estos métodos faltaban — el outbox nunca funcionó sin ellos
            db.put = function(store, val) {
              return new Promise(function(r, j) {
                var tx = db.transaction(store, 'readwrite');
                var req2 = tx.objectStore(store).put(val);
                req2.onsuccess = function() { r(req2.result); };
                req2.onerror   = function() { j(req2.error); };
              });
            };

            db.getAll = function(store) {
              return new Promise(function(r, j) {
                var tx = db.transaction(store, 'readonly');
                var req2 = tx.objectStore(store).getAll();
                req2.onsuccess = function() { r(req2.result || []); };
                req2.onerror   = function() { j(req2.error); };
              });
            };

            db.getAllKeys = function(store) {
              return new Promise(function(r, j) {
                var tx = db.transaction(store, 'readonly');
                var req2 = tx.objectStore(store).getAllKeys();
                req2.onsuccess = function() { r(req2.result || []); };
                req2.onerror   = function() { j(req2.error); };
              });
            };

            db.delete = function(store, key) {
              return new Promise(function(r, j) {
                var tx = db.transaction(store, 'readwrite');
                var req2 = tx.objectStore(store).delete(key);
                req2.onsuccess = function() { r(); };
                req2.onerror   = function() { j(req2.error); };
              });
            };

            res(db);
          };
          req.onerror = function(e) { rej(e.target.error); };
        });
      }
    };
  </script>

  <script>
    window.onerror = function(msg, src, line, col, err) {
      document.getElementById('splash').style.display = 'none';
      document.getElementById('error-screen').style.display = 'block';
      document.getElementById('error-msg').textContent = (err ? err.stack : msg) + '\n\nFuente: ' + src + ':' + line;
      return true;

    window.onunhandledrejection = function(e) {
      var r = e.reason;
      window.onerror(r && r.message || String(r), 'promise', 0, 0, r instanceof Error ? r : null);
    };
  </script>

    // ═══════════════════════════════════════════════════

    // ═══════════════════════════════════════════════════
    // pn: parsea números en formato ES-AR ("65,0" → 65, "1.250,5" → 1250.5)
    // Regla: el punto es separador de miles, la coma es decimal
    const pn = v => {
      if(!v && v !== 0) return 0;
      const s = String(v).trim();
      // Si tiene coma → ES-AR: quitar puntos de miles, reemplazar coma decimal
      if(s.includes(',')) {
        const n = parseFloat(s.replace(/\./g, '').replace(',', '.'));
        return isNaN(n) ? 0 : n;
      }
      // Sin coma → puede ser número puro o con punto decimal estándar
      const n = parseFloat(s);
      return isNaN(n) ? 0 : n;
    };
    const fn = v => { if(!v && v!==0) return "0"; const n=Number(v); return n.toLocaleString('es-AR',{maximumFractionDigits:1}); };
    const ft = s => { const m=Math.floor(s/60),sec=s%60; return `${m}:${sec<10?'0':''}${sec}`; };

    const getWeekStart = d => { const dt=new Date(d); const day=dt.getDay(); dt.setDate(dt.getDate()+(day===0?-6:1-day)); dt.setHours(0,0,0,0); return dt; };
    const _wkCache = new Map();
    const getWeekKey = d => {
      const key = d instanceof Date ? d.toDateString() : String(d);
      if(_wkCache.has(key)) return _wkCache.get(key);
      const result = getWeekStart(d).toISOString().split('T')[0];
      _wkCache.set(key, result);
      return result;
    };
    const addWeeks = (wk,n) => { const d=new Date(wk+'T00:00:00'); d.setDate(d.getDate()+n*7); return d.toISOString().split('T')[0]; };
    const isCurrentWeek = wk => getWeekKey(new Date())===wk;

    const isBeforeStart = wk => wk < START_WEEK;
    const formatWeekLabel = wk => {

      const M=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
      return d.getMonth()===e.getMonth()?`${d.getDate()}–${e.getDate()} ${M[d.getMonth()]} ${d.getFullYear()}`:`${d.getDate()} ${M[d.getMonth()]}–${e.getDate()} ${M[e.getMonth()]}`;

    // ─── v3 NAMESPACES ───────────────────────────────────────────

    const metaSet = (k, v) => { try { localStorage.setItem(V3.META+k, JSON.stringify(v)); } catch(e) {} };

    const getDeviceId = () => {

    const DEVICE_ID = getDeviceId();

    // ─── localStorage por namespace ───────────────────────────────
    const lsWeekSave  = (wk, v)  => { try { localStorage.setItem(V3.WEEK+wk, JSON.stringify(v)); } catch(e) {} };
    const lsWeekLoad  = (wk)     => { try { const v=localStorage.getItem(V3.WEEK+wk); return v?JSON.parse(v):null; } catch(e) { return null; } };
    const lsAllWeekKeys = ()     => Object.keys(localStorage).filter(k=>k.startsWith(V3.WEEK)).map(k=>k.slice(V3.WEEK.length)).sort().reverse();

    const lsDaySave   = (d, v)   => { try { localStorage.setItem(V3.DAY+d, JSON.stringify(v)); } catch(e) {} };
    const lsDayLoad   = (d)      => { try { const v=localStorage.getItem(V3.DAY+d); return v?JSON.parse(v):null; } catch(e) { return null; } };
    const lsAllDayKeys = ()      => Object.keys(localStorage).filter(k=>k.startsWith(V3.DAY)).map(k=>k.slice(V3.DAY.length)).sort().reverse();

    const lsRoutineSave = (id,v) => { try { localStorage.setItem(V3.ROUT+id, JSON.stringify(v)); } catch(e) {} };
    const lsRoutineLoad = (id)   => { try { const v=localStorage.getItem(V3.ROUT+id); return v?JSON.parse(v):null; } catch(e) { return null; } };
    const lsAllRoutineKeys = ()  => Object.keys(localStorage).filter(k=>k.startsWith(V3.ROUT)).map(k=>k.slice(V3.ROUT.length));

    const lsNotifSave = (did,v)  => { try { localStorage.setItem(V3.NOTIF+did, JSON.stringify(v)); } catch(e) {} };
    const lsNotifLoad = (did)    => { try { const v=localStorage.getItem(V3.NOTIF+did); return v?JSON.parse(v):null; } catch(e) { return null; } };

    // Compat aliases para código legacy
    const lsSave = (k, v) => isDateKey(k) ? lsDaySave(k, v) : lsWeekSave(k, v);
    const lsLoad = (k)    => isDateKey(k) ? lsDayLoad(k)    : lsWeekLoad(k);
    const lsAllKeys = () => [...lsAllWeekKeys(), ...lsAllDayKeys()];

    // ─── MIGRACIÓN desde enzo_v2_ ────────────────────────────────
    const migrateLegacyLocalStorage = () => {
      if(metaGet('migration_v3_done')) return;
      const oldKeys = Object.keys(localStorage).filter(k=>k.startsWith(V3.OLD));
      if(oldKeys.length === 0) { metaSet('migration_v3_done', true); return; }

      let migrated = 0;
      oldKeys.forEach(fullKey => {
        const key = fullKey.slice(V3.OLD.length);
        try {
          const raw = localStorage.getItem(fullKey);
          if(!raw) return;
          const val = JSON.parse(raw);
          if(!val) return;

          const hasWeekStruct = !!(val.dayMapping || val.sessions);
          const hasDayStruct  = !!(val.meds || val.meals || val.fasted !== undefined);
          const hasTracker    = !!(val.tracker);
          const isDateFmt     = isDateKey(key);

          if(hasTracker) {
            // Formato muy viejo: toda la semana en daily_logs
            const wkKey = key;
            if(!lsWeekLoad(wkKey)) lsWeekSave(wkKey, { dayMapping: val.dayMapping||{}, bodyWeight: val.bodyWeight||'' });
            Object.entries(val.tracker||{}).forEach(([idx, dayData]) => {
              const date = getDayDate(wkKey, parseInt(idx));
              if(!lsDayLoad(date)) lsDaySave(date, { ...dayData, _session: (val.sessions||{})[idx]||null });
            });
          } else if(hasWeekStruct && !hasDayStruct) {
            if(!lsWeekLoad(key)) lsWeekSave(key, val);
          } else if(hasDayStruct && !hasWeekStruct) {
            if(!lsDayLoad(key)) lsDaySave(key, val);
          } else if(isDateFmt) {
            const dow = new Date(key+'T12:00:00').getDay();
            if(dow === 1 && hasWeekStruct) {
              if(!lsWeekLoad(key)) lsWeekSave(key, val);
              if(!lsDayLoad(key))  lsDaySave(key, val); // preservar ambos
              console.warn('[Migration] Ambigüedad lunes:', key);
            } else {
              if(!lsDayLoad(key)) lsDaySave(key, val);
            }
          }
          migrated++;
        } catch(e) { console.warn('[Migration] error en', fullKey, e.message); }
      });

      metaSet('migration_v3_done', true);
      console.info('[Migration] v2→v3:', migrated, '/', oldKeys.length, 'keys');

    // ─── HELPERS de fechas ───────────────────────────────────────
    const isDateKey = k => /^\d{4}-\d{2}-\d{2}$/.test(k);

    // ─── OUTBOX con dedupe por entity_type+entity_id ─────────────

    const enqueueOutboxOp = async ({ entity_type, entity_id, payload, base_revision }) => {
      try {
        const db = await openOutboxDB();
        await db.put('outbox', {
          entity_key: `${entity_type}:${entity_id}`,
          entity_type, entity_id, payload, base_revision,
          queued_at: Date.now(), retries: 0, device_id: DEVICE_ID
        });

    };

    const flushOutbox = async () => {
      if(!navigator.onLine || !window.idb) return;
      try {
        const db    = await openOutboxDB();
        const items = await db.getAll('outbox');
        if(!items || items.length === 0) return;

        for(const item of items) {
          try {
            let rpcName, rpcArgs;
            if(item.entity_type === 'daily_log') {
              rpcName = 'save_daily_log';
              rpcArgs = { p_date: item.entity_id, p_tracker: item.payload.tracker, p_session: item.payload.session||null, p_base_revision: item.base_revision||null, p_device_id: DEVICE_ID };
            } else if(item.entity_type === 'weekly_config') {
              rpcName = 'save_weekly_config';
              rpcArgs = { p_week_key: item.entity_id, p_body_weight: item.payload.body_weight||null, p_day_mapping: item.payload.day_mapping||{}, p_base_revision: item.base_revision||null, p_device_id: DEVICE_ID };
            } else if(item.entity_type === 'routine') {
              rpcName = 'save_routine';
              rpcArgs = { p_routine_id: item.entity_id, p_data: item.payload, p_base_revision: item.base_revision||null, p_device_id: DEVICE_ID };
            } else continue;

            const { data, error } = await supabase.rpc(rpcName, rpcArgs);
            if(error) throw new Error(error.message);

            // BUG FIX: conflictos vienen en data.status, no en error
            if(data?.status === 'conflict') {
              metaSet('last_conflict', { entity_key: item.entity_key, server: data.server, at: new Date().toISOString() });
              await db.delete('outbox', item.entity_key); // no reintentar un conflicto
            } else {
              await db.delete('outbox', item.entity_key);
            }
          } catch(e) {
            if(!navigator.onLine) break;
            item.retries = (item.retries||0) + 1;
            if(item.retries >= 5) await db.delete('outbox', item.entity_key);
            else await db.put('outbox', item);
          }
        }
        metaSet('last_sync', new Date().toISOString());
        console.info('[Outbox] flush ok');
      } catch(e) {
        metaSet('last_error', e.message?.slice(0,100));

    const bodyWeightToNumeric = (bw) => {

          p_date: date, p_tracker: tracker, p_session: session||null,

        if(error) throw new Error(error.message);

        // Actualizar revision local con la del servidor

        metaSet('last_sync', new Date().toISOString());
        return { ok: true, queued: false };

        const isNet = !navigator.onLine || e.name==='TypeError' || e.message?.includes('fetch');

        // Actualizar revision local

    // ─── BOOTSTRAP vía RPC get_bootstrap_state ───────────────────
    const bootstrapRemoteState = async () => {
      const eightWeeksAgo = addWeeks(getWeekKey(new Date()), -8);
      const { data, error } = await supabase.rpc('get_bootstrap_state', { p_from: eightWeeksAgo });
      if(error || !data) throw new Error(error?.message || 'Bootstrap vacío');

    // ─── CARGA LOCAL ─────────────────────────────────────────────
    const loadLocalCaches = () => {
      const weeklyCache = {}, dailyCache = {}, routinesCache = {};
      lsAllWeekKeys().filter(k=>!isBeforeStart(k)&&isDateKey(k)).forEach(wk => {
        const d=lsWeekLoad(wk); if(d) weeklyCache[wk]=d;

      lsAllDayKeys().filter(k=>!isBeforeStart(k)).forEach(dt => {

    const getFastStats = (t) => {
      if(!t.fasted || !t.fastStartTime) return {endStr:null, rollover:false, walkStr:null, isFasted:false};

      const [sH, sM] = t.fastStartTime.split(':').map(Number);
      const dur = pn(t.fastHours);

      if(isNaN(sH) || dur <= 0) return {endStr:null, rollover:false, walkStr:null, isFasted:false};

      const totalMinutos = sH * 60 + sM + (dur * 60);
      const finH = Math.floor(totalMinutos / 60) % 24;
      const finM = Math.round(totalMinutos % 60);
      const rollover = totalMinutos >= 1440;
      const baseStr = `${String(finH).padStart(2,'0')}:${String(finM).padStart(2,'0')}`;
      const endStr = rollover ? `${baseStr} (Mañana)` : baseStr;

      // Caminata en ayuno
      let walkStr = null, isFasted = false;
      if(t.walked && t.walkStartTime) {
        const [wH, wM] = t.walkStartTime.split(':').map(Number);
        if(!isNaN(wH)) {
          let diff = (wH * 60 + wM) - (sH * 60 + sM);
          if(diff < 0) diff += 1440;
          isFasted = diff <= (dur * 60);
          walkStr = isFasted
            ? `Caminata en ayuno (${fn(diff/60)} hs)`
            : `Fuera del ayuno (+${fn((diff - dur*60)/60)} hs)`;
        }
      }

      return {endStr, rollover, walkStr, isFasted};
    };

      { id:'meds2',  label:'💊 Medicación noche', time:'23:30', enabled:false },
    ];

    // Carga notifs: v3 namespace → legacy → defaults
    const loadNotifsLocal = () => {
      const v3 = lsNotifLoad(DEVICE_ID);
      if(v3) return Array.isArray(v3) ? v3 : (v3.notifs || defaultNotifs);
      try { const s = localStorage.getItem(NOTIF_KEY); if(s) return JSON.parse(s); } catch(e) {}
      return defaultNotifs;
    };

    const NotifView = () => {
      const [notifs,    setNotifs]    = useState(() => loadNotifsLocal());
      const [perm,      setPerm]      = useState(typeof Notification!=='undefined'?Notification.permission:'denied');
      const [syncMsg,   setSyncMsg]   = useState('');
      const [swInfo,    setSwInfo]    = useState({ ready: false, controlling: false, authValid: false, schedCount: 0 });
      const [timers]    = useState({});

      // Obtener estado del SW al montar
      useEffect(() => {
        if(!('serviceWorker' in navigator)) return;
        navigator.serviceWorker.ready.then(reg => {
          const ctrl = navigator.serviceWorker.controller;
          if(ctrl) {
            const onMsg = (e) => {
              if(e.data?.type === 'SW_DEBUG_RESPONSE') {
                setSwInfo({
                  ready:       true,
                  controlling: true,
                  authValid:   e.data.authValid || false,
                  schedCount:  e.data.scheduledCount || 0,
                });
                navigator.serviceWorker.removeEventListener('message', onMsg);
              }
            };
            navigator.serviceWorker.addEventListener('message', onMsg);
            ctrl.postMessage({ type: 'SW_DEBUG_REQUEST' });
            setTimeout(() => navigator.serviceWorker.removeEventListener('message', onMsg), 3000);
          } else {
            setSwInfo({ ready: true, controlling: false, authValid: false, schedCount: 0 });
          }
        }).catch(() => {});
      }, []);

      const persistAndSync = async (n) => {
        setNotifs(n);
        // 1. localStorage v3 por device_id
        lsNotifSave(DEVICE_ID, n);
        // 2. Sincronizar con Supabase (best-effort)
        try {
          const { error } = await supabase.rpc('save_notification_settings', {
            p_device_id:     DEVICE_ID,
            p_data:          { notifs: n },
            p_base_revision: null
          });
          if(!error) setSyncMsg('✓ Guardado');
          else       setSyncMsg('⚠ Sin sync remoto');
        } catch(e) { setSyncMsg('⚠ Sin red'); }
        setTimeout(() => setSyncMsg(''), 2500);
        scheduleAll(n);
      };

      const requestPerm = async () => {
        if(typeof Notification === 'undefined') return;
        const p = await Notification.requestPermission();
        setPerm(p);
        if(p === 'granted') scheduleAll(notifs);
      };

      const scheduleAll = (list) => {
        if(typeof Notification === 'undefined' || Notification.permission !== 'granted') return;

        // Enviar al Service Worker (persiste aunque se cierre la pestaña)
        if('serviceWorker' in navigator) {
          navigator.serviceWorker.ready.then(reg => {
            if(reg.active) reg.active.postMessage({ type: 'SW_SET_SCHEDULE', notifs: list });
          }).catch(() => {});
        }

        // Fallback setTimeout (funciona si la pestaña está abierta)
        Object.values(timers).forEach(clearTimeout);
        const now = new Date();
        list.filter(n => n.enabled).forEach(n => {
          const [h, m] = n.time.split(':').map(Number);
          const target = new Date(now); target.setHours(h, m, 0, 0);
          if(target <= now) target.setDate(target.getDate() + 1);
          timers[n.id] = setTimeout(() => {
            if(Notification.permission !== 'granted') return;
            if('serviceWorker' in navigator) {
              navigator.serviceWorker.ready.then(reg => {
                if(reg?.showNotification) {
                  reg.showNotification('Enzo Training', {
                    body:   n.label,
                    icon:   './icon-192.png',
                    badge:  './icon-192.png',
                    tag:    `fallback-${n.id}-${Date.now()}`,
                    data:   { id: n.id, time: n.time }
                  }).catch(() => {});
                }
              }).catch(() => {});
            }
          }, target - now);
        });
      };

      const sendTestNotif = () => {
        if(Notification.permission !== 'granted') return;
        if('serviceWorker' in navigator) {
          navigator.serviceWorker.ready.then(reg => {
            if(reg.active) reg.active.postMessage({ type: 'SW_TEST_NOTIFICATION' });
          }).catch(() => {});
        }
      };

      const toggle  = (id)   => persistAndSync(notifs.map(n => n.id===id ? { ...n, enabled:!n.enabled } : n));
      const setTime = (id,t) => persistAndSync(notifs.map(n => n.id===id ? { ...n, time:t } : n));

      const swStatusColor = swInfo.controlling ? '#10B981' : '#F59E0B';
      const swStatusLabel = !swInfo.ready ? '—' : swInfo.controlling ? '✓ Activo' : '⚠ No controla';

      return html`
        <div class="fade-up" style="display:flex;flex-direction:column;gap:12px;">
          <${Card}>
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
              <p style="margin:0;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#6366F1;">🔔 Recordatorios Diarios</p>
              ${syncMsg && html`<span style="font-size:10px;font-family:'JetBrains Mono',monospace;color:${syncMsg.startsWith('✓')?'#10B981':'#F59E0B'};">${syncMsg}</span>`}
            </div>

            <!-- Nota por dispositivo -->
            <div style="padding:8px 10px;border-radius:6px;background:rgba(99,102,241,0.08);border:1px solid rgba(99,102,241,0.2);margin-bottom:12px;">
              <p style="margin:0;font-size:11px;color:#6366F1;">📱 Estas alertas se configuran <strong>por dispositivo</strong>. Los horarios de este dispositivo no afectan a los demás.</p>
            </div>

            ${perm !== 'granted' && html`
              <div style="padding:10px;border-radius:8px;background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);margin-bottom:12px;">
                <p style="margin:0 0 8px;font-size:12px;color:#F59E0B;">Permisos de notificación requeridos</p>
                <button onClick=${requestPerm}
                  style="padding:8px 16px;border-radius:8px;border:none;background:#F59E0B;color:#080D1A;font-weight:700;font-family:'Barlow Condensed',sans-serif;cursor:pointer;font-size:13px;">
                  Activar notificaciones
                </button>
              </div>
            `}

            ${perm === 'granted' && html`
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
                <div class="badge" style="background:rgba(16,185,129,0.1);color:#10B981;">✓ Notificaciones activadas</div>
                <button onClick=${sendTestNotif}
                  style="padding:5px 10px;border-radius:6px;border:1px solid rgba(99,102,241,0.4);background:rgba(99,102,241,0.1);color:#6366F1;font-size:11px;font-family:'Barlow Condensed',sans-serif;font-weight:700;cursor:pointer;">
                  🔔 Probar ahora
                </button>
              </div>
            `}

            <div style="display:flex;flex-direction:column;gap:8px;">
              ${notifs.map(n => html`
                <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;background:rgba(10,15,30,0.5);border:1px solid ${n.enabled?'rgba(99,102,241,0.4)':'#1E2D45'};">
                  <input type="checkbox" checked=${n.enabled} onChange=${()=>toggle(n.id)} style="width:18px;height:18px;"/>
                  <span style="flex:1;font-size:14px;color:${n.enabled?'#e2e8f0':'#64748b'};">${n.label}</span>
                  <input type="time" value=${n.time} onInput=${e=>setTime(n.id,e.target.value)}
                    style="background:#0F1729;border:1px solid #1E2D45;border-radius:6px;padding:4px 8px;font-size:13px;color:${n.enabled?'white':'#64748b'};font-family:'JetBrains Mono',monospace;"/>
                </div>
              `)}
            </div>
          <//>

          <!-- Estado del SW y notificaciones -->
          <${Card}>
            <p style="margin:0 0 10px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#475569;">Estado de notificaciones</p>
            <div style="display:flex;flex-direction:column;gap:6px;font-size:11px;font-family:'JetBrains Mono',monospace;">
              ${[
                ['Permiso',    perm === 'granted' ? '✓ granted' : perm],
                ['SW',         swStatusLabel],
                ['Auth en SW', swInfo.authValid ? '✓ Sí (mark_done funciona offline)' : '✗ No (necesita app abierta)'],
                ['Programadas', swInfo.schedCount + ' alertas activas'],
                ['⚠ Sin Web Push', 'Las notificaciones requieren pestaña/app abierta o SW activo. No se garantiza entrega si el navegador suspende el SW.'],
              ].map(([k,v]) => html`
                <div style="display:flex;justify-content:space-between;gap:8px;padding:3px 0;border-bottom:1px solid rgba(30,45,69,0.5);">
                  <span style="color:#64748b;flex-shrink:0;">${k}</span>
                  <span style="color:${k==='SW'?swStatusColor:k==='⚠ Sin Web Push'?'#F59E0B':'#94a3b8'};text-align:right;">${v}</span>
                </div>
              `)}
            </div>
          <//>
        </div>
      `;
    };

    // ═══════════════════════════════════════════════════
    //  EDITOR DE RUTINAS

    const RoutineEditor = ({routines, onSave}) => {
      const [rts, setRts] = useState(routines);
      const [selId, setSelId] = useState(Object.keys(routines)[0]||'1');
      const [dirty, setDirty] = useState(false);

      const upd = (fn) => { setRts(r=>{ const n=fn(r); setDirty(true); return n; }); };

      const updateExName = (ei, val) => upd(r=>({...r,[selId]:{...r[selId],exercises:r[selId].exercises.map((ex,i)=>i===ei?{...ex,name:val}:ex)}}));
      // Parsear "3 min", "1,5 min", "90 seg" → segundos
      const parseRestStr = (str) => {
        const s = String(str).trim().toLowerCase();
        const numMatch = s.match(/[\d,\.]+/);
        if(!numMatch) return null;
        const num = pn(numMatch[0]);
        if(s.includes('seg') || s.includes('s)')) return Math.round(num);
        return Math.round(num * 60); // minutos por defecto
      };

      const updateSet = (ei,si,field,val) => upd(r=>{
        const exercises = r[selId].exercises.map((ex,i)=>i===ei ? {
          ...ex,
          sets: ex.sets.map((s,j)=>j===si ? (() => {
            const updated = {...s, [field]: val};
            // Bug 9 fix: sincronizar restSecs cuando cambia restStr
            if(field === 'restStr') {
              const secs = parseRestStr(val);
              if(secs !== null) updated.restSecs = secs;
            }
            // Y si cambia restSecs directamente, actualizar restStr
            if(field === 'restSecs') {
              const secs = parseInt(val);
              if(!isNaN(secs)) updated.restStr = secs >= 60
                ? `${(secs/60).toFixed(secs%60===0?0:1).replace('.',',')} min`
                : `${secs} seg`;
            }
            return updated;
          })() : s)
        } : ex);
        return {...r, [selId]: {...r[selId], exercises}};
      });
      const addSet       = (ei) => upd(r=>({...r,[selId]:{...r[selId],exercises:r[selId].exercises.map((ex,i)=>i===ei?{...ex,sets:[...ex.sets,{reps:'10',weight:'0,0',rir:'2',restSecs:90,restStr:'1,5 min'}]}:ex)}}));
      const removeSet    = (ei,si) => upd(r=>({...r,[selId]:{...r[selId],exercises:r[selId].exercises.map((ex,i)=>i===ei?{...ex,sets:ex.sets.filter((_,j)=>j!==si)}:ex)}}));
      const addExercise  = () => upd(r=>({...r,[selId]:{...r[selId],exercises:[...r[selId].exercises,{name:'Nuevo ejercicio',sets:[{reps:'10',weight:'0,0',rir:'2',restSecs:90,restStr:'1,5 min'}]}]}}));
      const removeExercise=(ei)=> upd(r=>({...r,[selId]:{...r[selId],exercises:r[selId].exercises.filter((_,i)=>i!==ei)}}));

      const handleSave = () => { onSave(rts); setDirty(false); };

      const routine = rts[selId];

      return html`
        <div class="fade-up" style="display:flex;flex-direction:column;gap:12px;">
          <${Card}>
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
              <p style="margin:0;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#10B981;">✏️ Editor de Rutinas</p>
              ${dirty && html`
                <button onClick=${handleSave}
                  style="padding:7px 16px;border-radius:8px;border:none;background:#10B981;color:#080D1A;font-weight:700;font-family:'Barlow Condensed',sans-serif;font-size:13px;cursor:pointer;letter-spacing:0.05em;">
                  GUARDAR CAMBIOS
                </button>
              `}
            </div>

            <!-- Selector de rutina -->
            <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;">
              ${Object.values(rts).map(r => html`
                <button onClick=${()=>setSelId(r.id)}
                  style=${`padding:6px 14px;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;cursor:pointer;border:1px solid ${selId===r.id?'#10B981':'#1E2D45'};background:${selId===r.id?'rgba(16,185,129,0.15)':'transparent'};color:${selId===r.id?'#10B981':'#64748b'};`}>
                  ${r.name}
                </button>
              `)}
            </div>

            <!-- Lista de ejercicios -->
            <div style="display:flex;flex-direction:column;gap:12px;">
              ${routine?.exercises.map((ex, ei) => html`
                <div style="padding:10px;border-radius:8px;background:rgba(10,15,30,0.5);border:1px solid #1E2D45;">
                  <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
                    <span style="font-size:11px;font-family:'JetBrains Mono',monospace;color:#6366F1;flex-shrink:0;">${ei+1}.</span>
                    <input value=${ex.name} onInput=${e=>updateExName(ei,e.target.value)}
                      style="flex:1;background:#0F1729;border:1px solid #2A3F5F;border-radius:6px;padding:6px 10px;font-size:13px;color:white;font-family:'Barlow',sans-serif;"/>
                    <button onClick=${()=>removeExercise(ei)}
                      style="width:28px;height:28px;border-radius:6px;border:none;background:rgba(239,68,68,0.15);color:#EF4444;font-size:16px;cursor:pointer;flex-shrink:0;">×</button>
                  </div>
                  <!-- Sets -->
                  <div style="display:flex;flex-direction:column;gap:4px;margin-bottom:8px;">
                    <div style="display:grid;grid-template-columns:32px 1fr 1fr 1fr 1fr 28px;gap:4px;padding:0 2px;">
                      ${['#','Reps','Kg','RIR','Pausa',''].map(h=>html`<span style="font-size:9px;text-transform:uppercase;color:#475569;text-align:center;">${h}</span>`)}
                    </div>
                    ${ex.sets.map((s,si) => html`
                      <div style="display:grid;grid-template-columns:32px 1fr 1fr 1fr 1fr 28px;gap:4px;align-items:center;">
                        <span style="font-size:10px;color:#475569;text-align:center;font-family:'JetBrains Mono',monospace;">${si+1}</span>
                        ${['reps','weight','rir','restStr'].map(f => html`
                          <input value=${s[f]} onInput=${e=>updateSet(ei,si,f,e.target.value)}
                            style="background:#0a0f1e;border:1px solid #1E2D45;border-radius:5px;padding:4px 6px;font-size:11px;color:white;text-align:center;font-family:'JetBrains Mono',monospace;width:100%;"/>
                        `)}
                        <button onClick=${()=>removeSet(ei,si)}
                          style="width:28px;height:24px;border-radius:5px;border:none;background:rgba(239,68,68,0.1);color:#EF4444;font-size:14px;cursor:pointer;">×</button>
                      </div>
                    `)}
                  </div>
                  <button onClick=${()=>addSet(ei)}
                    style="width:100%;padding:5px;border-radius:6px;border:1px dashed #1E2D45;background:transparent;color:#475569;font-size:11px;cursor:pointer;">
                    + Agregar serie
                  </button>
                </div>
              `)}
            </div>
            <button onClick=${addExercise}
              style="width:100%;margin-top:10px;padding:10px;border-radius:8px;border:1px dashed rgba(99,102,241,0.4);background:transparent;color:#6366F1;font-size:12px;font-weight:700;font-family:'Barlow Condensed',sans-serif;cursor:pointer;letter-spacing:0.05em;">
              + AGREGAR EJERCICIO
            </button>
          <//>
        </div>
      `;
    };

    // ═══════════════════════════════════════════════════
    //  PANEL HÁBITOS
    // ═══════════════════════════════════════════════════
    const getYesterdayFast = (allWeeks, currentWk, activeDay) => {
      try {
        const todayStr = getDayDate(currentWk, parseInt(activeDay));
        const todayDt = new Date(todayStr + 'T12:00:00');
        const prevDt = new Date(todayDt); prevDt.setDate(todayDt.getDate() - 1);

        const prevWk = getWeekKey(prevDt);
        const prevDayIdx = prevDt.getDay();
        const prevTracker = allWeeks[prevWk]?.tracker?.[prevDayIdx];

        if(prevTracker && prevTracker.fasted && prevTracker.fastStartTime && prevTracker.fastHours) {
          const [sH, sM] = prevTracker.fastStartTime.split(':').map(Number);
          const dur = pn(prevTracker.fastHours);
          if(!isNaN(sH) && dur > 0) {
            const startDateTime = new Date(prevDt);
            startDateTime.setHours(sH, sM, 0, 0);
            const endDateTime = new Date(startDateTime.getTime() + (dur * 3600000));

            const todayStart = new Date(todayDt); todayStart.setHours(0,0,0,0);
            if(endDateTime > todayStart) {
               const finH = String(endDateTime.getHours()).padStart(2,'0');
               const finM = String(endDateTime.getMinutes()).padStart(2,'0');
               return `⏳ Ayuno de ayer en curso: finaliza a las ${finH}:${finM}`;
            }
          }
        }
      } catch(e) {}
      return null;
    };

    const HabitsPanel = ({tracker:t, yesterdayFastMsg, onChange, onMed, onMeal, onAddItem, onRemoveItem}) => {
      const [open,setOpen] = useState(true);
      const [aiLoading, setAiLoading] = useState([false,false,false]);
      const [aiError,   setAiError]   = useState(['','','']);
      const [recipeSaving, setRecipeSaving] = useState([false,false,false]);
      const [recipeMsg, setRecipeMsg] = useState(['','','']);
      const [savedRecipes, setSavedRecipes] = useState([]);
      const [recipesLoading, setRecipesLoading] = useState(true);
      const [recipesError, setRecipesError] = useState('');
      const [editingRecipeId, setEditingRecipeId] = useState(null);
      const [editingRecipeName, setEditingRecipeName] = useState('');
      const [editingRecipeBaseQty, setEditingRecipeBaseQty] = useState('1');
      const [editingRecipeBaseUnit, setEditingRecipeBaseUnit] = useState('porcion');
      const [editingRecipeCals, setEditingRecipeCals] = useState('0');
      const [editingRecipeProt, setEditingRecipeProt] = useState('0');
      const [editingRecipeCarb, setEditingRecipeCarb] = useState('0');
      const [editingRecipeFat, setEditingRecipeFat] = useState('0');
      const [editingRecipeIngredients, setEditingRecipeIngredients] = useState('');
      const [editingRecipeNotes, setEditingRecipeNotes] = useState('');
      const [editingRecipeSaving, setEditingRecipeSaving] = useState(false);
      const [stockBusyKey, setStockBusyKey] = useState('');
      const recipesRef = useRef(null);

      const fs = getFastStats(t);

      // Totales diarios calculados desde items
      const macros = dayTotals(t.meals);

      const normalizeRecipeText = (s='') =>
        String(s)
          .normalize('NFD')
          .replace(/[\u0300-\u036f]/g, '')
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, ' ')
          .trim()
          .replace(/\s+/g, ' ');

      const parseRecipeAmount = (text='') => {
        const m = String(text).toLowerCase().match(/(\d+(?:[.,]\d+)?)\s*(kg|g|gramos?|porciones?|porcion|u|unidades?)/);
        if(!m) return null;
        return {
          value: parseFloat(m[1].replace(',', '.')),
          unit: m[2]
        };
      };

      const parseRecipeCountNoun = (text='') => {
        const m = String(text).trim().match(/^(\d+(?:[.,]\d+)?)\s+(.+)$/i);
        if(!m) return null;
        return {
          value: parseFloat(String(m[1]).replace(',', '.')),
          noun: normalizeRecipeText(m[2] || '')
        };
      };

      const stripRecipeAmount = (text='') =>
        normalizeRecipeText(String(text).replace(/(\d+(?:[.,]\d+)?)\s*(kg|g|gramos?|porciones?|porcion|u|unidades?)/ig, ' '));

      const singularizeWord = (word='') => {
        const w = String(word || '').trim();
        if(!w) return '';
        if(w.endsWith('es') && w.length > 4) return w.slice(0, -2);
        if(w.endsWith('s') && w.length > 3) return w.slice(0, -1);
        return w;
      };

      const normalizeRecipeKey = (text='') =>
        normalizeRecipeText(text)
          .split(' ')
          .filter(Boolean)
          .map(singularizeWord)
          .join(' ');

      const unitToGrams = (value, unit) => {
        const u = String(unit||'').toLowerCase();
        if(u === 'kg') return value * 1000;
        if(u === 'g' || u === 'gramo' || u === 'gramos') return value;
        return null;
      };

      const unitToPortions = (value, unit) => {
        const u = String(unit||'').toLowerCase();
        if(u === 'porcion' || u === 'porciones') return value;
        return null;
      };

      const formatRecipeQty = (value, unit) => {
        const n = Number(value);
        const clean = Number.isInteger(n) ? String(n) : String(Math.round(n * 100) / 100).replace('.', ',');
        return `${clean} ${unit}`.trim();
      };

      const normalizeStockUnit = (unit='') => {
        const u = normalizeRecipeText(unit);
        if(!u) return '';
        if(['g','gramo','gramos'].includes(u)) return 'g';
        if(u === 'kg') return 'kg';
        if(['porcion','porciones'].includes(u)) return 'porcion';
        if(['unidad','unidades','u'].includes(u)) return 'unidad';
        return u;
      };

      const scaleRecipeMacros = (recipe, factor) => {
        const macrosBase = recipe.macros || {};
        return {
          cals: Math.round((parseFloat(macrosBase.cals) || 0) * factor),
          prot: Math.round((parseFloat(macrosBase.prot) || 0) * factor),
          carb: Math.round((parseFloat(macrosBase.carb) || 0) * factor),
          fat:  Math.round((parseFloat(macrosBase.fat)  || 0) * factor)
        };
      };

      const findRecipeMatch = (recipes, inputText) => {
        const raw = String(inputText || '').trim();
        const normalizedFull = normalizeRecipeText(raw);
        const normalizedNameOnly = stripRecipeAmount(raw);
        const normalizedFullKey = normalizeRecipeKey(raw);
        const normalizedNameKey = normalizeRecipeKey(normalizedNameOnly);
        const parsedAmount = parseRecipeAmount(raw);
        const parsedCountNoun = parseRecipeCountNoun(raw);
        const exactMatches = [];
        const fuzzyMatches = [];

        for(const recipe of (recipes || [])) {
          const names = [recipe.recipe_name, ...((Array.isArray(recipe.aliases) ? recipe.aliases : []))]
            .filter(Boolean)
            .map(normalizeRecipeText);
          const keys = [recipe.recipe_name, ...((Array.isArray(recipe.aliases) ? recipe.aliases : []))]
            .filter(Boolean)
            .map(normalizeRecipeKey);
          const exact =
            names.includes(normalizedFull) ||
            names.includes(normalizedNameOnly) ||
            keys.includes(normalizedFullKey) ||
            keys.includes(normalizedNameKey) ||
            (parsedCountNoun && keys.includes(parsedCountNoun.noun));

          const fuzzy =
            !exact &&
            (
              keys.some(k => k && (normalizedFullKey.includes(k) || k.includes(normalizedFullKey) || normalizedNameKey.includes(k) || k.includes(normalizedNameKey))) ||
              (parsedCountNoun && keys.some(k => k && (parsedCountNoun.noun.includes(k) || k.includes(parsedCountNoun.noun))))
            );

          if(!exact && !fuzzy) continue;

          let factor = 1;
          let qty = formatRecipeQty(recipe.base_qty || 1, recipe.base_unit || 'porcion');
          let stockDelta = parseFloat(recipe.base_qty) || 1;
          let stockDeltaUnit = normalizeStockUnit(recipe.base_unit || 'porcion');

          if(parsedAmount?.value > 0) {
            const baseQty = parseFloat(recipe.base_qty) || 1;
            const inputGrams = unitToGrams(parsedAmount.value, parsedAmount.unit);
            const baseGrams = unitToGrams(baseQty, recipe.base_unit);
            const inputPortions = unitToPortions(parsedAmount.value, parsedAmount.unit);
            const basePortions = unitToPortions(baseQty, recipe.base_unit);

            if(inputGrams && baseGrams) {
              factor = inputGrams / baseGrams;
              qty = `${formatRecipeQty(parsedAmount.value, parsedAmount.unit)} (${recipe.base_unit})`;
              stockDelta = parsedAmount.value;
              stockDeltaUnit = normalizeStockUnit(parsedAmount.unit);
            } else if(inputPortions && basePortions) {
              factor = inputPortions / basePortions;
              qty = `${formatRecipeQty(parsedAmount.value, parsedAmount.unit)} (${recipe.base_unit})`;
              stockDelta = parsedAmount.value;
              stockDeltaUnit = normalizeStockUnit(parsedAmount.unit);
            }
          } else if(parsedCountNoun?.value > 0 && (normalizeStockUnit(recipe.base_unit || '') === 'unidad' || normalizeStockUnit(recipe.stock_unit || '') === 'unidad')) {
            const baseQty = parseFloat(recipe.base_qty) || 1;
            factor = parsedCountNoun.value / baseQty;
            qty = `${formatRecipeQty(parsedCountNoun.value, parsedCountNoun.value === 1 ? 'unidad' : 'unidades')} (${recipe.base_unit || 'unidad'})`;
            stockDelta = parsedCountNoun.value;
            stockDeltaUnit = 'unidad';
          }

          const result = {
            name: recipe.recipe_name,
            qty,
            nota: recipe.notes || 'Receta guardada',
            recipe_id: recipe.id,
            recipe_name: recipe.recipe_name,
            stock_qty: recipe.stock_qty,
            stock_unit: recipe.stock_unit || '',
            low_stock_threshold: recipe.low_stock_threshold,
            stock_delta: stockDelta,
            stock_delta_unit: stockDeltaUnit,
            ...scaleRecipeMacros(recipe, factor)
          };
          if(exact) exactMatches.push(result);
          else fuzzyMatches.push(result);
        }

        if(exactMatches.length === 1) return { kind:'exact', item: exactMatches[0] };
        if(exactMatches.length > 1) return { kind:'ambiguous', options: exactMatches.slice(0,3) };
        if(fuzzyMatches.length === 1) return { kind:'fuzzy', item: fuzzyMatches[0] };
        if(fuzzyMatches.length > 1) return { kind:'ambiguous', options: fuzzyMatches.slice(0,3) };
        return null;
      };

      const getRecipes = async () => {
        if(recipesRef.current) return recipesRef.current;
        const { data, error } = await supabase
          .from('user_recipes')
          .select('id, recipe_name, aliases, base_qty, base_unit, stock_qty, stock_unit, low_stock_threshold, macros, ingredients, notes')
          .order('updated_at', { ascending: false });
        if(error) throw error;
        recipesRef.current = data || [];
        return recipesRef.current;
      };

      useEffect(() => {
        let cancelled = false;
        setRecipesLoading(true);
        setRecipesError('');
        getRecipes()
          .then((rows) => {
            if(cancelled) return;
            setSavedRecipes(rows || []);
          })
          .catch((e) => {
            if(cancelled) return;
            setRecipesError(e.message || 'No se pudieron cargar las recetas.');
          })
          .finally(() => {
            if(cancelled) return;
            setRecipesLoading(false);
          });
        return () => { cancelled = true; };
      }, []);

      // analyzeMeal: llama a la IA y agrega el resultado como item a la leyenda
      const analyzeMeal = async (mealIndex) => {
        const text = String(t.meals?.[mealIndex]?.aiDraft || '').trim();
        if(!text) return;

        setAiLoading(prev => { const n=[...prev]; n[mealIndex]=true; return n; });
        setAiError(prev   => { const n=[...prev]; n[mealIndex]='';   return n; });

        try {
          try {
            const recipes = await getRecipes();
            const recipeSearch = findRecipeMatch(recipes, text);
            if(recipeSearch?.kind === 'ambiguous') {
              const optionsText = recipeSearch.options.map(op => op.name).join(', ');
              const useLibrary = window.confirm(`Encontre varias opciones en tu biblioteca: ${optionsText}. ¿Querés usar la biblioteca en vez de calcularlo por internet?`);
              if(!useLibrary) throw new Error('__USE_INTERNET__');
            }

            const recipeHit = recipeSearch?.item || (recipeSearch?.options ? recipeSearch.options[0] : null);
            if(recipeHit) {
              const shouldUseLibrary = recipeSearch?.kind === 'exact'
                ? true
                : window.confirm(`Encontre "${recipeHit.name}" en tu biblioteca. ¿Querés usar ese valor guardado en vez de calcularlo por internet?`);
              if(!shouldUseLibrary) throw new Error('__USE_INTERNET__');

              onAddItem(mealIndex, recipeHit);
              onMeal(mealIndex, 'aiDraft', '');
              if(recipeHit.stock_unit && recipeHit.stock_delta_unit && normalizeStockUnit(recipeHit.stock_unit) === normalizeStockUnit(recipeHit.stock_delta_unit)) {
                await discountItemStock(mealIndex, recipeHit);
              }
              return;
            }
          } catch(recipeErr) {
            if(recipeErr?.message !== '__USE_INTERNET__') {
              console.warn('[RECIPES]', recipeErr.message);
            }
          }

          const res = await fetch('/.netlify/functions/get-macros', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ meal: text })
          });
          const data = await res.json().catch(() => ({}));
          if(!res.ok) throw new Error(data.error || `HTTP ${res.status}`);

          onAddItem(mealIndex, {
            name: data.name || text,
            qty:  data.qty  || '1 porción',
            cals: Math.round(parseFloat(data.cals)||0),
            prot: Math.round(parseFloat(data.prot)||0),
            carb: Math.round(parseFloat(data.carb)||0),
            fat:  Math.round(parseFloat(data.fat) ||0),
            nota: data.nota || ''
          });

          onMeal(mealIndex, 'aiDraft', '');
        } catch(e) {
          console.error('[IA]', e);
          setAiError(prev => { const n=[...prev]; n[mealIndex]=e.message||'Error'; return n; });
        } finally {
          setAiLoading(prev => { const n=[...prev]; n[mealIndex]=false; return n; });
        }
      };

      const saveMealAsRecipe = async (mealIndex) => {
        const meal = t.meals?.[mealIndex];
        const items = meal?.items || [];
        if(items.length === 0) return;

        const recipeName = window.prompt('Nombre de la receta:', `Comida ${mealIndex + 1} casera`);
        if(!recipeName || !recipeName.trim()) return;

        setRecipeSaving(prev => { const n=[...prev]; n[mealIndex]=true; return n; });
        setRecipeMsg(prev => { const n=[...prev]; n[mealIndex]=''; return n; });

        try {
          const totals = mealTotals(meal);
          const payload = {
            recipe_name: recipeName.trim(),
            aliases: [],
            base_qty: 1,
            base_unit: 'porcion',
            macros: {
              cals: Math.round(totals.cals || 0),
              prot: Math.round(totals.prot || 0),
              carb: Math.round(totals.carb || 0),
              fat: Math.round(totals.fat || 0)
            },
            ingredients: items.map(item => ({
              name: item.name || 'Ingrediente',
              qty: item.qty || '1 porcion'
            })),
            notes: 'Guardada desde una comida del diario',
            updated_at: new Date().toISOString()
          };

          const { error } = await supabase.from('user_recipes').insert(payload);
          if(error) {
            if(String(error.message || '').toLowerCase().includes('duplicate') || String(error.code || '') === '23505') {
              throw new Error('Ya existe una receta con ese nombre.');
            }
            throw error;
          }

          recipesRef.current = null;
          const refreshed = await getRecipes();
          setSavedRecipes(refreshed || []);
          setRecipeMsg(prev => { const n=[...prev]; n[mealIndex]='Receta guardada.'; return n; });
          setTimeout(() => {
            setRecipeMsg(prev => { const n=[...prev]; n[mealIndex]=''; return n; });
          }, 2500);
        } catch(e) {
          setRecipeMsg(prev => { const n=[...prev]; n[mealIndex]=e.message || 'No se pudo guardar la receta.'; return n; });
        } finally {
          setRecipeSaving(prev => { const n=[...prev]; n[mealIndex]=false; return n; });
        }
      };

      const discountItemStock = async (mealIndex, item) => {
        if(!item?.recipe_id) return;

        const stockKey = `${mealIndex}:${item.recipe_id}`;
        const recipeName = item.recipe_name || item.name || 'Ingrediente';
        const stockUnit = normalizeStockUnit(item.stock_unit || '');
        const deltaUnit = normalizeStockUnit(item.stock_delta_unit || '');
        const delta = parseFloat(item.stock_delta);

        if(!stockUnit) {
          setRecipeMsg(prev => { const n=[...prev]; n[mealIndex]='Ese item no tiene stock configurado.'; return n; });
          return;
        }
        if(!(delta > 0)) {
          setRecipeMsg(prev => { const n=[...prev]; n[mealIndex]='No pude calcular cuanto descontar.'; return n; });
          return;
        }
        if(stockUnit !== deltaUnit) {
          setRecipeMsg(prev => { const n=[...prev]; n[mealIndex]=`La unidad de stock de ${recipeName} no coincide (${item.stock_unit || '-'} vs ${item.stock_delta_unit || '-'}).`; return n; });
          return;
        }

        setStockBusyKey(stockKey);
        setRecipeMsg(prev => { const n=[...prev]; n[mealIndex]=''; return n; });

        try {
          const currentRecipe = (savedRecipes || []).find(r => r.id === item.recipe_id)
            || (await getRecipes()).find(r => r.id === item.recipe_id);

          if(!currentRecipe) throw new Error('No encontre la receta para descontar stock.');
          if(currentRecipe.stock_qty == null || currentRecipe.stock_qty === '') throw new Error('Ese item no tiene stock configurado.');

          const nextQty = Math.max(0, (parseFloat(currentRecipe.stock_qty) || 0) - delta);
          const { data, error } = await supabase
            .from('user_recipes')
            .update({ stock_qty: nextQty, updated_at: new Date().toISOString() })
            .eq('id', item.recipe_id)
            .select('id, recipe_name, aliases, base_qty, base_unit, stock_qty, stock_unit, low_stock_threshold, macros, ingredients, notes')
            .single();
          if(error) throw error;

          recipesRef.current = (recipesRef.current || []).map(r => r.id === item.recipe_id ? data : r);
          setSavedRecipes(prev => prev.map(r => r.id === item.recipe_id ? data : r));
          setRecipeMsg(prev => {
            const n=[...prev];
            n[mealIndex]=`Stock descontado: -${formatRecipeQty(delta, item.stock_delta_unit || item.stock_unit || '')}.`;
            return n;
          });
          setTimeout(() => {
            setRecipeMsg(prev => {
              const n=[...prev];
              if(String(n[mealIndex] || '').startsWith('Stock descontado')) n[mealIndex]='';
              return n;
            });
          }, 2500);
        } catch(e) {
          setRecipeMsg(prev => { const n=[...prev]; n[mealIndex]=e.message || 'No se pudo descontar stock.'; return n; });
        } finally {
          setStockBusyKey('');
        }
      };

      const deleteRecipe = async (recipe) => {
        try {
          const { error } = await supabase.from('user_recipes').delete().eq('id', recipe.id);
          if(error) throw error;
          recipesRef.current = null;
          setSavedRecipes(prev => prev.filter(r => r.id !== recipe.id));
        } catch(e) {
          setRecipesError(e.message || 'No se pudo borrar la receta.');
          setTimeout(() => setRecipesError(''), 3000);
        }
      };

      const startEditRecipe = (recipe) => {
        setEditingRecipeId(recipe.id);
        setEditingRecipeName(recipe.recipe_name || '');
        setEditingRecipeBaseQty(String(recipe.base_qty ?? 1));
        setEditingRecipeBaseUnit(recipe.base_unit || 'porcion');
        setEditingRecipeCals(String(Math.round(parseFloat(recipe.macros?.cals) || 0)));
        setEditingRecipeProt(String(Math.round(parseFloat(recipe.macros?.prot) || 0)));
        setEditingRecipeCarb(String(Math.round(parseFloat(recipe.macros?.carb) || 0)));
        setEditingRecipeFat(String(Math.round(parseFloat(recipe.macros?.fat) || 0)));
        setEditingRecipeIngredients(
          Array.isArray(recipe.ingredients)
            ? recipe.ingredients.map(it => `${it.qty || '1 porcion'} | ${it.name || 'Ingrediente'}`).join('\n')
            : ''
        );
        setEditingRecipeNotes(recipe.notes || '');
      };

      const cancelEditRecipe = () => {
        setEditingRecipeId(null);
        setEditingRecipeName('');
        setEditingRecipeBaseQty('1');
        setEditingRecipeBaseUnit('porcion');
        setEditingRecipeCals('0');
        setEditingRecipeProt('0');
        setEditingRecipeCarb('0');
        setEditingRecipeFat('0');
        setEditingRecipeIngredients('');
        setEditingRecipeNotes('');
      };

      const saveRecipeEdit = async (recipeId) => {
        if(!editingRecipeName.trim()) return;
        setEditingRecipeSaving(true);
        setRecipesError('');
        try {
          const ingredients = editingRecipeIngredients
            .split('\n')
            .map(line => line.trim())
            .filter(Boolean)
            .map(line => {
              const [qtyPart, ...nameParts] = line.split('|');
              return {
                qty: (qtyPart || '').trim() || '1 porcion',
                name: nameParts.join('|').trim() || qtyPart.trim() || 'Ingrediente'
              };
            });

          const payload = {
            recipe_name: editingRecipeName.trim(),
            base_qty: parseFloat(String(editingRecipeBaseQty).replace(',', '.')) || 1,
            base_unit: editingRecipeBaseUnit.trim() || 'porcion',
            macros: {
              cals: Math.max(0, Math.round(parseFloat(editingRecipeCals) || 0)),
              prot: Math.max(0, Math.round(parseFloat(editingRecipeProt) || 0)),
              carb: Math.max(0, Math.round(parseFloat(editingRecipeCarb) || 0)),
              fat: Math.max(0, Math.round(parseFloat(editingRecipeFat) || 0))
            },
            ingredients,
            notes: editingRecipeNotes.trim() || null,
            updated_at: new Date().toISOString()
          };

          const { data, error } = await supabase.from('user_recipes')
            .update(payload)
            .eq('id', recipeId)
            .select()
            .single();
          if(error) throw error;

          recipesRef.current = null;
          setSavedRecipes(prev => prev.map(r => r.id === recipeId ? data : r));
          cancelEditRecipe();
        } catch(e) {
          setRecipesError(e.message || 'No se pudo editar la receta.');
          setTimeout(() => setRecipesError(''), 3000);
        } finally {
          setEditingRecipeSaving(false);
        }
      };

      return html`
        <${SectionAccordion} icon=${html`<${IActivity} s=${18} c=""/>`} title="Parámetros Diarios" isOpen=${open} onToggle=${()=>setOpen(!open)}>
          <div style="display:grid;gap:12px;grid-template-columns:1fr;"> 

            <!-- NUTRICIÓN & CARDIO -->
            <div style="padding:12px;border-radius:10px;background:rgba(10,15,30,0.5);border:1px solid #1E2D45;display:flex;flex-direction:column;gap:10px;">
              <p style="margin:0;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;font-weight:700;color:#F59E0B;">Nutrición & Cardio</p>

              ${yesterdayFastMsg && html`
                <div style="padding:8px 10px;border-radius:6px;background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.3);margin-bottom:8px;">
                  <p style="margin:0;font-size:12px;color:#818CF8;font-family:'JetBrains Mono',monospace;">${yesterdayFastMsg}</p>
                </div>
              `}
              <${CheckRow} label="Ayuno realizado" checked=${t.fasted} onChange=${v=>onChange('fasted',v)}>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
                  <${Inp} label="Inicio (HH:MM)" type="time" value=${t.fastStartTime} onChange=${v=>onChange('fastStartTime',v)}/>
                  <${Inp} label="Duración (hs)" value=${t.fastHours} onChange=${v=>onChange('fastHours',v)} placeholder="Ej: 16"/>
                </div>
                ${fs.endStr && html`<span class="badge" style="background:rgba(16,185,129,0.1);color:#10B981;">⏱ Finaliza: ${fs.endStr}</span>`}
              <//>

              <${CheckRow} label="☕ Mate / Café" checked=${t.mateOrCoffee} onChange=${v=>onChange('mateOrCoffee',v)}>
                <${Inp} label="Hora" type="time" value=${t.mateOrCoffeeTime} onChange=${v=>onChange('mateOrCoffeeTime',v)}/>
              <//>

              <${CheckRow} label="🚶 Caminata" checked=${t.walked} onChange=${v=>onChange('walked',v)}>
                <${Inp} label="Pasos" value=${t.steps} onChange=${v=>onChange('steps',v)} placeholder="Ej: 10.000"/>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
                  <${Inp} label="Inicio" type="time" value=${t.walkStartTime} onChange=${v=>onChange('walkStartTime',v)}/>
                  <${Inp} label="Fin" type="time" value=${t.walkEndTime} onChange=${v=>onChange('walkEndTime',v)}/>
                </div>
                ${fs.walkStr && html`<span class="badge" style=${`background:${fs.isFasted?'rgba(16,185,129,0.1)':'rgba(245,158,11,0.1)'};color:${fs.isFasted?'#10B981':'#F59E0B'};`}>${fs.walkStr}</span>`}
              <//>
            </div>

            <!-- ALIMENTACIÓN -->
            <div style="padding:12px;border-radius:10px;background:rgba(10,15,30,0.5);border:1px solid #1E2D45;display:flex;flex-direction:column;gap:10px;">
              <p style="margin:0;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;font-weight:700;color:#10B981;">Alimentación</p>

              ${[0,1,2].map(i => {
                const m        = t.meals[i] || { items:[], firstBite:'', lastBite:'' };
                const items    = m.items || [];
                const mTotals  = mealTotals(m);
                const loading  = aiLoading[i];
                const errMsg   = aiError[i];

                return html`
                  <div style="padding:10px;border-radius:8px;background:rgba(22,32,53,0.6);border:1px solid #1E2D45;">
                    <p style="margin:0 0 8px;font-size:11px;font-weight:700;color:#6366F1;">Comida ${i+1}</p>

                    <!-- Input IA -->
                    <div style="display:flex;gap:6px;margin-bottom:8px;">
                      <input
                        type="text"
                        value=${m.aiDraft || ''}
                        onInput=${e=>onMeal(i,'aiDraft',e.target.value)}
                        onKeyDown=${e=>{ if(e.key==='Enter'&&!loading) analyzeMeal(i); }}
                        placeholder="Sumar alimento a la leyenda..."
                        style="flex:1;background:#0a0f1e;border:1px solid #2A3F5F;border-radius:8px;padding:7px 10px;font-size:12px;color:#e2e8f0;font-family:'Barlow',sans-serif;"
                        disabled=${loading}
                      />
                      <button
                        onClick=${()=>analyzeMeal(i)}
                        disabled=${loading||!String(m.aiDraft||'').trim()}
                        title="Analizar con IA y sumar"
                        style=${`display:flex;align-items:center;gap:4px;padding:7px 12px;border-radius:8px;border:1px solid ${loading?'rgba(99,102,241,0.4)':String(m.aiDraft||'').trim()?'rgba(99,102,241,0.3)':'#1E2D45'};cursor:${loading||!String(m.aiDraft||'').trim()?'not-allowed':'pointer'};background:${loading?'rgba(99,102,241,0.15)':String(m.aiDraft||'').trim()?'rgba(99,102,241,0.25)':'rgba(30,45,69,0.5)'};color:${loading?'#818CF8':String(m.aiDraft||'').trim()?'#A5B4FC':'#374151'};font-size:12px;font-weight:700;font-family:'Barlow Condensed',sans-serif;letter-spacing:0.05em;transition:all 0.15s;`}
                      >
                        ${loading
                          ? html`<span class="spin" style="display:inline-block;width:12px;height:12px;border:2px solid rgba(129,140,248,0.3);border-top-color:#818CF8;border-radius:50%;"></span>`
                          : html`<span>✨</span>`
                        }
                        <span>${loading?'...':'IA'}</span>
                      </button>
                    </div>

                    <!-- Error IA -->
                    ${errMsg && html`<p style="margin:0 0 6px;font-size:10px;color:#EF4444;font-family:'JetBrains Mono',monospace;">❌ ${errMsg}</p>`}

                    <!-- LEYENDA de alimentos -->
                    ${items.length > 0 && html`
                      <div style="display:flex;flex-direction:column;gap:4px;margin-bottom:8px;">
                        ${items.map((item, idx) => html`
                          <div style="display:flex;align-items:center;justify-content:space-between;background:rgba(10,15,30,0.4);padding:8px 12px;border-radius:8px;border:1px solid #1E2D45;">
                            <div style="display:flex;align-items:center;gap:8px;flex:1;min-width:0;">
                              <span style="font-size:12px;font-weight:700;color:#10B981;font-family:'JetBrains Mono',monospace;white-space:nowrap;">${item.qty||'1 porción'}</span>
                              <span style="font-size:12px;color:#cbd5e1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${item.name}</span>
                            </div>
                            <div style="display:flex;align-items:center;gap:10px;margin-left:8px;">
                              ${item.recipe_id && item.stock_unit && item.stock_delta_unit && normalizeStockUnit(item.stock_unit) === normalizeStockUnit(item.stock_delta_unit) && html`
                                <span style="padding:4px 7px;border-radius:6px;border:1px solid rgba(125,211,252,0.3);background:rgba(14,165,233,0.12);color:#7DD3FC;font-size:9px;font-weight:700;font-family:'Barlow Condensed',sans-serif;letter-spacing:0.05em;white-space:nowrap;">
                                  ${stockBusyKey === `${i}:${item.recipe_id}` ? 'ACTUALIZANDO STOCK...' : 'STOCK AUTO'}
                                </span>
                              `}
                              <span style="font-size:11px;font-weight:700;color:#6366F1;font-family:'JetBrains Mono',monospace;white-space:nowrap;">${fn(item.prot)}g P</span>
                              <button onClick=${()=>onRemoveItem(i, idx, item)} style="color:#EF4444;background:none;border:none;font-size:20px;cursor:pointer;padding:0;line-height:1;">×</button>
                            </div>
                          </div>
                          ${item.nota && html`<p style="margin:1px 0 3px 8px;font-size:9px;color:#F59E0B;">⚠ ${item.nota}</p>`}
                        `)}
                      </div>
                    `}

                    <!-- TOTALES ACUMULADOS DE LA COMIDA -->
                    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:8px;">
                      ${[['cals','Kcal',mTotals.cals],['prot','P',mTotals.prot],['carb','C',mTotals.carb],['fat','G',mTotals.fat]].map(([k,l,v]) => html`
                        <div style="text-align:center;background:#0F1729;padding:5px 4px;border-radius:6px;border:1px solid #1E2D45;">

    const GymPanel = ({session, tracker:t, onSetComplete, onInput, onHabit, onApplyOverload}) => {

      if(!session||session.length===0) return null;
      const safeT = { gymStartTime:'', gymEndTime:'', ...t };

      // Detecta ejercicios donde se superaron las reps objetivo en al menos 1 serie
      const overloadCandidates = session.filter(ex =>
        ex.sets.some(s => s.completed && parseInt(s.reps) > parseInt(s.idealReps||s.reps))
      );

      return html`
        <${SectionAccordion} icon=${html`<${IDumb} s=${18}/>`} title="Rutina Gimnasio" isOpen=${open} onToggle=${()=>setOpen(!open)}>
          <!-- Horarios sesión -->
          <div style="display:flex;flex-wrap:wrap;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;background:rgba(10,15,30,0.5);border:1px solid #1E2D45;margin-bottom:12px;">
            <${IClock} s=${16} c=""/>
            <span style="font-size:13px;color:#94a3b8;">Sesión:</span>
            <div style="display:flex;gap:12px;flex-wrap:wrap;">
              ${[['gymStartTime','Inicio'],['gymEndTime','Fin']].map(([k,l]) => html`
                <div style="display:flex;align-items:center;gap:6px;">

                </div>
              `)}
            </div>
          </div>

          <!-- Ejercicios -->
          ${session.map((ex,ei) => html`
            <div style="border-radius:10px;overflow:hidden;border:1px solid #1E2D45;margin-bottom:10px;">
              <div style="padding:8px 12px;background:rgba(22,32,53,0.7);border-left:3px solid var(--green);">
                <p style="margin:0;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;color:white;letter-spacing:0.04em;">${ei+1}. ${ex.name}</p>
                ${muscleMap[ex.name] && html`
                  <p style="margin:2px 0 0;font-size:10px;color:#475569;">
                    ${muscleMap[ex.name].direct.join(', ')}
                    ${muscleMap[ex.name].indirect.length>0 ? ' · '+muscleMap[ex.name].indirect.join(', ') : ''}

              <div class="table-wrap">

                    <tr>

                      <th>Reps</th><th>Peso</th><th>RIR</th><th>Pausa</th>
                      <th style="text-align:center;">✓</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${ex.sets.map((set,si) => html`
                      <tr class=${set.completed?'set-row-done':''}>
                        <td style="text-align:center;font-size:11px;font-family:'JetBrains Mono',monospace;color:#475569;">${si+1}</td>
                        <td><input class="inp-xs" style="width:52px;" value=${set.reps} onInput=${e=>onInput(ei,si,'reps',e.target.value)}/></td>
                        <td><input class="inp-xs" style="width:60px;" value=${set.weight} onInput=${e=>onInput(ei,si,'weight',e.target.value)}/></td>
                        <td><span class=${`tag-rir ${set.rir.includes('Fallo')?'fallo':''}`}>${set.rir}</span></td>
                        <td><span style="font-size:11px;color:#64748b;font-family:'JetBrains Mono',monospace;white-space:nowrap;">${set.restStr}</span></td>

                          <button class="check-btn" onClick=${()=>onSetComplete(ei,si,set.restSecs)}
                            style=${set.completed?'background:#10B981;box-shadow:0 0 10px rgba(16,185,129,0.4);':'background:#162035;border:1px solid #1E2D45;'}>
                            <${ICheck} s=${14} c=""/>

                      ${set.completed && html`

                              <span>RPE: ${set.rpe||7}</span><span>Esfuerzo percibido</span>

    // ═══════════════════════════════════════════════════
    //  SEMANA RESUMEN
    // ═══════════════════════════════════════════════════
    const WeekSummary = ({weekData}) => {
      const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, ReferenceLine } = getRC();
      const sessions = weekData?.sessions || {};
      const tracker  = weekData?.tracker  || {};

      // ── Métricas base
      const totalSteps = Object.values(tracker).reduce((a,d)=>a+(d?.walked&&d?.steps?pn(d.steps):0),0);
      const totalWater = Object.values(tracker).reduce((a,d)=>a+(d?.water||0),0);

      const macByDay = DAYS.map(d=>{
        const t=tracker[d.key]||newDay();
        const tot = dayTotals(t.meals);
        return{name:d.abbr, cals:tot.cals, prot:tot.prot, carb:tot.carb, fat:tot.fat};
      });
      const wm = macByDay.reduce((a,d)=>({cals:a.cals+d.cals,prot:a.prot+d.prot,carb:a.carb+d.carb,fat:a.fat+d.fat}),{cals:0,prot:0,carb:0,fat:0});

      // ── Sueño
      const sleepDays = Object.values(tracker).filter(d=>d?.sleepHours&&pn(d.sleepHours)>0);
      const sleepAvg  = sleepDays.length ? (sleepDays.reduce((a,d)=>a+pn(d.sleepHours),0)/sleepDays.length) : 0;
      const sleepColor = sleepAvg>=8?'#10B981':sleepAvg>=7?'#6366F1':sleepAvg>=6?'#F59E0B':'#EF4444';

      // ── Suplementos — % de adherencia (días tomados / 7)
      const medNames = ['roacuttan','finasteride','minoxidil','creatine','magnesium'];
      const medAdherence = medNames.map(m=>({
        name: m==='creatine'?'Creatina':m==='magnesium'?'Magnesio':m.charAt(0).toUpperCase()+m.slice(1),
        pct: Math.round(Object.values(tracker).filter(d=>d?.meds?.[m]).length / 7 * 100)
      }));

      // ── Días de entrenamiento
      const trainingDays = Object.values(weekData?.dayMapping||{}).filter(v=>v!=='').length;

      // ── Volumen muscular
      const vol = {}; MUSCLES.forEach(m=>vol[m]={direct:0,indirect:0});
      Object.values(sessions).forEach(s=>s&&s.forEach(ex=>{const done=ex.sets.filter(s=>s.completed).length;if(done>0&&muscleMap[ex.name]){muscleMap[ex.name].direct.forEach(m=>{if(vol[m])vol[m].direct+=done;});muscleMap[ex.name].indirect.forEach(m=>{if(vol[m])vol[m].indirect+=done;});}}));

      const tooltipStyle = {background:'#0F1729',border:'1px solid #1E2D45',borderRadius:'8px',fontFamily:'JetBrains Mono,monospace',fontSize:'11px'};

      // ── Macros Elásticos: carbos objetivo se ajusta según la grasa real consumida
      // C_objetivo = (2000 - 660 - (G_real × 9)) / 4   |  Proteína fija: 165g = 660 kcal
      // Bug 10 fix: usar grasa promedio diaria (no el total semanal) en fórmula diaria
      const fatDailyAvg   = wm.fat / 7;
      const carbsTarget     = Math.max(0, Math.round((TARGETS.kcal - (TARGETS.prot * 4) - (fatDailyAvg * 9)) / 4));
      const carbsTargetWeekly = carbsTarget * 7;

      // ── Adherencia a macros con carbos elásticos
      const macroAdh = {
        prot: Math.min(100, Math.round(wm.prot  / (TARGETS.prot*7)      * 100)),
        carb: Math.min(100, Math.round(wm.carb  / (carbsTargetWeekly||1) * 100)),
        fat:  Math.min(100, Math.round(wm.fat   / (TARGETS.fat*7)        * 100)),
        kcal: Math.min(100, Math.round(wm.cals  / (TARGETS.kcal*7)       * 100)),
      };

      return html`
        <div class="fade-up" style="display:flex;flex-direction:column;gap:12px;">

          <!-- RESUMEN RÁPIDO -->
          <${Card}>

                  <div style="width:${Math.min(sleepAvg/9*100,100)}%;height:100%;background:${sleepColor};border-radius:4px;transition:width 0.5s;"></div>

            <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;">
              ${DAYS.map(d=>{

                const c=h>=8?'#10B981':h>=7?'#6366F1':h>=6?'#F59E0B':h>0?'#EF4444':'#1E2D45';
                return html`
                  <div style="text-align:center;">
                    <div style="height:32px;background:${c};border-radius:4px;opacity:${h>0?1:0.3};display:flex;align-items:center;justify-content:center;">
                      <span style="font-size:9px;font-family:'JetBrains Mono',monospace;color:${h>0?'#080D1A':'#374151'};">${h>0?h.toFixed(0):''}</span>
