                </div>

                <div style="padding:12px;border-radius:10px;background:rgba(15,23,41,0.75);border:1px solid #1E2D45;">
                  <p style="margin:0 0 8px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#6366F1;">Chat anti-spoiler</p>
                  <div style="margin-bottom:8px;padding:8px 10px;border-radius:8px;background:rgba(99,102,241,0.08);border:1px solid rgba(99,102,241,0.2);color:#C7D2FE;font-size:12px;">
                    Gemini debe responder solo con informacion segura hasta la pagina ${Math.max(1, parseInt(book.current_page || 1, 10) || 1)}.
                  </div>
                  <textarea value=${chatDraft} onInput=${e=>setChatDraft(e.target.value)} placeholder="Preguntale algo sobre lo leido hasta tu pagina actual..." style="width:100%;background:#0F1729;border:1px solid #1E2D45;border-radius:8px;padding:10px;font-size:13px;color:#cbd5e1;font-family:'Barlow',sans-serif;resize:vertical;min-height:76px;"></textarea>
                  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;">
                    <button onClick=${askBookAi} style="padding:8px 12px;border-radius:8px;border:none;background:#6366F1;color:#F8FAFC;font-size:12px;font-weight:800;font-family:'Barlow Condensed',sans-serif;cursor:pointer;letter-spacing:0.05em;">
                      ${chatLoading ? 'PREGUNTANDO...' : 'PREGUNTAR A GEMINI'}
                    </button>
                  </div>
                </div>
              </div>
            `}
          <//>
        </div>
      `;
    };

    const HealthView = ({session, onSyncDailyMeds, bodyWeight, onBodyWeight, todayMeds, previousDayMeds}) => {
      const [stock, setStock] = useState(MEDS_STOCK_DEFAULT);
      const [loading, setLoading] = useState(true);
      const [saving, setSaving] = useState(false);
      const [error, setError] = useState('');
      const [notice, setNotice] = useState('');
      const [editingHistoryAt, setEditingHistoryAt] = useState('');
      const todayMedsState = todayMeds || {};
      const previousMedsState = previousDayMeds || {};
      const getDinnerLogicalTarget = () => {
        const now = new Date();
        const baseDate = new Date(now);
        let medsState = todayMedsState;
        let label = 'hoy';
        if(now.getHours() < 6) {
          baseDate.setDate(baseDate.getDate() - 1);
          medsState = previousMedsState;
          label = 'ayer';
        }
        return {
          dateKey: getDinnerLogicalDateKey(now),
          medsState: medsState || {},
          label
        };
      };

      const entryDeltas = (entry) => {
        if(!entry) return { roaccutan: 0, combo: 0 };
        if(entry.type === 'roaccutan_take') return { roaccutan: -1, combo: 0 };
        if(entry.type === 'dinner_combo_take') return { roaccutan: 0, combo: -1 };
        if(entry.type === 'habit_toggle') {
          return {
            roaccutan: pn(entry.delta_roaccutan),
            combo: pn(entry.delta_combo)
          };
        }
        if(entry.field === 'roaccutan') return { roaccutan: pn(entry.delta), combo: 0 };
        if(entry.field === 'minoxidil_finasteride') return { roaccutan: 0, combo: pn(entry.delta) };
        return { roaccutan: 0, combo: 0 };
      };
      const isTodayEntry = (iso) => {
        if(!iso) return false;
        const d = new Date(iso);
        if(Number.isNaN(d.getTime())) return false;
        const now = new Date();
        return d.getFullYear() === now.getFullYear()
          && d.getMonth() === now.getMonth()
          && d.getDate() === now.getDate();
      };
      const hasRemainingTakeForDate = (history, field, dateKey) => {
        return (history || []).some(entry => {
          const entryDateKey = entry?.logical_date || (entry?.at ? localDateKey(new Date(entry.at)) : '');
          if(entryDateKey !== dateKey) return false;
          const deltas = entryDeltas(entry);
          return field === 'roaccutan' ? deltas.roaccutan < 0 : deltas.combo < 0;
        });
      };
      const recalcLastTakeFields = (payload) => {
        const history = Array.isArray(payload?.history) ? payload.history : [];
        const lastRoaccutan = history.find(entry => entry?.type === 'roaccutan_take' || (entry?.type === 'habit_toggle' && pn(entry?.delta_roaccutan) < 0));
        const lastDinner = history.find(entry => entry?.type === 'dinner_combo_take' || (entry?.type === 'habit_toggle' && pn(entry?.delta_combo) < 0));
        const latestAt = history.find(entry => entry?.at)?.at || '';
        return {
          ...payload,
          last_roaccutan_at: lastRoaccutan?.at || '',
          last_dinner_meds_at: lastDinner?.at || '',
          last_dinner_logical_date: lastDinner?.logical_date || (lastDinner?.at ? localDateKey(new Date(lastDinner.at)) : ''),
          last_taken_at: latestAt || ''
        };
      };
      const buildHealthPayload = (basePayload, patch = {}, newEntry = null) => {
        const base = { ...MEDS_STOCK_DEFAULT, ...(basePayload || {}) };
        const history = Array.isArray(base.history) ? base.history : [];
        const next = {
          ...base,
          ...patch,
          history: newEntry ? [newEntry, ...history].slice(0, 60) : history
        };
        return recalcLastTakeFields(next);
      };
      const applyHealthAction = async ({ patch, entry, okMsg }) => {
        const next = buildHealthPayload(stock, patch, entry);
        await persistHealth(next, okMsg);
        return next;
      };
      const pickNewestHealthPayload = (local, remote, remoteUpdatedAt='') => {
        const localTs = new Date(local?._updatedAt || 0).getTime() || 0;
        const remoteTs = new Date(remote?._updatedAt || remoteUpdatedAt || 0).getTime() || 0;
        return localTs >= remoteTs ? (local || remote || MEDS_STOCK_DEFAULT) : (remote || local || MEDS_STOCK_DEFAULT);
      };

      const loadHealth = useCallback(async () => {
        setLoading(true);
        setError('');
        try {
          const local = JSON.parse(localStorage.getItem(MEDS_STOCK_KEY) || 'null');
          const { data, error } = await supabase
            .from('app_inventory')
            .select('data, updated_at')
            .eq('key', 'meds_stock')
            .maybeSingle();
          if(error) {
            setStock({ ...MEDS_STOCK_DEFAULT, ...(local || {}) });
          } else {
            const freshest = pickNewestHealthPayload(local, data?.data || null, data?.updated_at || '');
            const merged = { ...MEDS_STOCK_DEFAULT, ...(freshest || {}) };
            setStock(merged);
            try { localStorage.setItem(MEDS_STOCK_KEY, JSON.stringify(merged)); } catch(_) {}
          }
        } catch(e) {
          try {
            const local = JSON.parse(localStorage.getItem(MEDS_STOCK_KEY) || 'null');
            setStock({ ...MEDS_STOCK_DEFAULT, ...(local || {}) });
          } catch(_) {
            setError(e.message || 'No se pudo cargar SALUD.');
          }
        } finally {
          setLoading(false);
        }
      }, []);

      useEffect(() => {
        loadHealth();
        const onFocus = () => loadHealth();
        const onVisible = () => { if(document.visibilityState === 'visible') loadHealth(); };
        const onHealthChanged = (event) => {
          if(event?.detail) setStock(prev => ({ ...prev, ...event.detail }));
        };
        window.addEventListener('focus', onFocus);
        document.addEventListener('visibilitychange', onVisible);
        window.addEventListener('enzo-health-changed', onHealthChanged);
        return () => {
          window.removeEventListener('focus', onFocus);
          document.removeEventListener('visibilitychange', onVisible);
          window.removeEventListener('enzo-health-changed', onHealthChanged);
        };
      }, [loadHealth]);

      const exportHealthData = () => {
        try {
          const payload = {
            app: 'enzo-training-health',
            exported_at: new Date().toISOString(),
            meds_stock: stock,
            body_weight: bodyWeight || ''
          };
          const blob = new Blob([JSON.stringify(payload, null, 2)], { type:'application/json;charset=utf-8' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `salud-stock-${new Date().toISOString().slice(0,19).replace(/[:T]/g,'-')}.json`;
          document.body.appendChild(a);
          a.click();
          a.remove();
          setTimeout(() => URL.revokeObjectURL(url), 1000);
          setNotice('Datos de SALUD exportados.');
          setTimeout(() => setNotice(''), 2500);
        } catch(e) {
          setError(e.message || 'No se pudieron exportar los datos de salud.');
        }
      };

      const persistHealth = async (payload, okMsg='Salud guardada.') => {
        setSaving(true);
        setError('');
        try {
          const normalizedPayload = { ...payload, _updatedAt: new Date().toISOString() };
          setStock(normalizedPayload);
          try { window.dispatchEvent(new CustomEvent('enzo-health-changed', { detail: normalizedPayload })); } catch(_) {}
          try { localStorage.setItem(MEDS_STOCK_KEY, JSON.stringify(normalizedPayload)); } catch(_) {}
          const { error } = await supabase
            .from('app_inventory')
            .upsert({
              key: 'meds_stock',
              data: normalizedPayload,
              updated_at: new Date().toISOString()
            }, { onConflict: 'key' });
          if(error) {
            setNotice(`${okMsg} Guardado local porque el remoto esta restringido.`);
          } else {
            setNotice(okMsg);
          }
          setTimeout(() => setNotice(''), 2500);
        } catch(e) {
          setError(e.message || 'No se pudo guardar SALUD.');
        } finally {
          setSaving(false);
        }
      };

      const updateField = (key, value) => {
        setStock(prev => ({ ...prev, [key]: value }));
      };

      const syncTodayChecks = async (partial, dateKey) => {
        if(typeof onSyncDailyMeds === 'function') {
          await onSyncDailyMeds(partial, dateKey);
        }
      };

      const registerRoaccutanTake = async () => {
        if(todayMedsState.roacuttan) {
          setNotice('Roaccutan ya esta marcado hoy. Si fue un error, corregilo desde HOY o el historial.');
          setTimeout(() => setNotice(''), 2500);
          return;
        }
        const now = new Date();
        await applyHealthAction({
          patch: {
          roaccutan: Math.max(0, (parseInt(stock.roaccutan || 0, 10) || 0) - 1),
          },
          entry: {
            at: now.toISOString(),
            type: 'roaccutan_take',
            logical_date: localDateKey(now),
            roaccutan: 1
          },
          okMsg: 'Roaccutan del mediodia registrado.'
        });
        await syncTodayChecks({ roacuttan: true });
      };

      const registerDinnerTake = async () => {
        const dinnerTarget = getDinnerLogicalTarget();
        if(dinnerTarget.medsState.finasteride && dinnerTarget.medsState.minoxidil) {
          setNotice(`Las meds de cena ya estan marcadas para ${dinnerTarget.label}. Si fue un error, corregilo desde HOY o el historial.`);
          setTimeout(() => setNotice(''), 2500);
          return;
        }
        const now = new Date();
        await applyHealthAction({
          patch: {
          minoxidil_finasteride: Math.max(0, (parseInt(stock.minoxidil_finasteride || 0, 10) || 0) - 1),
          },
          entry: {
            at: now.toISOString(),
            type: 'dinner_combo_take',
            logical_date: dinnerTarget.dateKey,
            minoxidil_finasteride: 1
          },
          okMsg: `Meds de la cena registradas para ${dinnerTarget.label}.`
        });
        await syncTodayChecks({ finasteride: true, minoxidil: true }, dinnerTarget.dateKey);
      };

      const adjustStock = async (field, delta) => {
        const nowIso = new Date().toISOString();
        const current = parseInt(stock[field] || 0, 10) || 0;
        const nextVal = Math.max(0, current + delta);
        await applyHealthAction({
          patch: { [field]: nextVal },
          entry: {
            at: nowIso,
            type: delta > 0 ? 'restock' : 'manual_adjust',
            field,
            delta
          },
          okMsg: delta > 0 ? 'Stock repuesto.' : 'Stock ajustado.'
        });
      };

      const deleteHistoryEntry = async (entryAt) => {
        const history = Array.isArray(stock.history) ? stock.history : [];
        const target = history.find(entry => entry?.at === entryAt);
        if(!target) return;
        const deltas = entryDeltas(target);
        const remaining = history.filter(entry => entry?.at !== entryAt);
        const next = buildHealthPayload({
          ...stock,
          roaccutan: Math.max(0, pn(stock.roaccutan) - deltas.roaccutan),
          minoxidil_finasteride: Math.max(0, pn(stock.minoxidil_finasteride) - deltas.combo),
          history: remaining
        });
        await persistHealth(next, 'Movimiento borrado y stock recompuesto.');
        const affectsDate = target?.logical_date || (isTodayEntry(target.at) ? localDateKey(new Date()) : '');
        const logicalToday = localDateKey(new Date());
        const logicalYesterday = localDateKey(new Date(Date.now() - 86400000));
        if(affectsDate === logicalToday || affectsDate === logicalYesterday || isTodayEntry(target.at)) {
          const medStateForAffectedDate = affectsDate === logicalYesterday ? previousMedsState : todayMedsState;
          if(deltas.roaccutan < 0 && todayMedsState.roacuttan && !hasRemainingTakeForDate(remaining, 'roaccutan', logicalToday)) {
            await syncTodayChecks({ roacuttan: false });
          }
          if(deltas.roaccutan > 0 && !todayMedsState.roacuttan) {
            await syncTodayChecks({ roacuttan: true });
          }
          if(deltas.combo < 0 && (medStateForAffectedDate.finasteride || medStateForAffectedDate.minoxidil) && !hasRemainingTakeForDate(remaining, 'combo', affectsDate || logicalToday)) {
            await syncTodayChecks({ finasteride: false, minoxidil: false }, affectsDate || undefined);
          }
          if(deltas.combo > 0 && (!medStateForAffectedDate.finasteride || !medStateForAffectedDate.minoxidil)) {
            await syncTodayChecks({ finasteride: true, minoxidil: true }, affectsDate || undefined);
          }
        }
      };
      const editHistoryEntry = async (entryAt) => {
        const history = Array.isArray(stock.history) ? stock.history : [];
        const target = history.find(entry => entry?.at === entryAt);
        if(!target) return;
        setEditingHistoryAt(entryAt);
        try {
          if(target.type === 'roaccutan_take') {
            await deleteHistoryEntry(entryAt);
            setNotice('Movimiento listo para corregir. Usa REGISTRAR ROACCUTAN si queres volver a cargarlo.');
          } else if(target.type === 'dinner_combo_take') {
            await deleteHistoryEntry(entryAt);
            setNotice('Movimiento listo para corregir. Usa REGISTRAR MEDS CENA si queres volver a cargarlo.');
          } else if(target.type === 'restock' || target.type === 'manual_adjust') {
            const fieldLabel = target.field === 'roaccutan' ? 'Roaccutan' : 'Minoxidil/Finasteride';
            const nextVal = window.prompt(`Nuevo ajuste para ${fieldLabel}. Usa positivo o negativo.`, String(target.delta || 0));
            if(nextVal == null) return;
            const parsed = pn(nextVal);
            if(!parsed && parsed !== 0) {
              setNotice('Ajuste cancelado.');
              return;
            }
            await deleteHistoryEntry(entryAt);
            if(parsed !== 0) await adjustStock(target.field, parsed);
          } else if(target.type === 'habit_toggle') {
            await deleteHistoryEntry(entryAt);
            setNotice('Check diario quitado del historial. Si queres corregirlo, hacelo desde HOY.');
          }
          setTimeout(() => setNotice(''), 3000);
        } finally {
          setEditingHistoryAt('');
        }
      };

      const roaccutanCount = parseInt(stock.roaccutan || 0, 10) || 0;
      const minoxCount = parseInt(stock.minoxidil_finasteride || 0, 10) || 0;
      const low = roaccutanCount <= 2 || minoxCount <= 2;

      return html`
        <div class="fade-up" style="display:flex;flex-direction:column;gap:12px;">
          <${Card}>
            <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px;">
              <div>
                <p style="margin:0;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#F59E0B;">Salud / Blindex</p>
                <p style="margin:4px 0 0;font-size:12px;color:#64748b;">Stock real de medicacion, toma diaria y alerta de reposicion.</p>
              </div>
              <div style="display:flex;gap:8px;align-items:center;">
                <button onClick=${exportHealthData} style="padding:8px 12px;border-radius:8px;border:1px solid rgba(245,158,11,0.3);background:rgba(245,158,11,0.12);color:#FCD34D;font-size:11px;font-weight:800;font-family:'Barlow Condensed',sans-serif;cursor:pointer;letter-spacing:0.05em;">
                  EXPORTAR
                </button>
                <button class="btn-icon" style="background:#162035;border:1px solid #1E2D45;" onClick=${loadHealth}>
                  <${ISync} s=${16}/>
                </button>
              </div>
            </div>
            ${notice && html`<div style="margin-bottom:10px;padding:8px 10px;border-radius:8px;background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.25);color:#FCD34D;font-size:12px;">${notice}</div>`}
            ${error && html`<div style="margin-bottom:10px;padding:8px 10px;border-radius:8px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);color:#FCA5A5;font-size:12px;">${error}</div>`}
            ${loading ? html`
              <p style="margin:0;color:#94A3B8;font-size:12px;">Cargando salud...</p>
            ` : html`
              <div style="display:flex;flex-direction:column;gap:12px;">
                ${low && html`
                  <div style="padding:10px;border-radius:8px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);">
                    <p style="margin:0;font-size:12px;color:#FCA5A5;font-weight:700;">Reponer: alguno de los stocks esta en 2 o menos.</p>
                  </div>
                `}
                <div style="padding:12px;border-radius:10px;background:rgba(15,23,41,0.75);border:1px solid #1E2D45;display:flex;align-items:center;justify-content:space-between;gap:12px;">
                  <div>
                    <p style="margin:0;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:#94A3B8;">Peso corporal (semana)</p>
                    <p style="margin:4px 0 0;font-size:12px;color:#64748b;">Registralo aca una vez por semana.</p>
                  </div>
                  <div style="display:flex;align-items:center;gap:6px;">
                    <input type="number" step="0.1" placeholder="kg"
                      value=${bodyWeight || ''}
                      onInput=${e=>onBodyWeight && onBodyWeight(e.target.value)}
                      style="width:86px;background:#0F1729;border:1px solid #2A3F5F;border-radius:8px;padding:7px 10px;font-size:14px;font-weight:700;font-family:'JetBrains Mono',monospace;color:white;text-align:center;"/>
                    ${(bodyWeight || '') && html`<span style="font-size:13px;color:#10B981;font-weight:700;">kg</span>`}
                  </div>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
                  ${[
                    ['roaccutan', 'Roaccutan', roaccutanCount],
                    ['minoxidil_finasteride', 'Minoxidil / Finasteride', minoxCount]
                  ].map(([key, label, count]) => html`
                    <div style="padding:12px;border-radius:10px;background:rgba(15,23,41,0.75);border:1px solid ${count <= 2 ? 'rgba(239,68,68,0.3)' : '#1E2D45'};">
                      <p style="margin:0 0 6px;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:#94A3B8;">${label}</p>
                      <p style="margin:0 0 6px;font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:${count <= 2 ? '#FCA5A5' : '#E2E8F0'};">${count}</p>
                      <p style="margin:0 0 10px;font-size:11px;color:#64748b;">Blindex: ${Math.ceil(count / 10)} de 10 unidades</p>
                      <div style="display:flex;gap:6px;flex-wrap:wrap;">
                        <button onClick=${()=>adjustStock(key, -1)} style="padding:6px 10px;border-radius:8px;border:1px solid rgba(239,68,68,0.3);background:rgba(239,68,68,0.12);color:#FCA5A5;font-size:11px;font-weight:700;font-family:'Barlow Condensed',sans-serif;cursor:pointer;">-1</button>
                        <button onClick=${()=>adjustStock(key, -10)} style="padding:6px 10px;border-radius:8px;border:1px solid rgba(245,158,11,0.3);background:rgba(245,158,11,0.12);color:#FCD34D;font-size:11px;font-weight:700;font-family:'Barlow Condensed',sans-serif;cursor:pointer;">- Blindex</button>
                        <button onClick=${()=>adjustStock(key, +10)} style="padding:6px 10px;border-radius:8px;border:1px solid rgba(16,185,129,0.3);background:rgba(16,185,129,0.12);color:#86EFAC;font-size:11px;font-weight:700;font-family:'Barlow Condensed',sans-serif;cursor:pointer;">+ Blindex</button>
                      </div>
                    </div>
                  `)}
                </div>

                <div style="padding:12px;border-radius:10px;background:rgba(15,23,41,0.75);border:1px solid #1E2D45;">
                  <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:8px;">
                    <p style="margin:0;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#10B981;">Tomas del dia</p>
                    <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#94A3B8;">${stock.last_taken_at ? new Date(stock.last_taken_at).toLocaleString('es-AR') : 'Sin registro'}</span>
                  </div>
                  <p style="margin:0 0 10px;font-size:12px;color:#64748b;">Roaccutan va al mediodia. Minoxidil y Finasteride van con la cena. Si las tomas entre 00:00 y 06:00, cuentan para el dia anterior. Los botones de stock son solo ajustes de inventario; para marcar tomas reales usa los botones de registrar.</p>
                  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
                    <div style="padding:10px;border-radius:8px;background:rgba(8,13,26,0.45);border:1px solid #1E2D45;">
                      <p style="margin:0 0 4px;font-size:10px;text-transform:uppercase;color:#F59E0B;">Mediodia</p>
                      <p style="margin:0 0 8px;font-size:12px;color:#CBD5E1;">Roaccutan</p>
                      <p style="margin:0 0 8px;font-size:10px;color:#64748b;">Ultimo registro: ${stock.last_roaccutan_at ? new Date(stock.last_roaccutan_at).toLocaleString('es-AR') : 'Sin registro'}</p>
                      <button onClick=${registerRoaccutanTake} style="padding:8px 12px;border-radius:8px;border:none;background:#F59E0B;color:#041018;font-size:12px;font-weight:800;font-family:'Barlow Condensed',sans-serif;cursor:pointer;letter-spacing:0.05em;">
                        ${saving ? 'GUARDANDO...' : 'REGISTRAR ROACCUTAN'}
                      </button>
                    </div>
                    <div style="padding:10px;border-radius:8px;background:rgba(8,13,26,0.45);border:1px solid #1E2D45;">
                      <p style="margin:0 0 4px;font-size:10px;text-transform:uppercase;color:#10B981;">Cena</p>
                      <p style="margin:0 0 8px;font-size:12px;color:#CBD5E1;">Minoxidil + Finasteride</p>
                      <p style="margin:0 0 8px;font-size:10px;color:#64748b;">Ultimo registro: ${stock.last_dinner_meds_at ? new Date(stock.last_dinner_meds_at).toLocaleString('es-AR') : 'Sin registro'}</p>
                      <button onClick=${registerDinnerTake} style="padding:8px 12px;border-radius:8px;border:none;background:#10B981;color:#041018;font-size:12px;font-weight:800;font-family:'Barlow Condensed',sans-serif;cursor:pointer;letter-spacing:0.05em;">
                        ${saving ? 'GUARDANDO...' : 'REGISTRAR MEDS CENA'}
                      </button>
                    </div>
                  </div>
                </div>

                <div style="padding:12px;border-radius:10px;background:rgba(15,23,41,0.75);border:1px solid #1E2D45;">
                  <p style="margin:0 0 8px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#6366F1;">Historial reciente</p>
                  <div style="display:flex;flex-direction:column;gap:8px;">
                    ${(Array.isArray(stock.history) ? stock.history : []).length === 0 ? html`
                      <p style="margin:0;color:#64748b;font-size:12px;">Todavia no hay movimientos guardados.</p>
                    ` : (stock.history || []).slice(0, 8).map(entry => html`
                      <div style="padding:8px 10px;border-radius:8px;background:rgba(8,13,26,0.5);border:1px solid #1E2D45;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;">
                        <div style="flex:1;min-width:0;">
                          <p style="margin:0 0 4px;font-size:10px;color:#64748b;font-family:'JetBrains Mono',monospace;">${entry.at ? new Date(entry.at).toLocaleString('es-AR') : ''}</p>
                          <p style="margin:0;font-size:12px;color:#E2E8F0;">
                            ${entry.type === 'roaccutan_take'
                              ? 'Toma mediodia: -1 Roaccutan'
                              : entry.type === 'dinner_combo_take'
                                ? 'Toma cena: -1 Minoxidil/Finasteride'
                              : entry.type === 'habit_toggle'
                                ? `Check diario: ${entry.med === 'roacuttan'
                                    ? `Roaccutan ${entry.delta_roaccutan > 0 ? '+' : ''}${entry.delta_roaccutan}`
                                    : `Combo noche ${entry.delta_combo > 0 ? '+' : ''}${entry.delta_combo}`}`
                              : entry.type === 'restock'
                                ? `Reposicion: ${entry.field === 'roaccutan' ? 'Roaccutan' : 'Minoxidil/Finasteride'} +${entry.delta}`
                                : `Ajuste: ${entry.field === 'roaccutan' ? 'Roaccutan' : 'Minoxidil/Finasteride'} ${entry.delta}`
                            }
                          </p>
                        </div>
                        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
                          <button onClick=${()=>editHistoryEntry(entry.at)} disabled=${editingHistoryAt === entry.at} style="padding:4px 8px;border-radius:6px;border:1px solid rgba(99,102,241,0.3);background:rgba(99,102,241,0.12);color:#A5B4FC;font-size:10px;font-weight:700;font-family:'Barlow Condensed',sans-serif;cursor:pointer;letter-spacing:0.05em;opacity:${editingHistoryAt === entry.at ? 0.7 : 1};">
                            EDITAR
                          </button>
                          <button onClick=${()=>deleteHistoryEntry(entry.at)} style="padding:4px 8px;border-radius:6px;border:1px solid rgba(239,68,68,0.3);background:rgba(239,68,68,0.12);color:#FCA5A5;font-size:10px;font-weight:700;font-family:'Barlow Condensed',sans-serif;cursor:pointer;letter-spacing:0.05em;">
                            BORRAR
                          </button>
                        </div>
                      </div>
                    `)}
                  </div>
                </div>
              </div>
            `}
          <//>
        </div>
      `;
    };

    const TodayDashboard = ({session, onOpenTasks, onOpenStudy, onOpenBooks, onOpenHealth, onOpenRecipes, onOpenNotif}) => {
      const [summary, setSummary] = useState({
        pending:0, dueToday:0, notes:0, high:0, nextTask:null,
        studyPending:0, studyDone:0, studySubjects:0,
        book:null, bookPct:0,
        meds:null, medsLow:false,
        pantryLow:0,
        medNextLabel:'Sin datos de salud',
        medNextDetail:'',
        backupDue:false,
        backupLabel:''
      });
      const [loading, setLoading] = useState(true);
      const [weather, setWeather] = useState({ loading:true, data:null, error:'' });
      const weatherGymAdvice = useMemo(() => {
        const w = weather.data;
        if(!w) return { label:'Sin recomendación de tiempo', color:'#94A3B8', detail:'' };
        const severe = w.zonda || w.hail_risk || w.lightning_risk || w.storm_risk_today === 'alto' || (Number(w.wind_gusts) || 0) >= 60;
        const caution = !severe && (w.storm_risk_today === 'medio' || (Number(w.rain_probability) || 0) >= 55 || (Number(w.wind_gusts) || 0) >= 40);
        if(severe) {
          return {
            label:'Hoy mejor evaluar antes de ir al gym',
            color:'#FCA5A5',
            detail:'Tiempo inestable o con alerta fuerte. Si salís, revisá condiciones al momento.'
          };
        }
        if(caution) {
          return {
            label:'Gym con cautela',
            color:'#FBBF24',
            detail:'Hay inestabilidad o viento marcado. Conviene chequear el tiempo antes de salir.'
          };
        }
        return {
          label:'Tiempo favorable para salir',
          color:'#86EFAC',
          detail:'No se ve un riesgo fuerte en las próximas horas.'
        };
      }, [weather.data]);

      const loadSummary = useCallback(async () => {
        setLoading(true);
        try {
          const [
            { data: taskRows, error: taskErr },
            { data: noteRows, error: noteErr },
            { data: invRows, error: invErr },
            { data: studyRows, error: studyErr },
            { data: recipeRows, error: recipeErr }
          ] = await Promise.all([
            supabase.from('tasks')
              .select('id,title,due_at,priority,status,category')
              .eq('user_id', session.user.id)
              .order('due_at', { ascending: true, nullsFirst: false }),
            supabase.from('notes')
              .select('id,kind,content,created_at')
              .eq('user_id', session.user.id)
              .order('created_at', { ascending: false }),
            supabase.from('app_inventory')
              .select('key,data')
              .in('key', ['meds_stock', 'reading_progress', 'sweets_sauces_stock']),
            supabase.from('study_plan')
              .select('subject,topics')
              .order('subject', { ascending: true }),
            supabase.from('user_recipes')
              .select('recipe_name,stock_qty,low_stock_threshold')
          ]);
          if(taskErr) throw taskErr;
          if(noteErr) throw noteErr;
          if(invErr) throw invErr;
          if(studyErr) throw studyErr;
          if(recipeErr) throw recipeErr;

          const tasks = taskRows || [];
          const notes = (noteRows || []).filter(n => n.kind !== 'converted');
          const inventory = Object.fromEntries((invRows || []).map(row => [row.key, row.data || {}]));
          const study = studyRows || [];
          const recipes = recipeRows || [];
          const now = new Date();
          const endOfToday = new Date(now); endOfToday.setHours(23,59,59,999);
          const pending = tasks.filter(t => t.status !== 'done');
          const dueToday = pending.filter(t => t.due_at && new Date(t.due_at) <= endOfToday);
          const nextTask = pending
            .filter(t => t.due_at)
            .sort((a,b)=>new Date(a.due_at)-new Date(b.due_at))[0] || pending[0] || null;
          const meds = { ...MEDS_STOCK_DEFAULT, ...(inventory.meds_stock || {}) };
          const book = { ...BOOK_DEFAULT, ...(inventory.reading_progress || {}) };
          const bookPct = Math.max(0, Math.min(100, Math.round((pn(book.current_page) / Math.max(1, pn(book.total_pages))) * 100) || 0));
          const todayKey = localDateKey(new Date());
          const dinnerLogicalKey = (() => {
            const now = new Date();
            if(now.getHours() < 6) {
              const prev = new Date(now);
              prev.setDate(prev.getDate() - 1);
              return localDateKey(prev);
            }
            return localDateKey(now);
          })();
          const roaccutanToday = meds.last_roaccutan_at && localDateKey(new Date(meds.last_roaccutan_at)) === todayKey;
          const dinnerToday = (meds.last_dinner_logical_date || (meds.last_dinner_meds_at ? localDateKey(new Date(meds.last_dinner_meds_at)) : '')) === dinnerLogicalKey;
          const medNextLabel = !roaccutanToday
            ? 'Roaccutan pendiente'
            : !dinnerToday
              ? 'Meds de cena pendientes'
              : 'Tomas del dia completas';
          const medNextDetail = !roaccutanToday
            ? 'Mediodia'
            : !dinnerToday
              ? 'Cena'
              : `Ultimos registros: R ${meds.last_roaccutan_at ? new Date(meds.last_roaccutan_at).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'}) : '-'} · C ${meds.last_dinner_meds_at ? new Date(meds.last_dinner_meds_at).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'}) : '-'}`;
          const studyTopics = study.flatMap(row => Array.isArray(row.topics) ? row.topics : []);
          const studyPending = studyTopics.filter(topic => !topic?.done).length;
          const studyDone = studyTopics.filter(topic => !!topic?.done).length;
          const pantryLow = recipes.filter(row => {
            const qty = pn(row.stock_qty);
            const threshold = pn(row.low_stock_threshold);
            return qty > 0 && threshold > 0 && qty <= threshold;
          }).length;
          const lastBackupAt = metaGet('last_backup_at');
          const lastBackupMs = lastBackupAt ? new Date(lastBackupAt).getTime() : 0;
          const hoursSinceBackup = lastBackupMs ? Math.floor((Date.now() - lastBackupMs) / 3600000) : null;
          const backupDue = !lastBackupMs || hoursSinceBackup >= 72;
          const backupLabel = !lastBackupMs
            ? 'Nunca hiciste backup manual'
            : backupDue
              ? `Ultimo backup hace ${hoursSinceBackup}h`
              : `Ultimo backup hace ${hoursSinceBackup}h`;

          setSummary({
            pending: pending.length,
            dueToday: dueToday.length,
            notes: notes.length,
            high: pending.filter(t => (t.priority || 'normal') === 'high').length,
            nextTask,
            studyPending,
            studyDone,
            studySubjects: study.length,
            book,
            bookPct,
            meds,
            medsLow: pn(meds.roaccutan) <= 2 || pn(meds.minoxidil_finasteride) <= 2,
            pantryLow,
            medNextLabel,
            medNextDetail,
            backupDue,
            backupLabel
          });
        } catch(_) {
          setSummary({
            pending:0, dueToday:0, notes:0, high:0, nextTask:null,
            studyPending:0, studyDone:0, studySubjects:0,
            book:null, bookPct:0,
            meds:null, medsLow:false,
            pantryLow:0,
            medNextLabel:'Sin datos de salud',
            medNextDetail:'',
            backupDue:false,
            backupLabel:''
          });
        } finally {
          setLoading(false);
        }
      }, [session.user.id]);

      const quickUpdateTask = useCallback(async (task, status) => {
        if(!task?.id) return;
        try {
          const basePatch = {
            status,
            email_reminder_sent_at: status === 'pending' ? null : task.email_reminder_sent_at || null,
            updated_at: new Date().toISOString()
          };
          const { error } = await supabase.from('tasks')
            .update(basePatch)
            .eq('id', task.id)
            .eq('user_id', session.user.id);
          if(error) throw error;

          if(status === 'done' && (task.recurrence || 'none') !== 'none'){
            const nextDueAt = computeNextRecurringDueAt(task);
            const { error: nextErr } = await supabase.from('tasks').insert({
              user_id: session.user.id,
              title: task.title,
              details: task.details || null,
              subtasks: normalizeSubtasks(task.subtasks || []),
              priority: task.priority || 'normal',
              category: task.category || 'personal',
              recurrence: task.recurrence || 'none',
              status: 'pending',
              auto_email_reminder: task.auto_email_reminder !== false,
              due_at: nextDueAt,
              email_reminder_sent_at: null
            });
            if(nextErr) throw nextErr;
          }
          loadSummary();
        } catch(_) {}
      }, [loadSummary, session.user.id]);

      useEffect(() => {
        loadSummary();
        const onFocus = () => loadSummary();
        const onVisible = () => { if(document.visibilityState === 'visible') loadSummary(); };
        window.addEventListener('focus', onFocus);
        document.addEventListener('visibilitychange', onVisible);
        return () => {
          window.removeEventListener('focus', onFocus);
          document.removeEventListener('visibilitychange', onVisible);
        };
      }, [loadSummary]);

      const loadWeather = useCallback(async () => {
        const cacheKey = 'enzo_weather_san_rafael';
        try {
          const cached = JSON.parse(localStorage.getItem(cacheKey) || 'null');
          if(cached?.data && cached?.at && (Date.now() - cached.at) < 30 * 60 * 1000) {
            setWeather({ loading:false, data: cached.data, error:'' });
            return;
          }
        } catch(_) {}
        setWeather(prev => ({ ...prev, loading:true, error:'' }));
        try {
          const res = await fetch('/.netlify/functions/weather-san-rafael');
          const data = await res.json().catch(() => ({}));
          if(!res.ok) throw new Error(data?.error || 'No se pudo cargar el clima.');
          setWeather({ loading:false, data, error:'' });
          try { localStorage.setItem(cacheKey, JSON.stringify({ at: Date.now(), data })); } catch(_) {}
        } catch(e) {
          setWeather({ loading:false, data:null, error:e.message || 'No se pudo cargar el clima.' });
        }
      }, []);

      useEffect(() => {
        loadWeather();
        const onFocus = () => loadWeather();
        const onVisible = () => { if(document.visibilityState === 'visible') loadWeather(); };
        window.addEventListener('focus', onFocus);
        document.addEventListener('visibilitychange', onVisible);
        return () => {
          window.removeEventListener('focus', onFocus);
          document.removeEventListener('visibilitychange', onVisible);
        };
      }, [loadWeather]);

      return html`
        <div class="glass-card" style="padding:12px 14px;display:flex;flex-direction:column;gap:10px;">
          <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;">
            <div>
              <p style="margin:0;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:#6366F1;font-weight:700;">Tablero principal</p>
              <p style="margin:4px 0 0;font-size:12px;color:#94A3B8;">Lo importante del d&iacute;a, sin salir del Diario.</p>
            </div>
            <button onClick=${onOpenTasks}
              style="padding:8px 10px;border-radius:8px;border:1px solid rgba(99,102,241,0.35);background:rgba(99,102,241,0.12);color:#A5B4FC;font-size:11px;font-weight:800;font-family:'Barlow Condensed',sans-serif;cursor:pointer;letter-spacing:0.05em;">
              VER TAREAS
            </button>
          </div>
          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;text-align:center;">
            ${[
              { label:'Pend.', val: summary.pending, color:'#10B981' },
              { label:'Hoy', val: summary.dueToday, color:'#EF4444' },
              { label:'Ideas', val: summary.notes, color:'#F59E0B' },
              { label:'Alta', val: summary.high, color:'#38BDF8' }
            ].map(item => html`
              <div style="padding:10px 8px;border-radius:10px;background:rgba(10,15,30,0.45);border:1px solid #1E2D45;">
                <p style="margin:0;font-size:9px;color:#64748b;text-transform:uppercase;">${item.label}</p>
                <p style=${`margin:4px 0 0;font-size:17px;font-weight:700;font-family:'JetBrains Mono',monospace;color:${item.color};`}>${loading ? '...' : item.val}</p>
              </div>
            `)}
          </div>
          <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;">
            <button onClick=${onOpenStudy} style="text-align:left;padding:10px 12px;border-radius:10px;border:1px solid rgba(99,102,241,0.25);background:rgba(99,102,241,0.08);cursor:pointer;">
              <p style="margin:0 0 4px;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:#A5B4FC;font-weight:700;">Estudio</p>
              <p style="margin:0;font-size:18px;font-family:'JetBrains Mono',monospace;font-weight:700;color:#E2E8F0;">${loading ? '...' : summary.studyPending}</p>

                  HECHA
                </button>
                <button onClick=${()=>quickUpdateTask(summary.nextTask,'archived')} style="padding:6px 10px;border-radius:8px;border:1px solid rgba(148,163,184,0.35);background:rgba(148,163,184,0.12);color:#CBD5E1;font-size:11px;font-weight:800;font-family:'Barlow Condensed',sans-serif;cursor:pointer;letter-spacing:0.05em;">
                  ARCHIVAR
                </button>
                <button onClick=${onOpenTasks} style="padding:6px 10px;border-radius:8px;border:1px solid rgba(99,102,241,0.35);background:rgba(99,102,241,0.12);color:#A5B4FC;font-size:11px;font-weight:800;font-family:'Barlow Condensed',sans-serif;cursor:pointer;letter-spacing:0.05em;">
                  ABRIR
                </button>
              </div>
            `}
          </div>
        </div>
      `;
    };

    const ProductivityView = ({session}) => {
      const [tasks, setTasks] = useState([]);
      const [notes, setNotes] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState('');
      const [taskTitle, setTaskTitle] = useState('');
      const [taskDue, setTaskDue] = useState('');
      const [taskPriority, setTaskPriority] = useState('normal');
      const [noteTitle, setNoteTitle] = useState('');
      const [noteText, setNoteText] = useState('');
      const [noteKind, setNoteKind] = useState('idea');
      const [noteKindLocked, setNoteKindLocked] = useState(false);
      const [saving, setSaving] = useState('');
      const [taskSearch, setTaskSearch] = useState('');
      const [priorityFilter, setPriorityFilter] = useState('all');
      const [statusFilter, setStatusFilter] = useState('all');
      const [categoryFilter, setCategoryFilter] = useState('all');
      const [noteKindFilter, setNoteKindFilter] = useState('all');
      const [taskAutoEmail, setTaskAutoEmail] = useState(true);
      const [taskCategory, setTaskCategory] = useState('personal');
      const [taskRecurrence, setTaskRecurrence] = useState('none');
      const [editingTaskId, setEditingTaskId] = useState(null);
      const [editingTaskTitle, setEditingTaskTitle] = useState('');
      const [editingTaskDetails, setEditingTaskDetails] = useState('');
      const [editingTaskSubtasksText, setEditingTaskSubtasksText] = useState('');
      const [editingTaskDue, setEditingTaskDue] = useState('');
      const [editingTaskPriority, setEditingTaskPriority] = useState('normal');
      const [editingTaskAutoEmail, setEditingTaskAutoEmail] = useState(true);
      const [editingTaskCategory, setEditingTaskCategory] = useState('personal');
      const [editingTaskRecurrence, setEditingTaskRecurrence] = useState('none');
      const [editingNoteId, setEditingNoteId] = useState(null);
      const [editingNoteTitle, setEditingNoteTitle] = useState('');
      const [editingNoteContent, setEditingNoteContent] = useState('');
      const [editingNoteKind, setEditingNoteKind] = useState('idea');
      const [editingNoteKindLocked, setEditingNoteKindLocked] = useState(false);
      const [aiOpenNoteId, setAiOpenNoteId] = useState(null);
      const [aiDrafts, setAiDrafts] = useState(()=>loadThoughtDrafts());
      const [aiReplies, setAiReplies] = useState(()=>loadThoughtThreads());
      const [aiLoadingNoteId, setAiLoadingNoteId] = useState(null);
      const [aiNotice, setAiNotice] = useState('');
      const [taskNotice, setTaskNotice] = useState('');
      const aiDraftTimersRef = useRef({});

      useEffect(() => { saveThoughtThreads(aiReplies); }, [aiReplies]);
      useEffect(() => { saveThoughtDrafts(aiDrafts); }, [aiDrafts]);

      const loadData = useCallback(async () => {
        setLoading(true);
        setError('');
        try {
          const [{ data: taskRows, error: taskErr }, { data: noteRows, error: noteErr }] = await Promise.all([
            supabase.from('tasks')
              .select('*')
              .eq('user_id', session.user.id)
              .order('status', { ascending: true })
              .order('due_at', { ascending: true, nullsFirst: false })
              .order('created_at', { ascending: false }),
            supabase.from('notes')
              .select('*')
              .eq('user_id', session.user.id)
              .order('pinned', { ascending: false })
              .order('created_at', { ascending: false })
          ]);
          if(taskErr) throw taskErr;
          if(noteErr) throw noteErr;
          setTasks(taskRows || []);
          setNotes(noteRows || []);
          const remoteThreads = Object.fromEntries(
            (noteRows || [])
              .filter(n => Array.isArray(n.ai_thread) && n.ai_thread.length > 0)
              .map(n => [n.id, n.ai_thread])
          );
          setAiReplies(prev => {
            const merged = { ...prev };
            Object.entries(remoteThreads).forEach(([noteId, thread]) => {
              const localThread = merged[noteId] || [];
              merged[noteId] = thread.length >= localThread.length ? thread : localThread;
            });
            return merged;
          });
          const remoteDrafts = Object.fromEntries(
            (noteRows || [])
              .filter(n => typeof n.ai_draft === 'string' && n.ai_draft.trim())
              .map(n => [n.id, n.ai_draft])
          );
          setAiDrafts(prev => {
            const merged = { ...prev };
            Object.entries(remoteDrafts).forEach(([noteId, draft]) => {
              const localDraft = merged[noteId] || '';
              merged[noteId] = String(draft).length >= String(localDraft).length ? draft : localDraft;
            });
            return merged;
          });
        } catch(e) {
          setError(e.message || 'No se pudieron cargar tareas y pensamientos.');
        } finally {
          setLoading(false);
        }
      }, [session.user.id]);

      useEffect(() => {
        loadData();
        const onFocus = () => loadData();
        const onVisible = () => { if(document.visibilityState === 'visible') loadData(); };
        window.addEventListener('focus', onFocus);
        document.addEventListener('visibilitychange', onVisible);
        return () => {
          window.removeEventListener('focus', onFocus);
          document.removeEventListener('visibilitychange', onVisible);
        };
      }, [loadData]);

      const addTask = async () => {
        if(!taskTitle.trim()) return;
        setSaving('task');
        setError('');
        try {
          const { data, error } = await supabase.from('tasks').insert({
            user_id: session.user.id,
            title: taskTitle.trim(),
            details: null,
            subtasks: [],
            priority: taskPriority,
            category: taskCategory,
            recurrence: taskRecurrence,
            status: 'pending',
            auto_email_reminder: taskAutoEmail,
            due_at: taskDue || null
          }).select().single();
          if(error) throw error;
          setTasks(prev => [data, ...prev]);
          setTaskTitle('');
          setTaskDue('');
          setTaskPriority('normal');
          setTaskCategory('personal');
          setTaskRecurrence('none');
          setTaskAutoEmail(true);
        } catch(e) {
          setError(e.message || 'No se pudo guardar la tarea.');
        } finally {
          setSaving('');
        }
      };

      const addNote = async () => {
        if(!noteText.trim()) return;
        setSaving('note');
        setError('');
        try {
          const { data, error } = await supabase.from('notes').insert({
            user_id: session.user.id,
            note_title: noteTitle.trim() || null,
            content: noteText.trim(),
            kind: noteKind,
            pinned: false,
            ai_thread: [],
            ai_draft: ''
          }).select().single();
          if(error) throw error;
          setNotes(prev => [data, ...prev]);
          setNoteTitle('');
          setNoteText('');
          setNoteKind('idea');
          setNoteKindLocked(false);
        } catch(e) {
          setError(e.message || 'No se pudo guardar el pensamiento.');
        } finally {
          setSaving('');
        }
      };

      const updateTaskStatus = async (task, status) => {
        try {
          const basePatch = {
            status,
            email_reminder_sent_at: status === 'pending' ? null : task.email_reminder_sent_at || null,
            updated_at: new Date().toISOString()
          };
          const { data, error } = await supabase.from('tasks')
            .update({
              ...basePatch
            })
            .eq('id', task.id)
            .eq('user_id', session.user.id)
            .select()
            .single();
          if(error) throw error;
          let spawnedTask = null;
          if(status === 'done' && (task.recurrence || 'none') !== 'none'){
            const nextDueAt = computeNextRecurringDueAt(task);
            const { data: nextTask, error: nextErr } = await supabase.from('tasks').insert({
              user_id: session.user.id,
              title: task.title,
              details: task.details || null,
              subtasks: normalizeSubtasks(task.subtasks || []),
              priority: task.priority || 'normal',
              category: task.category || 'personal',
              recurrence: task.recurrence || 'none',
              status: 'pending',
              auto_email_reminder: task.auto_email_reminder !== false,
              due_at: nextDueAt,
              email_reminder_sent_at: null
            }).select().single();
            if(nextErr) throw nextErr;
            spawnedTask = nextTask;
          }
          setTasks(prev => {
            const next = prev.map(t => t.id === task.id ? data : t);
            return spawnedTask ? [spawnedTask, ...next] : next;
          });
        } catch(e) {
          setError(e.message || 'No se pudo actualizar la tarea.');
        }
      };

      const startEditTask = (task) => {
        setEditingTaskId(task.id);
        setEditingTaskTitle(task.title || '');
        setEditingTaskDetails(task.details || '');
        setEditingTaskSubtasksText(subtasksToEditorText(task.subtasks || []));
        setEditingTaskDue(task.due_at ? String(task.due_at).slice(0,16) : '');
        setEditingTaskPriority(task.priority || 'normal');
        setEditingTaskCategory(task.category || 'personal');
        setEditingTaskAutoEmail(task.auto_email_reminder !== false);
        setEditingTaskRecurrence(task.recurrence || 'none');
      };

      const saveTaskEdit = async (task) => {
        if(!editingTaskTitle.trim()) return;
        setSaving(`edit-task-${task.id}`);
        setError('');
        try {
          const { data, error } = await supabase.from('tasks')
            .update({
              title: editingTaskTitle.trim(),
              details: editingTaskDetails.trim() || null,
              subtasks: editorTextToSubtasks(editingTaskSubtasksText),
              due_at: editingTaskDue || null,
              priority: editingTaskPriority,
              category: editingTaskCategory,
              recurrence: editingTaskRecurrence,
              auto_email_reminder: editingTaskAutoEmail,
              email_reminder_sent_at: null,
              updated_at: new Date().toISOString()
            })
            .eq('id', task.id)
            .eq('user_id', session.user.id)
            .select()
            .single();
          if(error) throw error;
          setTasks(prev => prev.map(t => t.id === task.id ? data : t));
          setEditingTaskId(null);
        } catch(e) {
          setError(e.message || 'No se pudo editar la tarea.');
        } finally {
          setSaving('');
        }
      };

      const deleteTask = async (task) => {
        try {
          const { error } = await supabase.from('tasks')
            .delete()
            .eq('id', task.id)
            .eq('user_id', session.user.id);
          if(error) throw error;
          setTasks(prev => prev.filter(t => t.id !== task.id));
        } catch(e) {
          setError(e.message || 'No se pudo borrar la tarea.');
        }
      };

      const toggleSubtask = async (task, subtaskIndex) => {
        try {
          const subtasks = normalizeSubtasks(task.subtasks || []).map((item, idx) => idx === subtaskIndex ? { ...item, done: !item.done } : item);
          const { data, error } = await supabase.from('tasks')
            .update({
              subtasks,
              updated_at: new Date().toISOString()
            })
            .eq('id', task.id)
            .eq('user_id', session.user.id)
            .select()
            .single();
          if(error) throw error;
          setTasks(prev => prev.map(t => t.id === task.id ? data : t));
        } catch(e) {
          setError(e.message || 'No se pudo actualizar la subtarea.');
        }
      };

      const togglePinNote = async (note) => {
        try {
          const { data, error } = await supabase.from('notes')
            .update({ pinned: !note.pinned, updated_at: new Date().toISOString() })
            .eq('id', note.id)
            .eq('user_id', session.user.id)
            .select()
            .single();
          if(error) throw error;
          setNotes(prev => prev.map(n => n.id === note.id ? data : n));
        } catch(e) {
          setError(e.message || 'No se pudo actualizar el pensamiento.');
        }
      };

      const persistAiThread = async (noteId, thread) => {
        const { error } = await supabase.from('notes')
          .update({
            ai_thread: thread,
            updated_at: new Date().toISOString()
          })
          .eq('id', noteId)
          .eq('user_id', session.user.id);
        if(error) throw error;
      };

      const persistAiDraft = async (noteId, draft) => {
        const { error } = await supabase.from('notes')
          .update({
            ai_draft: draft,
            updated_at: new Date().toISOString()
          })
          .eq('id', noteId)
          .eq('user_id', session.user.id);
        if(error) throw error;
      };

      const updateAiDraft = (noteId, value) => {
        setAiDrafts(prev => ({ ...prev, [noteId]: value }));
        clearTimeout(aiDraftTimersRef.current[noteId]);
        aiDraftTimersRef.current[noteId] = setTimeout(() => {
          persistAiDraft(noteId, value).catch(() => {});
        }, 700);
      };

      const startEditNote = (note) => {
        setEditingNoteId(note.id);
        setEditingNoteTitle(note.note_title || '');
        setEditingNoteContent(note.content || '');
        setEditingNoteKind(note.kind || 'idea');
        setEditingNoteKindLocked(false);
      };

      const saveNoteEdit = async (note) => {
