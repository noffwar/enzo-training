  <style>

      --red: #EF4444;

    /* Scrollbar */
    .hide-scroll { scrollbar-width: none; -ms-overflow-style: none; }
    .hide-scroll::-webkit-scrollbar { display: none; }
    /* Inputs */
    input[type="checkbox"] { accent-color: var(--green); width: 18px; height: 18px; cursor: pointer; flex-shrink:0; }
    input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(0.5); cursor: pointer; }
    input:focus, select:focus { outline: none; border-color: var(--indigo) !important; box-shadow: 0 0 0 2px rgba(99,102,241,0.2); }
    input, select { font-family: 'Barlow', sans-serif; }
    /* Layout */
    .pb-safe { padding-bottom: calc(76px + env(safe-area-inset-bottom, 8px)); }
    .pt-safe { padding-top: env(safe-area-inset-top, 0px); }
    /* Animations */
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.4)} }
    @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes urgentPulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
    .spin { animation: spin 0.9s linear infinite; }
    .fade-up { animation: fadeUp 0.2s ease-out forwards; }
    .timer-urgent { animation: urgentPulse 0.7s ease-in-out infinite; }
    /* Components */
    .glass-card { background: rgba(15,23,41,0.85); border: 1px solid #1E2D45; border-radius: 12px; }
    .set-row-done { border-left: 3px solid var(--green) !important; background: rgba(16,185,129,0.08) !important; }
    .bottom-nav { background: rgba(8,13,26,0.97); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid #1E2D45; }
    .section-toggle { width:100%; padding:12px 16px; display:flex; align-items:center; justify-content:space-between; background:rgba(22,32,53,0.4); border:none; cursor:pointer; color:white; }

    .inp-xs { width:100%; background:#0F1729; border:1px solid #1E2D45; border-radius:6px; padding:4px 6px; font-size:12px; color:white; text-align:center; font-family:'JetBrains Mono',monospace; }

    th { font-size:9px; text-transform:uppercase; letter-spacing:0.08em; color:#475569; padding:8px 6px; border-bottom:1px solid #1E2D45; font-weight:600; }
    td { padding:5px 6px; border-bottom:1px solid rgba(30,45,69,0.4); vertical-align:middle; }
    /* Buttons */

    .btn-icon:active { transform:scale(0.92); }
    .check-btn { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; border:none; cursor:pointer; margin:0 auto; transition:all 0.15s; }

  <script>

  <!-- Recharts (UMD) — carga diferida: solo cuando se necesitan los gráficos -->
  <script>
    window._rechartsLoaded = false;
    window._loadRecharts = function() {
      if(window._rechartsLoaded) return Promise.resolve();
      // Bug 12 fix: NO marcar como cargado hasta que el script realmente cargue
      return new Promise(function(res, rej) {
        var s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/recharts@2.12.7/umd/Recharts.js';
        s.crossOrigin = 'anonymous';
        s.onload = function() {
          window._rechartsLoaded = true; // marcar DESPUÉS del éxito
          window._RC = window.Recharts || {};
          res();
        };
        s.onerror = function(e) {
          // No marcar como loaded → permite reintentar
          document.head.removeChild(s);
          rej(e);
        };
        document.head.appendChild(s);
      });
    };

    // html2canvas — carga diferida: solo al presionar exportar
    window._loadHtml2Canvas = function() {
      if(window.html2canvas) return Promise.resolve();
      return new Promise(function(res, rej) {
        var s = document.createElement('script');
        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
        s.onload = res;
        s.onerror = function(e) { document.head.removeChild(s); rej(e); };
        document.head.appendChild(s);
      });
    };
  </script>
  <!-- idb helper: wrapper mínimo nativo para la cola de Background Sync -->
  <script>
    window.idb = {
      openDB: function(name, version, callbacks) {
        return new Promise(function(res, rej) {
          var req = indexedDB.open(name, version);
          req.onupgradeneeded = function(e) {
            if(callbacks && callbacks.upgrade) callbacks.upgrade(e.target.result);
          };
          req.onsuccess = function(e) {
            var db = e.target.result;

            db.add = function(store, val) {
              return new Promise(function(r, j) {
                var tx = db.transaction(store, 'readwrite');
                var req2 = tx.objectStore(store).add(val);
                req2.onsuccess = function() { r(req2.result); };
                req2.onerror   = function() { j(req2.error); };
              });
            };

            // BUG FIX: estos métodos faltaban — el outbox nunca funcionó sin ellos
            db.put = function(store, val) {
              return new Promise(function(r, j) {
                var tx = db.transaction(store, 'readwrite');
                var req2 = tx.objectStore(store).put(val);
                req2.onsuccess = function() { r(req2.result); };
                req2.onerror   = function() { j(req2.error); };
              });
            };

            db.getAll = function(store) {
              return new Promise(function(r, j) {
                var tx = db.transaction(store, 'readonly');
                var req2 = tx.objectStore(store).getAll();
                req2.onsuccess = function() { r(req2.result || []); };
                req2.onerror   = function() { j(req2.error); };
              });
            };

            db.getAllKeys = function(store) {
              return new Promise(function(r, j) {
                var tx = db.transaction(store, 'readonly');
                var req2 = tx.objectStore(store).getAllKeys();
                req2.onsuccess = function() { r(req2.result || []); };
                req2.onerror   = function() { j(req2.error); };
              });
            };

            db.delete = function(store, key) {
              return new Promise(function(r, j) {
                var tx = db.transaction(store, 'readwrite');
                var req2 = tx.objectStore(store).delete(key);
                req2.onsuccess = function() { r(); };
                req2.onerror   = function() { j(req2.error); };
              });
            };

            res(db);
          };
          req.onerror = function(e) { rej(e.target.error); };
        });
      }
    };
  </script>

  <script>
    window.onerror = function(msg, src, line, col, err) {
      document.getElementById('splash').style.display = 'none';
      document.getElementById('error-screen').style.display = 'block';
      document.getElementById('error-msg').textContent = (err ? err.stack : msg) + '\n\nFuente: ' + src + ':' + line;

    window.onunhandledrejection = function(e) {
      var r = e.reason;
      window.onerror(r && r.message || String(r), 'promise', 0, 0, r instanceof Error ? r : null);
    };
  </script>

    // pn: parsea números en formato ES-AR ("65,0" → 65, "1.250,5" → 1250.5)
    // Regla: el punto es separador de miles, la coma es decimal
    const pn = v => {
      if(!v && v !== 0) return 0;
      const s = String(v).trim();
      // Si tiene coma → ES-AR: quitar puntos de miles, reemplazar coma decimal
      if(s.includes(',')) {
        const n = parseFloat(s.replace(/\./g, '').replace(',', '.'));
        return isNaN(n) ? 0 : n;
      }
      // Sin coma → puede ser número puro o con punto decimal estándar
      const n = parseFloat(s);
      return isNaN(n) ? 0 : n;
    };
    const fn = v => { if(!v && v!==0) return "0"; const n=Number(v); return n.toLocaleString('es-AR',{maximumFractionDigits:1}); };
    const ft = s => { const m=Math.floor(s/60),sec=s%60; return `${m}:${sec<10?'0':''}${sec}`; };

    const getWeekStart = d => { const dt=new Date(d); const day=dt.getDay(); dt.setDate(dt.getDate()+(day===0?-6:1-day)); dt.setHours(0,0,0,0); return dt; };

      return d.getMonth()===e.getMonth()?`${d.getDate()}–${e.getDate()} ${M[d.getMonth()]} ${d.getFullYear()}`:`${d.getDate()} ${M[d.getMonth()]}–${e.getDate()} ${M[e.getMonth()]}`;

    const lsSave = (k, v) => isDateKey(k) ? lsDaySave(k, v) : lsWeekSave(k, v);

    // ─── MIGRACIÓN desde enzo_v2_ ────────────────────────────────
    const migrateLegacyLocalStorage = () => {
      if(metaGet('migration_v3_done')) return;
      const oldKeys = Object.keys(localStorage).filter(k=>k.startsWith(V3.OLD));
      if(oldKeys.length === 0) { metaSet('migration_v3_done', true); return; }

      let migrated = 0;
      oldKeys.forEach(fullKey => {
        const key = fullKey.slice(V3.OLD.length);
        try {
          const raw = localStorage.getItem(fullKey);
          if(!raw) return;
          const val = JSON.parse(raw);
          if(!val) return;

          const hasWeekStruct = !!(val.dayMapping || val.sessions);
          const hasDayStruct  = !!(val.meds || val.meals || val.fasted !== undefined);
          const hasTracker    = !!(val.tracker);
          const isDateFmt     = isDateKey(key);

          if(hasTracker) {
            // Formato muy viejo: toda la semana en daily_logs
            const wkKey = key;
            if(!lsWeekLoad(wkKey)) lsWeekSave(wkKey, { dayMapping: val.dayMapping||{}, bodyWeight: val.bodyWeight||'' });
            Object.entries(val.tracker||{}).forEach(([idx, dayData]) => {

              if(!lsDayLoad(date)) lsDaySave(date, { ...dayData, _session: (val.sessions||{})[idx]||null });
            });
          } else if(hasWeekStruct && !hasDayStruct) {
            if(!lsWeekLoad(key)) lsWeekSave(key, val);
          } else if(hasDayStruct && !hasWeekStruct) {
            if(!lsDayLoad(key)) lsDaySave(key, val);
          } else if(isDateFmt) {
            const dow = new Date(key+'T12:00:00').getDay();
            if(dow === 1 && hasWeekStruct) {
              if(!lsWeekLoad(key)) lsWeekSave(key, val);
              if(!lsDayLoad(key))  lsDaySave(key, val); // preservar ambos
              console.warn('[Migration] Ambigüedad lunes:', key);
            } else {
              if(!lsDayLoad(key)) lsDaySave(key, val);
            }
          }
          migrated++;
        } catch(e) { console.warn('[Migration] error en', fullKey, e.message); }
      });

      metaSet('migration_v3_done', true);

    // ─── HELPERS de fechas ───────────────────────────────────────

    const localDateKey = (d = new Date()) => {

    // ─── OUTBOX con dedupe por entity_type+entity_id ─────────────
    const openOutboxDB = () => window.idb?.openDB('enzo-sync-db-v3', 1, {

    const enqueueOutboxOp = async ({ entity_type, entity_id, payload, base_revision }) => {
      try {
        const db = await openOutboxDB();

    const flushOutbox = async () => {
      if(!navigator.onLine || !window.idb) return;
      try {
        const db    = await openOutboxDB();
        const items = await db.getAll('outbox');
        if(!items || items.length === 0) return;

        for(const item of items) {
          try {
            let rpcName, rpcArgs;
            if(item.entity_type === 'daily_log') {
              rpcName = 'save_daily_log';
              rpcArgs = { p_date: item.entity_id, p_tracker: item.payload.tracker, p_session: item.payload.session||null, p_base_revision: item.base_revision||null, p_device_id: DEVICE_ID };
            } else if(item.entity_type === 'weekly_config') {
              rpcName = 'save_weekly_config';
              rpcArgs = { p_week_key: item.entity_id, p_body_weight: item.payload.body_weight||null, p_day_mapping: item.payload.day_mapping||{}, p_base_revision: item.base_revision||null, p_device_id: DEVICE_ID };

              rpcArgs = { p_routine_id: item.entity_id, p_data: item.payload, p_base_revision: item.base_revision||null, p_device_id: DEVICE_ID };
            } else continue;

            const { data, error } = await supabase.rpc(rpcName, rpcArgs);
            if(error) throw new Error(error.message);

            // BUG FIX: conflictos vienen en data.status, no en error
            if(data?.status === 'conflict') {
              metaSet('last_conflict', { entity_key: item.entity_key, server: data.server, at: new Date().toISOString() });

            } else {
              await db.delete('outbox', item.entity_key);
            }

            if(!navigator.onLine) break;

    const getFastStats = (t) => {
      if(!t.fasted || !t.fastStartTime) return {endStr:null, rollover:false, walkStr:null, isFasted:false};

      const [sH, sM] = t.fastStartTime.split(':').map(Number);
      const dur = pn(t.fastHours);

      if(isNaN(sH) || dur <= 0) return {endStr:null, rollover:false, walkStr:null, isFasted:false};

      const totalMinutos = sH * 60 + sM + (dur * 60);
      const finH = Math.floor(totalMinutos / 60) % 24;
      const finM = Math.round(totalMinutos % 60);
      const rollover = totalMinutos >= 1440;
      const baseStr = `${String(finH).padStart(2,'0')}:${String(finM).padStart(2,'0')}`;
      const endStr = rollover ? `${baseStr} (Mañana)` : baseStr;

      // Caminata en ayuno
      let walkStr = null, isFasted = false;
      if(t.walked && t.walkStartTime) {
        const [wH, wM] = t.walkStartTime.split(':').map(Number);
        if(!isNaN(wH)) {
          let diff = (wH * 60 + wM) - (sH * 60 + sM);
          if(diff < 0) diff += 1440;
          isFasted = diff <= (dur * 60);
          walkStr = isFasted
            ? `Caminata en ayuno (${fn(diff/60)} hs)`
            : `Fuera del ayuno (+${fn((diff - dur*60)/60)} hs)`;
        }
      }

      return {endStr, rollover, walkStr, isFasted};
    };

    const SmartCena = ({currentProt, tracker}) => {
      const [rec, setRec] = useState(null);

      const totals = dayTotals(meals);

      const fiberEstimate = (meals || []).reduce((acc, meal) => acc + (meal?.items || []).reduce((sum, item) => {
        const text = normalizeFoodHint(`${item?.name || ''} ${item?.qty || ''}`);
        let next = sum;
        if(/avena|salvado|integral|legumbre|lenteja|garbanzo|poroto|verdura|brocoli|zanahoria|espinaca|banana|manzana|pera|papa|batata/.test(text)) next += 4;
        if(/fruta|ensalada|vegetal|verduras|frutos secos/.test(text)) next += 2;
        return next;
      }, 0), 0);
      const lastMealTime = (meals || [])

      const fastingAdvice = useMemo(() => {
        const proteinOk = totals.prot >= TARGETS.prot * 0.85;

        const fatOk = totals.fat >= 45;
        const fiberOk = fiberEstimate >= 18;
        const shouldFast = proteinOk && caloriesOk && (fatOk || fiberOk);
        const caution = !proteinOk || totals.cals < TARGETS.kcal * 0.65;
        let hungerWindow = 'Sin datos';
        if(lastMealTime) {
          const [h,m] = lastMealTime.split(':').map(Number);
          if(!Number.isNaN(h)) {
            const base = new Date();
            base.setHours(h, m || 0, 0, 0);
            const holdHours = 8.5
              + Math.min(2, totals.fat / 35)
              + Math.min(1.5, totals.prot / 90)
              + Math.min(1.5, fiberEstimate / 16)
              - (totals.cals < TARGETS.kcal * 0.7 ? 1.2 : 0);
            const start = new Date(base.getTime() + holdHours * 3600000);
            const end = new Date(start.getTime() + 90 * 60000);
            const fmt = dt => dt.toLocaleTimeString('es-AR', { hour:'2-digit', minute:'2-digit' });
            hungerWindow = `${fmt(start)}-${fmt(end)}`;
          }
        }
        return {
          shouldFast,
          caution,
          label: shouldFast
            ? 'Hoy sí conviene ayuno corto'
            : caution
              ? 'Hoy no conviene forzar ayuno'
              : 'Ayuno opcional y flexible',

        const list = HOME_FOODS.map(f => {
          const per100 = f.unit === 'unidad' ? f.p : f.p; // g proteína por unidad/100g
          const qty    = f.unit === 'unidad'
            ? Math.ceil(missP / f.p)                       // unidades necesarias
            : Math.round(missP / (f.p / 100));             // gramos necesarios
          const kcal   = f.unit === 'unidad'
            ? qty * (f.p*4 + f.c*4 + f.f*9)
            : (qty/100) * (f.p*4 + f.c*4 + f.f*9);
          return { ...f, qty, kcal: Math.round(kcal) };
        });
        setRec(list);
        setOpen(true);
      };

      return html`
        <div class="glass-card" style="padding:12px;border-color:rgba(245,158,11,0.3);">
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <span style="font-size:12px;font-weight:700;color:#F59E0B;text-transform:uppercase;letter-spacing:0.06em;">
              💡 Asistente Nutricional
            </span>
            <button onClick=${calculate}
              style="padding:5px 12px;border-radius:8px;border:none;background:#F59E0B;color:#080D1A;font-size:12px;font-weight:700;font-family:'Barlow Condensed',sans-serif;cursor:pointer;">
              Recomendar
            </button>
          </div>
          ${rec === 'ok' && html`<p style="margin:8px 0 0;font-size:13px;color:#10B981;">✅ Objetivo proteico alcanzado</p>`}
          ${rec && Array.isArray(rec) && open && html`
            <div style="margin-top:10px;display:flex;flex-direction:column;gap:6px;">
              <p style="margin:0;font-size:10px;text-transform:uppercase;color:#64748b;">Para cubrir ${Math.round(TARGETS.prot - currentProt)}g de proteína faltante:</p>
              ${rec.map(f => html`
                <div style="display:flex;justify-content:space-between;align-items:center;background:rgba(10,15,30,0.4);padding:6px 10px;border-radius:6px;border:1px solid #1E2D45;">
                  <span style="font-size:12px;color:#cbd5e1;">${f.name}</span>
                  <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#F59E0B;white-space:nowrap;">
                    ${f.qty}${f.unit==='unidad'?'u':'g'} · ${f.kcal}kcal
                  </span>
                </div>
              `)}
            </div>
          `}
          <div style="margin-top:10px;padding:10px;border-radius:8px;background:rgba(10,15,30,0.42);border:1px solid #1E2D45;">
            <p style="margin:0;font-size:10px;text-transform:uppercase;color:#64748b;">Ayuno nocturno</p>
            <p style="margin:6px 0 0;font-size:13px;font-weight:700;color:${fastingAdvice.shouldFast ? '#10B981' : (fastingAdvice.caution ? '#F59E0B' : '#CBD5E1')};">${fastingAdvice.label}</p>
            <p style="margin:4px 0 0;font-size:11px;color:#94A3B8;">${fastingAdvice.detail}</p>
            <p style="margin:6px 0 0;font-size:11px;color:#7DD3FC;">Hambre probable: ${fastingAdvice.hungerWindow}</p>
          </div>
        </div>
      `;
    };

    const NutritionReviewCard = ({currentDateKey, currentTracker, previousDateKey, previousTracker}) => {
      const [review, setReview] = useState({ today:null, previous:null, loadingToday:false, loadingPrevious:false, error:'' });
      const serializeMeals = (tracker) => JSON.stringify((tracker?.meals || []).map(meal => ({
        items: (meal?.items || []).map(item => ({
          name: item?.name || '',
          qty: item?.qty || '',
          cals: pn(item?.cals),
          prot: pn(item?.prot),
          carb: pn(item?.carb),
          fat: pn(item?.fat)
        }))
      })));
      const fetchReview = useCallback(async (dateKey, tracker, targetKey) => {
        if(!dateKey || !(tracker?.meals || []).some(m => (m.items || []).length > 0)) return;
        const cacheKey = `enzo_nutrition_review_${dateKey}`;
        const mealsFingerprint = serializeMeals(tracker);
        try {
          const cached = JSON.parse(localStorage.getItem(cacheKey) || 'null');
          if(cached?.fingerprint === mealsFingerprint && cached?.payload) {
            setReview(prev => ({ ...prev, [targetKey]: cached.payload }));
            return;
          }
        } catch(_) {}

        setReview(prev => ({ ...prev, [`loading${targetKey === 'today' ? 'Today' : 'Previous'}`]: true, error:'' }));
        try {
          const res = await fetch('/.netlify/functions/daily-nutrition-review', {
            method:'POST',
            headers:{ 'Content-Type':'application/json' },
            body: JSON.stringify({
              date: dateKey,
              meals: tracker.meals || [],
              totals: dayTotals(tracker.meals || [])
            })
          });
          const data = await res.json().catch(() => ({}));
          if(!res.ok) throw new Error(data?.error || 'No se pudo revisar la nutricion.');
          setReview(prev => ({ ...prev, [targetKey]: data }));
          try {
            localStorage.setItem(cacheKey, JSON.stringify({ fingerprint: mealsFingerprint, payload: data }));
          } catch(_) {}
        } catch(e) {
          setReview(prev => ({ ...prev, error: e.message || 'No se pudo revisar la nutricion.' }));
        } finally {
          setReview(prev => ({ ...prev, [`loading${targetKey === 'today' ? 'Today' : 'Previous'}`]: false }));
        }
      }, []);

      useEffect(() => {
        fetchReview(previousDateKey, previousTracker, 'previous');
      }, [fetchReview, previousDateKey, serializeMeals(previousTracker)]);

      useEffect(() => {
        const now = new Date();
        if(now.getHours() < 20) return;
        fetchReview(currentDateKey, currentTracker, 'today');
      }, [fetchReview, currentDateKey, serializeMeals(currentTracker)]);

      const renderNutrients = (nutrients) => {
        const entries = Object.entries(nutrients || {});
        if(entries.length === 0) return null;
        return html`
          <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;">
            ${entries.map(([key, status]) => html`
              <span style=${`padding:4px 7px;border-radius:999px;border:1px solid rgba(30,41,59,0.8);background:${status === 'low' ? 'rgba(245,158,11,0.12)' : status === 'high' ? 'rgba(239,68,68,0.12)' : 'rgba(16,185,129,0.12)'};color:${status === 'low' ? '#FBBF24' : status === 'high' ? '#FCA5A5' : '#86EFAC'};font-size:10px;font-weight:700;text-transform:uppercase;`}>
                ${key}: ${status}
              </span>
            `)}
          </div>
        `;
      };

      if(!review.previous && !review.today && !review.loadingPrevious && !review.loadingToday) return null;

      return html`
        <div class="glass-card" style="padding:12px;border-color:rgba(56,189,248,0.25);display:flex;flex-direction:column;gap:10px;">
          <div>
            <p style="margin:0;font-size:12px;font-weight:700;color:#38BDF8;text-transform:uppercase;letter-spacing:0.06em;">Micros y sugerencias</p>
            <p style="margin:4px 0 0;font-size:11px;color:#94A3B8;">Estimacion orientativa de fibra, minerales, sodio y cierre del dia.</p>
          </div>
          ${review.previous && html`
            <div style="padding:10px;border-radius:8px;background:rgba(10,15,30,0.42);border:1px solid #1E2D45;">
              <p style="margin:0;font-size:10px;text-transform:uppercase;color:#64748b;">Para hoy, segun ayer</p>
              <p style="margin:6px 0 0;font-size:13px;font-weight:700;color:#E2E8F0;">${review.previous.day_summary || 'Sin resumen'}</p>
              ${renderNutrients(review.previous.nutrients)}
              <div style="margin-top:8px;display:flex;flex-direction:column;gap:4px;">
                ${(review.previous.tomorrow_recommendations || []).slice(0,3).map(line => html`<p style="margin:0;font-size:11px;color:#CBD5E1;">• ${line}</p>`)}
              </div>
              ${review.previous.fat_advice && html`<p style="margin:8px 0 0;font-size:11px;color:#FBBF24;">${review.previous.fat_advice}</p>`}
            </div>
          `}
          ${(review.today || review.loadingToday) && html`
            <div style="padding:10px;border-radius:8px;background:rgba(10,15,30,0.42);border:1px solid #1E2D45;">
              <p style="margin:0;font-size:10px;text-transform:uppercase;color:#64748b;">Cierre del dia para mañana</p>
              <p style="margin:6px 0 0;font-size:13px;font-weight:700;color:#E2E8F0;">${review.loadingToday ? 'Analizando...' : (review.today?.day_summary || 'Sin resumen')}</p>
              ${renderNutrients(review.today?.nutrients)}
              <div style="margin-top:8px;display:flex;flex-direction:column;gap:4px;">
                ${review.loadingToday
                  ? html`<p style="margin:0;font-size:11px;color:#94A3B8;">Calculando recomendaciones...</p>`
                  : (review.today?.tomorrow_recommendations || []).slice(0,3).map(line => html`<p style="margin:0;font-size:11px;color:#CBD5E1;">• ${line}</p>`)}
              </div>
            </div>
          `}
          ${review.error && html`<p style="margin:0;font-size:11px;color:#FCA5A5;">${review.error}</p>`}
        </div>
      `;
    };

    // ═══════════════════════════════════════════════════
    //  NOTIFICACIONES — Panel de recordatorios
    // ═══════════════════════════════════════════════════
    const NOTIF_KEY = 'enzo_notifs_v1'; // legado — solo para migración inicial
    const defaultNotifs = [
      { id:'meal1',  label:'🍽 Comida 1',         time:'12:00', enabled:false },
      { id:'meal2',  label:'🍽 Comida 2',         time:'16:00', enabled:false },
      { id:'meal3',  label:'🍽 Comida 3',         time:'21:00', enabled:false },
      { id:'gym',    label:'💪 Ir al gym',        time:'18:00', enabled:false },
      { id:'sleep',  label:'😴 Dormir',           time:'23:30', enabled:false },
      { id:'meds',   label:'💊 Roacuttan',        time:'14:00', enabled:false },
      { id:'meds2',  label:'💊 Medicación noche', time:'23:30', enabled:false },
    ];

    // Carga notifs: v3 namespace → legacy → defaults
    const loadNotifsLocal = () => {
      const v3 = lsNotifLoad(DEVICE_ID);
      if(v3) return Array.isArray(v3) ? v3 : (v3.notifs || defaultNotifs);
      try { const s = localStorage.getItem(NOTIF_KEY); if(s) return JSON.parse(s); } catch(e) {}
      return defaultNotifs;
    };

    const NotifView = ({session}) => {
      const [notifs,    setNotifs]    = useState(() => loadNotifsLocal());
      const [perm,      setPerm]      = useState(typeof Notification!=='undefined'?Notification.permission:'denied');
      const [syncMsg,   setSyncMsg]   = useState('');
      const [swInfo,    setSwInfo]    = useState({ ready: false, controlling: false, authValid: false, schedCount: 0 });
      const [timers]    = useState({});
      const [backupBusy,setBackupBusy]= useState(false);
      const [backupMsg, setBackupMsg] = useState('');
      const [backupMeta,setBackupMeta]= useState(() => {
        const lastBackupAt = metaGet('last_backup_at');
        const hours = lastBackupAt ? Math.floor((Date.now() - new Date(lastBackupAt).getTime()) / 3600000) : null;
        return {
          lastBackupAt,
          hoursSince: hours,
          due: !lastBackupAt || hours >= 72
        };
      });
      const importInputRef = useRef(null);

      const refreshBackupMeta = useCallback(() => {
        const lastBackupAt = metaGet('last_backup_at');
        const hours = lastBackupAt ? Math.floor((Date.now() - new Date(lastBackupAt).getTime()) / 3600000) : null;
        setBackupMeta({
          lastBackupAt,
          hoursSince: hours,
          due: !lastBackupAt || hours >= 72
        });
      }, []);

      useEffect(() => {
        refreshBackupMeta();
        const onFocus = () => refreshBackupMeta();
        const onVisible = () => { if(document.visibilityState === 'visible') refreshBackupMeta(); };
        window.addEventListener('focus', onFocus);
        document.addEventListener('visibilitychange', onVisible);
        return () => {
          window.removeEventListener('focus', onFocus);
          document.removeEventListener('visibilitychange', onVisible);
        };
      }, [refreshBackupMeta]);

      // Obtener estado del SW al montar
      useEffect(() => {
        if(!('serviceWorker' in navigator)) return;
        navigator.serviceWorker.ready.then(reg => {
          const ctrl = navigator.serviceWorker.controller;
          if(ctrl) {
            const onMsg = (e) => {
              if(e.data?.type === 'SW_DEBUG_RESPONSE') {
                setSwInfo({
                  ready:       true,
                  controlling: true,
                  authValid:   e.data.authValid || false,
                  schedCount:  e.data.scheduledCount || 0,
                });
                navigator.serviceWorker.removeEventListener('message', onMsg);
              }
            };
            navigator.serviceWorker.addEventListener('message', onMsg);
            ctrl.postMessage({ type: 'SW_DEBUG_REQUEST' });
            setTimeout(() => navigator.serviceWorker.removeEventListener('message', onMsg), 3000);
          } else {
            setSwInfo({ ready: true, controlling: false, authValid: false, schedCount: 0 });
          }
        }).catch(() => {});
      }, []);

      const persistAndSync = async (n) => {
        setNotifs(n);
        // 1. localStorage v3 por device_id
        lsNotifSave(DEVICE_ID, n);
        // 2. Sincronizar con Supabase (best-effort)
        try {
          const { error } = await supabase.rpc('save_notification_settings', {
            p_device_id:     DEVICE_ID,
            p_data:          { notifs: n },
            p_base_revision: null
          });
          if(!error) setSyncMsg('✓ Guardado');
          else       setSyncMsg('⚠ Sin sync remoto');
        } catch(e) { setSyncMsg('⚠ Sin red'); }
        setTimeout(() => setSyncMsg(''), 2500);
        scheduleAll(n);
      };

      const requestPerm = async () => {
        if(typeof Notification === 'undefined') return;
        const p = await Notification.requestPermission();
        setPerm(p);
        if(p === 'granted') scheduleAll(notifs);
      };

      const scheduleAll = (list) => {
        if(typeof Notification === 'undefined' || Notification.permission !== 'granted') return;

        // Enviar al Service Worker (persiste aunque se cierre la pestaña)
        if('serviceWorker' in navigator) {
          navigator.serviceWorker.ready.then(reg => {
            if(reg.active) reg.active.postMessage({ type: 'SW_SET_SCHEDULE', notifs: list });
          }).catch(() => {});
        }

        // Fallback setTimeout (funciona si la pestaña está abierta)
        Object.values(timers).forEach(clearTimeout);
        const now = new Date();
        list.filter(n => n.enabled).forEach(n => {
          const [h, m] = n.time.split(':').map(Number);
          const target = new Date(now); target.setHours(h, m, 0, 0);
          if(target <= now) target.setDate(target.getDate() + 1);
          timers[n.id] = setTimeout(() => {
            if(Notification.permission !== 'granted') return;
            if('serviceWorker' in navigator) {
              navigator.serviceWorker.ready.then(reg => {
                if(reg?.showNotification) {
                  reg.showNotification('Enzo Training', {
                    body:   n.label,
                    icon:   './icon-192.png',
                    badge:  './icon-192.png',
                    tag:    `fallback-${n.id}-${Date.now()}`,
                    data:   { id: n.id, time: n.time }
                  }).catch(() => {});
                }
              }).catch(() => {});
            }
          }, target - now);
        });
      };

      const sendTestNotif = () => {
        if(Notification.permission !== 'granted') return;
        if('serviceWorker' in navigator) {
          navigator.serviceWorker.ready.then(reg => {
            if(reg.active) reg.active.postMessage({ type: 'SW_TEST_NOTIFICATION' });
          }).catch(() => {});
        }
      };

      const exportBackup = async () => {
        if(!session?.user?.id) return;
        setBackupBusy(true);
        setBackupMsg('');
        try {
          const [
            { data: tasksRows, error: tasksErr },
            { data: notesRows, error: notesErr },
            { data: recipeRows, error: recipeErr },
            { data: studyRows, error: studyErr },
            { data: bookRows, error: bookErr },
            { data: invRows, error: invErr },
            { data: routineRows, error: routineErr },
            { data: dailyRows, error: dailyErr },
            { data: weeklyRows, error: weeklyErr }
          ] = await Promise.all([
            supabase.from('tasks').select('*').eq('user_id', session.user.id).order('created_at', { ascending:false }),
            supabase.from('notes').select('*').eq('user_id', session.user.id).order('created_at', { ascending:false }),
            supabase.from('user_recipes').select('*').order('updated_at', { ascending:false }),
            supabase.from('study_plan').select('*').order('subject', { ascending:true }),
            supabase.from('book_notes').select('*').order('created_at', { ascending:false }),
            supabase.from('app_inventory').select('*').order('key', { ascending:true }),
            supabase.from('routines').select('*').order('routine_id', { ascending:true }),
            supabase.from('daily_logs_v2').select('*').order('date', { ascending:false }),
            supabase.from('weekly_configs_v2').select('*').order('week_key', { ascending:false })
          ]);
          const firstError = tasksErr || notesErr || recipeErr || studyErr || bookErr || invErr || routineErr || dailyErr || weeklyErr;
          if(firstError) throw firstError;

          const localRoutines = Object.fromEntries(lsAllRoutineKeys().map(id => [id, lsRoutineLoad(id)]).filter(([,v]) => !!v));
          const backup = {
            app: 'enzo-training',
            exported_at: new Date().toISOString(),
            device_id: DEVICE_ID,
            user_id: session.user.id,
            user_email: session.user.email || '',
            remote: {
              tasks: tasksRows || [],
              notes: notesRows || [],
              user_recipes: recipeRows || [],
              study_plan: studyRows || [],
              book_notes: bookRows || [],
              app_inventory: invRows || [],
              routines: routineRows || [],
              daily_logs_v2: dailyRows || [],
              weekly_configs_v2: weeklyRows || []
            },
            local: {
              notification_settings: lsNotifLoad(DEVICE_ID) || [],
              routines: localRoutines
            }
          };

          const blob = new Blob([JSON.stringify(backup, null, 2)], { type:'application/json;charset=utf-8' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `enzo-backup-${new Date().toISOString().slice(0,19).replace(/[:T]/g,'-')}.json`;
          document.body.appendChild(a);
          a.click();
          a.remove();
          setTimeout(() => URL.revokeObjectURL(url), 1000);
          metaSet('last_backup_at', new Date().toISOString());
          refreshBackupMeta();
          setBackupMsg('Backup exportado correctamente.');
        } catch(e) {
          setBackupMsg(e.message || 'No se pudo exportar el backup.');
        } finally {
          setBackupBusy(false);
          setTimeout(() => setBackupMsg(''), 3500);
        }
      };

      const importBackup = async (file) => {
        if(!file || !session?.user?.id) return;
        setBackupBusy(true);
        setBackupMsg('');
        try {
          const raw = await file.text();
          const parsed = JSON.parse(raw);
          if(parsed?.app !== 'enzo-training' || !parsed?.remote) throw new Error('El archivo no parece un backup valido de Enzo Training.');
          const ok = window.confirm('Esto va a restaurar datos desde el backup y puede sobrescribir informacion actual. Queres continuar?');
          if(!ok) {
            setBackupBusy(false);
            return;
          }

          const remote = parsed.remote || {};
          const userId = session.user.id;
          const sanitizeRows = (rows) => Array.isArray(rows) ? rows : [];

          const tasksRows = sanitizeRows(remote.tasks).map(row => ({ ...row, user_id: userId }));
          const notesRows = sanitizeRows(remote.notes).map(row => ({ ...row, user_id: userId }));
          const recipeRows = sanitizeRows(remote.user_recipes);
          const studyRows = sanitizeRows(remote.study_plan);
          const bookRows = sanitizeRows(remote.book_notes);
          const inventoryRows = sanitizeRows(remote.app_inventory);
          const routineRows = sanitizeRows(remote.routines);
          const dailyRows = sanitizeRows(remote.daily_logs_v2);
          const weeklyRows = sanitizeRows(remote.weekly_configs_v2);

          const wipeAndInsert = async (table, deleteFilter, rows) => {
            const delQuery = deleteFilter(supabase.from(table).delete());
            const { error: delErr } = await delQuery;
            if(delErr) throw delErr;
            if(rows.length === 0) return;
            const { error: insErr } = await supabase.from(table).insert(rows);
            if(insErr) throw insErr;
          };

          await wipeAndInsert('tasks', q => q.eq('user_id', userId), tasksRows);
          await wipeAndInsert('notes', q => q.eq('user_id', userId), notesRows);
          await wipeAndInsert('book_notes', q => q.neq('id', '00000000-0000-0000-0000-000000000000'), bookRows);
          await wipeAndInsert('user_recipes', q => q.neq('id', '00000000-0000-0000-0000-000000000000'), recipeRows);
          await wipeAndInsert('study_plan', q => q.neq('id', '00000000-0000-0000-0000-000000000000'), studyRows);

          if(inventoryRows.length){
            const { error } = await supabase.from('app_inventory').upsert(inventoryRows, { onConflict:'key' });
            if(error) throw error;
          }
          if(routineRows.length){
            const normalized = routineRows.map(row => ({
              routine_id: row.routine_id,
              data: row.data,
              updated_at: row.updated_at,
              revision: row.revision,
              device_id: row.device_id,
              created_at: row.created_at
            }));
            const { error } = await supabase.from('routines').upsert(normalized, { onConflict:'routine_id' });
            if(error) throw error;
          }
          if(dailyRows.length){
            const normalized = dailyRows.map(row => ({
              date: row.date,
              tracker: row.tracker,
              session: row.session,
              updated_at: row.updated_at,
              revision: row.revision,
              device_id: row.device_id,
              created_at: row.created_at
            }));
            const { error } = await supabase.from('daily_logs_v2').upsert(normalized, { onConflict:'date' });
            if(error) throw error;
          }
          if(weeklyRows.length){
            const normalized = weeklyRows.map(row => ({
              week_key: row.week_key,
              body_weight: row.body_weight,
              day_mapping: row.day_mapping,
              updated_at: row.updated_at,
              revision: row.revision,
              device_id: row.device_id,
              created_at: row.created_at
            }));
            const { error } = await supabase.from('weekly_configs_v2').upsert(normalized, { onConflict:'week_key' });
            if(error) throw error;
          }

          if(parsed?.local?.notification_settings){
            const importedNotifs = Array.isArray(parsed.local.notification_settings) ? parsed.local.notification_settings : (parsed.local.notification_settings.notifs || []);
            if(importedNotifs.length){
              lsNotifSave(DEVICE_ID, importedNotifs);
              setNotifs(importedNotifs);
              scheduleAll(importedNotifs);
            }
          }
          if(parsed?.local?.routines && typeof parsed.local.routines === 'object'){
            Object.entries(parsed.local.routines).forEach(([id, data]) => {
              if(data) lsRoutineSave(id, data);
            });
          }

          metaSet('last_backup_at', new Date().toISOString());
          refreshBackupMeta();
          setBackupMsg('Backup importado correctamente. Recomendado: recargar la app.');
        } catch(e) {
          setBackupMsg(e.message || 'No se pudo importar el backup.');
        } finally {
          setBackupBusy(false);
          if(importInputRef.current) importInputRef.current.value = '';
          setTimeout(() => setBackupMsg(''), 5000);
        }
      };

      const toggle  = (id)   => persistAndSync(notifs.map(n => n.id===id ? { ...n, enabled:!n.enabled } : n));
      const setTime = (id,t) => persistAndSync(notifs.map(n => n.id===id ? { ...n, time:t } : n));

      const swStatusColor = swInfo.controlling ? '#10B981' : '#F59E0B';
      const swStatusLabel = !swInfo.ready ? '—' : swInfo.controlling ? '✓ Activo' : '⚠ No controla';

      return html`
        <div class="fade-up" style="display:flex;flex-direction:column;gap:12px;">
          <${Card}>

      const [rts, setRts] = useState(routines);
      const [selId, setSelId] = useState(Object.keys(routines)[0]||'1');

      const upd = (fn) => { setRts(r=>{ const n=fn(r); setDirty(true); return n; }); };

      const updateExName = (ei, val) => upd(r=>({...r,[selId]:{...r[selId],exercises:r[selId].exercises.map((ex,i)=>i===ei?{...ex,name:val}:ex)}}));
      // Parsear "3 min", "1,5 min", "90 seg" → segundos
      const parseRestStr = (str) => {
        const s = String(str).trim().toLowerCase();
        const numMatch = s.match(/[\d,\.]+/);
        if(!numMatch) return null;
        const num = pn(numMatch[0]);
        if(s.includes('seg') || s.includes('s)')) return Math.round(num);
        return Math.round(num * 60); // minutos por defecto
      };

      const updateSet = (ei,si,field,val) => upd(r=>{
        const exercises = r[selId].exercises.map((ex,i)=>i===ei ? {
          ...ex,
          sets: ex.sets.map((s,j)=>j===si ? (() => {
            const updated = {...s, [field]: val};
            // Bug 9 fix: sincronizar restSecs cuando cambia restStr
            if(field === 'restStr') {
              const secs = parseRestStr(val);
              if(secs !== null) updated.restSecs = secs;
            }
            // Y si cambia restSecs directamente, actualizar restStr
            if(field === 'restSecs') {
              const secs = parseInt(val);
              if(!isNaN(secs)) updated.restStr = secs >= 60
                ? `${(secs/60).toFixed(secs%60===0?0:1).replace('.',',')} min`
                : `${secs} seg`;
            }
            return updated;
          })() : s)
        } : ex);
        return {...r, [selId]: {...r[selId], exercises}};
      });
      const addSet       = (ei) => upd(r=>({...r,[selId]:{...r[selId],exercises:r[selId].exercises.map((ex,i)=>i===ei?{...ex,sets:[...ex.sets,{reps:'10',weight:'0,0',rir:'2',restSecs:90,restStr:'1,5 min'}]}:ex)}}));
      const removeSet    = (ei,si) => upd(r=>({...r,[selId]:{...r[selId],exercises:r[selId].exercises.map((ex,i)=>i===ei?{...ex,sets:ex.sets.filter((_,j)=>j!==si)}:ex)}}));

      const removeExercise=(ei)=> upd(r=>({...r,[selId]:{...r[selId],exercises:r[selId].exercises.filter((_,i)=>i!==ei)}}));

      const handleSave = () => { onSave(rts); setDirty(false); };

                <button onClick=${()=>setSelId(r.id)}

            <!-- Lista de ejercicios -->

                      style="flex:1;background:#0F1729;border:1px solid #2A3F5F;border-radius:6px;padding:6px 10px;font-size:13px;color:white;font-family:'Barlow',sans-serif;"/>

                      style="width:28px;height:28px;border-radius:6px;border:none;background:rgba(239,68,68,0.15);color:#EF4444;font-size:16px;cursor:pointer;flex-shrink:0;">×</button>

                  <!-- Sets -->

                    </div>
                    ${ex.sets.map((s,si) => html`
                      <div style="display:grid;grid-template-columns:32px 1fr 1fr 1fr 1fr 28px;gap:4px;align-items:center;">

                        ${['reps','weight','rir','restStr'].map(f => html`

                        <button onClick=${()=>removeSet(ei,si)}

                      </div>
                    `)}
                  </div>
                  <button onClick=${()=>addSet(ei)}
                    style="width:100%;padding:5px;border-radius:6px;border:1px dashed #1E2D45;background:transparent;color:#475569;font-size:11px;cursor:pointer;">
                    + Agregar serie
                  </button>
                </div>
              `)}
            </div>
            <button onClick=${addExercise}
              style="width:100%;margin-top:10px;padding:10px;border-radius:8px;border:1px dashed rgba(99,102,241,0.4);background:transparent;color:#6366F1;font-size:12px;font-weight:700;font-family:'Barlow Condensed',sans-serif;cursor:pointer;letter-spacing:0.05em;">
              + AGREGAR EJERCICIO
            </button>
          <//>
        </div>
      `;
    };
