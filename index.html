    const getYesterdayFast = (allWeeks, currentWk, activeDay) => {
      try {
        const todayStr = getDayDate(currentWk, parseInt(activeDay));
        const todayDt = new Date(todayStr + 'T12:00:00');
        const prevDt = new Date(todayDt); prevDt.setDate(todayDt.getDate() - 1);

        const prevWk = getWeekKey(prevDt);
        const prevDayIdx = prevDt.getDay();
        const prevTracker = allWeeks[prevWk]?.tracker?.[prevDayIdx];

        if(prevTracker && prevTracker.fasted && prevTracker.fastStartTime && prevTracker.fastHours) {
          const [sH, sM] = prevTracker.fastStartTime.split(':').map(Number);
          const dur = pn(prevTracker.fastHours);
          if(!isNaN(sH) && dur > 0) {
            const startDateTime = new Date(prevDt);
            startDateTime.setHours(sH, sM, 0, 0);
            const endDateTime = new Date(startDateTime.getTime() + (dur * 3600000));

            const todayStart = new Date(todayDt); todayStart.setHours(0,0,0,0);
            if(endDateTime > todayStart) {
               const finH = String(endDateTime.getHours()).padStart(2,'0');
               const finM = String(endDateTime.getMinutes()).padStart(2,'0');
               return `â³ Ayuno de ayer en curso: finaliza a las ${finH}:${finM}`;
            }
          }
        }
      } catch(e) {}
      return null;
    };

    const getRelativeDaySnapshot = (allWeeks, currentWk, activeDay, offsetDays) => {
      try {
        const baseDate = new Date(getDayDate(currentWk, parseInt(activeDay, 10)) + 'T12:00:00');
        baseDate.setDate(baseDate.getDate() + offsetDays);
        const wkKey = getWeekKey(baseDate);
        const dayIdx = String(baseDate.getDay());
        const tracker = allWeeks[wkKey]?.tracker?.[dayIdx] || null;
        return {
          dateKey: getDayDate(wkKey, parseInt(dayIdx, 10)),
          tracker
        };
      } catch(_) {
        return { dateKey:'', tracker:null };
      }
    };

    const HabitsPanel = ({tracker:t, selectedDateKey, yesterdayFastMsg, onChange, onMed, onMeal, onAddItem, onRemoveItem, onReplaceItem}) => {
      const [open,setOpen] = useState(true);
      const [aiLoading, setAiLoading] = useState([false,false,false]);
      const [aiError,   setAiError]   = useState(['','','']);
      const [mealSplitEditOpen, setMealSplitEditOpen] = useState([false,false,false]);
      const [mealSplitDrafts, setMealSplitDrafts] = useState(['','','']);
      const [recipeSaving, setRecipeSaving] = useState([false,false,false]);
      const [recipeMsg, setRecipeMsg] = useState(['','','']);
      const [savedRecipes, setSavedRecipes] = useState([]);
      const [recipesLoading, setRecipesLoading] = useState(true);
      const [recipesError, setRecipesError] = useState('');
      const [stockBusyKey, setStockBusyKey] = useState('');
      const [editingMealItem, setEditingMealItem] = useState({ mealIndex:-1, itemIndex:-1 });
      const recipesRef = useRef(null);

      const fs = getFastStats(t);

      // Totales diarios calculados desde items
      const macros = dayTotals(t.meals);
      const mealMedStatus = getMedicationStatusForView({
        selectedDateKey,
        medsState: t.meds || {},
        now: new Date()
      });
      const roaccutanStatusLabel = mealMedStatus.roaccutanLabel;
      const dinnerStatusLabel = mealMedStatus.dinnerLabel;

      const normalizeRecipeText = (s='') =>
        String(s)
          .normalize('NFD')
          .replace(/[\u0300-\u036f]/g, '')
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, ' ')
          .trim()
          .replace(/\s+/g, ' ');

      const parseLeadingRecipeAmount = (text='') => {
        const raw = String(text || '').trim().toLowerCase();
        if(!raw) return null;

        let match = raw.match(/^(\d+)\s*\/\s*(\d+)(?:\s+(.*))?$/);
        if(match) {
          const numerator = parseFloat(match[1]);
          const denominator = parseFloat(match[2]);
          return {
            value: denominator ? numerator / denominator : 0,
            rest: String(match[3] || '').trim(),
            label: `${match[1]}/${match[2]}`
          };
        }

        match = raw.match(/^(media|medio)(?:\s+(.*))?$/);
        if(match) {
          return { value: 0.5, rest: String(match[2] || '').trim(), label: match[1] };
        }

        match = raw.match(/^(una|un|1)\s+y\s+media(?:\s+(.*))?$/);
        if(match) {
          return { value: 1.5, rest: String(match[2] || '').trim(), label: String(match[0] || '').trim() };
        }

        match = raw.match(/^(\d+(?:[.,]\d+)?)(?:\s+y\s+media)?(?:\s+(.*))?$/);
        if(match) {
          const base = parseFloat(String(match[1]).replace(',', '.'));
          const hasHalf = /\s+y\s+media(?:\s|$)/.test(raw);
          return {
            value: base + (hasHalf ? 0.5 : 0),
            rest: String(match[2] || '').trim(),
            label: hasHalf ? `${match[1]} y media` : String(match[1])
          };
        }

        return null;
      };

      const parseRecipeAmount = (text='') => {
        const raw = String(text || '').toLowerCase().trim();
        const lead = parseLeadingRecipeAmount(raw);
        const amountPart = lead ? raw.slice(0, raw.length - lead.rest.length).trim() : raw;
        const m = amountPart.match(/(\d+(?:[.,]\d+)?|\d+\s*\/\s*\d+|media|medio|una\s+y\s+media|un\s+y\s+media|1\s+y\s+media)\s*(kg|g|gramos?|porciones?|porcion|u|unidades?)/);
        if(!m) return null;
        const parsed = parseLeadingRecipeAmount(`${m[1]} x`) || { value: parseFloat(String(m[1]).replace(',', '.')) || 0 };
        return {
          value: parsed.value,
          unit: m[2]
        };
      };

      const parseRecipeCountNoun = (text='') => {
        const parsed = parseLeadingRecipeAmount(text);
        if(!parsed || !(parsed.value > 0) || !parsed.rest) return null;
        return {
          value: parsed.value,
          noun: normalizeRecipeText(parsed.rest || ''),
          label: parsed.label || '',
          rawRest: String(parsed.rest || '').trim()
        };
      };

      const stripRecipeAmount = (text='') => {
        const parsed = parseLeadingRecipeAmount(text);
        if(parsed?.rest) return normalizeRecipeText(parsed.rest);
        return normalizeRecipeText(String(text).replace(/(\d+(?:[.,]\d+)?|\d+\s*\/\s*\d+|media|medio|una\s+y\s+media|un\s+y\s+media|1\s+y\s+media)\s*(kg|g|gramos?|porciones?|porcion|u|unidades?)/ig, ' '));
      };

      const singularizeWord = (word='') => {
        const w = String(word || '').trim();
        if(!w) return '';
        if(w.endsWith('es') && w.length > 4) return w.slice(0, -2);
        if(w.endsWith('s') && w.length > 3) return w.slice(0, -1);
        return w;
      };

      const normalizeRecipeKey = (text='') =>
        normalizeRecipeText(text)
          .split(' ')
          .filter(Boolean)
          .map(singularizeWord)
          .join(' ');

      const unitToGrams = (value, unit) => {
        const u = String(unit||'').toLowerCase();
        if(u === 'kg') return value * 1000;
        if(u === 'g' || u === 'gramo' || u === 'gramos') return value;
        return null;
      };

      const unitToPortions = (value, unit) => {
        const u = String(unit||'').toLowerCase();
        if(u === 'porcion' || u === 'porciones') return value;
        return null;
      };

      const formatRecipeQty = (value, unit) => {
        const n = Number(value);
        const rounded = Math.round(n * 100) / 100;
        let clean = '';
        if(Number.isInteger(rounded)) {
          clean = String(rounded);
        } else {
          const whole = Math.trunc(rounded);
          const fraction = Math.abs(rounded - whole);
          if(Math.abs(fraction - 0.5) < 0.01) {
            clean = whole === 0 ? '1/2' : `${whole} 1/2`;
          } else {
            clean = String(rounded).replace('.', ',');
          }
        }
        return `${clean} ${unit}`.trim();
      };

      const normalizeStockUnit = (unit='') => {
        const u = normalizeRecipeText(unit);
        if(!u) return '';
        if(['g','gramo','gramos'].includes(u)) return 'g';
        if(u === 'kg') return 'kg';
        if(['porcion','porciones'].includes(u)) return 'porcion';
        if(['unidad','unidades','u'].includes(u)) return 'unidad';
        return u;
      };

      const scaleRecipeMacros = (recipe, factor) => {
        const macrosBase = recipe.macros || {};
        return {
          cals: Math.round((parseFloat(macrosBase.cals) || 0) * factor),
          prot: Math.round((parseFloat(macrosBase.prot) || 0) * factor),
          carb: Math.round((parseFloat(macrosBase.carb) || 0) * factor),
          fat:  Math.round((parseFloat(macrosBase.fat)  || 0) * factor)
        };
      };

      const recipeHasIngredientList = (recipe) =>
        Array.isArray(recipe?.ingredients) && recipe.ingredients.some(it => String(it?.name || '').trim());

      const recipeTracksPantryStock = (recipe) => {
        if(!recipe) return false;
        if(recipeHasIngredientList(recipe)) return false;
        return !(recipe.stock_qty == null || recipe.stock_qty === '') && !!normalizeStockUnit(recipe.stock_unit || '');
      };

      const findRecipeMatch = (recipes, inputText) => {
        const raw = String(inputText || '').trim();
        const normalizedFull = normalizeRecipeText(raw);
        const normalizedNameOnly = stripRecipeAmount(raw);
        const normalizedFullKey = normalizeRecipeKey(raw);
        const normalizedNameKey = normalizeRecipeKey(normalizedNameOnly);
        const parsedAmount = parseRecipeAmount(raw);
        const parsedCountNoun = parseRecipeCountNoun(raw);
        const parsedCountNounKey = parsedCountNoun ? normalizeRecipeKey(parsedCountNoun.noun) : '';
        const exactMatches = [];
        const fuzzyMatches = [];

        for(const recipe of (recipes || [])) {
          const rawNames = [recipe.recipe_name, ...((Array.isArray(recipe.aliases) ? recipe.aliases : []))].filter(Boolean);
          const names = [recipe.recipe_name, ...((Array.isArray(recipe.aliases) ? recipe.aliases : []))]
            .filter(Boolean)
            .map(normalizeRecipeText);
          const keys = [recipe.recipe_name, ...((Array.isArray(recipe.aliases) ? recipe.aliases : []))]
            .filter(Boolean)
            .map(normalizeRecipeKey);
          const exact =
            names.includes(normalizedFull) ||
            names.includes(normalizedNameOnly) ||
            keys.includes(normalizedFullKey) ||
            keys.includes(normalizedNameKey) ||
            (parsedCountNounKey && keys.includes(parsedCountNounKey));

          const fuzzy =
            !exact &&
            (
              keys.some(k => {
                if(!k) return false;
                const words = k.split(' ').filter(Boolean);
                if(words.length === 1 && words[0].length <= 3) return false;
                return (
                  normalizedFullKey.startsWith(k) ||
                  normalizedNameKey.startsWith(k) ||
                  k.startsWith(normalizedFullKey) ||
                  k.startsWith(normalizedNameKey) ||
                  normalizedFullKey.endsWith(` ${k}`) ||
                  normalizedNameKey.endsWith(` ${k}`)
                );
              }) ||
              (parsedCountNounKey && keys.some(k => k && (parsedCountNounKey.includes(k) || k.includes(parsedCountNounKey))))
            );

          if(!exact && !fuzzy) continue;

          let factor = 1;
          let qty = formatRecipeQty(recipe.base_qty || 1, recipe.base_unit || 'porcion');
          let stockDelta = parseFloat(recipe.base_qty) || 1;
          let stockDeltaUnit = normalizeStockUnit(recipe.base_unit || 'porcion');

          if(parsedAmount?.value > 0) {
            const baseQty = parseFloat(recipe.base_qty) || 1;
            const inputGrams = unitToGrams(parsedAmount.value, parsedAmount.unit);
            const baseGrams = unitToGrams(baseQty, recipe.base_unit);
            const inputPortions = unitToPortions(parsedAmount.value, parsedAmount.unit);
            const basePortions = unitToPortions(baseQty, recipe.base_unit);

            if(inputGrams && baseGrams) {
              factor = inputGrams / baseGrams;
              qty = `${formatRecipeQty(parsedAmount.value, parsedAmount.unit)} (${recipe.base_unit})`;
              stockDelta = parsedAmount.value;
              stockDeltaUnit = normalizeStockUnit(parsedAmount.unit);
            } else if(inputPortions && basePortions) {
              factor = inputPortions / basePortions;
              qty = `${formatRecipeQty(parsedAmount.value, parsedAmount.unit)} (${recipe.base_unit})`;
              stockDelta = parsedAmount.value;
              stockDeltaUnit = normalizeStockUnit(parsedAmount.unit);
            }
          } else if(
            parsedCountNoun?.value > 0 &&
            (
              normalizeStockUnit(recipe.base_unit || '') === 'unidad' ||
              normalizeStockUnit(recipe.stock_unit || '') === 'unidad' ||
              normalizeStockUnit(recipe.base_unit || '') === 'porcion'
            )
          ) {
            const baseQty = parseFloat(recipe.base_qty) || 1;
            factor = parsedCountNoun.value / baseQty;
            const baseUnitNormalized = normalizeStockUnit(recipe.base_unit || '');
            const humanPrefix = String(parsedCountNoun.label || '').trim();
            const exactRawMatch = rawNames.find(name => normalizeRecipeKey(name) === parsedCountNounKey) || recipe.recipe_name;
            const pluralRawMatch = rawNames.find(name => normalizeRecipeKey(name) === parsedCountNounKey && /s\b/i.test(String(name).trim())) || exactRawMatch;
            const humanNoun = String(parsedCountNoun.value > 1 ? pluralRawMatch : recipe.recipe_name || parsedCountNoun.rawRest || '').trim();
            qty = humanPrefix && humanNoun
              ? `${humanPrefix} ${humanNoun}`.trim()
              : formatRecipeQty(parsedCountNoun.value, baseUnitNormalized === 'porcion'
                  ? (parsedCountNoun.value === 1 ? 'porcion' : 'porciones')
                  : (parsedCountNoun.value === 1 ? 'unidad' : 'unidades'));
            stockDelta = parsedCountNoun.value;
            stockDeltaUnit = baseUnitNormalized === 'porcion' ? 'porcion' : 'unidad';
          }

          const result = {
            name: recipe.recipe_name,
            qty,
            nota: recipe.notes || 'Receta guardada',
            recipe_id: recipe.id,
            recipe_name: recipe.recipe_name,
            stock_qty: recipeTracksPantryStock(recipe) ? recipe.stock_qty : null,
            stock_unit: recipeTracksPantryStock(recipe) ? (recipe.stock_unit || '') : '',
            low_stock_threshold: recipe.low_stock_threshold,
            stock_trackable: recipeTracksPantryStock(recipe),
            stock_delta: stockDelta,
            stock_delta_unit: stockDeltaUnit,
            ...scaleRecipeMacros(recipe, factor)
          };
          if(exact) exactMatches.push(result);
          else fuzzyMatches.push(result);
        }

        if(exactMatches.length === 1) return { kind:'exact', item: exactMatches[0] };
        if(exactMatches.length > 1) return { kind:'ambiguous', options: exactMatches.slice(0,3) };
        if(fuzzyMatches.length === 1) return { kind:'fuzzy', item: fuzzyMatches[0] };
        if(fuzzyMatches.length > 1) return { kind:'ambiguous', options: fuzzyMatches.slice(0,3) };
        return null;
      };

      const getRecipes = async () => {
        if(recipesRef.current) return recipesRef.current;
        const { data, error } = await supabase
          .from('user_recipes')
          .select('id, recipe_name, aliases, base_qty, base_unit, stock_qty, stock_unit, low_stock_threshold, macros, ingredients, notes, updated_at')
          .order('updated_at', { ascending: false });
        if(error) throw error;
        recipesRef.current = data || [];
        return recipesRef.current;
      };

      useEffect(() => {
        let cancelled = false;
        const refreshRecipes = () => {
          setRecipesLoading(true);
          setRecipesError('');
          recipesRef.current = null;
          getRecipes()
            .then((rows) => {
              if(cancelled) return;
              setSavedRecipes(rows || []);
            })
            .catch((e) => {
              if(cancelled) return;
              setRecipesError(e.message || 'No se pudieron cargar las recetas.');
            })
            .finally(() => {
              if(cancelled) return;
              setRecipesLoading(false);
            });
        };
        refreshRecipes();
        const onFocus = () => refreshRecipes();
        const onVisible = () => { if(document.visibilityState === 'visible') refreshRecipes(); };
        window.addEventListener('focus', onFocus);
        document.addEventListener('visibilitychange', onVisible);
        return () => {
          cancelled = true;
          window.removeEventListener('focus', onFocus);
          document.removeEventListener('visibilitychange', onVisible);
        };
      }, []);

      const pushRecipeSuggestionIntoDraft = (mealIndex, recipeName, recipeAliases=[]) => {
        const current = String(t.meals?.[mealIndex]?.aiDraft || '').trim();
        const currentNormalized = normalizeFoodText(current);
        const recipeNormalized = normalizeFoodText(recipeName);
        let next = recipeName;
        const parsedPrefix = parseLeadingRecipeAmount(current);
        const parsedPrefixNumber = parsedPrefix?.value ?? null;
        const aliasList = [recipeName, ...(Array.isArray(recipeAliases) ? recipeAliases : [])].filter(Boolean);
        const pluralFriendlyName = (() => {
          if(!(parsedPrefixNumber > 1)) return recipeName;
          const pluralAlias = aliasList.find(name => /s$/i.test(String(name).trim())) || recipeName;
          return pluralAlias;
        })();

        if(current) {
          const amountPrefixMatch = current.match(/^(\s*(?:\d+(?:[.,]\d+)?|\d+\s*\/\s*\d+|media|medio|una\s+y\s+media|un\s+y\s+media|1\s+y\s+media)\s*(?:kg|g|gramos?|porciones?|porcion|u|unidades?)?\s*)(.*)$/i);
          if(amountPrefixMatch) {
            const prefix = String(amountPrefixMatch[1] || '').trim();
            const tail = String(amountPrefixMatch[2] || '').trim();
            if(prefix && (!tail || recipeNormalized.includes(normalizeFoodText(tail)) || normalizeFoodText(tail).includes(recipeNormalized) || normalizeFoodText(tail).length >= 2)) {
              next = `${prefix} ${pluralFriendlyName}`.trim();
            } else {
              next = `${current}, ${recipeName}`;
            }
          } else if(recipeNormalized.includes(currentNormalized) || currentNormalized.includes(recipeNormalized) || currentNormalized.length >= 2) {
            next = pluralFriendlyName;
          } else {
            next = `${current}, ${recipeName}`;
          }
        }
        updateMealDraft(mealIndex, next);
      };

      const updateMealDraft = (mealIndex, value) => {
        onMeal(mealIndex, 'aiDraft', value);
        setMealSplitEditOpen(prev => {
          const next = [...prev];
          next[mealIndex] = false;
          return next;
        });
        setMealSplitDrafts(prev => {
          const next = [...prev];
          next[mealIndex] = '';
          return next;
        });
      };

      const clearMealDraft = (mealIndex) => {
        updateMealDraft(mealIndex, '');
        setAiError(prev => { const n=[...prev]; n[mealIndex]=''; return n; });
        setRecipeMsg(prev => { const n=[...prev]; n[mealIndex]=''; return n; });
        if(editingMealItem.mealIndex === mealIndex) {
          setEditingMealItem({ mealIndex:-1, itemIndex:-1 });
        }
      };

      const startEditMealItem = (mealIndex, itemIndex, item) => {
        const draft = `${String(item?.qty || '').trim()} ${String(item?.name || '').trim()}`.trim();
        updateMealDraft(mealIndex, draft);
        setEditingMealItem({ mealIndex, itemIndex });
        setAiError(prev => { const n=[...prev]; n[mealIndex]=''; return n; });
      };

      const splitMealDraftParts = (text='') => {
        const raw = String(text || '').trim();
        if(!raw) return [];
        const normalized = raw.replace(/\s+/g, ' ').trim();
        const normalizedForSplit = normalized
          .replace(/\s+y\s+(?=(?:\d+(?:[.,]\d+)?|\d+\s*\/\s*\d+|media|medio|una\s+y\s+media|un\s+y\s+media|1\s+y\s+media)\b)/ig, ' | ')
          .replace(/,\s*(?=(?:\d+(?:[.,]\d+)?|\d+\s*\/\s*\d+|media|medio|una\s+y\s+media|un\s+y\s+media|1\s+y\s+media)\b)/ig, ' | ')
          .replace(/\s+(?:con|mas|mÃ¡s|acompaÃ±ado de|acompanado de)\s+(?=(?:\d+(?:[.,]\d+)?|\d+\s*\/\s*\d+|media|medio|una\s+y\s+media|un\s+y\s+media|1\s+y\s+media)\b)/ig, ' | ')
          .replace(/\s*\+\s*(?=(?:\d+(?:[.,]\d+)?|\d+\s*\/\s*\d+|media|medio|una\s+y\s+media|un\s+y\s+media|1\s+y\s+media)\b)/ig, ' | ')
          .replace(/\s+(?:postre|de postre|bebida|de bebida)\s*:\s*(?=(?:\d+(?:[.,]\d+)?|\d+\s*\/\s*\d+|media|medio|una\s+y\s+media|un\s+y\s+media|1\s+y\s+media)\b)/ig, ' | ')
          .replace(/\s+(?:postre|de postre|bebida|de bebida)\s+(?=(?:\d+(?:[.,]\d+)?|\d+\s*\/\s*\d+|media|medio|una\s+y\s+media|un\s+y\s+media|1\s+y\s+media)\b)/ig, ' | ');
        const parts = normalizedForSplit
          .split(/\s*\|\s*/i)
          .map(part => part.trim())
          .filter(Boolean);
        if(parts.length <= 1) return [normalized];

        const looksIndependent = (part) => {
          const p = String(part || '').trim().toLowerCase();
          return !!(
            parseRecipeAmount(p) ||
            parseRecipeCountNoun(p) ||
            /^\d/.test(p) ||
            /^(media|medio|una y media|un y medio|1\/2)\b/.test(p)
          );
        };

        return parts.every(looksIndependent) ? parts : [normalized];
      };

      const cleanMealPartPrefix = (text='') =>
        String(text || '')
          .replace(/^(?:con|mas|mÃ¡s|acompaÃ±ado de|acompanado de|postre|de postre|bebida|de bebida)\s*:?\s+/i, '')
          .trim();

      const getMealAnalysisParts = (mealIndex, sourceText='') => {
        const draft = String(sourceText || '').trim();
        const manualParts = String(mealSplitDrafts[mealIndex] || '')
          .split(/\r?\n/)
          .map(cleanMealPartPrefix)
          .map(part => part.trim())
          .filter(Boolean);
        if(mealSplitEditOpen[mealIndex] && manualParts.length > 0) return manualParts;
        return splitMealDraftParts(draft).map(cleanMealPartPrefix).filter(Boolean);
      };

      const prepareMealSplitEditor = (mealIndex, text='') => {
        const parts = splitMealDraftParts(text).map(cleanMealPartPrefix).filter(Boolean);
        setMealSplitDrafts(prev => {
          const next = [...prev];
          next[mealIndex] = parts.join('\n');
          return next;
        });
        setMealSplitEditOpen(prev => {
          const next = [...prev];
          next[mealIndex] = true;
          return next;
        });
      };

      const analyzeMealParts = async (mealIndex, parts=[]) => {
        for(const part of parts) {
          await analyzeSingleMealEntry(mealIndex, cleanMealPartPrefix(part));
        }
        updateMealDraft(mealIndex, '');
        setMealSplitEditOpen(prev => {
          const next = [...prev];
          next[mealIndex] = false;
          return next;
        });
        setMealSplitDrafts(prev => {
          const next = [...prev];
          next[mealIndex] = '';
          return next;
        });
      };

      const confirmMealSplitPreview = async (mealIndex, sourceText='') => {
        const parts = getMealAnalysisParts(mealIndex, sourceText);
        if(parts.length <= 1) {
          await analyzeMeal(mealIndex);
          return;
        }
        setAiLoading(prev => { const next=[...prev]; next[mealIndex]=true; return next; });
        setAiError(prev => { const next=[...prev]; next[mealIndex]=''; return next; });
        try {
          await analyzeMealParts(mealIndex, parts);
        } catch (e) {
          console.error('[MEAL_SPLIT]', e);
          setAiError(prev => { const next=[...prev]; next[mealIndex]=e.message||'Error'; return next; });
        } finally {
          setAiLoading(prev => { const next=[...prev]; next[mealIndex]=false; return next; });
        }
      };

      const analyzeSingleMealEntry = async (mealIndex, text) => {
        try {
          const recipes = await getRecipes();
          const recipeSearch = findRecipeMatch(recipes, text);
          if(recipeSearch?.kind === 'ambiguous') {
            const optionsText = recipeSearch.options.map(op => op.name).join(', ');
            const useLibrary = window.confirm(`Encontre varias opciones en tu biblioteca: ${optionsText}. Â¿QuerÃ©s usar la biblioteca en vez de calcularlo por internet?`);
            if(!useLibrary) throw new Error('__USE_INTERNET__');
          }

          const recipeHit = recipeSearch?.item || (recipeSearch?.options ? recipeSearch.options[0] : null);
          if(recipeHit) {
            const shouldUseLibrary = recipeSearch?.kind === 'exact'
              ? true
              : window.confirm(`Encontre "${recipeHit.name}" en tu biblioteca. Â¿QuerÃ©s usar ese valor guardado en vez de calcularlo por internet?`);
            if(!shouldUseLibrary) throw new Error('__USE_INTERNET__');

            if(editingMealItem.mealIndex === mealIndex && editingMealItem.itemIndex >= 0) {
              onReplaceItem(mealIndex, editingMealItem.itemIndex, recipeHit);
              setEditingMealItem({ mealIndex:-1, itemIndex:-1 });
            } else {
              onAddItem(mealIndex, recipeHit);
            }
            if(recipeHit.stock_unit && recipeHit.stock_delta_unit && normalizeStockUnit(recipeHit.stock_unit) === normalizeStockUnit(recipeHit.stock_delta_unit)) {
              await discountItemStock(mealIndex, recipeHit);
            }
            return;
          }
        } catch(recipeErr) {
          if(recipeErr?.message !== '__USE_INTERNET__') {
            console.warn('[RECIPES]', recipeErr.message);
          }
        }

        const { res, data } = await fetchJsonWithTimeout('/.netlify/functions/get-macros', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ meal: text })
        });
        if(!res.ok) throw new Error(data.error || `HTTP ${res.status}`);

        const nextItem = {
          name: data.name || text,
          qty:  data.qty  || '1 porciÃ³n',
          cals: Math.round(parseFloat(data.cals)||0),
          prot: Math.round(parseFloat(data.prot)||0),
          carb: Math.round(parseFloat(data.carb)||0),
          fat:  Math.round(parseFloat(data.fat) ||0),
          nota: data.nota || ''
        };
        if(editingMealItem.mealIndex === mealIndex && editingMealItem.itemIndex >= 0) {

      const analyzeMeal = async (mealIndex) => {
        const text = String(t.meals?.[mealIndex]?.aiDraft || '').trim();
        if(!text) return;

        const parts = getMealAnalysisParts(mealIndex, text);
        if(parts.length > 1 && !mealSplitEditOpen[mealIndex] && !String(mealSplitDrafts[mealIndex] || '').trim()) {
          prepareMealSplitEditor(mealIndex, text);
          return;

        setAiLoading(prev => { const n=[...prev]; n[mealIndex]=true; return n; });
        setAiError(prev   => { const n=[...prev]; n[mealIndex]='';   return n; });

        try {
          if(parts.length > 1) {
            await analyzeMealParts(mealIndex, parts);
            return;
          }
          try {
            const recipes = await getRecipes();
            const recipeSearch = findRecipeMatch(recipes, text);

              const optionsText = recipeSearch.options.map(op => op.name).join(', ');

              if(!useLibrary) throw new Error('__USE_INTERNET__');
            }

            const recipeHit = recipeSearch?.item || (recipeSearch?.options ? recipeSearch.options[0] : null);
            if(recipeHit) {
              const shouldUseLibrary = recipeSearch?.kind === 'exact'
                ? true
                : window.confirm(`Encontre "${recipeHit.name}" en tu biblioteca. Â¿QuerÃ©s usar ese valor guardado en vez de calcularlo por internet?`);
              if(!shouldUseLibrary) throw new Error('__USE_INTERNET__');

              if(editingMealItem.mealIndex === mealIndex && editingMealItem.itemIndex >= 0) {
                onReplaceItem(mealIndex, editingMealItem.itemIndex, recipeHit);
                setEditingMealItem({ mealIndex:-1, itemIndex:-1 });
              } else {
                onAddItem(mealIndex, recipeHit);
              }
              updateMealDraft(mealIndex, '');
              if(recipeHit.stock_unit && recipeHit.stock_delta_unit && normalizeStockUnit(recipeHit.stock_unit) === normalizeStockUnit(recipeHit.stock_delta_unit)) {
                await discountItemStock(mealIndex, recipeHit);
              }
              return;
            }
          } catch(recipeErr) {
            if(recipeErr?.message !== '__USE_INTERNET__') {
              console.warn('[RECIPES]', recipeErr.message);
            }
          }

          const { res, data } = await fetchJsonWithTimeout('/.netlify/functions/get-macros', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ meal: text })
          });
          if(!res.ok) throw new Error(data.error || `HTTP ${res.status}`);

          const nextItem = {
            name: data.name || text,
            qty:  data.qty  || '1 porciÃ³n',
            cals: Math.round(parseFloat(data.cals)||0),
            prot: Math.round(parseFloat(data.prot)||0),
            carb: Math.round(parseFloat(data.carb)||0),
            fat:  Math.round(parseFloat(data.fat) ||0),
            nota: data.nota || ''
          };
          if(editingMealItem.mealIndex === mealIndex && editingMealItem.itemIndex >= 0) {
            onReplaceItem(mealIndex, editingMealItem.itemIndex, nextItem);
            setEditingMealItem({ mealIndex:-1, itemIndex:-1 });
          } else {
            onAddItem(mealIndex, nextItem);
          }

          updateMealDraft(mealIndex, '');
        } catch(e) {
          console.error('[IA]', e);
          setAiError(prev => { const n=[...prev]; n[mealIndex]=e.message||'Error'; return n; });
        } finally {
          setAiLoading(prev => { const n=[...prev]; n[mealIndex]=false; return n; });

      };

        try {

          }));
          const payload = {

            base_unit: 'porcion',
            macros: {

      // â”€â”€ Volumen muscular

      const vol = {}; canonicalMuscles.forEach(m=>vol[m]={direct:0,indirect:0});

        const done=ex.sets.filter(s=>s.completed).length;

          muscles.indirect.forEach(m=>{
            const key = canonicalMuscleName(m);
            if(vol[key]) vol[key].indirect += done;
          });
        }
      }));
      const volumeScaleMax = Math.max(20, ...Object.values(vol).map(v => (v.direct + v.indirect)), 0);
      const volumeData = Object.entries(vol).map(([m,v])=>({
        name:m.slice(0,4),
        fullName:m,
        dir:v.direct,
        ind:v.indirect,
        total:v.direct + v.indirect,
        dirPct: volumeScaleMax > 0 ? (v.direct / volumeScaleMax) * 100 : 0,

      const macroAdh = {

    const STUDY_SUBJECT_SEEDS = [

      { subject:'Algebra Lineal', topics:[

        { name:'Vectores', done:false },
        { name:'Espacios vectoriales', done:false },
        { name:'Transformaciones lineales', done:false }
      ] },
      { subject:'Integracion I', topics:[
        { name:'Introduccion', done:false },
        { name:'Metodos basicos', done:false },
        { name:'Cambio de variable', done:false },
        { name:'Integracion por partes', done:false },

        { name:'Cantidad de movimiento', done:false },

      ] },

        { name:'Diagrama hierro-carbono', done:false },
        { name:'Tratamientos termicos', done:false },

        { name:'Corrosion', done:false }
      ] },
      { subject:'Economia', topics:[
        { name:'Conceptos basicos', done:false },
        { name:'Costos', done:false },
        { name:'Oferta y demanda', done:false },
        { name:'Punto de equilibrio', done:false },
        { name:'Inflacion', done:false },
        { name:'Flujo de fondos', done:false }
      ] }
    ];

    const StudyView = ({session}) => {
      const [rows, setRows] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState('');
      const [notice, setNotice] = useState('');
      const [expanded, setExpanded] = useState({});
      const [drafts, setDrafts] = useState({});
      const [savingMap, setSavingMap] = useState({});

      const setSaving = (subject, val) => setSavingMap(prev => ({ ...prev, [subject]: val }));

      const loadStudy = useCallback(async () => {
        setLoading(true);
        setError('');
        try {
          const { data: existing, error: fetchErr } = await supabase
            .from('study_plan')
            .select('id, subject, topics, updated_at')
            .order('subject', { ascending: true });
          if(fetchErr) throw fetchErr;

          const present = new Set((existing || []).map(r => r.subject));
          const missing = STUDY_SUBJECT_SEEDS.filter(s => !present.has(s.subject));
          if(missing.length) {
            const { error: insertErr } = await supabase
              .from('study_plan')
              .insert(missing.map(item => ({
                subject: item.subject,
                topics: item.topics,
                updated_at: new Date().toISOString()
              })));
            if(insertErr && !String(insertErr.message || '').toLowerCase().includes('duplicate')) throw insertErr;
          }

          const { data: refreshed, error: refetchErr } = await supabase
            .from('study_plan')
            .select('id, subject, topics, updated_at')
            .order('subject', { ascending: true });
          if(refetchErr) throw refetchErr;

          setRows(refreshed || []);
          setExpanded(prev => {
            const next = { ...prev };
            (refreshed || []).forEach(r => { if(next[r.subject] == null) next[r.subject] = true; });
            return next;
          });
        } catch(e) {
          setError(e.message || 'No se pudo cargar estudio.');
        } finally {
          setLoading(false);
        }
      }, []);

      useEffect(() => {
        loadStudy();
        const onFocus = () => loadStudy();
        const onVisible = () => { if(document.visibilityState === 'visible') loadStudy(); };
        window.addEventListener('focus', onFocus);
        document.addEventListener('visibilitychange', onVisible);
        return () => {
          window.removeEventListener('focus', onFocus);
          document.removeEventListener('visibilitychange', onVisible);
        };
      }, [loadStudy]);

      const saveSubjectTopics = async (row, nextTopics) => {
        setSaving(row.subject, true);
        setError('');
        try {
          const { data, error } = await supabase
            .from('study_plan')
            .update({ topics: nextTopics, updated_at: new Date().toISOString() })
            .eq('id', row.id)
            .select()
            .single();
          if(error) throw error;
          setRows(prev => prev.map(r => r.id === row.id ? data : r));
        } catch(e) {
          setError(e.message || 'No se pudo guardar el tema.');
        } finally {
          setSaving(row.subject, false);
        }
      };

      const toggleTopic = async (row, idx) => {
        const current = Array.isArray(row.topics) ? row.topics : [];
        const nextTopics = current.map((topic, i) => i === idx ? { ...topic, done: !topic.done } : topic);
        setRows(prev => prev.map(r => r.id === row.id ? { ...r, topics: nextTopics } : r));
        await saveSubjectTopics(row, nextTopics);
      };

      const addTopic = async (row) => {
        const draft = String(drafts[row.subject] || '').trim();
        if(!draft) return;
        const current = Array.isArray(row.topics) ? row.topics : [];
        const nextTopics = [...current, { name: draft, done: false }];
        setRows(prev => prev.map(r => r.id === row.id ? { ...r, topics: nextTopics } : r));
        setDrafts(prev => ({ ...prev, [row.subject]: '' }));
        await saveSubjectTopics(row, nextTopics);
      };

      const removeTopic = async (row, idx) => {
        const current = Array.isArray(row.topics) ? row.topics : [];
        const nextTopics = current.filter((_, i) => i !== idx);
        setRows(prev => prev.map(r => r.id === row.id ? { ...r, topics: nextTopics } : r));
        await saveSubjectTopics(row, nextTopics);
      };

      const sendTopicToTasks = async (row, topic) => {
        setError('');
        setNotice('');
        try {
          const payload = {
            user_id: session.user.id,
            title: `${row.subject}: ${topic.name}`,
            details: `Tema de estudio pendiente de ${row.subject}`,
            priority: 'normal',
            status: 'pending',
            category: 'estudio'
          };
          const { error } = await supabase.from('tasks').insert(payload);
          if(error) throw error;
          setNotice(`Tema enviado a TAREAS: ${topic.name}`);
          setTimeout(() => setNotice(''), 2500);
        } catch(e) {
          setError(e.message || 'No se pudo pasar el tema a tareas.');
        }
      };

      const totalSubjects = rows.length;
      const totalTopics = rows.reduce((acc, row) => acc + (Array.isArray(row.topics) ? row.topics.length : 0), 0);
      const completedTopics = rows.reduce((acc, row) => acc + (Array.isArray(row.topics) ? row.topics.filter(t => !!t.done).length : 0), 0);
      const pendingTopics = Math.max(0, totalTopics - completedTopics);
      const completionPct = totalTopics ? Math.round((completedTopics / totalTopics) * 100) : 0;

      return html`
        <div class="fade-up" style="display:flex;flex-direction:column;gap:12px;">
          <${Card}>
            <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px;">
              <div>
                <p style="margin:0;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#10B981;">Plan de estudio</p>
                <p style="margin:4px 0 0;font-size:12px;color:#64748b;">Materias UTN con temas y progreso. Todo queda guardado en study_plan.</p>
              </div>
              <button class="btn-icon" style="background:#162035;border:1px solid #1E2D45;" onClick=${loadStudy}>
                <${ISync} s=${16}/>
              </button>
            </div>
            ${notice && html`<div style="margin-bottom:10px;padding:8px 10px;border-radius:8px;background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.25);color:#86EFAC;font-size:12px;">${notice}</div>`}
            ${error && html`<div style="margin-bottom:10px;padding:8px 10px;border-radius:8px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);color:#FCA5A5;font-size:12px;">${error}</div>`}
            ${loading ? html`
              <p style="margin:0;color:#94A3B8;font-size:12px;">Cargando materias...</p>
            ` : html`
              <div style="display:flex;flex-direction:column;gap:10px;">
                <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;">
                  ${[
                    ['Materias', totalSubjects, '#10B981'],
                    ['Pendientes', pendingTopics, '#F59E0B'],
                    ['Hechos', completedTopics, '#6366F1'],

                              ${savingMap[row.subject] ? 'GUARDANDO...' : 'AGREGAR'}

    const BooksView = ({session}) => {
      const [book, setBook] = useState(BOOK_DEFAULT);

          setError(e.message || 'No se pudo cargar Libros.');

          setLoading(false);
        }

        loadBooks();

    const HealthView = ({session, onSyncDailyMeds, bodyWeight, onBodyWeight, todayMeds, previousDayMeds, weekTracker, healthWeekKey, onOpenDay}) => {

      const [loading, setLoading] = useState(true);
      const [saving, setSaving] = useState(false);
      const [error, setError] = useState('');
      const [notice, setNotice] = useState('');
      const [editingHistoryAt, setEditingHistoryAt] = useState('');
      const [historyFilter, setHistoryFilter] = useState('all');
      const [healthSectionOpen, setHealthSectionOpen] = useState({
        inventory: true,

      });
      const todayMedsState = todayMeds || {};
      const previousMedsState = previousDayMeds || {};
      const getDinnerLogicalTarget = () => getDinnerLogicalTargetState({
        todayMedsState,
        previousMedsState,
        now: new Date()
      });

      const entryDeltas = (entry) => {
        if(!entry) return { roaccutan: 0, combo: 0 };
        if(entry.type === 'roaccutan_take') return { roaccutan: -1, combo: 0 };
        if(entry.type === 'dinner_combo_take') return { roaccutan: 0, combo: -1 };
        if(entry.type === 'habit_toggle') {
          return {
            roaccutan: pn(entry.delta_roaccutan),
            combo: pn(entry.delta_combo)
          };
        }
        if(entry.field === 'roaccutan') return { roaccutan: pn(entry.delta), combo: 0 };
        if(entry.field === 'minoxidil_finasteride') return { roaccutan: 0, combo: pn(entry.delta) };
        return { roaccutan: 0, combo: 0 };
      };
      const hasRemainingTakeForDate = (history, field, dateKey) => {
        return (history || []).some(entry => {
          const entryDateKey = entry?.logical_date || (entry?.at ? localDateKey(new Date(entry.at)) : '');
          if(entryDateKey !== dateKey) return false;
          const deltas = entryDeltas(entry);
          return field === 'roaccutan' ? deltas.roaccutan < 0 : deltas.combo < 0;
        });
      };
      const recalcLastTakeFields = (payload) => {
        const history = Array.isArray(payload?.history) ? payload.history : [];
        const lastRoaccutan = history.find(entry => entry?.type === 'roaccutan_take' || (entry?.type === 'habit_toggle' && pn(entry?.delta_roaccutan) < 0));
        const lastDinner = history.find(entry => entry?.type === 'dinner_combo_take' || (entry?.type === 'habit_toggle' && pn(entry?.delta_combo) < 0));
        const latestAt = history.find(entry => entry?.at)?.at || '';
        return {
          ...payload,
          last_roaccutan_at: lastRoaccutan?.at || '',
          last_dinner_meds_at: lastDinner?.at || '',
          last_dinner_logical_date: lastDinner?.logical_date || (lastDinner?.at ? localDateKey(new Date(lastDinner.at)) : ''),
          last_taken_at: latestAt || ''
        };
      };
      const buildHealthPayload = (basePayload, patch = {}, newEntry = null) => {
        const base = { ...MEDS_STOCK_DEFAULT, ...(basePayload || {}) };
        const history = Array.isArray(base.history) ? base.history : [];
        const next = {
          ...base,
          ...patch,
          history: newEntry ? [newEntry, ...history].slice(0, 60) : history
        };
        return recalcLastTakeFields(next);
      };
      const applyHealthAction = async ({ patch, entry, okMsg }) => {
        const next = buildHealthPayload(stock, patch, entry);
        await persistHealth(next, okMsg);
        return next;
      };
      const loadHealth = useCallback(async () => {
        setLoading(true);
        setError('');
        try {
          const local = JSON.parse(localStorage.getItem(MEDS_STOCK_KEY) || 'null');
          const { data, error } = await supabase
            .from('app_inventory')
            .select('data, updated_at')
            .eq('key', 'meds_stock')
            .maybeSingle();
          if(error) {
            setStock({ ...MEDS_STOCK_DEFAULT, ...(local || {}) });
          } else {
            const freshest = pickNewestPayload(local, data?.data || null, data?.updated_at || '', MEDS_STOCK_DEFAULT);
            const merged = { ...MEDS_STOCK_DEFAULT, ...(freshest || {}) };
            setStock(merged);
          safeLocalSet(MEDS_STOCK_KEY, merged);
          }
        } catch(e) {
          try {
            const local = JSON.parse(localStorage.getItem(MEDS_STOCK_KEY) || 'null');
            setStock({ ...MEDS_STOCK_DEFAULT, ...(local || {}) });
          } catch(_) {
            setError(e.message || 'No se pudo cargar SALUD.');
          }
        } finally {
          setLoading(false);
        }
      }, []);

      useEffect(() => {
        loadHealth();
        const onFocus = () => loadHealth();
        const onVisible = () => { if(document.visibilityState === 'visible') loadHealth(); };
        const onHealthChanged = (event) => {
          if(event?.detail) setStock(prev => ({ ...prev, ...event.detail }));
        };
        window.addEventListener('focus', onFocus);
        document.addEventListener('visibilitychange', onVisible);
        window.addEventListener('enzo-health-changed', onHealthChanged);
        return () => {
          window.removeEventListener('focus', onFocus);
          document.removeEventListener('visibilitychange', onVisible);
          window.removeEventListener('enzo-health-changed', onHealthChanged);
        };
      }, [loadHealth]);

      const exportHealthData = () => {
        try {
          const payload = {
            app: 'enzo-training-health',
            exported_at: new Date().toISOString(),
            meds_stock: stock,
            body_weight: bodyWeight || ''
          };
          const blob = new Blob([JSON.stringify(payload, null, 2)], { type:'application/json;charset=utf-8' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `salud-stock-${new Date().toISOString().slice(0,19).replace(/[:T]/g,'-')}.json`;
          document.body.appendChild(a);
          a.click();
          a.remove();
          setTimeout(() => URL.revokeObjectURL(url), 1000);
          setNotice('Datos de SALUD exportados.');
          setTimeout(() => setNotice(''), 2500);
        } catch(e) {
          setError(e.message || 'No se pudieron exportar los datos de salud.');
        }
      };

      const persistHealth = async (payload, okMsg='Salud guardada.') => {
        setSaving(true);
        setError('');
        try {
          const normalizedPayload = { ...payload, _updatedAt: new Date().toISOString() };
          setStock(normalizedPayload);
        safeDispatch('enzo-health-changed', normalizedPayload);
        safeLocalSet(MEDS_STOCK_KEY, normalizedPayload);
          const { error } = await supabase
            .from('app_inventory')
            .upsert({
              key: 'meds_stock',
              data: normalizedPayload,
              updated_at: new Date().toISOString()
            }, { onConflict: 'key' });
          if(error) {
            setNotice(`${okMsg} Guardado local porque el remoto esta restringido.`);
          } else {
            setNotice(okMsg);
          }
          setTimeout(() => setNotice(''), 2500);
        } catch(e) {
          setError(e.message || 'No se pudo guardar SALUD.');
        } finally {
          setSaving(false);
        }
      };

      const syncTodayChecks = async (partial, dateKey) => {
        if(typeof onSyncDailyMeds === 'function') {
          await onSyncDailyMeds(partial, dateKey);
        }
      };

      const registerRoaccutanTake = async () => {
        if(todayMedsState.roacuttan) {
          setNotice('Roaccutan ya esta marcado hoy. Si fue un error, corregilo desde HOY o el historial.');
          setTimeout(() => setNotice(''), 2500);
          return;
        }
        const now = new Date();
        await applyHealthAction({
          patch: {
          roaccutan: Math.max(0, (parseInt(stock.roaccutan || 0, 10) || 0) - 1),
          },
          entry: {
            at: now.toISOString(),
            type: 'roaccutan_take',
            logical_date: localDateKey(now),
            roaccutan: 1
          },
          okMsg: 'Roaccutan del mediodia registrado.'
        });
        await syncTodayChecks({ roacuttan: true });
      };

      const registerDinnerTake = async () => {
        const dinnerTarget = getDinnerLogicalTarget();
        if(dinnerTarget.medsState.finasteride && dinnerTarget.medsState.minoxidil) {
          setNotice(`Las meds de cena ya estan marcadas para ${dinnerTarget.label}. Si fue un error, corregilo desde HOY o el historial.`);
          setTimeout(() => setNotice(''), 2500);
          return;
        }
        const now = new Date();
        await applyHealthAction({
          patch: {
          minoxidil_finasteride: Math.max(0, (parseInt(stock.minoxidil_finasteride || 0, 10) || 0) - 1),
          },
          entry: {
            at: now.toISOString(),
            type: 'dinner_combo_take',
            logical_date: dinnerTarget.dateKey,
            minoxidil_finasteride: 1
          },
          okMsg: `Meds de la cena registradas para ${dinnerTarget.label}.`
        });
        await syncTodayChecks({ finasteride: true, minoxidil: true }, dinnerTarget.dateKey);
      };

      const adjustStock = async (field, delta) => {
        const nowIso = new Date().toISOString();
        const current = parseInt(stock[field] || 0, 10) || 0;
        const nextVal = Math.max(0, current + delta);
        await applyHealthAction({
          patch: { [field]: nextVal },
          entry: {
            at: nowIso,
            type: delta > 0 ? 'restock' : 'manual_adjust',
            field,
            delta
          },
          okMsg: delta > 0 ? 'Stock repuesto.' : 'Stock ajustado.'
        });
      };

      const deleteHistoryEntry = async (entryAt) => {
        const history = Array.isArray(stock.history) ? stock.history : [];
        const target = history.find(entry => entry?.at === entryAt);
        if(!target) return;
        const deltas = entryDeltas(target);
        const remaining = history.filter(entry => entry?.at !== entryAt);
        const next = buildHealthPayload({
          ...stock,
          roaccutan: Math.max(0, pn(stock.roaccutan) - deltas.roaccutan),
          minoxidil_finasteride: Math.max(0, pn(stock.minoxidil_finasteride) - deltas.combo),
          history: remaining
        });
        await persistHealth(next, 'Movimiento borrado y stock recompuesto.');
        const affectsDate = target?.logical_date || (target?.at ? localDateKey(new Date(target.at)) : '');
        const affectsChecks = target?.type === 'roaccutan_take' || target?.type === 'dinner_combo_take' || target?.type === 'habit_toggle';
        if(affectsChecks && affectsDate) {
          if(deltas.roaccutan < 0 && !hasRemainingTakeForDate(remaining, 'roaccutan', affectsDate)) {
            await syncTodayChecks({ roacuttan: false }, affectsDate);
          }
          if(deltas.roaccutan > 0) {
            await syncTodayChecks({ roacuttan: true }, affectsDate);
          }
          if(deltas.combo < 0 && !hasRemainingTakeForDate(remaining, 'combo', affectsDate)) {
            await syncTodayChecks({ finasteride: false, minoxidil: false }, affectsDate);
          }
          if(deltas.combo > 0) {
            await syncTodayChecks({ finasteride: true, minoxidil: true }, affectsDate);
          }
        }
      };
      const editHistoryEntry = async (entryAt) => {
        const history = Array.isArray(stock.history) ? stock.history : [];
        const target = history.find(entry => entry?.at === entryAt);
        if(!target) return;
        setEditingHistoryAt(entryAt);
        try {
          if(target.type === 'roaccutan_take') {
            await deleteHistoryEntry(entryAt);
            setNotice('Movimiento listo para corregir. Usa REGISTRAR ROACCUTAN si queres volver a cargarlo.');
          } else if(target.type === 'dinner_combo_take') {
            await deleteHistoryEntry(entryAt);
            setNotice('Movimiento listo para corregir. Usa REGISTRAR MEDS CENA si queres volver a cargarlo.');
          } else if(target.type === 'restock' || target.type === 'manual_adjust') {
            const fieldLabel = target.field === 'roaccutan' ? 'Roaccutan' : 'Minoxidil/Finasteride';
            const nextVal = window.prompt(`Nuevo ajuste para ${fieldLabel}. Usa positivo o negativo.`, String(target.delta || 0));
            if(nextVal == null) return;
            const parsed = pn(nextVal);
            if(!parsed && parsed !== 0) {
              setNotice('Ajuste cancelado.');
              return;
            }
            await deleteHistoryEntry(entryAt);
            if(parsed !== 0) await adjustStock(target.field, parsed);
          } else if(target.type === 'habit_toggle') {
            await deleteHistoryEntry(entryAt);
            setNotice('Check diario quitado del historial. Si queres corregirlo, hacelo desde HOY.');
          }
          setTimeout(() => setNotice(''), 3000);
        } finally {
          setEditingHistoryAt('');
        }
      };

      const roaccutanCount = parseInt(stock.roaccutan || 0, 10) || 0;
      const minoxCount = parseInt(stock.minoxidil_finasteride || 0, 10) || 0;
      const low = roaccutanCount <= 2 || minoxCount <= 2;
      const fullHistory = Array.isArray(stock.history) ? stock.history : [];
      const dinnerTarget = getDinnerLogicalTarget();
      const roaccutanStatus = todayMedsState.roacuttan
        ? { label:'Hecha hoy', color:'#86EFAC', bg:'rgba(16,185,129,0.12)', border:'rgba(16,185,129,0.35)' }
        : { label:'Pendiente', color:'#FCD34D', bg:'rgba(245,158,11,0.12)', border:'rgba(245,158,11,0.35)' };
      const dinnerDone = !!dinnerTarget.medsState.finasteride && !!dinnerTarget.medsState.minoxidil;
      const todayHealthIssues = [];
      const todayRoaccutanExpected = hasRemainingTakeForDate(fullHistory, 'roaccutan', localDateKey());
      const todayDinnerExpected = hasRemainingTakeForDate(fullHistory, 'combo', dinnerTarget.dateKey);
      if(!!todayMedsState.roacuttan !== todayRoaccutanExpected) {
        todayHealthIssues.push(todayRoaccutanExpected ? 'Roaccutan con toma real sin check' : 'Roaccutan marcado sin toma real');
      }
      if(dinnerDone !== todayDinnerExpected) {
        todayHealthIssues.push(todayDinnerExpected
          ? (dinnerTarget.label === 'ayer' ? 'Cena de ayer con toma real sin checks completos' : 'Cena con toma real sin checks completos')
          : (dinnerTarget.label === 'ayer' ? 'Cena de ayer marcada sin toma real' : 'Cena marcada sin toma real'));
      }
      const dinnerStatus = dinnerDone
        ? {
            label: dinnerTarget.label === 'ayer' ? 'Hecha para ayer' : 'Hecha hoy',
            color:'#86EFAC',
            bg:'rgba(16,185,129,0.12)',
            border:'rgba(16,185,129,0.35)'

        : {
            label: dinnerTarget.label === 'ayer' ? 'Pendiente de ayer' : 'Pendiente',
            color:'#FCD34D',
            bg:'rgba(245,158,11,0.12)',
            border:'rgba(245,158,11,0.35)'
          };
      const statusMeta = {
        roaccutan: roaccutanStatus,
        dinner: dinnerStatus
      };
      const weekStartKey = healthWeekKey || getWeekKey(new Date());
      const weekDateKeys = Array.from({ length: 7 }, (_, idx) => getDayDate(weekStartKey, idx));
      const weekEndKey = weekDateKeys[6];
      const weekHistory = fullHistory.filter(entry => {
        const logicalKey = entry?.logical_date || (entry?.at ? localDateKey(new Date(entry.at)) : '');
        if(!logicalKey) return false;
        return logicalKey >= weekStartKey && logicalKey <= weekEndKey;
      });
      const weekRealTakes = weekHistory.filter(entry =>
        entry?.type === 'roaccutan_take' || entry?.type === 'dinner_combo_take'
      );
      const weekRoaccutanTakes = weekRealTakes.filter(entry => entry?.type === 'roaccutan_take').length;
      const weekDinnerTakes = weekRealTakes.filter(entry => entry?.type === 'dinner_combo_take').length;
      const roaccutanAdherencePct = Math.min(100, Math.round((weekRoaccutanTakes / 7) * 100));
      const dinnerAdherencePct = Math.min(100, Math.round((weekDinnerTakes / 7) * 100));
      const adherenceColor = (pct) => pct >= 85 ? '#10B981' : pct >= 50 ? '#F59E0B' : '#EF4444';
      const trackerDays = Object.values(weekTracker || {});
      const weekRoaccutanChecks = trackerDays.filter(day => !!day?.meds?.roacuttan).length;
      const weekDinnerChecks = trackerDays.filter(day => !!day?.meds?.finasteride && !!day?.meds?.minoxidil).length;
      const weekAllDeltas = weekHistory.reduce((acc, entry) => {
        const deltas = entryDeltas(entry);
        return {
          roaccutan: acc.roaccutan + deltas.roaccutan,
          combo: acc.combo + deltas.combo
        };
      }, { roaccutan: 0, combo: 0 });
      const weekMedicationDeltas = weekHistory.reduce((acc, entry) => {
        if(entry?.type !== 'roaccutan_take' && entry?.type !== 'dinner_combo_take' && entry?.type !== 'habit_toggle') {
          return acc;
        }
        const deltas = entryDeltas(entry);
        return {
          roaccutan: acc.roaccutan + deltas.roaccutan,
          combo: acc.combo + deltas.combo
        };
      }, { roaccutan: 0, combo: 0 });
      const weekAdjustmentBreakdown = weekHistory.reduce((acc, entry) => {
        if(!entry) return acc;
        const targetField = entry?.field === 'roaccutan'
          ? 'roaccutan'
          : entry?.field === 'minoxidil_finasteride'
            ? 'combo'
            : null;
        if(entry?.type === 'restock' && targetField) {
          acc[targetField].restock += pn(entry.delta);
        } else if(entry?.type === 'manual_adjust' && targetField) {
          acc[targetField].manual += pn(entry.delta);
        } else if(entry?.type === 'habit_toggle') {
          acc.roaccutan.checks += pn(entry.delta_roaccutan);
          acc.combo.checks += pn(entry.delta_combo);
        }
        return acc;
      }, {
        roaccutan: { restock: 0, manual: 0, checks: 0 },
        combo: { restock: 0, manual: 0, checks: 0 }
      });
      const weekOpeningStock = {
        roaccutan: Math.max(0, roaccutanCount - weekAllDeltas.roaccutan),
        combo: Math.max(0, minoxCount - weekAllDeltas.combo)
      };
      const expectedStockThisWeek = {
        roaccutan: Math.max(0, weekOpeningStock.roaccutan + weekMedicationDeltas.roaccutan),
        combo: Math.max(0, weekOpeningStock.combo + weekMedicationDeltas.combo)
      };
      const stockConsistency = [
        {
          label:'Roaccutan',
          field:'roaccutan',
          actual: roaccutanCount,
          expected: expectedStockThisWeek.roaccutan,
          opening: weekOpeningStock.roaccutan,
          takesDelta: weekMedicationDeltas.roaccutan,
          drift: roaccutanCount - expectedStockThisWeek.roaccutan,
          breakdown: weekAdjustmentBreakdown.roaccutan
        },
        {
          label:'Cena',
          field:'minoxidil_finasteride',
          actual: minoxCount,
          expected: expectedStockThisWeek.combo,
          opening: weekOpeningStock.combo,
          takesDelta: weekMedicationDeltas.combo,
          drift: minoxCount - expectedStockThisWeek.combo,
          breakdown: weekAdjustmentBreakdown.combo
        }
      ];
      const weekConsistency = [
        {
          label:'Roaccutan',
          checks: weekRoaccutanChecks,
          takes: weekRoaccutanTakes,
          diff: weekRoaccutanChecks - weekRoaccutanTakes
        },
        {
          label:'Cena',
          checks: weekDinnerChecks,
          takes: weekDinnerTakes,
          diff: weekDinnerChecks - weekDinnerTakes
        }
      ];
      const hasWeekMismatch = weekConsistency.some(row => row.diff !== 0);
      const weekDiagnostics = Object.keys(weekTracker || {}).sort((a,b)=>parseInt(a,10)-parseInt(b,10)).flatMap(dayIdx => {
        const trackerDay = weekTracker?.[dayIdx] || {};
        const meds = trackerDay.meds || {};
        const dateKey = getDayDate(healthWeekKey, parseInt(dayIdx, 10));
        const label = DAYS.find(d => d.key === String(dayIdx))?.abbr || dateKey;
        const desiredRoaccutan = hasRemainingTakeForDate(weekHistory, 'roaccutan', dateKey);
        const desiredDinner = hasRemainingTakeForDate(weekHistory, 'combo', dateKey);
        const issues = [];
        if(!!meds.roacuttan !== desiredRoaccutan) {
          issues.push({ dateKey, label, text: desiredRoaccutan ? 'Toma real sin check de Roaccutan' : 'Check de Roaccutan sin toma real' });
        }
        if((!!meds.finasteride && !!meds.minoxidil) !== desiredDinner) {
          issues.push({ dateKey, label, text: desiredDinner ? 'Toma real de cena sin checks completos' : 'Checks de cena sin toma real' });
        }
        return issues;
      });
      const filteredHistory = fullHistory.filter(entry => {
        if(historyFilter === 'all') return true;
        if(historyFilter === 'takes') return entry?.type === 'roaccutan_take' || entry?.type === 'dinner_combo_take';
        if(historyFilter === 'checks') return entry?.type === 'habit_toggle';
        if(historyFilter === 'adjustments') return entry?.type === 'manual_adjust' || entry?.type === 'restock';
        return true;
      });
      const historyEntries = filteredHistory.slice(0, 12).map(entry => ({
        entry,
        meta: getHealthEntryMeta(entry)
      }));
      const reconcileWeekChecks = async () => {
        if(typeof onSyncDailyMeds !== 'function' || !healthWeekKey) return;
        try {
          const updates = [];
          for(const dayIdx of Object.keys(weekTracker || {})) {
            const dateKey = getDayDate(healthWeekKey, parseInt(dayIdx, 10));
            const desiredRoaccutan = hasRemainingTakeForDate(weekHistory, 'roaccutan', dateKey);
            const desiredDinner = hasRemainingTakeForDate(weekHistory, 'combo', dateKey);
            const trackerDay = weekTracker?.[dayIdx] || {};
            const meds = trackerDay.meds || {};
            const patch = {};
            if(!!meds.roacuttan !== desiredRoaccutan) patch.roacuttan = desiredRoaccutan;
            if(!!meds.finasteride !== desiredDinner) patch.finasteride = desiredDinner;
            if(!!meds.minoxidil !== desiredDinner) patch.minoxidil = desiredDinner;
            if(Object.keys(patch).length) updates.push({ dateKey, patch });
          }
          for(const update of updates) {
            await onSyncDailyMeds(update.patch, update.dateKey);
          }
          setNotice(updates.length ? 'Checks reconciliados segun las tomas registradas.' : 'No habia diferencias para reconciliar.');
          setTimeout(() => setNotice(''), 2500);
        } catch(e) {
          setError(e.message || 'No se pudo reconciliar la semana.');
        }
      };
      const hasStockMismatch = stockConsistency.some(row => row.drift !== 0);
      const reconcileExpectedStock = async () => {
        try {
          const patch = {};
          stockConsistency.forEach(row => {
            if(row.drift !== 0) patch[row.field] = Math.max(0, row.expected);
          });
          if(!Object.keys(patch).length) {
            setNotice('El stock ya coincide con lo esperado para la semana visible.');
            setTimeout(() => setNotice(''), 2500);
            return;
          }
          await applyHealthAction({
            patch,
            entry: {
              at: new Date().toISOString(),
              type: 'manual_adjust',
              field: 'weekly_reconcile',
              delta: 0,
              note: `Reconciliacion semanal: ${Object.entries(patch).map(([field,val]) => `${field}=${val}`).join(', ')}`,
              logical_date: weekEndKey
            },
            okMsg: 'Stock alineado con el esperado de la semana visible.'
          });
          setTimeout(() => setNotice(''), 2500);
        } catch (e) {
          setError(e.message || 'No se pudo reconciliar el stock.');
        }
      };
      const showWeeklyMedsRecap = () => {
        const missingDays = weekDiagnostics.map(item => `${item.label}: ${item.text}`).join(' Â· ');
        const summary = [
          `Semana ${weekStartKey} a ${weekEndKey}.`,
          `Roaccutan: ${weekRoaccutanTakes}/7 tomas reales (${roaccutanAdherencePct}%).`,
          `Cena: ${weekDinnerTakes}/7 tomas reales (${dinnerAdherencePct}%).`,
          hasWeekMismatch ? 'Hay diferencias entre checks y tomas reales.' : 'Checks y tomas reales coinciden.',
          missingDays ? `Dias a revisar: ${missingDays}` : 'No hay dias marcados para revisar.'
        ].join(' ');
        setNotice(summary);
        setTimeout(() => setNotice(''), 7000);
      };

      return html`
        <div class="fade-up" style="display:flex;flex-direction:column;gap:12px;">
          <${Card}>
            <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px;">
              <div>
                <p style="margin:0;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#F59E0B;">Salud / Blindex</p>
                <p style="margin:4px 0 0;font-size:12px;color:#64748b;">Stock real de medicacion, toma diaria y alerta de reposicion.</p>
              </div>
              <div style="display:flex;gap:8px;align-items:center;">
                <button onClick=${exportHealthData} style="padding:8px 12px;border-radius:8px;border:1px solid rgba(245,158,11,0.3);background:rgba(245,158,11,0.12);color:#FCD34D;font-size:11px;font-weight:800;font-family:'Barlow Condensed',sans-serif;cursor:pointer;letter-spacing:0.05em;">
                  EXPORTAR
                </button>
                <button class="btn-icon" style="background:#162035;border:1px solid #1E2D45;" onClick=${loadHealth}>
                  <${ISync} s=${16}/>
                </button>
              </div>
            </div>
            ${notice && html`<div style="margin-bottom:10px;padding:8px 10px;border-radius:8px;background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.25);color:#FCD34D;font-size:12px;">${notice}</div>`}
            ${error && html`<div style="margin-bottom:10px;padding:8px 10px;border-radius:8px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);color:#FCA5A5;font-size:12px;">${error}</div>`}
            ${loading ? html`
              <p style="margin:0;color:#94A3B8;font-size:12px;">Cargando salud...</p>
            ` : html`
              <div style="display:flex;flex-direction:column;gap:12px;">
                <${SectionAccordion}
                  icon=${html`<span style="width:10px;height:10px;border-radius:999px;background:#F59E0B;display:inline-block;"></span>`}
                  title="Inventario y peso"
                  isOpen=${healthSectionOpen.inventory}
                  onToggle=${()=>setHealthSectionOpen(prev => ({ ...prev, inventory: !prev.inventory }))}
                >
                ${low && html`
                  <div style="padding:10px;border-radius:8px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);margin-bottom:10px;">
                    <p style="margin:0;font-size:12px;color:#FCA5A5;font-weight:700;">Reponer: alguno de los stocks esta en 2 o menos.</p>
                  </div>
                `}
                <div style="padding:12px;border-radius:10px;background:rgba(15,23,41,0.75);border:1px solid #1E2D45;display:flex;align-items:center;justify-content:space-between;gap:12px;">
                  <div>
                    <p style="margin:0;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:#94A3B8;">Peso corporal (semana)</p>
                    <p style="margin:4px 0 0;font-size:12px;color:#64748b;">Registralo aca una vez por semana.</p>
                  </div>
                  <div style="display:flex;align-items:center;gap:6px;">
                    <input type="number" step="0.1" placeholder="kg"
                      value=${bodyWeight || ''}
                      onInput=${e=>onBodyWeight && onBodyWeight(e.target.value)}
                      style="width:86px;background:#0F1729;border:1px solid #2A3F5F;border-radius:8px;padding:7px 10px;font-size:14px;font-weight:700;font-family:'JetBrains Mono',monospace;color:white;text-align:center;"/>
                    ${(bodyWeight || '') && html`<span style="font-size:13px;color:#10B981;font-weight:700;">kg</span>`}
                  </div>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
                  ${[
                    ['roaccutan', 'Roaccutan', roaccutanCount],
                    ['minoxidil_finasteride', 'Minoxidil / Finasteride', minoxCount]
                  ].map(([key, label, count]) => html`
                    <div style="padding:12px;border-radius:10px;background:rgba(15,23,41,0.75);border:1px solid ${count <= 2 ? 'rgba(239,68,68,0.3)' : '#1E2D45'};">
                      <p style="margin:0 0 6px;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:#94A3B8;">${label}</p>
                      <p style="margin:0 0 6px;font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:${count <= 2 ? '#FCA5A5' : '#E2E8F0'};">${count}</p>
                      <p style="margin:0 0 10px;font-size:11px;color:#64748b;">Blindex: ${Math.ceil(count / 10)} de 10 unidades</p>
                      <div style="display:flex;gap:6px;flex-wrap:wrap;">
                        <button onClick=${()=>adjustStock(key, -1)} style="padding:6px 10px;border-radius:8px;border:1px solid rgba(239,68,68,0.3);background:rgba(239,68,68,0.12);color:#FCA5A5;font-size:11px;font-weight:700;font-family:'Barlow Condensed',sans-serif;cursor:pointer;">-1</button>
                        <button onClick=${()=>adjustStock(key, -10)} style="padding:6px 10px;border-radius:8px;border:1px solid rgba(245,158,11,0.3);background:rgba(245,158,11,0.12);color:#FCD34D;font-size:11px;font-weight:700;font-family:'Barlow Condensed',sans-serif;cursor:pointer;">- Blindex</button>
                        <button onClick=${()=>adjustStock(key, +10)} style="padding:6px 10px;border-radius:8px;border:1px solid rgba(16,185,129,0.3);background:rgba(16,185,129,0.12);color:#86EFAC;font-size:11px;font-weight:700;font-family:'Barlow Condensed',sans-serif;cursor:pointer;">+ Blindex</button>
                      </div>
                    </div>
                  `)}
                </div>
