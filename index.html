<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#080D1A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Enzo Training">
  <title>ENZO | Training</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; background: #080D1A; color: #E2E8F0; overscroll-behavior: none; }
    body { font-family: 'Barlow', sans-serif; -webkit-font-smoothing: antialiased; }
    :root {
      --green: #10B981; --green-dim: rgba(16,185,129,0.15); --green-glow: rgba(16,185,129,0.35);
      --indigo: #6366F1; --indigo-dim: rgba(99,102,241,0.15);
      --amber: #F59E0B; --red: #EF4444;
      --bg: #080D1A; --surface: #0F1729; --surface2: #162035; --border: #1E2D45;
    }
    .hide-scroll { scrollbar-width: none; -ms-overflow-style: none; }
    .hide-scroll::-webkit-scrollbar { display: none; }
    input[type="checkbox"] { accent-color: var(--green); width: 18px; height: 18px; cursor: pointer; flex-shrink:0; }
    input:focus, select:focus { outline: none; border-color: var(--indigo) !important; box-shadow: 0 0 0 2px rgba(99,102,241,0.2); }
    .glass-card { background: rgba(15,23,41,0.85); border: 1px solid #1E2D45; border-radius: 12px; }
    .spin { animation: spin 0.9s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .inp { width:100%; background:#0F1729; border:1px solid #1E2D45; border-radius:8px; padding:8px 12px; font-size:14px; color:white; }
    .inp-xs { width:100%; background:#0F1729; border:1px solid #1E2D45; border-radius:6px; padding:4px 6px; font-size:12px; color:white; text-align:center; font-family:'JetBrains Mono',monospace; }
    .check-btn { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; border:none; cursor:pointer; transition:all 0.15s; }
    .rpe-slider { width:100%; height:6px; border-radius:3px; appearance:none; -webkit-appearance:none; cursor:pointer; background: linear-gradient(to right, #6366F1, #10B981, #F59E0B, #EF4444); }
    .rpe-slider::-webkit-slider-thumb { appearance:none; width:18px; height:18px; background:white; border-radius:50%; border:2px solid #6366F1; }
    .section-toggle { width:100%; display:flex; align-items:center; justify-content:space-between; padding:14px 16px; background:transparent; border:none; color:#E2E8F0; cursor:pointer; -webkit-tap-highlight-color:transparent; }
    .section-toggle:hover { background:rgba(255,255,255,0.02); }
    .btn-icon { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; border:1px solid #1E2D45; background:#162035; cursor:pointer; color:#94A3B8; transition:all 0.15s; flex-shrink:0; }
    .btn-icon:hover { background:#1E2D45; }
    .chev { transition: transform 0.2s ease; color:#64748b; }
    .chev.open { transform: rotate(180deg); }
    .fade-up { animation: fadeUp 0.3s ease-out; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    .timer-urgent { animation: timerPulse 0.6s ease-in-out infinite alternate; }
    @keyframes timerPulse { from { opacity:1; } to { opacity:0.5; } }
    .text-green { color:#10B981; }
    .text-red { color:#EF4444; }
    select.inp { appearance:auto; -webkit-appearance:auto; }
  </style>
</head>
<body>
  <div id="splash" style="position:fixed;inset:0;background:#080D1A;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:20px;transition:opacity 0.3s;">
    <div style="font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:800;letter-spacing:0.1em;color:#fff;">ENZO <span style="color:#10B981">TRAINING</span></div>
    <div class="spin" style="width:40px;height:40px;border:3px solid #1E2D45;border-top-color:#10B981;border-radius:50%;"></div>
    <p style="font-family:'JetBrains Mono',monospace;font-size:12px;color:#4B5563;margin:0;">Cargando sistema modular...</p>
  </div>
  <div id="error-screen" style="display:none;position:fixed;inset:0;background:#080D1A;color:#EF4444;padding:40px;z-index:10000;overflow:auto;">
    <h2 style="font-family:'Barlow Condensed',sans-serif;font-size:24px;margin-bottom:10px;">ERROR CRÍTICO</h2>
    <pre id="error-msg" style="white-space:pre-wrap;font-family:'JetBrains Mono',monospace;font-size:12px;color:#CBD5E1;background:#0F1729;padding:20px;border-radius:12px;border:1px solid #1E2D45;"></pre>
    <button onclick="location.reload()" style="margin-top:20px;padding:12px 24px;background:#EF4444;color:white;border:none;border-radius:8px;font-weight:700;cursor:pointer;">REINTENTAR</button>
  </div>
  <div id="app"></div>

  <!-- IndexedDB Shim -->
  <script>
    window.idb = {
      openDB: function(name, ver, cfg) {
        return new Promise(function(res, rej) {
          var req = indexedDB.open(name, ver);
          req.onupgradeneeded = function(e) { cfg && cfg.upgrade && cfg.upgrade(e.target.result); };
          req.onsuccess = function(e) {
            var db = e.target.result;
            db.put = function(s, v) { return new Promise(function(r, j) { var tx = db.transaction(s, 'readwrite'); var rq = tx.objectStore(s).put(v); rq.onsuccess = function() { r(rq.result); }; rq.onerror = function() { j(rq.error); }; }); };
            db.getAll = function(s) { return new Promise(function(r, j) { var tx = db.transaction(s, 'readonly'); var rq = tx.objectStore(s).getAll(); rq.onsuccess = function() { r(rq.result || []); }; rq.onerror = function() { j(rq.error); }; }); };
            db.getAllKeys = function(s) { return new Promise(function(r, j) { var tx = db.transaction(s, 'readonly'); var rq = tx.objectStore(s).getAllKeys(); rq.onsuccess = function() { r(rq.result || []); }; rq.onerror = function() { j(rq.error); }; }); };
            db.delete = function(s, k) { return new Promise(function(r, j) { var tx = db.transaction(s, 'readwrite'); var rq = tx.objectStore(s).delete(k); rq.onsuccess = function() { r(); }; rq.onerror = function() { j(rq.error); }; }); };
            res(db);
          };
          req.onerror = function(e) { rej(e.target.error); };
        });
      }
    };
    window.onerror = function(msg, src, line, col, err) {
      document.getElementById('splash').style.display = 'none';
      document.getElementById('error-screen').style.display = 'block';
      document.getElementById('error-msg').textContent = (err ? err.stack : msg) + '\n\nSource: ' + src + ':' + line;
      return true;
    };
  </script>

  <script type="module">
    import { h, render } from 'https://esm.sh/preact';
    import { useState, useEffect, useCallback, useRef, useMemo } from 'https://esm.sh/preact/hooks';
    import htm from 'https://esm.sh/htm';
    const html = htm.bind(h);
    import { createClient } from 'https://esm.sh/@supabase/supabase-js';

    // Core & Views imports
    import * as core from './app-core.js?v=20260418';
    import * as gym from './app-gym.js?v=20260418';
    import * as comp from './app-components.js?v=20260418';
    import * as utils from './app-utils.js?v=20260418';
    import * as cons from './app-constants.js?v=20260418';
    import { createProductivityView } from './app-productivity.js?v=20260418';
    import { createHealthView } from './app-health.js?v=20260418';
    import { createRecipesView } from './app-recipes.js?v=20260418';
    import { createStudyView } from './app-study.js?v=20260418';
    import { createBooksView } from './app-books.js?v=20260418';
    import { createProgressViews } from './app-progress.js?v=20260418';
    import { createTimerView } from './app-timer.js?v=20260418';
    import { createNotifView } from './app-notifs.js?v=20260418';
    import { createGymPanel } from './app-gym.js?v=20260418';
    import { createLoginView } from './app-login.js?v=20260418';
    import { createTodayDashboard } from './app-dashboard.js?v=20260418';
    import { createHabitsPanel } from './app-habits.js?v=20260418';
    import { createApp } from './app-main.js?v=20260418';

    (async () => {
      try {
        const supabase = createClient(cons.SUPA_URL, cons.SUPA_KEY);
        window.supabase = supabase;

        const viewDeps = {
          h, render, useState, useEffect, useCallback, useRef, useMemo, html,
          supabase, ...core, ...gym, ...comp, ...utils, ...cons,
          createProductivityView, createHealthView, createRecipesView, createStudyView,
          createBooksView, createProgressViews, createTimerView, createNotifView,
          createGymPanel, createLoginView, createTodayDashboard, createHabitsPanel
        };

        console.log('[App] Initial dependencies:', viewDeps);

        const dynamicComponents = comp.createAppComponents(viewDeps);
        Object.assign(viewDeps, dynamicComponents);

        console.log('[App] Final dependencies (with dynamic components):', viewDeps);
        console.log('[App] SUPA_URL:', cons.SUPA_URL);

        const App = createApp(viewDeps);
        render(h(App), document.getElementById('app'));

        requestAnimationFrame(() => requestAnimationFrame(() => {
          const el = document.getElementById('splash');
          if(el) { el.style.opacity = '0'; setTimeout(() => el.style.display = 'none', 300); }
        }));
      } catch (e) {
        console.error('[App] Initialization Error:', e);
        document.getElementById('splash').style.display = 'none';
        document.getElementById('error-screen').style.display = 'block';
        document.getElementById('error-msg').textContent = e.stack || e.message || String(e);
      }
    })();
  </script>

  <script>
    if('serviceWorker' in navigator && !window.location.hostname.includes('localhost')) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(e => console.warn('[PWA] SW:', e.message)));
    }
  </script>
</body>
</html>
