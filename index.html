            ${false && selEx && exHistory.length>0 && canRenderLineChart && html`
              <div style="height:200px;">
                <${ResponsiveContainer} width="100%" height="100%">
                  <${LineChart} data=${exHistory} margin=${{top:5,right:5,left:-20,bottom:0}}>
                    <${CartesianGrid} strokeDasharray="3 3" stroke="#1E2D45"/>
                    <${XAxis} dataKey="week" tick=${{fill:'#64748b',fontSize:9}} axisLine=${false} tickLine=${false}/>
                    <${YAxis} yAxisId="w" tick=${{fill:'#64748b',fontSize:9}} axisLine=${false} tickLine=${false} unit="kg"/>
                    <${YAxis} yAxisId="r" orientation="right" domain=${[1,10]} tick=${{fill:'#F59E0B',fontSize:9}} axisLine=${false} tickLine=${false}/>
                    <${Tooltip} contentStyle=${tooltipStyle} formatter=${(v,n)=>[n==='RPE'?v:v+'kg',n]}/>
                    <${Line} yAxisId="w" type="monotone" dataKey="weight" name="Peso" stroke="#10B981" strokeWidth=${2} dot=${{fill:'#10B981',r:3}}/>
                    <${Line} yAxisId="r" type="monotone" dataKey="rpe" name="RPE" stroke="#F59E0B" strokeWidth=${1.5} strokeDasharray="4 3" dot=${{fill:'#F59E0B',r:2}} connectNulls/>
                  <//>
                <//>
              </div>
              <div style="display:flex;gap:12px;margin-top:6px;justify-content:center;">
                <div style="display:flex;align-items:center;gap:4px;"><div style="width:12px;height:2px;background:#10B981;border-radius:1px;"></div><span style="font-size:10px;color:#64748b;">Peso (kg)</span></div>
                <div style="display:flex;align-items:center;gap:4px;"><div style="width:12px;height:2px;background:#F59E0B;border-radius:1px;border-style:dashed;"></div><span style="font-size:10px;color:#64748b;">RPE (fatiga)</span></div>
              </div>
            `}
            ${selEx && exHistory.length===0 && html`<p style="color:#64748b;font-size:13px;text-align:center;padding:20px 0;">Sin datos registrados aun para este ejercicio.</p>`}
          <//>

          <!-- RECORDS PERSONALES -->
          ${personalRecords.length > 0 && html`
            <${Card}>
              <p style="margin:0 0 12px;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;font-weight:700;color:#F59E0B;">Records Personales</p>
              <div style="display:flex;flex-direction:column;gap:6px;">
                ${personalRecords.map(([ex, pr], i) => html`
                  <div style="display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:7px;background:${i===0?'rgba(245,158,11,0.08)':'rgba(10,15,30,0.4)'};border:1px solid ${i===0?'rgba(245,158,11,0.3)':'#1E2D45'};">
                    <div style="display:flex;align-items:center;gap:8px;min-width:0;">
                      <span style="font-size:12px;flex-shrink:0;">${i===0?'🥇':i===1?'🥈':i===2?'🥉':'  '}</span>
                      <span style="font-size:12px;color:#cbd5e1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${ex}</span>
                    </div>
                    <span style="font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:${i===0?'#F59E0B':'#94a3b8'};flex-shrink:0;margin-left:8px;">${pr}kg</span>
                  </div>
                `)}
              </div>
            <//>
          `}

          ${macHistory.length>0 && html`
            <${Card}>
              <p style="margin:0 0 4px;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;font-weight:700;color:#F59E0B;">Calorias por Semana</p>
              <p style="margin:0 0 10px;font-size:11px;color:#64748b;">Objetivo base: ${fn(weeklyCaloriesTarget)} kcal por 4 dias de gym.</p>
              <div style="display:flex;flex-direction:column;gap:8px;">
                ${caloriesBars.map(row => html`
                  <div style="padding:10px;border-radius:10px;background:rgba(10,15,30,0.6);border:1px solid #1E2D45;">
                    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px;">
                      <span style="font-size:11px;color:#CBD5E1;font-weight:700;">${row.week}</span>
                      <span style="font-family:'JetBrains Mono',monospace;font-size:12px;color:${row.cals >= weeklyCaloriesTarget ? '#10B981' : '#F59E0B'};">${fn(row.cals)} kcal</span>
                    </div>
                    <div style="position:relative;height:12px;border-radius:999px;background:#0F1729;border:1px solid #1E2D45;overflow:hidden;">
                      <div style=${`width:${row.pct}%;height:100%;background:${row.cals >= weeklyCaloriesTarget ? '#10B981' : '#F59E0B'};min-width:${row.cals > 0 ? '6px' : '0'};`}></div>
                      <div style=${`position:absolute;top:0;bottom:0;left:${(weeklyCaloriesTarget / caloriesScaleMax) * 100}%;width:2px;background:#6366F1;opacity:0.95;`}></div>
                    </div>
                    <div style="display:flex;justify-content:space-between;gap:8px;margin-top:6px;font-size:10px;color:#94A3B8;">
                      <span>Objetivo: <span style="color:#818CF8;font-family:'JetBrains Mono',monospace;">${fn(weeklyCaloriesTarget)}</span></span>
                      <span>Diferencia: <span style="color:${row.cals - weeklyCaloriesTarget >= 0 ? '#10B981' : '#FCA5A5'};font-family:'JetBrains Mono',monospace;">${row.cals - weeklyCaloriesTarget >= 0 ? '+' : ''}${fn(row.cals - weeklyCaloriesTarget)}</span></span>
                    </div>
                  </div>
                `)}
              </div>
            <//>
          `}

          <!-- PESO CORPORAL -->
          ${weightHistory.length > 0 && html`
            <${Card}>
              <p style="margin:0 0 12px;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;font-weight:700;color:#38BDF8;">Evolucion de Peso Corporal</p>
              <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
                <div>
                  <span style="font-size:10px;color:#64748b;">Inicio: </span>
                  <span style="font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:white;">${weightHistory[0]?.kg}kg</span>
                </div>
                <div>
                  <span style="font-size:10px;color:#64748b;">Actual: </span>
                  <span style="font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:${pn(weightHistory.at(-1)?.kg) < pn(weightHistory[0]?.kg) ? '#10B981':'#F59E0B'};">
                    ${weightHistory.at(-1)?.kg}kg
                    ${weightHistory.length>1 ? ` (${(pn(weightHistory.at(-1)?.kg)-pn(weightHistory[0]?.kg)>0?'+':'')}${(pn(weightHistory.at(-1)?.kg)-pn(weightHistory[0]?.kg)).toFixed(1)}kg)` : ''}
                  </span>
                </div>
              </div>
              <div style="display:flex;flex-direction:column;gap:8px;">
                ${weightRows.map(row => html`
                  <div style="padding:10px;border-radius:10px;background:rgba(10,15,30,0.6);border:1px solid #1E2D45;">
                    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px;">
                      <span style="font-size:11px;color:#CBD5E1;font-weight:700;">${row.week}</span>
                      <span style="font-family:'JetBrains Mono',monospace;font-size:12px;color:#38BDF8;">${row.kg} kg</span>
                    </div>
                    <div style="height:10px;border-radius:999px;background:#0F1729;border:1px solid #1E2D45;overflow:hidden;">
                      <div style=${`width:${row.pct}%;height:100%;background:#38BDF8;min-width:6px;`}></div>
                    </div>
                  </div>
                `)}
              </div>
            <//>
          `}

          <!-- EXPORTAR -->
          <${Card}>
            <p style="margin:0 0 10px;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;font-weight:700;color:#64748b;">Exportar</p>
            <button onClick=${exportImage}
              style="width:100%;padding:10px;border-radius:8px;border:1px solid rgba(99,102,241,0.3);background:rgba(99,102,241,0.1);color:#818CF8;font-size:13px;font-weight:700;font-family:'Barlow Condensed',sans-serif;cursor:pointer;letter-spacing:0.05em;">
              Capturar progreso como imagen
            </button>
            <p style="margin:6px 0 0;font-size:10px;color:#374151;text-align:center;">
              Usa Ctrl+P o la captura de pantalla del celular para guardar
            </p>
          <//>

        </div>
      `;
    };

    // ═══════════════════════════════════════════════════
    //  FLOATING TIMER
    // ═══════════════════════════════════════════════════
    const FloatingTimer = ({left, active, onToggle, onReset}) => {
      if(left===0 && !active) return null;
      const urgent = left<=10 && active;
      return html`
        <div style="position:fixed;bottom:88px;right:16px;z-index:50;display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:16px;background:rgba(8,13,26,0.97);border:1px solid #6366F1;box-shadow:0 0 20px rgba(99,102,241,0.25);">
          <div style="width:48px;height:48px;border-radius:12px;background:#162035;border:1px solid #6366F1;display:flex;align-items:center;justify-content:center;">
            <span class=${urgent?'timer-urgent':''} style=${`font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;color:${urgent?'#EF4444':'#6366F1'};`}>${ft(left)}</span>
          </div>
          <div style="display:flex;gap:6px;">
            <button class="btn-icon" style="background:#1E2D45;" onClick=${onToggle}>${active ? html`<${IPause} s=${16}/>` : html`<${IPlay} s=${16}/>`}</button>
            <button class="btn-icon" style="background:#1E2D45;" onClick=${onReset}><${IReset} s=${16} c="text-red"/></button>
          </div>
        </div>
      `;
    };

    // ═══════════════════════════════════════════════════
    //  LOGIN VIEW — Magic Link
    // ═══════════════════════════════════════════════════
    const formatTaskDate = (value) => {
      if(!value) return 'Sin fecha';
      try {
        return new Date(value).toLocaleString('es-AR', {
          day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit'
        });
      } catch(e) { return value; }
    };

    const priorityColor = (priority) => ({
      high: '#EF4444',
      normal: '#F59E0B',
      low: '#10B981'
    }[priority] || '#94A3B8');
    const CATEGORY_OPTIONS = [
      { value:'personal', label:'Personal', color:'#6366F1' },
      { value:'estudio', label:'Estudio', color:'#10B981' },
      { value:'salud', label:'Salud', color:'#F59E0B' },
      { value:'trabajo', label:'Trabajo', color:'#EF4444' }
    ];
    const categoryMeta = (value) => CATEGORY_OPTIONS.find(c => c.value === value) || CATEGORY_OPTIONS[0];
    const NOTE_KIND_OPTIONS = [
      { value:'idea', label:'Idea', color:'#F59E0B' },
      { value:'pregunta', label:'Pregunta', color:'#38BDF8' },
      { value:'reflexion', label:'Reflexion', color:'#A78BFA' },
      { value:'duda', label:'Duda', color:'#EF4444' }
    ];
    const noteKindMeta = (value) => NOTE_KIND_OPTIONS.find(k => k.value === value) || NOTE_KIND_OPTIONS[0];
    const noteDisplayTitle = (note) => {
      const custom = String(note?.note_title || '').trim();
      if(custom) return custom;
      const content = String(note?.content || '').trim();
      if(!content) return 'Pensamiento';
      return content.length > 56 ? `${content.slice(0, 56)}...` : content;
    };
    const classifyThoughtKind = (text='') => {
      const raw = String(text || '').trim();
      const lower = raw.toLowerCase();
      if(!lower) return 'idea';
      if(raw.includes('?') || /^(que|qué|como|cómo|por que|por qué|cuando|cuándo|donde|dónde|quien|quién)\b/.test(lower)) return 'pregunta';
      if(/(no entiendo|dudo|duda|sera|será|quiz[aá]s|capaz|me cuesta|no se si|no sé si)/.test(lower)) return 'duda';
      if(/(pienso|siento|aprendi|aprendí|reflexion|reflexión|me di cuenta|conclusion|conclusión|me pasa)/.test(lower)) return 'reflexion';
      return 'idea';
    };
    const RECURRENCE_OPTIONS = [
      { value:'none', label:'No repetir' },
      { value:'daily', label:'Diaria' },
      { value:'weekly', label:'Semanal' }
    ];
    const recurrenceLabel = (value) => (RECURRENCE_OPTIONS.find(r => r.value === value)?.label || 'No repetir');
    const normalizeSubtasks = (value) => {
      if(Array.isArray(value)){
        return value
          .map(item => {
            if(typeof item === 'string') return { text:item.trim(), done:false };
            const text = String(item?.text || '').trim();
            if(!text) return null;
            return { text, done: !!item?.done };
          })
          .filter(Boolean);
      }
      return [];
    };
    const subtasksToEditorText = (subtasks=[]) => normalizeSubtasks(subtasks).map(item => item.text).join('\n');
    const editorTextToSubtasks = (text='') => String(text || '')
      .split(/\r?\n/)
      .map(line => line.trim())
      .filter(Boolean)
      .map(line => ({ text: line, done:false }));
    const computeNextRecurringDueAt = (task) => {
      const recurrence = task?.recurrence || 'none';
      if(recurrence === 'none') return null;

      return next.toISOString();

    const RecipesView = ({session, onRecipeUpdated}) => {

      const applyRecipeAiEdit = async () => {

            carb: String(Math.max(0, Math.round(parseFloat(data.macros?.carb) || 0))),
            fat: String(Math.max(0, Math.round(parseFloat(data.macros?.fat) || 0))),

      const saveRecipe = async () => {
        if(!form.recipe_name.trim()) return;
        setSaving(true);
        setError('');
        try {
          const payload = {
            recipe_name: form.recipe_name.trim(),
            aliases: form.aliases.split(',').map(v => v.trim()).filter(Boolean),
            base_qty: parseFloat(String(form.base_qty).replace(',', '.')) || 1,
            base_unit: form.base_unit.trim() || 'porcion',
            stock_qty: form.stock_qty === '' ? null : (parseFloat(String(form.stock_qty).replace(',', '.')) || 0),
            stock_unit: form.stock_unit.trim() || null,
            low_stock_threshold: form.low_stock_threshold === '' ? null : (parseFloat(String(form.low_stock_threshold).replace(',', '.')) || 0),
            macros: {
              cals: Math.max(0, Math.round(parseFloat(form.cals) || 0)),
              prot: Math.max(0, Math.round(parseFloat(form.prot) || 0)),
              carb: Math.max(0, Math.round(parseFloat(form.carb) || 0)),
              fat: Math.max(0, Math.round(parseFloat(form.fat) || 0))
            },
            ingredients: form.ingredients
              .split('\n')
              .map(line => line.trim())
              .filter(Boolean)
              .map(line => {
                const [qtyPart, ...nameParts] = line.split('|');
                return {
                  qty: (qtyPart || '').trim() || '1 porcion',
                  name: nameParts.join('|').trim() || qtyPart.trim() || 'Ingrediente'
                };
              }),
            notes: form.notes.trim() || null,
            updated_at: new Date().toISOString()
          };

          if(editingId) {
            const { data, error } = await supabase.from('user_recipes')
              .update(payload)

              .select()
              .single();
            if(error) throw error;
            setRows(prev => prev.map(r => r.id === editingId ? data : r));
            onRecipeUpdated?.(data);
          } else {
            const { data, error } = await supabase.from('user_recipes')

            if(error) throw error;
            setRows(prev => [data, ...prev]);

        } catch(e) {
          setError(e.message || 'No se pudo guardar.');

          setSaving(false);

      const updateSweetsField = (key, value) => {
        setSweetsStock(prev => ({ ...prev, [key]: value }));
      };
      const updateSoldField = (key, value) => {
        setSoldDraft(prev => ({ ...prev, [key]: value }));
      };
      const normalizeSaleDraft = (draft, currentStock) => {
        const soldEntries = [];
        ['damasco','durazno','ciruela','pera','alcayota','tomate_triturado','tomate_entero'].forEach((key) => {
          const sold = parseFloat(String(draft[key] || '').replace(',', '.')) || 0;
          if(sold > 0) soldEntries.push({ key, qty: sold });
        });
        const otherSold = parseFloat(String(draft.otro_dulce_stock || '').replace(',', '.')) || 0;
        if(otherSold > 0 && currentStock.otro_dulce_nombre) {
          soldEntries.push({ key: currentStock.otro_dulce_nombre, qty: otherSold });
        }
        return soldEntries;
      };
      const stockAfterRemovingSale = (baseStock, target) => {
        const next = { ...baseStock };
        (target?.items || []).forEach(item => {
          const key = String(item?.key || '').trim();
          const qty = pn(item?.qty);
          if(!(qty > 0) || !key) return;
          if(['damasco','durazno','ciruela','pera','alcayota','tomate_triturado','tomate_entero'].includes(key)) {
            next[key] = String((pn(next[key]) || 0) + qty);
            return;
          }
          if(String(next.otro_dulce_nombre || '').trim().toLowerCase() === key.toLowerCase()) {
            next.otro_dulce_stock = String((pn(next.otro_dulce_stock) || 0) + qty);
          }
        });
        return next;
      };
      const persistSweetsPayload = async (payload, okMsg) => {
        try { localStorage.setItem(SWEETS_STOCK_KEY, JSON.stringify(payload)); } catch(_) {}
        const { error } = await supabase
          .from('app_inventory')
          .upsert({
            key: 'sweets_sauces_stock',
            data: payload,
            updated_at: new Date().toISOString()
          }, { onConflict: 'key' });
        if(error) {
          setSweetsMsg(`${okMsg} Guardado local porque el remoto está restringido por permisos.`);
        } else {
          setSweetsMsg(okMsg);
        }
        setTimeout(() => setSweetsMsg(''), 2500);
      };

      const saveSweetsStock = async () => {
        setSweetsSaving(true);
        setSweetsMsg('');
        try {
          const payload = { ...SWEETS_STOCK_DEFAULT, ...sweetsStock };
          try { localStorage.setItem(SWEETS_STOCK_KEY, JSON.stringify(payload)); } catch(_) {}
          const { error } = await supabase
            .from('app_inventory')
            .upsert({
              key: 'sweets_sauces_stock',
              data: payload,
              updated_at: new Date().toISOString()
            }, { onConflict: 'key' });
          if(error) {
            setSweetsMsg('Stock guardado en este dispositivo. El guardado remoto está restringido por permisos.');
          } else {
            setSweetsMsg('Stock de dulces y salsas guardado.');
          }
          setTimeout(() => setSweetsMsg(''), 2500);
        } catch(e) {
          setSweetsMsg('Stock guardado en este dispositivo.');
        } finally {
          setSweetsSaving(false);
        }
      };

      const registerSoldSweets = async () => {
        setSweetsSaving(true);
        setSweetsMsg('');
        try {
          const history = Array.isArray(sweetsStock.sales_history) ? sweetsStock.sales_history : [];
          const previousEntry = editingSaleAt ? history.find(entry => entry?.at === editingSaleAt) : null;
          const base = previousEntry ? stockAfterRemovingSale(sweetsStock, previousEntry) : { ...sweetsStock };
          const next = { ...base };
          const soldEntries = normalizeSaleDraft(soldDraft, base);
          ['damasco','durazno','ciruela','pera','alcayota','tomate_triturado','tomate_entero'].forEach((key) => {
            const sold = parseFloat(String(soldDraft[key] || '').replace(',', '.')) || 0;
            const current = parseFloat(String(base[key] || '').replace(',', '.')) || 0;
            next[key] = String(Math.max(0, current - sold));
          });
          const otherSold = parseFloat(String(soldDraft.otro_dulce_stock || '').replace(',', '.')) || 0;
          const otherCurrent = parseFloat(String(base.otro_dulce_stock || '').replace(',', '.')) || 0;
          next.otro_dulce_stock = String(Math.max(0, otherCurrent - otherSold));
          next.sales_history = [
            {
              at: editingSaleAt || new Date().toISOString(),
              items: soldEntries
            },
            ...history.filter(entry => entry?.at !== editingSaleAt)
          ].slice(0, 20);
          setSweetsStock(next);
          await persistSweetsPayload({ ...SWEETS_STOCK_DEFAULT, ...next }, editingSaleAt ? 'Venta actualizada.' : 'Venta descontada del stock.');
          setSoldDraft(SWEETS_SOLD_DEFAULT);
          setEditingSaleAt('');
          setSoldOpen(false);
        } catch(e) {
          setSweetsMsg('No se pudo descontar la venta.');
        } finally {
          setSweetsSaving(false);
        }
      };

      const editSalesEntry = (entry) => {
        const nextDraft = { ...SWEETS_SOLD_DEFAULT };
        (entry?.items || []).forEach(item => {
          const key = String(item?.key || '').trim();
          const qty = item?.qty == null ? '' : String(item.qty);
          if(['damasco','durazno','ciruela','pera','alcayota','tomate_triturado','tomate_entero'].includes(key)) {
            nextDraft[key] = qty;
            return;
          }
          if(String(sweetsStock.otro_dulce_nombre || '').trim().toLowerCase() === key.toLowerCase()) {
            nextDraft.otro_dulce_stock = qty;
          }
        });
        setSoldDraft(nextDraft);
        setEditingSaleAt(entry?.at || '');
        setSoldOpen(true);
      };

      const deleteSalesEntry = async (entryAt) => {
        if(!entryAt) return;
        setSweetsSaving(true);
        setSweetsMsg('');
        try {
          const history = Array.isArray(sweetsStock.sales_history) ? sweetsStock.sales_history : [];
          const target = history.find(entry => entry?.at === entryAt);
          if(!target) return;

          const next = { ...sweetsStock };
          (target.items || []).forEach(item => {
            const key = String(item?.key || '').trim();
            const qty = pn(item?.qty);
            if(!(qty > 0) || !key) return;

            if(['damasco','durazno','ciruela','pera','alcayota','tomate_triturado','tomate_entero'].includes(key)) {
              next[key] = String((pn(next[key]) || 0) + qty);
              return;
            }
            if(String(next.otro_dulce_nombre || '').trim().toLowerCase() === key.toLowerCase()) {
              next.otro_dulce_stock = String((pn(next.otro_dulce_stock) || 0) + qty);
            }
          });

          next.sales_history = history.filter(entry => entry?.at !== entryAt);
          setSweetsStock(next);
          await persistSweetsPayload({ ...SWEETS_STOCK_DEFAULT, ...next }, 'Venta borrada y stock repuesto.');
          if(editingSaleAt === entryAt) {
            setEditingSaleAt('');
            setSoldDraft(SWEETS_SOLD_DEFAULT);
          }
        } catch(e) {
          setSweetsMsg('No se pudo borrar la venta.');
        } finally {
          setSweetsSaving(false);
        }
      };

      const deleteRecipe = async (id) => {
        try {
          const { error } = await supabase.from('user_recipes').delete().eq('id', id);
          if(error) throw error;
          setRows(prev => prev.filter(r => r.id !== id));
          if(editingId === id) resetForm();
        } catch(e) {
          setError(e.message || 'No se pudo borrar.');
        }
      };

      const classifyRecipe = (recipe) =>
        Array.isArray(recipe.ingredients) && recipe.ingredients.length > 0 ? 'receta' : 'ingrediente';

      const filtered = rows.filter(recipe => {
        const kind = classifyRecipe(recipe);
        const hay = `${recipe.recipe_name || ''} ${(recipe.notes || '')}`.toLowerCase();
        if(typeFilter !== 'all' && kind !== typeFilter) return false;
        if(search.trim() && !hay.includes(search.trim().toLowerCase())) return false;
        return true;
      });
      const salesHistory = Array.isArray(sweetsStock.sales_history) ? sweetsStock.sales_history : [];
      const now = new Date();
      const startOfToday = new Date(now); startOfToday.setHours(0,0,0,0);
      const startOfWeek = new Date(now); startOfWeek.setDate(now.getDate() - ((now.getDay() + 6) % 7)); startOfWeek.setHours(0,0,0,0);
      const sumSales = (entries) => entries.reduce((acc, entry) => {
        const items = Array.isArray(entry?.items) ? entry.items : [];
        acc.movements += 1;
        acc.units += items.reduce((a, item) => a + (pn(item?.qty) || 0), 0);
        return acc;
      }, { movements:0, units:0 });
      const todaySales = sumSales(salesHistory.filter(entry => {
        const at = entry?.at ? new Date(entry.at) : null;
        return at && !Number.isNaN(at.getTime()) && at >= startOfToday;
      }));
      const weekSales = sumSales(salesHistory.filter(entry => {
        const at = entry?.at ? new Date(entry.at) : null;
        return at && !Number.isNaN(at.getTime()) && at >= startOfWeek;
      }));
      const filteredSalesHistory = salesHistory.filter(entry => {
        const at = entry?.at ? new Date(entry.at) : null;
        if(!at || Number.isNaN(at.getTime())) return false;
        if(salesRange === 'today') return at >= startOfToday;
        if(salesRange === 'week') return at >= startOfWeek;
        return true;
      });
      const topSellerMap = filteredSalesHistory.reduce((acc, entry) => {
        (entry.items || []).forEach(item => {
          const key = String(item?.key || '').trim();
          if(!key) return;
          acc[key] = (acc[key] || 0) + (pn(item?.qty) || 0);
        });
        return acc;

    const StudyView = ({session}) => {
      const [rows, setRows] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState('');
      const [notice, setNotice] = useState('');
      const [expanded, setExpanded] = useState({});
      const [drafts, setDrafts] = useState({});
      const [savingMap, setSavingMap] = useState({});

      const setSaving = (subject, val) => setSavingMap(prev => ({ ...prev, [subject]: val }));

      const loadStudy = useCallback(async () => {
        setLoading(true);
        setError('');
        try {
          const { data: existing, error: fetchErr } = await supabase
            .from('study_plan')
            .select('id, subject, topics, updated_at')
            .order('subject', { ascending: true });
          if(fetchErr) throw fetchErr;

          const present = new Set((existing || []).map(r => r.subject));
          const missing = STUDY_SUBJECT_SEEDS.filter(s => !present.has(s.subject));
          if(missing.length) {
            const { error: insertErr } = await supabase
              .from('study_plan')
              .insert(missing.map(item => ({
                subject: item.subject,
                topics: item.topics,
                updated_at: new Date().toISOString()
              })));
            if(insertErr && !String(insertErr.message || '').toLowerCase().includes('duplicate')) throw insertErr;
          }

          const { data: refreshed, error: refetchErr } = await supabase
            .from('study_plan')
            .select('id, subject, topics, updated_at')
            .order('subject', { ascending: true });
          if(refetchErr) throw refetchErr;

          setRows(refreshed || []);
          setExpanded(prev => {
            const next = { ...prev };
            (refreshed || []).forEach(r => { if(next[r.subject] == null) next[r.subject] = true; });
            return next;
          });
        } catch(e) {
          setError(e.message || 'No se pudo cargar estudio.');
        } finally {
          setLoading(false);
        }
      }, []);

      useEffect(() => { loadStudy(); }, [loadStudy]);

      const saveSubjectTopics = async (row, nextTopics) => {
        setSaving(row.subject, true);
        setError('');
        try {
          const { data, error } = await supabase
            .from('study_plan')
            .update({ topics: nextTopics, updated_at: new Date().toISOString() })
            .eq('id', row.id)
            .select()
            .single();
          if(error) throw error;
          setRows(prev => prev.map(r => r.id === row.id ? data : r));
        } catch(e) {
          setError(e.message || 'No se pudo guardar el tema.');
        } finally {
          setSaving(row.subject, false);
        }
      };

      const toggleTopic = async (row, idx) => {
        const current = Array.isArray(row.topics) ? row.topics : [];
        const nextTopics = current.map((topic, i) => i === idx ? { ...topic, done: !topic.done } : topic);
        setRows(prev => prev.map(r => r.id === row.id ? { ...r, topics: nextTopics } : r));
        await saveSubjectTopics(row, nextTopics);
      };

      const addTopic = async (row) => {
        const draft = String(drafts[row.subject] || '').trim();
        if(!draft) return;
        const current = Array.isArray(row.topics) ? row.topics : [];
        const nextTopics = [...current, { name: draft, done: false }];
        setRows(prev => prev.map(r => r.id === row.id ? { ...r, topics: nextTopics } : r));
        setDrafts(prev => ({ ...prev, [row.subject]: '' }));
        await saveSubjectTopics(row, nextTopics);
      };

      const removeTopic = async (row, idx) => {
        const current = Array.isArray(row.topics) ? row.topics : [];
        const nextTopics = current.filter((_, i) => i !== idx);
        setRows(prev => prev.map(r => r.id === row.id ? { ...r, topics: nextTopics } : r));
        await saveSubjectTopics(row, nextTopics);
      };

      const sendTopicToTasks = async (row, topic) => {
        setError('');
        setNotice('');
        try {
          const payload = {
            title: `${row.subject}: ${topic.name}`,
            details: `Tema de estudio pendiente de ${row.subject}`,
            priority: 'normal',
            status: 'pending',
            category: 'estudio'
          };
          const { error } = await supabase.from('tasks').insert(payload);
          if(error) throw error;
          setNotice(`Tema enviado a TAREAS: ${topic.name}`);
          setTimeout(() => setNotice(''), 2500);
        } catch(e) {
          setError(e.message || 'No se pudo pasar el tema a tareas.');
        }
      };

      const totalSubjects = rows.length;
      const totalTopics = rows.reduce((acc, row) => acc + (Array.isArray(row.topics) ? row.topics.length : 0), 0);
      const completedTopics = rows.reduce((acc, row) => acc + (Array.isArray(row.topics) ? row.topics.filter(t => !!t.done).length : 0), 0);
      const pendingTopics = Math.max(0, totalTopics - completedTopics);
      const completionPct = totalTopics ? Math.round((completedTopics / totalTopics) * 100) : 0;

      return html`
        <div class="fade-up" style="display:flex;flex-direction:column;gap:12px;">
          <${Card}>
            <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px;">
              <div>
                <p style="margin:0;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#10B981;">Plan de estudio</p>
                <p style="margin:4px 0 0;font-size:12px;color:#64748b;">Materias UTN con temas y progreso. Todo queda guardado en study_plan.</p>
              </div>
              <button class="btn-icon" style="background:#162035;border:1px solid #1E2D45;" onClick=${loadStudy}>
                <${ISync} s=${16}/>
              </button>
            </div>
            ${notice && html`<div style="margin-bottom:10px;padding:8px 10px;border-radius:8px;background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.25);color:#86EFAC;font-size:12px;">${notice}</div>`}
            ${error && html`<div style="margin-bottom:10px;padding:8px 10px;border-radius:8px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);color:#FCA5A5;font-size:12px;">${error}</div>`}
            ${loading ? html`
              <p style="margin:0;color:#94A3B8;font-size:12px;">Cargando materias...</p>
            ` : html`
              <div style="display:flex;flex-direction:column;gap:10px;">
                <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;">
                  ${[
                    ['Materias', totalSubjects, '#10B981'],
                    ['Pendientes', pendingTopics, '#F59E0B'],
                    ['Hechos', completedTopics, '#6366F1'],
                    ['Avance', `${completionPct}%`, '#38BDF8']
                  ].map(([label, value, color]) => html`
                    <div style=${`background:rgba(15,23,41,0.75);border:1px solid ${color}33;border-radius:10px;padding:10px;text-align:center;`}>
                      <p style="margin:0 0 4px;font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:#64748b;">${label}</p>
                      <p style=${`margin:0;font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;color:${color};`}>${value}</p>
                    </div>
                  `)}
                </div>
                ${rows.map(row => {
                  const topics = Array.isArray(row.topics) ? row.topics : [];
                  const done = topics.filter(t => !!t.done).length;
                  const pct = topics.length ? Math.round((done / topics.length) * 100) : 0;
                  return html`
                    <div style="border-radius:12px;border:1px solid #1E2D45;background:rgba(15,23,41,0.7);overflow:hidden;">
                      <button onClick=${()=>setExpanded(prev => ({ ...prev, [row.subject]: !prev[row.subject] }))} style="width:100%;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 14px;background:transparent;border:none;color:#E2E8F0;cursor:pointer;">
                        <div style="flex:1;text-align:left;">
                          <div style="display:flex;justify-content:space-between;gap:8px;align-items:center;margin-bottom:6px;">
                            <p style="margin:0;font-size:14px;font-weight:700;color:#E2E8F0;">${row.subject}</p>
                            <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:${pct===100?'#10B981':pct>0?'#F59E0B':'#64748b'};">${done}/${topics.length} · ${pct}%</span>
                          </div>
                          <div style="height:7px;border-radius:999px;background:#0F1729;border:1px solid #1E2D45;overflow:hidden;">
                            <div style=${`height:100%;width:${pct}%;background:${pct===100?'#10B981':'linear-gradient(90deg,#10B981,#6366F1)'};transition:width 0.2s;`}></div>
                          </div>
                        </div>
                        <${IChevD} s=${18} c=${`chev ${expanded[row.subject]?'open':''}`}/>
                      </button>
                      ${expanded[row.subject] && html`
                        <div style="padding:0 14px 14px;display:flex;flex-direction:column;gap:8px;border-top:1px solid #1E2D45;">
                          <div style="padding-top:10px;display:flex;flex-direction:column;gap:6px;">
                            ${topics.length === 0 ? html`
                              <p style="margin:0;color:#64748b;font-size:12px;">Todavia no hay temas cargados.</p>
                            ` : topics.map((topic, idx) => html`
                              <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;background:rgba(8,13,26,0.5);padding:8px 10px;border-radius:8px;border:1px solid #1E2D45;">
                                <label style="display:flex;align-items:center;gap:10px;flex:1;cursor:pointer;">
                                  <input type="checkbox" checked=${!!topic.done} onChange=${()=>toggleTopic(row, idx)} />
                                  <span style=${`font-size:13px;color:${topic.done?'#64748b':'#E2E8F0'};text-decoration:${topic.done?'line-through':'none'};`}>${topic.name}</span>
                                </label>
                                <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;">
                                  ${!topic.done && html`
                                    <button onClick=${()=>sendTopicToTasks(row, topic)} style="padding:4px 8px;border-radius:6px;border:1px solid rgba(16,185,129,0.3);background:rgba(16,185,129,0.12);color:#86EFAC;font-size:10px;font-weight:700;font-family:'Barlow Condensed',sans-serif;cursor:pointer;letter-spacing:0.05em;">
                                      PASAR A TAREA
                                    </button>
                                  `}
                                  <button onClick=${()=>removeTopic(row, idx)} style="padding:4px 8px;border-radius:6px;border:1px solid rgba(239,68,68,0.3);background:rgba(239,68,68,0.12);color:#FCA5A5;font-size:10px;font-weight:700;font-family:'Barlow Condensed',sans-serif;cursor:pointer;letter-spacing:0.05em;">
                                    BORRAR
                                  </button>
                                </div>
                              </div>
                            `)}
                          </div>
                          <div style="display:flex;gap:8px;align-items:center;">
                            <input class="inp" style="flex:1;" value=${drafts[row.subject] || ''} onInput=${e=>setDrafts(prev => ({ ...prev, [row.subject]: e.target.value }))} placeholder="Agregar tema nuevo..." />
                            <button onClick=${()=>addTopic(row)} style="padding:8px 12px;border-radius:8px;border:none;background:#10B981;color:#041018;font-size:12px;font-weight:800;font-family:'Barlow Condensed',sans-serif;cursor:pointer;letter-spacing:0.05em;">
                              ${savingMap[row.subject] ? 'GUARDANDO...' : 'AGREGAR'}
                            </button>
                          </div>
                        </div>
                      `}
                    </div>
                  `;
                })}
              </div>
            `}
          <//>
        </div>
      `;
    };

    const BOOK_DEFAULT = {
      title: 'El Duelo',
      author: 'Gabriel Rolon',
      current_page: 122,
      total_pages: 450
    };
    const MEDS_STOCK_KEY = 'enzo_meds_stock_v1';
    const MEDS_STOCK_DEFAULT = {
      roaccutan: 10,
      minoxidil_finasteride: 5,
      last_taken_at: '',
      last_roaccutan_at: '',
      last_dinner_meds_at: '',
      last_dinner_logical_date: '',
      history: [],
      _updatedAt: ''
    };

    const BooksView = ({session}) => {
      const [book, setBook] = useState(BOOK_DEFAULT);
      const [notes, setNotes] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState('');
      const [notice, setNotice] = useState('');
      const [saving, setSaving] = useState(false);
      const [noteDraft, setNoteDraft] = useState('');
      const [chatDraft, setChatDraft] = useState('');
      const [chatLoading, setChatLoading] = useState(false);
      const [summaryLoading, setSummaryLoading] = useState(false);
      const [pomodoroActive, setPomodoroActive] = useState(false);
      const [pomodoroLeft, setPomodoroLeft] = useState(25 * 60);

      const loadBooks = useCallback(async () => {
        setLoading(true);
        setError('');
        try {
          const [{ data: invRow, error: invErr }, { data: noteRows, error: notesErr }] = await Promise.all([
            supabase.from('app_inventory').select('data').eq('key', 'reading_progress').maybeSingle(),
            supabase.from('book_notes').select('id, book_title, current_page, question, answer, kind, created_at').order('created_at', { ascending:false }).limit(20)
          ]);
          if(invErr) throw invErr;
          if(notesErr) throw notesErr;
          setBook({ ...BOOK_DEFAULT, ...(invRow?.data || {}) });
          setNotes(noteRows || []);
        } catch(e) {
          setError(e.message || 'No se pudo cargar Libros.');
        } finally {
          setLoading(false);
        }
      }, []);

      useEffect(() => {
        loadBooks();
        const onFocus = () => loadBooks();
        const onVisible = () => { if(document.visibilityState === 'visible') loadBooks(); };
        window.addEventListener('focus', onFocus);
        document.addEventListener('visibilitychange', onVisible);
        return () => {
          window.removeEventListener('focus', onFocus);
          document.removeEventListener('visibilitychange', onVisible);
        };
      }, [loadBooks]);

      useEffect(() => {
        if(!pomodoroActive) return;
        const id = setInterval(() => {
          setPomodoroLeft(prev => {
            if(prev <= 1) {
              clearInterval(id);
              setPomodoroActive(false);
              setNotice('Pomodoro de lectura terminado.');
              setTimeout(() => setNotice(''), 2500);
              return 0;
            }
            return prev - 1;
          });
        }, 1000);
        return () => clearInterval(id);
      }, [pomodoroActive]);

      const saveBook = async (nextBook) => {
        setSaving(true);
        setError('');
        try {
          const payload = {
            ...nextBook,
            current_page: Math.max(0, parseInt(nextBook.current_page || 0, 10) || 0),
            total_pages: Math.max(1, parseInt(nextBook.total_pages || 1, 10) || 1)
          };
          const { error } = await supabase
            .from('app_inventory')
            .upsert({
              key: 'reading_progress',
              data: payload,
              updated_at: new Date().toISOString()
            }, { onConflict: 'key' });
          if(error) throw error;
          setBook(payload);
          setNotice('Progreso de lectura guardado.');
          setTimeout(() => setNotice(''), 2500);
        } catch(e) {
          setError(e.message || 'No se pudo guardar el progreso del libro.');
        } finally {
          setSaving(false);
        }
      };

      const addBookNote = async () => {
        const text = String(noteDraft || '').trim();
        if(!text) return;
        setError('');
        try {
          const payload = {
            book_title: book.title || BOOK_DEFAULT.title,
            current_page: Math.max(1, parseInt(book.current_page || 1, 10) || 1),
            question: text,
            answer: '',
            kind: 'note'
          };
          const { data, error } = await supabase.from('book_notes').insert(payload).select().single();
          if(error) throw error;
          setNotes(prev => [data, ...prev]);
          setNoteDraft('');
          setNotice('Nota del libro guardada.');
          setTimeout(() => setNotice(''), 2500);
        } catch(e) {
          setError(e.message || 'No se pudo guardar la nota.');
        }
      };

      const passBookDraftToTask = async () => {
        const text = String(noteDraft || '').trim();
        if(!text) return;
        setError('');
        try {
          const snippet = text.length > 56 ? `${text.slice(0, 56)}...` : text;
          const payload = {
            user_id: session.user.id,
            title: `Lectura - ${book.title || BOOK_DEFAULT.title}: ${snippet || 'nota'}`,
            details: text,
            priority: 'normal',
            status: 'pending',
            category: 'estudio',
            due_at: null,
            auto_email_reminder: false
          };
          const { error } = await supabase.from('tasks').insert(payload);
          if(error) throw error;
          setNoteDraft('');
          setNotice('Borrador pasado a TAREAS.');
          setTimeout(() => setNotice(''), 2500);
        } catch(e) {
          setError(e.message || 'No se pudo pasar el borrador a TAREAS.');
        }
      };

      const deleteBookNote = async (id) => {
        setError('');
        try {
          const { error } = await supabase.from('book_notes').delete().eq('id', id);
          if(error) throw error;
          setNotes(prev => prev.filter(n => n.id !== id));
        } catch(e) {
          setError(e.message || 'No se pudo borrar la nota.');
        }
      };

      const passBookNoteToTask = async (note) => {
        setError('');
        try {
          const text = String(note.answer || note.question || '').trim();
          const snippet = text.length > 56 ? `${text.slice(0, 56)}...` : text;
          const payload = {
            user_id: session.user.id,
            title: `Lectura - ${book.title || BOOK_DEFAULT.title}: ${snippet || 'nota'}`,
            details: text || 'Nota del modulo LIBROS',
            priority: 'normal',
            status: 'pending',
            category: 'estudio',
            due_at: null,
            auto_email_reminder: false
          };
          const { error } = await supabase.from('tasks').insert(payload);
          if(error) throw error;
          setNotice('Nota pasada a TAREAS.');
          setTimeout(() => setNotice(''), 2500);
        } catch(e) {
          setError(e.message || 'No se pudo pasar la nota a TAREAS.');
        }
      };

      const exportBookNotes = () => {
        try {
          const payload = {
            app: 'enzo-training-books',
            exported_at: new Date().toISOString(),
            book,
            notes
          };
          const blob = new Blob([JSON.stringify(payload, null, 2)], { type:'application/json;charset=utf-8' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `libros-${String(book.title || 'sin-titulo').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '') || 'notas'}-${new Date().toISOString().slice(0,10)}.json`;
          document.body.appendChild(a);
          a.click();
          a.remove();
          setTimeout(() => URL.revokeObjectURL(url), 1000);
          setNotice('Notas del libro exportadas.');
          setTimeout(() => setNotice(''), 2500);
        } catch(e) {
          setError(e.message || 'No se pudieron exportar las notas del libro.');
        }
      };

      const askBookAi = async () => {
        const question = String(chatDraft || '').trim();
        if(!question) return;
        setChatLoading(true);
        setError('');
        try {
          const res = await fetch('/.netlify/functions/book-chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              title: book.title || BOOK_DEFAULT.title,
              author: book.author || BOOK_DEFAULT.author,
              current_page: Math.max(1, parseInt(book.current_page || 1, 10) || 1),
              question
            })
          });
          const data = await res.json().catch(() => ({}));
          if(!res.ok) throw new Error(data?.error || `HTTP ${res.status}`);

          const payload = {
            book_title: book.title || BOOK_DEFAULT.title,
            current_page: Math.max(1, parseInt(book.current_page || 1, 10) || 1),
            question,
            answer: data.reply || '',
            kind: 'qa'
          };
          const { data: saved, error } = await supabase.from('book_notes').insert(payload).select().single();
          if(error) throw error;
          setNotes(prev => [saved, ...prev]);
          setChatDraft('');
          setNotice('Respuesta guardada en LIBROS.');
          setTimeout(() => setNotice(''), 2500);
        } catch(e) {
          setError(e.message || 'No se pudo consultar a Gemini.');
        } finally {
          setChatLoading(false);
        }
      };

      const summarizeBookSafe = async () => {
        setSummaryLoading(true);
        setError('');
        try {
          const res = await fetch('/.netlify/functions/book-summary', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              title: book.title || BOOK_DEFAULT.title,
              author: book.author || BOOK_DEFAULT.author,
              current_page: Math.max(1, parseInt(book.current_page || 1, 10) || 1)
            })
          });
          const data = await res.json().catch(() => ({}));
          if(!res.ok) throw new Error(data?.error || `HTTP ${res.status}`);

          const payload = {
            book_title: book.title || BOOK_DEFAULT.title,
            current_page: Math.max(1, parseInt(book.current_page || 1, 10) || 1),
            question: 'Resumen seguro de lo leido',
            answer: data.reply || '',
            kind: 'summary'
          };
          const { data: saved, error } = await supabase.from('book_notes').insert(payload).select().single();
          if(error) throw error;
          setNotes(prev => [saved, ...prev]);
          setNotice('Resumen seguro guardado en LIBROS.');
          setTimeout(() => setNotice(''), 2500);
        } catch(e) {
          setError(e.message || 'No se pudo generar el resumen seguro.');
        } finally {
          setSummaryLoading(false);
        }
      };

      const pct = Math.max(0, Math.min(100, Math.round(((parseInt(book.current_page || 0,10) || 0) / Math.max(1, parseInt(book.total_pages || 1,10) || 1)) * 100)));
      const fmtPomodoro = `${String(Math.floor(pomodoroLeft / 60)).padStart(2,'0')}:${String(pomodoroLeft % 60).padStart(2,'0')}`;

      return html`
        <div class="fade-up" style="display:flex;flex-direction:column;gap:12px;">
          <${Card}>
            <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px;">
              <div>
                <p style="margin:0;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#38BDF8;">Lectura</p>
                <p style="margin:4px 0 0;font-size:12px;color:#64748b;">Progreso del libro actual, pomodoro y notas de lectura.</p>
              </div>
              <button class="btn-icon" style="background:#162035;border:1px solid #1E2D45;" onClick=${loadBooks}>
                <${ISync} s=${16}/>

                    <input class="inp" value=${book.total_pages || ''} onInput=${e=>setBook(prev => ({ ...prev, total_pages:e.target.value }))} placeholder="Paginas totales" />

                  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
                    <span style="font-size:11px;color:#94A3B8;">Progreso</span>

                  <div style="height:8px;border-radius:999px;background:#0F1729;border:1px solid #1E2D45;overflow:hidden;margin-bottom:10px;">
                    <div style=${`height:100%;width:${pct}%;background:linear-gradient(90deg,#38BDF8,#6366F1);transition:width 0.2s;`}></div>

                      ${summaryLoading ? 'RESUMIENDO...' : 'RESUMEN SEGURO'}

                    <p style="margin:0;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#F59E0B;">Pomodoro lectura</p>
                    <span style="font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:${pomodoroActive?'#F59E0B':'#E2E8F0'};">${fmtPomodoro}</span>

                  <div style="display:flex;gap:8px;flex-wrap:wrap;">
                    <button onClick=${()=>setPomodoroActive(v=>!v)} style="padding:8px 12px;border-radius:8px;border:none;background:${pomodoroActive?'#EF4444':'#F59E0B'};color:#041018;font-size:12px;font-weight:800;font-family:'Barlow Condensed',sans-serif;cursor:pointer;letter-spacing:0.05em;">

                    </button>

                <div style="padding:12px;border-radius:10px;background:rgba(15,23,41,0.75);border:1px solid #1E2D45;">
                  <p style="margin:0 0 8px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#10B981;">Notas del libro</p>
                  <textarea value=${noteDraft} onInput=${e=>setNoteDraft(e.target.value)} placeholder="Escribi una nota, idea o pregunta sobre lo que leiste hasta la pagina actual..." style="width:100%;background:#0F1729;border:1px solid #1E2D45;border-radius:8px;padding:10px;font-size:13px;color:#cbd5e1;font-family:'Barlow',sans-serif;resize:vertical;min-height:76px;"></textarea>
                  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;">

                      GUARDAR NOTA
                    </button>
                    <button onClick=${passBookDraftToTask} style="padding:8px 12px;border-radius:8px;border:1px solid rgba(16,185,129,0.3);background:rgba(16,185,129,0.12);color:#86EFAC;font-size:12px;font-weight:800;font-family:'Barlow Condensed',sans-serif;cursor:pointer;letter-spacing:0.05em;">

                  <div style="display:flex;flex-direction:column;gap:8px;margin-top:10px;">
                    ${notes.length === 0 ? html`<p style="margin:0;color:#64748b;font-size:12px;">Todavia no hay notas guardadas.</p>` : notes.map(note => html`
                      <div style="padding:10px;border-radius:8px;background:rgba(8,13,26,0.5);border:1px solid #1E2D45;">

                              TAREA

                            <button onClick=${()=>deleteBookNote(note.id)} style="padding:4px 8px;border-radius:6px;border:1px solid rgba(239,68,68,0.3);background:rgba(239,68,68,0.12);color:#FCA5A5;font-size:10px;font-weight:700;font-family:'Barlow Condensed',sans-serif;cursor:pointer;letter-spacing:0.05em;">
                              BORRAR
