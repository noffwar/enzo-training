        if(error) { setStatus('error'); setMsg(error.message); }
        else       { setStatus('sent'); setMsg('✓ Revisá tu email — el link expira en 1 hora.'); }
      };

      return html`
        <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:#080D1A;">
          <div style="width:100%;max-width:360px;">
            <div style="text-align:center;margin-bottom:32px;">
              <p style="font-size:28px;font-family:'Barlow Condensed',sans-serif;font-weight:800;letter-spacing:0.1em;color:white;margin:0;">
                ENZO <span style="color:#10B981;">TRAINING</span>
              </p>
              <p style="color:#64748b;font-size:13px;margin:8px 0 0;">Ingresá con tu email para sincronizar entre dispositivos</p>
            </div>

            ${status === 'sent' ? html`
              <div style="background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);border-radius:12px;padding:20px;text-align:center;">
                <p style="font-size:32px;margin:0 0 8px;">📧</p>
                <p style="color:#10B981;font-size:14px;margin:0;">${msg}</p>
              </div>
            ` : html`
              <div style="display:flex;flex-direction:column;gap:12px;">
                <input
                  type="email"
                  placeholder="tu@email.com"
                  value=${email}
                  onInput=${e=>setEmail(e.target.value)}
                  onKeyDown=${e=>e.key==='Enter'&&handleLogin()}
                  style="width:100%;box-sizing:border-box;background:#0F1729;border:1px solid #2A3F5F;border-radius:10px;padding:14px 16px;font-size:16px;color:white;outline:none;"
                />
                <button onClick=${handleLogin} disabled=${status==='sending'}
                  style="width:100%;padding:14px;border-radius:10px;border:none;background:#10B981;color:white;font-size:14px;font-weight:700;font-family:'Barlow Condensed',sans-serif;letter-spacing:0.08em;cursor:pointer;opacity:${status==='sending'?'0.7':'1'};">
                  ${status==='sending' ? 'ENVIANDO...' : 'ENVIAR MAGIC LINK'}
                </button>
                ${status==='error' && html`<p style="color:#EF4444;font-size:12px;text-align:center;margin:0;">${msg}</p>`}
              </div>
            `}
          </div>
        </div>
      `;
    };

    // ═══════════════════════════════════════════════════
    //  DEBUG PANEL — oculto, activar con ?debug=1
    // ═══════════════════════════════════════════════════
    const DebugPanel = ({ session, syncLog, outboxCount }) => {
      const [open,    setOpen]    = useState(false);
      const [swDebug, setSwDebug] = useState(null);
      const conflictInfo = metaGet('last_conflict');

      // Consultar SW al abrir el panel
      useEffect(() => {
        if(!open || !('serviceWorker' in navigator)) return;
        const onMsg = (e) => {
          if(e.data?.type === 'SW_DEBUG_RESPONSE') setSwDebug(e.data);
        };
        navigator.serviceWorker.addEventListener('message', onMsg);
        navigator.serviceWorker.ready.then(reg => {
          if(reg.active) reg.active.postMessage({ type: 'SW_DEBUG_REQUEST' });
        }).catch(() => {});
        return () => navigator.serviceWorker.removeEventListener('message', onMsg);
      }, [open]);

      if(!open) return html`
        <button onClick=${()=>setOpen(true)}
          style="position:fixed;bottom:90px;left:8px;z-index:999;width:24px;height:24px;border-radius:50%;background:rgba(99,102,241,0.3);border:1px solid rgba(99,102,241,0.5);font-size:10px;cursor:pointer;color:#6366F1;padding:0;">
          🔧
        </button>`;

      const swCtrl = navigator.serviceWorker?.controller ? '✓ Controlando' : '⚠ No controla';
      const rows = [
        ['— Auth —',    ''],
        ['User',        session?.user?.email || '—'],
        ['UID',         (session?.user?.id || '—').slice(0,8)+'...'],
        ['— Sync —',    ''],
        ['Device',      DEVICE_ID],
        ['Online',      navigator.onLine ? '✓' : '✗'],
        ['Outbox',      outboxCount + ' items'],
        ['Last sync',   syncLog.lastSync  || 'nunca'],
        ['Last error',  syncLog.lastError || '—'],
        ['— SW —',      ''],
        ['SW API',      'serviceWorker' in navigator ? '✓' : '✗'],
        ['SW estado',   'serviceWorker' in navigator ? swCtrl : '—'],
        ['SW version',  swDebug?.cacheVersion || '—'],
        ['Auth en SW',  swDebug ? (swDebug.authValid ? '✓ válida' : '✗ sin token') : '—'],
        ['Auth expiry', swDebug?.authExpiry ? new Date(swDebug.authExpiry*1000).toLocaleTimeString('es-AR') : '—'],
        ['Alertas SW',  swDebug?.scheduledCount != null ? swDebug.scheduledCount+' programadas' : '—'],
        ['Notif perm',  typeof Notification!=='undefined' ? Notification.permission : 'N/A'],
        ['— Conflictos —', ''],
        ['Último conf.', conflictInfo ? `${conflictInfo.count||1} items — ${conflictInfo.at?.slice(0,10)||'?'}` : '—'],
        ['Conf. fechas', conflictInfo?.items ? conflictInfo.items.slice(0,3).join(', ') + (conflictInfo.items.length>3?'…':'') : '—'],
      ];

      return html`
        <div style="position:fixed;bottom:90px;left:8px;z-index:999;background:#0F1729;border:1px solid #2A3F5F;border-radius:10px;padding:12px;font-size:10px;font-family:'JetBrains Mono',monospace;color:#94a3b8;min-width:220px;max-width:280px;max-height:70vh;overflow-y:auto;">
          <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
            <span style="color:#6366F1;font-weight:700;">DEBUG</span>
            <div style="display:flex;gap:6px;">
              <button onClick=${()=>flushOutbox().catch(()=>{})}
                style="background:rgba(16,185,129,0.2);border:1px solid rgba(16,185,129,0.4);border-radius:4px;color:#10B981;font-size:9px;cursor:pointer;padding:2px 5px;">
                Retry sync
              </button>
              <button onClick=${()=>setOpen(false)} style="background:none;border:none;color:#64748b;cursor:pointer;font-size:12px;">✕</button>
            </div>
          </div>
          ${rows.map(([k,v])=> k.startsWith('—') ? html`
            <div style="padding:4px 0 2px;color:#6366F1;font-size:9px;text-transform:uppercase;letter-spacing:0.1em;">${k.replace(/—/g,'').trim()}</div>
          ` : html`
            <div style="display:flex;justify-content:space-between;gap:8px;padding:2px 0;border-bottom:1px solid #1E2D45;">
              <span style="color:#64748b;flex-shrink:0;">${k}</span>
              <span style="color:${v==='✗'||v.startsWith('✗')?'#EF4444':v==='✓'||v.startsWith('✓')?'#10B981':v.startsWith('⚠')?'#F59E0B':'white'};text-align:right;word-break:break-all;">${v}</span>
            </div>
          `)}
        </div>
      `;
    };

    // ═══════════════════════════════════════════════════
    //  APP PRINCIPAL
    // ═══════════════════════════════════════════════════
    const App = () => {
      // ── Auth state
      const [session,     setSession]     = useState(null);
      const [authLoading, setAuthLoading] = useState(true);
      const [outboxCount, setOutboxCount] = useState(0);
      const [syncLog,     setSyncLog]     = useState({ lastSync: null, lastError: null });
      const showDebug = new URLSearchParams(window.location.search).get('debug') === '1';

      // Listen for auth changes
      useEffect(()=>{
        supabase.auth.getSession().then(({ data }) => {
          setSession(data.session);
          setAuthLoading(false);
        });
        const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, sess) => {
          setSession(sess);
          setAuthLoading(false);
        });
        return () => subscription.unsubscribe();
      }, []);

      // Show login if not authenticated
      if(authLoading) return html`
        <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#080D1A;">
          <span class="spin" style="display:inline-block;width:28px;height:28px;border:3px solid rgba(16,185,129,0.3);border-top-color:#10B981;border-radius:50%;"></span>
        </div>`;
      if(!session) return html`<${LoginView}/>`;

      const handleLogout = () => supabase.auth.signOut();
      const [view, setView] = useState(()=>{
        // Leer ?view=X de la URL para que los shortcuts del manifest funcionen
        const p = new URLSearchParams(window.location.search).get('view');
        return (p && ['today','week','progress','tasks','recipes','notif','routines'].includes(p)) ? p : 'today';
      });
      const [chartsReady, setChartsReady] = useState(()=>!!window.Recharts);

      // Lazy load Recharts al abrir una tab con gráficos
      const navigateTo = (tab) => {
        setView(tab);
        if(!chartsReady && (tab === 'week' || tab === 'progress')) {
          window._loadRecharts && window._loadRecharts().then(()=>{
            window._RC = window.Recharts || {};
            setChartsReady(true);
          }).catch(()=>{});
        }
      };

      // Bug 12 fix: si la app arranca con ?view=week o ?view=progress, cargar Recharts al inicio
      useEffect(()=>{
        const initView = new URLSearchParams(window.location.search).get('view');
        if(initView === 'week' || initView === 'progress') {
          window._loadRecharts && window._loadRecharts().then(()=>{
            window._RC = window.Recharts || {};
            setChartsReady(true);
          }).catch(()=>{});
        }
      },[]);
      const [routineData, setRoutineData] = useState(()=>loadRoutines());
      const [currentWk, setCurrentWk] = useState(()=>getWeekKey(new Date()));
      const [activeDay, setActiveDay] = useState(()=>String(new Date().getDay()));
      const activeDayRef = useRef(activeDay);
      useEffect(()=>{ activeDayRef.current = activeDay; }, [activeDay]);
      const [allWeeks, setAllWeeks] = useState({});
      const [syncSaveStatus, setSyncSaveStatus] = useState('idle');
      const [hasUnsaved, setHasUnsaved] = useState(false);
      const [syncLoadStatus, setSyncLoadStatus] = useState('idle');
      const [syncLoadMsg,    setSyncLoadMsg]    = useState('');
      const [timerLeft, setTimerLeft] = useState(0);
      const [timerActive, setTimerActive] = useState(false);
      const timerRef = useRef(null);
      const prevTimerLeftRef = useRef(0);
      // Audio silencioso — necesario para que MediaSession funcione en background (Android)
      const audioRef = useRef(typeof Audio !== 'undefined'
        ? new Audio('data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAgD4AAAB9AAACABAAZGF0YQAAAAA=')
        : null
      );

      // ── Auto-sync al arrancar: usa bootstrapRemoteState (no selects directos)
      const fetchCloudData = useCallback(async () => {
        setSyncLoadStatus('loading');
        setSyncLoadMsg('');
        try {
          // BUG FIX: usar bootstrapRemoteState (RPC) en vez de selects directos prohibidos
          const bootstrapData = await bootstrapRemoteState();
          const { weeklyCache: wc, dailyCache: dc, routinesCache: rc } =
            applyBootstrapToState(bootstrapData, {}, {});

          setAllWeeks(buildAllWeeks(wc, dc));
          if(Object.keys(rc).length > 0) setRoutineData(prev => ({ ...prev, ...rc }));

          setSyncLoadStatus('ok');
          setSyncLog(prev => ({ ...prev, lastSync: new Date().toLocaleTimeString('es-AR') }));
        } catch(e) {
          console.warn('[AutoSync]', e.message);
          setSyncLoadStatus('idle');
          setSyncLog(prev => ({ ...prev, lastError: e.message.slice(0,60) }));
        }
        setTimeout(()=>{ setSyncLoadStatus('idle'); setSyncLoadMsg(''); }, 4000);
      }, []);

      // ── AUTO-SYNC AL INICIO (v3)
      useEffect(()=>{
        // 0. Migrar localStorage legacy (enzo_v2_ → enzo_v3_*) — idempotente
        migrateLegacyLocalStorage();

        // 1. Carga local instantánea — local-first, sin esperar red
        const { weeklyCache, dailyCache, routinesCache } = loadLocalCaches();
        const initWk = currentWk >= START_WEEK ? currentWk : START_WEEK;
        if(!weeklyCache[initWk]) weeklyCache[initWk] = { dayMapping: {}, bodyWeight: '' };

        const localAllWeeks = buildAllWeeks(weeklyCache, dailyCache);
        if(!localAllWeeks[initWk]) localAllWeeks[initWk] = newWeek();
        setAllWeeks(localAllWeeks);

        // Rutinas locales
        const localRoutines = Object.fromEntries(
          Object.entries(routinesCache).map(([id, d]) => [id, d])
        );
        if(Object.keys(localRoutines).length > 0) setRoutineData(prev => ({ ...prev, ...localRoutines }));

        // 2. Bootstrap remoto en background (solo si hay sesión)
        supabase.auth.getSession().then(async ({ data: { session } }) => {
          if(!session) return;

          // claim_legacy_rows: migra filas viejas de Supabase al nuevo esquema (idempotente)
          supabase.rpc('claim_legacy_rows').then(()=>{}).catch(()=>{});

          try {
            const bootstrapData = await bootstrapRemoteState();
            const { weeklyCache: wc2, dailyCache: dc2, routinesCache: rc2, conflicts } =
              applyBootstrapToState(bootstrapData, weeklyCache, dailyCache);

            setAllWeeks(buildAllWeeks(wc2, dc2));
            bootstrapAppliedRef.current = true; // suppress auto-persist for this setState

            if(Object.keys(rc2).length > 0) setRoutineData(prev => ({ ...prev, ...rc2 }));

            // Cargar notification_settings del bootstrap para este device
            const remoteNotifSettings = (bootstrapData.notification_settings||[]).find(n => n.device_id === DEVICE_ID);
            if(remoteNotifSettings?.data?.notifs) {
              const localNotifs = lsNotifLoad(DEVICE_ID);
              const localTs  = localNotifs?._updatedAt || null;
              const remoteTs = remoteNotifSettings.updated_at;
              // Remoto gana si es más nuevo o no hay local
              if(!localTs || (remoteTs && remoteTs > localTs)) {
                lsNotifSave(DEVICE_ID, remoteNotifSettings.data.notifs);
              }
            }

            if(conflicts.length > 0) {
              console.warn('[Bootstrap] Conflictos detectados:', conflicts.length);
              metaSet('last_conflict', { count: conflicts.length, items: conflicts.map(c=>c.date), at: new Date().toISOString() });
              setSyncLoadMsg(`⚠ ${conflicts.length} conflicto(s) — ver debug`);
              setSyncLoadStatus('error');
              setTimeout(()=>{ setSyncLoadStatus('idle'); setSyncLoadMsg(''); }, 6000);
            } else {
              setSyncLog(prev => ({ ...prev, lastSync: new Date().toLocaleTimeString('es-AR') }));
            }
          } catch(e) {
            console.warn('[Bootstrap] error:', e.message);
            metaSet('last_error', e.message?.slice(0,100));
            setSyncLog(prev => ({ ...prev, lastError: e.message?.slice(0,60) }));
          }
        });

        // 3. Flush outbox al arrancar y cuando vuelve la red
        flushOutbox().catch(()=>{});
        window.addEventListener('online', flushOutbox);

        // 6. Suscripción Realtime — actualiza automáticamente desde cualquier dispositivo
        const channel = supabase.channel('enzo-sync')
          .on('postgres_changes', { event: '*', schema: 'public', table: 'daily_logs' }, (payload) => {
            const row = payload.new;
            if(!row?.date || isBeforeStart(row.date) || row.last_device_id === DEVICE_ID) return;
            const dateObj = new Date(row.date + 'T12:00:00');
            const wkKey   = getWeekKey(dateObj);
            const dayIdx  = dateObj.getDay();
            setAllWeeks(prev => {
              // Conflict resolution: local gana si es más nuevo
              const localTs  = prev[wkKey]?.tracker?.[dayIdx]?._updatedAt;
              if(localTs && row.updated_at && localTs > row.updated_at) return prev;
              const next = { ...prev };
              if(!next[wkKey]) next[wkKey] = hydrate(newWeek());
              // BUG FIX: usar row.tracker/row.session (schema nuevo) en vez de row.data (schema viejo)
              const tracker = row.tracker || {};
              const sess    = row.session  || null;
              if(sess) next[wkKey] = { ...next[wkKey], sessions: { ...next[wkKey].sessions, [dayIdx]: sess } };
              next[wkKey] = { ...next[wkKey], tracker: { ...next[wkKey].tracker, [dayIdx]: { ...newDay(), ...tracker, meals: Array.isArray(tracker?.meals) ? tracker.meals : newDay().meals } } };
              // BUG FIX: lsDaySave (no lsSaveDay — función no existía)
              lsDaySave(row.date, { ...tracker, _session: sess, _revision: row.revision, _updatedAt: row.updated_at });
              return next;
            });
          })
          .on('postgres_changes', { event: '*', schema: 'public', table: 'weekly_configs' }, (payload) => {
            const row = payload.new;
            if(!row?.week_key || row.last_device_id === DEVICE_ID) return;
            if(isBeforeStart(row.week_key)) return;
            setAllWeeks(prev => {
              const next = { ...prev };
              const existing = prev[row.week_key] || newWeek();
              // BUG FIX: usar row.day_mapping/row.body_weight (schema nuevo)
              const bwStr = (row.body_weight !== undefined && row.body_weight !== null)
                ? String(row.body_weight).replace('.', ',') : existing.bodyWeight;
              const newWkData = {
                ...existing,
                dayMapping: row.day_mapping || existing.dayMapping,
                bodyWeight: bwStr,
                _revision:  row.revision,
                _updatedAt: row.updated_at,
              };
              next[row.week_key] = newWkData;
              lsWeekSave(row.week_key, newWkData);
              return next;
            });
          })
          .on('postgres_changes', { event: '*', schema: 'public', table: 'routines' }, (payload) => {
            const row = payload.new;
            if(!row?.routine_id || row.last_device_id === DEVICE_ID) return;
            // Routine updated from another device — apply to local state
            lsRoutineSave(row.routine_id, { ...row.data, _revision: row.revision, _updatedAt: row.updated_at });
            setRoutineData(prev => ({ ...prev, [row.routine_id]: { ...row.data, _revision: row.revision } }));
          })
          .subscribe();

        // 7. Mensajes del Service Worker
        const onSwMessage = (event) => {
          if(event.data?.type === 'MEDS_DONE') {
            const medId  = event.data.id;
            const medMap = { meds:'roacuttan', meds2:'magnesium' };
            const medKey = medMap[medId];
            if(medKey) {
              const todayWk  = getWeekKey(new Date());
              const todayIdx = String(new Date().getDay());
              const dateKey  = getDayDate(todayWk, parseInt(todayIdx));

              // Actualizar UI inmediatamente (optimista)
              setAllWeeks(prev => {
                const wk  = prev[todayWk] || newWeek();
                const tr  = { ...wk.tracker };
                const updatedDay = { ...tr[todayIdx], meds: { ...(tr[todayIdx]?.meds||{}), [medKey]: true } };
                tr[todayIdx] = updatedDay;
                lsDaySave(dateKey, { ...updatedDay, _updatedAt: new Date().toISOString() });
                return { ...prev, [todayWk]: { ...wk, tracker: tr } };
              });

              // BUG FIX: llamar patch_med_status via Supabase (no el stub persistEntry)
              supabase.rpc('patch_med_status', {
                p_date:      dateKey,
                p_med:       medKey,
                p_val:       true,
                p_device_id: DEVICE_ID
              }).then(({ data, error }) => {
                if(error) {
                  console.warn('[MEDS_DONE] patch_med_status falló, encolando:', error.message);
                  // Si falla por red, encolar en outbox
                  const wk = allWeeks[todayWk] || newWeek();
                  const dayData = wk.tracker?.[todayIdx];
                  if(dayData) {
                    enqueueOutboxOp({
                      entity_type: 'daily_log',
                      entity_id:   dateKey,
                      payload:     { tracker: { ...dayData, meds: { ...(dayData.meds||{}), [medKey]: true } }, session: null },
                      base_revision: dayData._revision || null
                    }).catch(()=>{});
                  }
                } else {
                  metaSet('last_sync', new Date().toISOString());
                }
              }).catch(()=>{});
            }
          }

          // Acción pendiente del SW cuando la app se reabre sin auth fresca
          if(event.data?.type === 'PENDING_MED_ACTION') {
            const { medId, date } = event.data;
            const medMap = { meds:'roacuttan', meds2:'magnesium' };
            const medKey = medMap[medId];
            if(medKey && date) {
              supabase.rpc('patch_med_status', {
                p_date: date, p_med: medKey, p_val: true, p_device_id: DEVICE_ID
              }).then(()=>{}).catch(()=>{});
            }
          }

          // SW avisa que hay red disponible → flush outbox
          if(event.data?.type === 'FLUSH_OUTBOX') {
            flushOutbox().catch(()=>{});
          }
        };
        if('serviceWorker' in navigator) navigator.serviceWorker.addEventListener('message', onSwMessage);

        // Manejar ?pending_med= en URL (app reabierta por el SW tras mark_done sin auth)
        const urlParams = new URLSearchParams(window.location.search);
        const pendingMedId   = urlParams.get('pending_med');
        const pendingMedDate = urlParams.get('pending_date');
        if(pendingMedId && pendingMedDate) {
          const medMap = { meds:'roacuttan', meds2:'magnesium' };
          const medKey = medMap[pendingMedId];
          if(medKey) {
            // Esperar a que haya sesión activa antes de persistir
            supabase.auth.getSession().then(({ data: { session: sess } }) => {
              if(!sess) return;
              supabase.rpc('patch_med_status', {
                p_date: pendingMedDate, p_med: medKey, p_val: true, p_device_id: DEVICE_ID
              }).then(() => {
                // Limpiar params de URL sin recargar
                const clean = window.location.pathname + (window.location.search.replace(/[?&]pending_med=[^&]*/g,'').replace(/[?&]pending_date=[^&]*/g,'').replace(/^&/,'?') || '');
                window.history.replaceState({}, '', clean);
              }).catch(()=>{});
            });
          }
        }

        // Polling de outbox para el debug panel
        const outboxInterval = setInterval(async () => {
          try {
            const db = await openOutboxDB();
            const keys = await db.getAllKeys('outbox');
            setOutboxCount(keys.length);
          } catch(e) {}
        }, 5000);

        return () => {
          window.removeEventListener('online', flushOutbox);
          supabase.removeChannel(channel);
          if('serviceWorker' in navigator) navigator.serviceWorker.removeEventListener('message', onSwMessage);
          clearInterval(outboxInterval);
        };
      }, []);

      // ── Auto-persist (v3): localStorage inmediato + Supabase vía RPC con debounce
      const saveTimerRef        = useRef(null);
      const prevTrackerRef      = useRef(null);
      const prevWeeklyRef       = useRef(null);
      // Guard: evitar writes remotos innecesarios cuando allWeeks viene de bootstrap
      const bootstrapAppliedRef = useRef(false);

      useEffect(()=>{
        if(Object.keys(allWeeks).length===0) return;

        // 1. localStorage — namespace v3 (siempre, independiente de la fuente)
        Object.entries(allWeeks).forEach(([wkKey, wkData]) => {
          if(!isDateKey(wkKey)) return;
          lsWeekSave(wkKey, { dayMapping: wkData.dayMapping, bodyWeight: wkData.bodyWeight||'' });
          Object.entries(wkData.tracker||{}).forEach(([dayIdx, dayData]) => {
            const dateKey    = getDayDate(wkKey, parseInt(dayIdx));
            const daySession = wkData.sessions?.[dayIdx] || null;
            lsDaySave(dateKey, { ...dayData, ...(daySession ? { _session: daySession } : {}) });
          });
        });

        // Si este setState vino de bootstrap, no disparar writes remotos
        if(bootstrapAppliedRef.current) {
          bootstrapAppliedRef.current = false;
          // Actualizar los refs para que el próximo cambio real se detecte correctamente
          const wkData = allWeeks[currentWk];
          if(wkData) {
            prevWeeklyRef.current  = JSON.stringify({ bw: wkData.bodyWeight, dm: wkData.dayMapping });
            prevTrackerRef.current = JSON.stringify(wkData.tracker?.[activeDayRef.current]);
          }
          return;
        }

        const wkData = allWeeks[currentWk];
        if(!wkData) return;
        const day = activeDayRef.current;

        // 2. Cambios semanales → saveWeeklyRemote
        const weeklyStr = JSON.stringify({ bw: wkData.bodyWeight, dm: wkData.dayMapping });
        if(weeklyStr !== prevWeeklyRef.current) {
          prevWeeklyRef.current = weeklyStr;
          clearTimeout(saveTimerRef.current);
          saveTimerRef.current = setTimeout(()=>{
            const wk = allWeeks[currentWk];
            if(!wk) return;
            saveWeeklyRemote(currentWk, wk.bodyWeight||null, wk.dayMapping||{}, wk._revision||null).catch(()=>{});
          }, 1500);
          return;
        }

        // 3. Cambios de tracker → saveDayRemote (sin session — esa va con GUARDAR)
        const trackerStr = JSON.stringify(wkData.tracker?.[day]);
        if(trackerStr === prevTrackerRef.current) return;
        prevTrackerRef.current = trackerStr;

        clearTimeout(saveTimerRef.current);
        saveTimerRef.current = setTimeout(()=>{
          const wk = allWeeks[currentWk];
          if(!wk) return;
          const d       = activeDayRef.current;
          const dayData = wk.tracker?.[d];
          if(!dayData) return;
          const dateKey = getDayDate(currentWk, parseInt(d));
          saveDayRemote(dateKey, dayData, null, dayData._revision||null).catch(()=>{});
        }, 1500);
      },[allWeeks]);


      // ── Timer con MediaSession (mantiene el timer visible en background / pantalla bloqueada)
      useEffect(()=>{
        clearInterval(timerRef.current);
        if(timerActive && timerLeft > 0) {
          // Solo usar audio secundario en la recta final para no pausar música externa.
          if(audioRef.current) {
            if(timerLeft <= 10) {
              audioRef.current.loop = true;
              audioRef.current.play().catch(()=>{});
            } else {
              audioRef.current.pause();
              audioRef.current.currentTime = 0;
            }
          }
          if(timerLeft <= 10 && prevTimerLeftRef.current !== timerLeft) {
            playTickBeep();
          }
          timerRef.current = setInterval(()=>{
            setTimerLeft(p => {
              const next = p - 1;
              // Actualizar MediaSession para mostrar el timer en la pantalla bloqueada
              if('mediaSession' in navigator) {
                try {
                  navigator.mediaSession.metadata = new MediaMetadata({
                    title: `Descanso: ${Math.floor(next/60)}:${String(next%60).padStart(2,'0')}`,
                    artist: 'Enzo Training',
                    album: 'Gym'
                  });
                } catch(e) {}
              }
              return next;
            });
          }, 1000);
        } else {
          // Detener audio silencioso
          if(audioRef.current) { audioRef.current.pause(); audioRef.current.currentTime = 0; }
          if(timerLeft === 0 && timerActive) { setTimerActive(false); playBeep(); }
        }
        prevTimerLeftRef.current = timerLeft;
        return () => clearInterval(timerRef.current);
      },[timerActive, timerLeft]);

      const upd = fn => { setHasUnsaved(true); setAllWeeks(prev=>{ const wk=prev[currentWk]||newWeek(); const next={...prev,[currentWk]:fn(wk)}; return next; }); };

      // ── Ensure session exists
      const ensureSession = useCallback((wkKey, dayKey)=>{
        setAllWeeks(prev=>{
          const wd=prev[wkKey]||newWeek();
          const rid=wd.dayMapping[dayKey];
          if(!rid||!routineData[rid]||wd.sessions[dayKey]) return prev;
          // idealReps: copia de reps objetivo para detectar superación de reps en sobrecarga progresiva
          const session=routineData[rid].exercises.map((ex,ei)=>({
            ...ex,
            id:`ex-${wkKey}-${dayKey}-${ei}`,
            sets:ex.sets.map((s,si)=>({
              ...s,
              id:`s-${wkKey}-${dayKey}-${ei}-${si}`,
              completed:false,
              idealReps: s.reps
            }))
          }));
          return {...prev,[wkKey]:{...wd,sessions:{...wd.sessions,[dayKey]:session}}};
        });
      },[routineData]);

      useEffect(()=>ensureSession(currentWk,activeDay),[currentWk,activeDay]);

      const wd = allWeeks[currentWk]||newWeek();
      const tracker    = wd.tracker[activeDay]||newDay();
      const gymSession = wd.sessions[activeDay]||[];
      const yesterdayFastMsg = getYesterdayFast(allWeeks, currentWk, activeDay);
      const routineId  = wd.dayMapping[activeDay];
      const routineInfo = routineId ? routineData[routineId] : null;

      const updateHabit = (f,v) => upd(w=>({...w,tracker:{...w.tracker,[activeDay]:{...w.tracker[activeDay],[f]:v}}}));
      const updateBodyWeight = (v) => { setHasUnsaved(true); setAllWeeks(prev=>({...prev,[currentWk]:{...(prev[currentWk]||newWeek()),bodyWeight:v}})); };
      const updateMed   = (med,v) => upd(w=>({...w,tracker:{...w.tracker,[activeDay]:{...w.tracker[activeDay],meds:{...w.tracker[activeDay].meds,[med]:v}}}}));
      const normalizeInventoryUnit = (unit='') => {
        const u = String(unit || '').trim().toLowerCase();
        if(!u) return '';
        if(['g','gramo','gramos'].includes(u)) return 'g';
        if(u === 'kg') return 'kg';
        if(['porcion','porciones'].includes(u)) return 'porcion';
        if(['unidad','unidades','u'].includes(u)) return 'unidad';
        return u;
      };
      // updateMeal: solo para firstBite/lastBite (los macros vienen de items)
      const updateMeal  = (i,f,v) => upd(w=>{const meals=[...w.tracker[activeDay].meals];meals[i]={...meals[i],[f]:v};return{...w,tracker:{...w.tracker,[activeDay]:{...w.tracker[activeDay],meals}}};});

      const addMealItem = (mealIndex, item) => upd(w => {
        const meals = [...w.tracker[activeDay].meals];
        meals[mealIndex] = { ...meals[mealIndex], items: [...(meals[mealIndex].items||[]), item] };
        return { ...w, tracker: { ...w.tracker, [activeDay]: { ...w.tracker[activeDay], meals } } };
      });

      const removeMealItem = (mealIndex, itemIndex, removedItem=null) => {
        upd(w => {
          const meals = [...w.tracker[activeDay].meals];
          meals[mealIndex] = { ...meals[mealIndex], items: (meals[mealIndex].items||[]).filter((_,i)=>i!==itemIndex) };
          return { ...w, tracker: { ...w.tracker, [activeDay]: { ...w.tracker[activeDay], meals } } };
        });

        if(!removedItem?.recipe_id) return;
        const stockUnit = normalizeInventoryUnit(removedItem.stock_unit || '');
        const deltaUnit = normalizeInventoryUnit(removedItem.stock_delta_unit || '');
        const delta = parseFloat(removedItem.stock_delta);
        if(!stockUnit || !deltaUnit || stockUnit !== deltaUnit || !(delta > 0)) return;

        supabase
          .from('user_recipes')
          .select('id, stock_qty')
          .eq('id', removedItem.recipe_id)
          .single()
          .then(({ data, error }) => {
            if(error || !data) throw error || new Error('No se pudo leer el stock.');
            const nextQty = (parseFloat(data.stock_qty) || 0) + delta;
            return supabase
              .from('user_recipes')
              .update({ stock_qty: nextQty, updated_at: new Date().toISOString() })
              .eq('id', removedItem.recipe_id);
          })
          .then(()=>{})
          .catch((e)=>console.warn('[STOCK_RESTORE]', e?.message || e));
      };

      const handleRoutineChange = v => {
        upd(w=>{
          const dm  = {...w.dayMapping};
          const ns  = {...w.sessions};

          // Si esta rutina estaba asignada a otro día, limpiarlo
          // Y borrar TAMBIÉN la sesión huérfana de ese día
          if(v) {
            Object.keys(dm).forEach(k=>{
              if(dm[k]===v && k!==activeDay) {
                dm[k]='';
                delete ns[k]; // Bug 4 fix: eliminar sesión huérfana
              }
            });
          }
          dm[activeDay] = v;
          delete ns[activeDay]; // limpiar sesión del día actual para regenerar
          return{...w, dayMapping:dm, sessions:ns};
        });
        if(v) setTimeout(()=>ensureSession(currentWk,activeDay),50);
      };

      const handleSetComplete = (ei,si,restSecs) => {
        upd(w=>{
          const s=[...(w.sessions[activeDay]||[])];
          const sets=[...s[ei].sets];
          const was=sets[si].completed;
          sets[si]={...sets[si],completed:!was};
          s[ei]={...s[ei],sets};
          if(!was){setTimerLeft(restSecs);setTimerActive(true);}
          return{...w,sessions:{...w.sessions,[activeDay]:s}};
        });
      };

      const handleInput = (ei,si,f,v) => {
        upd(w=>{const s=[...(w.sessions[activeDay]||[])];const sets=[...s[ei].sets];sets[si]={...sets[si],[f]:v};s[ei]={...s[ei],sets};return{...w,sessions:{...w.sessions,[activeDay]:s}};});
      };

      // Helper: detectar si un día tiene datos reales (no es un newDay vacío)
      const dayHasData = (dayData) => {
        if(!dayData) return false;
        if(dayData.fasted || dayData.walked || dayData.gymStartTime || dayData.mateOrCoffee) return true;
        if(dayData.sleepHours || dayData.water > 0) return true;
        if(dayData.steps || dayData.gymNotes) return true;
        if(Object.values(dayData.meds || {}).some(v => v)) return true;
        if((dayData.meals || []).some(m => (m.items || []).length > 0)) return true;
        return false;
      };

      // ── GUARDAR (v3): usa RPCs save_daily_log + save_weekly_config
      const handleSave = async () => {
        if(syncSaveStatus === 'saving') return;
        setSyncSaveStatus('saving');
        try {
          const wkData = allWeeks[currentWk] || newWeek();

          // 1. weekly_config: SOLO dayMapping + bodyWeight vía RPC
          const wkResult = await saveWeeklyRemote(
            currentWk,
            wkData.bodyWeight || null,
            wkData.dayMapping || {},
            wkData._revision || null
          );

          // 2. Solo los días con datos reales vía RPC save_daily_log
          const dayResults = await Promise.all(
            Object.entries(wkData.tracker)
              .filter(([idx, dayData]) => dayHasData(dayData) || wkData.sessions?.[idx])
              .map(([idx, dayData]) => {
                const dateKey    = getDayDate(currentWk, parseInt(idx));
                const daySession = wkData.sessions?.[idx] || null;
                return saveDayRemote(dateKey, dayData, daySession, dayData._revision || null);
              })
          );

          const allOk      = [wkResult, ...dayResults].every(r => r.ok || r.queued);
          const anyQueued  = [wkResult, ...dayResults].some(r => r.queued);
          const anyConflict = [wkResult, ...dayResults].some(r => r.conflict);
          const errors     = [wkResult, ...dayResults].filter(r => !r.ok && !r.queued && !r.conflict).map(r => r.error);

          if(anyConflict) {
            setSyncSaveStatus('error');
            setSyncLoadMsg('⚠ Conflicto — otro dispositivo tiene versión más nueva');
          } else if(allOk) {
            setSyncSaveStatus('ok');
            setHasUnsaved(false);
            if(anyQueued) setSyncLoadMsg('Sin red — en cola local');
            setSyncLog(prev => ({ ...prev, lastSync: new Date().toLocaleTimeString('es-AR') }));
          } else {
            setSyncSaveStatus('error');
            setSyncLoadMsg(errors[0] || 'Error al guardar');
            metaSet('last_error', errors[0]?.slice(0,100));
          }
        } catch(e) {
          console.error('[Save Error]', e);
          setSyncSaveStatus('error');
          setSyncLoadMsg(e.message || 'Error inesperado');
        }
        setTimeout(()=>{ setSyncSaveStatus('idle'); setSyncLoadMsg(''); }, 4000);
      };

      // ── CARGAR (v3): usa bootstrap RPC
      const handleLoad = async () => {
        if(syncLoadStatus === 'loading') return;
        setSyncLoadStatus('loading');
        setSyncLoadMsg('');
        try {
          const bootstrapData = await bootstrapRemoteState();
          const { weeklyCache: wc, dailyCache: dc, routinesCache: rc, conflicts } =
            applyBootstrapToState(bootstrapData, {}, {}); // fresh from server

          setAllWeeks(buildAllWeeks(wc, dc));
          if(Object.keys(rc).length > 0) setRoutineData(prev => ({ ...prev, ...rc }));

          const dayCount = (bootstrapData.daily_logs||[]).length;
          const msg = conflicts.length > 0
            ? `✓ ${dayCount} días (${conflicts.length} conflicto(s) — ver debug)`
            : `✓ ${dayCount} días sincronizados`;

          setSyncLoadMsg(msg);
          setSyncLoadStatus('ok');
          setSyncLog(prev => ({ ...prev, lastSync: new Date().toLocaleTimeString('es-AR') }));
          if(conflicts.length > 0) metaSet('last_conflict', { count: conflicts.length, items: conflicts.map(c=>c.date), at: new Date().toISOString() });
        } catch(e) {
          setSyncLoadStatus('error');
          setSyncLoadMsg('Fallo: ' + e.message);
          metaSet('last_error', e.message?.slice(0,100));
        }
        setTimeout(()=>{ setSyncLoadStatus('idle'); setSyncLoadMsg(''); }, 4000);
      };

      // Carga COMPLETA (todo el historial) — solo para la tab PROGRESO
      // Usa get_bootstrap_state sin filtro de fecha en vez de selects directos
      const loadFullHistory = useCallback(async () => {
        try {
          // Sin p_from → bootstrap trae todo el historial del usuario
          const { data, error } = await supabase.rpc('get_bootstrap_state');
          if(error) throw new Error(error.message);
          const bootstrapData = data || {};

          setAllWeeks(prev => {
            const next = { ...prev };

            // weekly_configs
            (bootstrapData.weekly_configs || []).forEach(row => {
              if(isBeforeStart(row.week_key)) return;
              const bwStr = (row.body_weight !== undefined && row.body_weight !== null)
                ? String(row.body_weight).replace('.', ',') : '';
              next[row.week_key] = hydrate({
                dayMapping: row.day_mapping || {},
                bodyWeight: bwStr,
                _revision:  row.revision,
                _updatedAt: row.updated_at,
              });
            });

            // daily_logs
            (bootstrapData.daily_logs || []).forEach(row => {
              if(isBeforeStart(row.date)) return;
              const dateObj = new Date(row.date + 'T12:00:00');
              const wkKey   = getWeekKey(dateObj);
              const dayIdx  = dateObj.getDay();
              if(!next[wkKey]) next[wkKey] = hydrate(newWeek());
              const tracker = row.tracker || {};
              const sess    = row.session  || null;
              if(sess) next[wkKey].sessions = { ...next[wkKey].sessions, [dayIdx]: sess };
              next[wkKey].tracker[dayIdx] = {
                ...newDay(), ...tracker,
                meals: Array.isArray(tracker?.meals) ? tracker.meals : newDay().meals
              };
            });

            return { ...next };
          });
          bootstrapAppliedRef.current = true; // suppress auto-persist writes after full history load
        } catch(e) { console.warn('[FullHistory]', e.message); }
      }, []);

      const navWeek = dir => {
        const nk = addWeeks(currentWk, dir);
        if(isBeforeStart(nk)) return; // no navegar antes del inicio oficial
        setCurrentWk(nk);
        setAllWeeks(prev=>prev[nk]?prev:{...prev,[nk]:newWeek()});
      };
      const isAtStart = currentWk <= START_WEEK;

      const handleSaveRoutines = async (updated) => {
        setRoutineData(updated);
        await saveRoutines(updated); // guarda en localStorage + Supabase
      };

      // A. Motor de sobrecarga progresiva: aplica +2,5kg a los pesos base de la rutina
      const handleApplyOverload = (candidates) => {
        const updated = JSON.parse(JSON.stringify(routineData)); // deep copy
        const routineId = wd.dayMapping[activeDay];
        if(!routineId || !updated[routineId]) return;

        candidates.forEach(({name}) => {
          const ex = updated[routineId].exercises.find(e => e.name === name);
          if(!ex) return;
          ex.sets = ex.sets.map(s => {
            const current = pn(s.weight); // pn() ya maneja "65,0" correctamente
            const newWeight = (current + 2.5).toFixed(1).replace('.', ',');
            return { ...s, weight: newWeight };
          });
        });

        setRoutineData(updated);
        saveRoutines(updated);
      };

      const saveColor = {idle:'#374151',saving:'#F59E0B',ok:'#10B981',error:'#EF4444'}[syncSaveStatus];
      const loadColor = {idle:'#374151',loading:'#F59E0B',ok:'#10B981',error:'#EF4444'}[syncLoadStatus];

      // ── Enviar auth context al SW cuando la sesión cambia
      useEffect(()=>{
        if(!('serviceWorker' in navigator)) return;
        const sendAuthCtx = async () => {
          const reg = await navigator.serviceWorker.ready.catch(()=>null);
          if(!reg?.active) return;
          if(session?.access_token) {
            reg.active.postMessage({
              type: 'SW_SET_AUTH_CONTEXT',
              access_token: session.access_token,
              user_id: session.user?.id?.slice(0,8),
              device_id: DEVICE_ID,
              expiry: session.expires_at
            });
          } else {
            reg.active.postMessage({ type: 'SW_CLEAR_AUTH_CONTEXT' });
          }
        };
        sendAuthCtx();
      }, [session]);

      return html`
        <div style="min-height:100vh;background:#080D1A;">

          <!-- DEBUG PANEL (solo con ?debug=1) -->
          <!-- BUG FIX: pasar session (auth) no gymSession -->
          ${showDebug && html`<${DebugPanel} session=${session} syncLog=${syncLog} outboxCount=${outboxCount}/>`}

          <!-- HEADER -->
          <header class="pt-safe" style="position:sticky;top:0;z-index:30;background:rgba(8,13,26,0.97);border-bottom:1px solid #1E2D45;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);">
            <div style="max-width:640px;margin:0 auto;padding:12px 16px;">

              <!-- Top row -->
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
                <div style="display:flex;align-items:center;gap:8px;">
                  <h1 style="margin:0;font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;letter-spacing:0.08em;color:white;">
                    ENZO <span style="color:#10B981;">TRAINING</span>
                  </h1>
                  <!-- Logout button -->
                  <button onClick=${handleLogout} title="Cerrar sesión"
                    style="background:none;border:none;cursor:pointer;color:#374151;font-size:11px;padding:2px 6px;border-radius:4px;line-height:1;">
                    ⏏
                  </button>
                </div>
                <!-- Botones de sync -->
                <div style="display:flex;gap:6px;">

                  <!-- CARGAR -->
                  <button onClick=${handleLoad} disabled=${syncLoadStatus==='loading'}
                    title="Cargar datos desde Supabase"
                    style=${`display:flex;align-items:center;gap:5px;padding:7px 11px;border-radius:8px;border:1px solid ${syncLoadStatus==='ok'?'#10B981':syncLoadStatus==='error'?'#EF4444':'#1E2D45'};background:rgba(22,32,53,0.9);cursor:pointer;transition:all 0.2s;opacity:${syncLoadStatus==='loading'?'0.7':'1'};`}>
                    <div style="width:7px;height:7px;border-radius:50%;flex-shrink:0;background:${loadColor};"></div>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="${syncLoadStatus==='loading'?'#F59E0B':'#94a3b8'}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class=${syncLoadStatus==='loading'?'spin':''}>
                      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                      <polyline points="7 10 12 15 17 10"/>
                      <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    <span style="font-size:11px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:0.05em;color:${syncLoadStatus==='loading'?'#F59E0B':syncLoadStatus==='ok'?'#10B981':syncLoadStatus==='error'?'#EF4444':'#94a3b8'};">
                      ${syncLoadStatus==='loading'?'CARGANDO...':syncLoadStatus==='ok'?'LISTO ✓':syncLoadStatus==='error'?'ERROR':'CARGAR'}
                    </span>
                  </button>

                  <!-- GUARDAR -->
                  <button onClick=${handleSave} disabled=${syncSaveStatus==='saving'}
                    title="Guardar datos en Supabase"
                    style=${`display:flex;align-items:center;gap:5px;padding:7px 11px;border-radius:8px;border:1px solid ${syncSaveStatus==='error'?'#EF4444':hasUnsaved?'rgba(245,158,11,0.5)':'rgba(16,185,129,0.3)'};background:${syncSaveStatus==='saving'?'rgba(22,32,53,0.9)':hasUnsaved?'rgba(245,158,11,0.1)':'rgba(16,185,129,0.12)'};cursor:pointer;transition:all 0.2s;opacity:${syncSaveStatus==='saving'?'0.7':'1'};`}>
                    <div style="width:7px;height:7px;border-radius:50%;flex-shrink:0;background:${hasUnsaved&&syncSaveStatus==='idle'?'#F59E0B':saveColor};${hasUnsaved&&syncSaveStatus==='idle'?'animation:pulse 1.2s ease-in-out infinite;':''}"></div>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="${syncSaveStatus==='saving'?'#F59E0B':hasUnsaved?'#F59E0B':'#10B981'}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class=${syncSaveStatus==='saving'?'spin':''}>
                      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                      <polyline points="17 8 12 3 7 8"/>
                      <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                    <span style="font-size:11px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:0.05em;color:${syncSaveStatus==='saving'?'#F59E0B':syncSaveStatus==='ok'?'#10B981':syncSaveStatus==='error'?'#EF4444':hasUnsaved?'#F59E0B':'#10B981'};">
                      ${syncSaveStatus==='saving'?'GUARDANDO...':syncSaveStatus==='ok'?'GUARDADO ✓':syncSaveStatus==='error'?'ERROR':hasUnsaved?'GUARDAR *':'GUARDAR'}
                    </span>
                  </button>

                </div>
              </div>

              <!-- Mensaje de error visible -->
              ${syncLoadMsg && html`
                <div style="margin-bottom:8px;padding:6px 10px;border-radius:6px;font-size:11px;font-family:'JetBrains Mono',monospace;
                  background:${syncLoadStatus==='error'?'rgba(239,68,68,0.1)':'rgba(16,185,129,0.1)'};
                  border:1px solid ${syncLoadStatus==='error'?'rgba(239,68,68,0.3)':'rgba(16,185,129,0.3)'};
                  color:${syncLoadStatus==='error'?'#EF4444':'#10B981'};">
                  ${syncLoadStatus==='error'?'❌':'✓'} ${syncLoadMsg}
                </div>
              `}

              <!-- Week nav -->
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
                <button class="btn-icon" style=${`background:#162035;border:1px solid #1E2D45;opacity:${isAtStart?'0.3':'1'};`} onClick=${()=>navWeek(-1)} disabled=${isAtStart}>
                  <${IChevL} s=${16}/>
                </button>
                <div style="flex:1;text-align:center;">
                  <p style="margin:0;font-size:13px;font-weight:600;color:white;">${formatWeekLabel(currentWk)}</p>
                  ${isCurrentWeek(currentWk) && html`<span style="font-size:10px;font-family:'JetBrains Mono',monospace;color:#10B981;">● SEMANA ACTUAL</span>`}
                </div>
                <button class="btn-icon" style="background:#162035;border:1px solid #1E2D45;" onClick=${()=>navWeek(1)} disabled=${isCurrentWeek(currentWk)}>
                  <${IChevR} s=${16}/>
                </button>
              </div>

              <!-- Day tabs -->
              <div class="hide-scroll" style="display:flex;gap:4px;overflow-x:auto;">
                ${DAYS.map(day=>{
                  const active=activeDay===day.key;
                  const hasR=wd.dayMapping[day.key]!=='';
                  const sess=wd.sessions[day.key]||[];
                  const done=sess.reduce((a,ex)=>a+ex.sets.filter(s=>s.completed).length,0);
                  const total=sess.reduce((a,ex)=>a+ex.sets.length,0);
                  return html`
                    <button key=${day.key} onClick=${()=>{setActiveDay(day.key);setView('today');}}
                      style=${`flex:1;min-width:38px;padding:8px 4px;border-radius:10px;border:1px solid ${active?'#10B981':'#1E2D45'};background:${active?'#10B981':'#162035'};cursor:pointer;position:relative;${active?'box-shadow:0 0 12px rgba(16,185,129,0.3);':''}`}>
                      <p style=${`margin:0;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:${active?'white':'#64748b'};`}>${day.abbr}</p>
                      <p style=${`margin:0;font-size:9px;color:${active?'rgba(255,255,255,0.75)':'#374151'};`}>${day.label}</p>
                      ${hasR && !active && html`<div style="position:absolute;top:4px;right:4px;width:5px;height:5px;border-radius:50%;background:#6366F1;"></div>`}
                      ${done>0 && html`<div style="position:absolute;bottom:3px;right:3px;font-size:8px;font-family:'JetBrains Mono',monospace;color:#10B981;">${done}/${total}</div>`}
                    </button>
                  `;
                })}
              </div>

            </div>
          </header>

          <!-- CONTENIDO -->
          <main style="max-width:640px;margin:0 auto;padding:16px 16px calc(88px + env(safe-area-inset-bottom, 12px));">

            ${view==='today' && html`
              <div style="display:flex;flex-direction:column;gap:12px;">
                <!-- Day header -->
                <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;">
                  <div>
                    <h2 style="margin:0;font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:800;letter-spacing:0.04em;color:white;">
                      ${routineInfo?.fullName||`DÍA ${activeDay}: Descanso`}
                    </h2>
                    ${routineInfo?.description && html`<p style="margin:2px 0 0;font-size:13px;color:#6366F1;">${routineInfo.description}</p>`}
                  </div>
                  <select class="inp" style="min-width:110px;font-size:12px;padding:8px 10px;" value=${routineId||''} onChange=${e=>handleRoutineChange(e.target.value)}>
                    <option value="">Descanso</option>
                    ${Object.values(routineData).map(r=>html`<option value=${r.id}>${r.name}</option>`)}
                  </select>
                </div>

                <${TodayDashboard} session=${session} onOpenTasks=${()=>navigateTo('tasks')}/>

                <${HabitsPanel} tracker=${tracker} yesterdayFastMsg=${yesterdayFastMsg} onChange=${updateHabit} onMed=${updateMed} onMeal=${updateMeal} onAddItem=${addMealItem} onRemoveItem=${removeMealItem}/>

                <!-- Peso corporal semanal -->
                <div class="glass-card" style="padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:12px;">
                  <div>
                    <p style="margin:0;font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:#64748b;">⚖️ Peso corporal (semana)</p>
                    <p style="margin:2px 0 0;font-size:10px;color:#374151;">Solo se registra una vez por semana</p>
                  </div>
                  <div style="display:flex;align-items:center;gap:6px;">
                    <input type="number" step="0.1" placeholder="kg"
                      value=${wd.bodyWeight||''}
                      onInput=${e=>updateBodyWeight(e.target.value)}
                      style="width:72px;background:#0F1729;border:1px solid #2A3F5F;border-radius:8px;padding:7px 10px;font-size:14px;font-weight:700;font-family:'JetBrains Mono',monospace;color:white;text-align:center;"/>
                    ${wd.bodyWeight && html`<span style="font-size:13px;color:#10B981;font-weight:700;">kg</span>`}
                  </div>
                </div>

                <!-- Water + Macros elásticos del día + Asistente nutricional -->
                <div class="glass-card" style="padding:10px 12px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;text-align:center;">
                  ${[
                    {label:'Prot restante', val:Math.max(0,Math.round(TARGETS.prot - dayTotals(tracker.meals||[]).prot))+'g', color:'#10B981'},
                    {label:'Carbos disp.',  val:Math.max(0,Math.round((TARGETS.kcal - TARGETS.prot*4 - dayTotals(tracker.meals||[]).fat*9)/4 - dayTotals(tracker.meals||[]).carb))+'g', color:'#6366F1'},
                    {label:'Kcal objetivo', val:fn(TARGETS.kcal), color:'#F59E0B'},
                  ].map(({label,val,color})=>html`
                    <div>
                      <p style="margin:0;font-size:9px;text-transform:uppercase;color:#64748b;">${label}</p>
                      <p style="margin:0;font-size:16px;font-weight:700;font-family:'JetBrains Mono',monospace;color:${color};">${val}</p>
                    </div>
                  `)}
                </div>
                <${WaterTracker}
                  val=${tracker.water||0}
                  onChange=${v=>updateHabit('water',v)}
                  roacuttan=${tracker.meds?.roacuttan||false}/>
                <${SmartCena} currentProt=${dayTotals(tracker.meals||[]).prot}/>

                <${GymPanel} session=${gymSession} tracker=${tracker} onSetComplete=${handleSetComplete} onInput=${handleInput} onHabit=${updateHabit} onApplyOverload=${handleApplyOverload}/>

                ${gymSession.length===0 && !routineId && html`
                  <${Card}>
                    <div style="text-align:center;padding:24px 0;">
                      <p style="font-size:36px;margin:0 0 8px;">🛌</p>
                      <p style="font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;color:#cbd5e1;margin:0;">Día de Descanso</p>
                      <p style="font-size:13px;color:#64748b;margin:4px 0 0;">Recuperá y registrá tus hábitos arriba.</p>
                    </div>
                  <//>
                `}
              </div>
            `}

            ${view==='week'     && html`<${WeekSummary} weekData=${wd}/>`}
            ${view==='progress' && html`<${ProgressView} allWeeks=${allWeeks} onMount=${loadFullHistory}/>`}
            ${view==='tasks'    && html`<${ProductivityView} session=${session}/>`}
            ${view==='recipes'  && html`<${RecipesView} session=${session}/>`}
            ${view==='study'    && html`<${StudyView} session=${session}/>`}
            ${view==='health'   && html`<${HealthView} session=${session}/>`}
            ${view==='books'    && html`<${BooksView} session=${session}/>`}
            ${view==='notif'    && html`<${NotifView}/>`}
            ${view==='routines' && html`<${RoutineEditor} routines=${routineData} onSave=${handleSaveRoutines}/>`}

          </main>

          <!-- TIMER -->
          <${FloatingTimer} left=${timerLeft} active=${timerActive}
            onToggle=${()=>setTimerActive(!timerActive)}
            onReset=${()=>{setTimerActive(false);setTimerLeft(0);}}/>

          <!-- BOTTOM NAV -->
          <nav class="bottom-nav" style="position:fixed;bottom:0;left:0;right:0;z-index:30;">
            <div style="max-width:640px;margin:0 auto;display:flex;">
              ${[
                {id:'today',    icon:html`<${IHome} s=${20}/>`, label:'HOY'},
                {id:'week',     icon:html`<${ICal}  s=${20}/>`, label:'SEMANA'},
                {id:'progress', icon:html`<${IBar}  s=${20}/>`, label:'PROGRESO'},
                {id:'tasks',    icon:html`<${IList} s=${20}/>`, label:'TAREAS'},
                {id:'study',    icon:html`<${ITarget} s=${20}/>`, label:'ESTUDIO'},
                {id:'health',   icon:html`<${IBell} s=${20}/>`, label:'SALUD'},
                {id:'books',    icon:html`<${IBook} s=${20}/>`, label:'LIBROS'},
                {id:'recipes',  icon:html`<${IActivity} s=${20}/>`, label:'RECETAS'},
                {id:'notif',    icon:html`<${IBell} s=${20}/>`, label:'ALERTAS'},
                {id:'routines', icon:html`<${IEdit} s=${20}/>`, label:'RUTINAS'},
              ].map(tab => html`
                <button key=${tab.id} onClick=${()=>navigateTo(tab.id)}
                  style=${`flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0 7px;gap:2px;border:none;background:transparent;cursor:pointer;color:${view===tab.id?'#10B981':'#374151'};`}>
                  ${tab.icon}
                  <span style="font-size:8px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:0.1em;">${tab.label}</span>
                  ${view===tab.id && html`<div style="width:14px;height:2px;border-radius:1px;background:#10B981;"></div>`}
                </button>
              `)}
            </div>
          </nav>

        </div>
      `;
    };

    // ── Mount
    render(html`<${App}/>`, document.getElementById('app'));

    // ── Ocultar splash
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      const el = document.getElementById('splash');
      if(el){ el.style.opacity='0'; setTimeout(()=>el.style.display='none', 300); }
    }));

  </script>

  <script>
    // Service Worker — sólo en producción HTTPS
    if('serviceWorker' in navigator) {
      const h = window.location.hostname;
      const isPreview = h.includes('claudeusercontent') || h==='localhost' || h==='127.0.0.1';
      if(!isPreview) {
        window.addEventListener('load', ()=>{
          navigator.serviceWorker.register('./sw.js')
            .then(r=>console.log('[PWA] SW registrado:',r.scope))
            .catch(e=>console.warn('[PWA] SW:',e.message));
        });
      }
    }
  </script>

</body>
</html>
