  <!-- Recharts (UMD) - carga diferida: solo cuando se necesitan los graficos -->
  <script>
    window._rechartsLoaded = false;
    window._loadRecharts = function() {
      if(window._rechartsLoaded) return Promise.resolve();
      return new Promise(function(res, rej) {
        var s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/recharts@2.12.7/umd/Recharts.js';
        s.crossOrigin = 'anonymous';
        s.onload = function() {
          window._rechartsLoaded = true;
          window._RC = window.Recharts || {};
          res();
        };
        s.onerror = function(e) {
          document.head.removeChild(s);
          rej(e);
        };
        document.head.appendChild(s);
      });
    };

    // html2canvas - carga diferida: solo al presionar exportar
    window._loadHtml2Canvas = function() {
      if(window.html2canvas) return Promise.resolve();
      return new Promise(function(res, rej) {
        var s = document.createElement('script');
        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
        s.onload = res;
        s.onerror = function(e) { document.head.removeChild(s); rej(e); };
        document.head.appendChild(s);
      });
    };
  </script>
  <!-- idb helper: wrapper minimo nativo para la cola de Background Sync -->
  <script>
    window.idb = {
      openDB: function(name, version, callbacks) {
        return new Promise(function(res, rej) {
          var req = indexedDB.open(name, version);
          req.onupgradeneeded = function(e) {
            if(callbacks && callbacks.upgrade) callbacks.upgrade(e.target.result);
          };
          req.onsuccess = function(e) {
            var db = e.target.result;

            db.add = function(store, val) {
              return new Promise(function(r, j) {
                var tx = db.transaction(store, 'readwrite');
                var req2 = tx.objectStore(store).add(val);
                req2.onsuccess = function() { r(req2.result); };
                req2.onerror   = function() { j(req2.error); };
              });
            };

            db.put = function(store, val) {
              return new Promise(function(r, j) {
                var tx = db.transaction(store, 'readwrite');
                var req2 = tx.objectStore(store).put(val);
                req2.onsuccess = function() { r(req2.result); };
                req2.onerror   = function() { j(req2.error); };
              });
            };

            db.getAll = function(store) {
              return new Promise(function(r, j) {
                var tx = db.transaction(store, 'readonly');
                var req2 = tx.objectStore(store).getAll();
                req2.onsuccess = function() { r(req2.result || []); };
                req2.onerror   = function() { j(req2.error); };
              });
            };

            db.get = function(store, key) {
              return new Promise(function(r, j) {
                var tx = db.transaction(store, 'readonly');
                var req2 = tx.objectStore(store).get(key);
                req2.onsuccess = function() { r(req2.result); };
                req2.onerror   = function() { j(req2.error); };
              });
            };

            db.getAllKeys = function(store) {
              return new Promise(function(r, j) {
                var tx = db.transaction(store, 'readonly');
                var req2 = tx.objectStore(store).getAllKeys();
                req2.onsuccess = function() { r(req2.result || []); };
                req2.onerror   = function() { j(req2.error); };
              });
            };

            db.delete = function(store, key) {
              return new Promise(function(r, j) {
                var tx = db.transaction(store, 'readwrite');
                var req2 = tx.objectStore(store).delete(key);
                req2.onsuccess = function() { r(); };
                req2.onerror   = function() { j(req2.error); };
              });
            };

            res(db);
          };
          req.onerror = function(e) { rej(e.target.error); };
        });
      }
    };
  </script>

  <script>
    window.onerror = function(msg, src, line, col, err) {
      document.getElementById('splash').style.display = 'none';

      document.getElementById('error-msg').textContent = (err ? err.stack : msg) + '\n\nFuente: ' + src + ':' + line;
      return true;

    window.onunhandledrejection = function(e) {
      var r = e.reason;
      window.onerror(r && r.message || String(r), 'promise', 0, 0, r instanceof Error ? r : null);
    };
  </script>

    const fn = v => { if(!v && v!==0) return "0"; const n=Number(v); return n.toLocaleString('es-AR',{maximumFractionDigits:1}); };
    const ft = s => { const m=Math.floor(s/60),sec=s%60; return `${m}:${sec<10?'0':''}${sec}`; };

    const getWeekStart = d => { const dt=new Date(d); const day=dt.getDay(); dt.setDate(dt.getDate()+(day===0?-6:1-day)); dt.setHours(0,0,0,0); return dt; };
    const _wkCache = new Map();
    const getWeekKey = d => {
      const key = d instanceof Date ? d.toDateString() : String(d);
      if(_wkCache.has(key)) return _wkCache.get(key);
      const result = getWeekStart(d).toISOString().split('T')[0];
      _wkCache.set(key, result);
      return result;
    };
    const addWeeks = (wk,n) => { const d=new Date(wk+'T00:00:00'); d.setDate(d.getDate()+n*7); return d.toISOString().split('T')[0]; };
    const isCurrentWeek = wk => getWeekKey(new Date())===wk;

    // Fecha de inicio oficial de la app â€” no mostrar datos anteriores
    const START_DATE = '2026-03-16';
    const START_WEEK = getWeekKey(new Date(START_DATE + 'T12:00:00')); // lunes de esa semana
    const isBeforeStart = wk => wk < START_WEEK;
    const formatWeekLabel = wk => {
      const d=new Date(wk+'T00:00:00'); const e=new Date(d); e.setDate(d.getDate()+6);
      const M=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
      return d.getMonth()===e.getMonth()?`${d.getDate()}â€“${e.getDate()} ${M[d.getMonth()]} ${d.getFullYear()}`:`${d.getDate()} ${M[d.getMonth()]}â€“${e.getDate()} ${M[e.getMonth()]}`;
    };

    // â”€â”€â”€ v3 NAMESPACES â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    const V3 = {
      WEEK:  'enzo_v3_week:',
      DAY:   'enzo_v3_day:',
      ROUT:  'enzo_v3_routine:',
      NOTIF: 'enzo_v3_notif:',
      META:  'enzo_v3_meta:',
      OLD:   'enzo_v2_',          // legado â€” migrar una vez
    };

    const safeLocalSet = (key, value) => {
      try {
        localStorage.setItem(key, JSON.stringify(value));
        return true;
      } catch(_) {
        return false;
      }
    };
    const safeDispatch = (eventName, detail) => {
      try {
        window.dispatchEvent(new CustomEvent(eventName, { detail }));
        return true;
      } catch(_) {
        return false;
      }
    };

    // Meta helpers (device_id, last_sync, last_error, migration_done)
    const metaGet = (k)    => { try { return JSON.parse(localStorage.getItem(V3.META+k)); } catch(e) { return null; } };
    const metaSet = (k, v) => { safeLocalSet(V3.META+k, v); };

    // Device-ID estable por navegador
    const getDeviceId = () => {
      let id = metaGet('device_id');
      if(!id) { id = 'dev_' + Math.random().toString(36).slice(2,8) + '_' + Date.now().toString(36); metaSet('device_id', id); }
      return id;
    };
    const DEVICE_ID = getDeviceId();

    // â”€â”€â”€ localStorage por namespace â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    const lsWeekSave  = (wk, v)  => { safeLocalSet(V3.WEEK+wk, v); };
    const lsWeekLoad  = (wk)     => { try { const v=localStorage.getItem(V3.WEEK+wk); return v?JSON.parse(v):null; } catch(e) { return null; } };
    const lsAllWeekKeys = ()     => Object.keys(localStorage).filter(k=>k.startsWith(V3.WEEK)).map(k=>k.slice(V3.WEEK.length)).sort().reverse();

    const lsDaySave   = (d, v)   => { safeLocalSet(V3.DAY+d, v); };
    const lsDayLoad   = (d)      => { try { const v=localStorage.getItem(V3.DAY+d); return v?JSON.parse(v):null; } catch(e) { return null; } };
    const lsAllDayKeys = ()      => Object.keys(localStorage).filter(k=>k.startsWith(V3.DAY)).map(k=>k.slice(V3.DAY.length)).sort().reverse();

    const lsRoutineSave = (id,v) => { safeLocalSet(V3.ROUT+id, v); };
    const lsRoutineLoad = (id)   => { try { const v=localStorage.getItem(V3.ROUT+id); return v?JSON.parse(v):null; } catch(e) { return null; } };
    const lsAllRoutineKeys = ()  => Object.keys(localStorage).filter(k=>k.startsWith(V3.ROUT)).map(k=>k.slice(V3.ROUT.length));

    const lsNotifSave = (did,v)  => { safeLocalSet(V3.NOTIF+did, v); };
    const lsNotifLoad = (did)    => { try { const v=localStorage.getItem(V3.NOTIF+did); return v?JSON.parse(v):null; } catch(e) { return null; } };

    // â”€â”€â”€ MIGRACIÃ“N desde enzo_v2_ â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    const migrateLegacyLocalStorage = () => {
      if(metaGet('migration_v3_done')) return;
      const oldKeys = Object.keys(localStorage).filter(k=>k.startsWith(V3.OLD));
      if(oldKeys.length === 0) { metaSet('migration_v3_done', true); return; }

      let migrated = 0;
      oldKeys.forEach(fullKey => {
        const key = fullKey.slice(V3.OLD.length);
        try {
          const raw = localStorage.getItem(fullKey);
          if(!raw) return;
          const val = JSON.parse(raw);
          if(!val) return;

          const hasWeekStruct = !!(val.dayMapping || val.sessions);
          const hasDayStruct  = !!(val.meds || val.meals || val.fasted !== undefined);
          const hasTracker    = !!(val.tracker);
          const isDateFmt     = isDateKey(key);

          if(hasTracker) {
            // Formato muy viejo: toda la semana en daily_logs
            const wkKey = key;
            if(!lsWeekLoad(wkKey)) lsWeekSave(wkKey, { dayMapping: val.dayMapping||{}, bodyWeight: val.bodyWeight||'' });
            Object.entries(val.tracker||{}).forEach(([idx, dayData]) => {
              const date = getDayDate(wkKey, parseInt(idx));
              if(!lsDayLoad(date)) lsDaySave(date, { ...dayData, _session: (val.sessions||{})[idx]||null });
            });
          } else if(hasWeekStruct && !hasDayStruct) {
            if(!lsWeekLoad(key)) lsWeekSave(key, val);
          } else if(hasDayStruct && !hasWeekStruct) {
            if(!lsDayLoad(key)) lsDaySave(key, val);
          } else if(isDateFmt) {
            const dow = new Date(key+'T12:00:00').getDay();
            if(dow === 1 && hasWeekStruct) {
              if(!lsWeekLoad(key)) lsWeekSave(key, val);
              if(!lsDayLoad(key))  lsDaySave(key, val); // preservar ambos
              console.warn('[Migration] AmbigÃ¼edad lunes:', key);
            } else {
              if(!lsDayLoad(key)) lsDaySave(key, val);
            }
          }
          migrated++;
        } catch(e) { console.warn('[Migration] error en', fullKey, e.message); }
      });

      metaSet('migration_v3_done', true);
    };

    // â”€â”€â”€ HELPERS de fechas â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    const isDateKey = k => /^\d{4}-\d{2}-\d{2}$/.test(k);
    const localDateKey = (d = new Date()) => {
      const yy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      return `${yy}-${mm}-${dd}`;
    };
    const getDinnerLogicalDateKey = (now = new Date()) => {
      const base = new Date(now);
      if(base.getHours() < 6) base.setDate(base.getDate() - 1);
      return localDateKey(base);
    };
    const pickNewestPayload = (local, remote, remoteUpdatedAt = '', fallback = null) => {
      const localTs = new Date(local?._updatedAt || 0).getTime() || 0;
      const remoteTs = new Date(remote?._updatedAt || remoteUpdatedAt || 0).getTime() || 0;
      if(!local && !remote) return fallback;
      return localTs >= remoteTs ? (local || remote || fallback) : (remote || local || fallback);
    };
    const getDinnerLogicalTargetState = ({ todayMedsState = {}, previousMedsState = {}, now = new Date() } = {}) => {
      const logicalDateKey = getDinnerLogicalDateKey(now);
      const calendarTodayKey = localDateKey(now);
      const usesPreviousDay = logicalDateKey !== calendarTodayKey;
      return {
        dateKey: logicalDateKey,
        medsState: usesPreviousDay ? (previousMedsState || {}) : (todayMedsState || {}),
        label: usesPreviousDay ? 'ayer' : 'hoy',
        usesPreviousDay,
        calendarTodayKey
      };
    };
    const getMedicationStatusForView = ({ selectedDateKey = '', medsState = {}, now = new Date() } = {}) => {
      const calendarTodayKey = localDateKey(now);
      const dinnerLogicalKey = getDinnerLogicalDateKey(now);
      const viewDateKey = String(selectedDateKey || calendarTodayKey);
      const roaccutanDone = !!medsState.roacuttan;
      const dinnerDone = !!medsState.finasteride && !!medsState.minoxidil;
      const dinnerRelevant = viewDateKey === dinnerLogicalKey;
      return {
        calendarTodayKey,
        dinnerLogicalKey,
        viewDateKey,
        roaccutanDone,
        dinnerDone,
        dinnerRelevant,
        roaccutanLabel: roaccutanDone
          ? (viewDateKey === calendarTodayKey ? 'Hecha hoy' : 'Hecha')
          : 'Pendiente',
        dinnerLabel: dinnerDone
          ? (dinnerRelevant
              ? (calendarTodayKey === dinnerLogicalKey ? 'Hecha hoy' : 'Hecha para ayer')
              : 'No corresponde')
          : (dinnerRelevant
          ? (calendarTodayKey === dinnerLogicalKey ? 'Pendiente' : 'Pendiente de ayer')
          : 'No corresponde')
      };
    };
    const CLIENT_FETCH_TIMEOUT_MS = 8000;
    const parseJsonResponseSafe = async (res) => {
      try {
        const data = await res.json();
        return (data && typeof data === 'object') ? data : {};
      } catch(_) {
        return {};
      }
    };
    const fetchJsonWithTimeout = async (url, options = {}, timeoutMs = CLIENT_FETCH_TIMEOUT_MS) => {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), timeoutMs);
      try {
        const res = await fetch(url, { ...options, signal: controller.signal });
        const data = await parseJsonResponseSafe(res);
        return { res, data };
      } catch(error) {
        if(error?.name === 'AbortError') {
          const timeoutError = new Error('La solicitud tardÃ³ demasiado. ProbÃ¡ de nuevo.');
          timeoutError.code = 'TIMEOUT';
          throw timeoutError;
        }
        throw error;
      } finally {
        clearTimeout(timeout);
      }
    };

    const getDayDate = (wkKey, dayIdx) => {
      const d = new Date(wkKey+'T12:00:00');
      const offset = dayIdx===0 ? 6 : dayIdx-1;
      d.setDate(d.getDate()+offset);
      return localDateKey(d);
    };

    // â”€â”€â”€ OUTBOX con dedupe por entity_type+entity_id â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    const openOutboxDB = () => window.idb?.openDB('enzo-sync-db-v3', 1, {
      upgrade(db) {
        if(!db.objectStoreNames.contains('outbox')) {
          db.createObjectStore('outbox', { keyPath: 'entity_key' });
        }
      }
    });

    const enqueueOutboxOp = async ({ entity_type, entity_id, payload, base_revision }) => {
      try {
        const db = await openOutboxDB();
        await db.put('outbox', {
          entity_key: `${entity_type}:${entity_id}`,
          entity_type, entity_id, payload, base_revision,
          queued_at: Date.now(), retries: 0, device_id: DEVICE_ID
        });
      } catch(e) { console.warn('[Outbox] enqueue error:', e.message); }
    };

    const flushOutbox = async () => {
      if(!navigator.onLine || !window.idb) return;
      try {
        const db    = await openOutboxDB();
        const items = await db.getAll('outbox');
        if(!items || items.length === 0) return;

        for(const item of items) {
          try {
            let rpcName, rpcArgs;
            if(item.entity_type === 'daily_log') {
              rpcName = 'save_daily_log';
              rpcArgs = { p_date: item.entity_id, p_tracker: item.payload.tracker, p_session: item.payload.session||null, p_base_revision: item.base_revision||null, p_device_id: DEVICE_ID };
            } else if(item.entity_type === 'weekly_config') {
              rpcName = 'save_weekly_config';
              rpcArgs = { p_week_key: item.entity_id, p_body_weight: item.payload.body_weight||null, p_day_mapping: item.payload.day_mapping||{}, p_base_revision: item.base_revision||null, p_device_id: DEVICE_ID };
            } else if(item.entity_type === 'routine') {
              rpcName = 'save_routine';
              rpcArgs = { p_routine_id: item.entity_id, p_data: item.payload, p_base_revision: item.base_revision||null, p_device_id: DEVICE_ID };
            } else continue;

            const { data, error } = await supabase.rpc(rpcName, rpcArgs);
            if(error) throw new Error(error.message);

            if(data?.status === 'conflict') {
              metaSet('last_conflict', { entity_key: item.entity_key, server: data.server, at: new Date().toISOString() });
              await db.delete('outbox', item.entity_key); // no reintentar un conflicto
            } else {
              if(item.entity_type === 'daily_log') {
                const local = lsDayLoad(item.entity_id) || {};
                lsDaySave(item.entity_id, {
                  ...local,
                  _revision: data?.revision || local._revision || item.base_revision || null,
                  _updatedAt: data?.updated_at || new Date().toISOString(),
                  _dirty: false
                });
              } else if(item.entity_type === 'weekly_config') {
                const local = lsWeekLoad(item.entity_id) || {};
                lsWeekSave(item.entity_id, {
                  ...local,
                  _revision: data?.revision || local._revision || item.base_revision || null,
                  _updatedAt: data?.updated_at || new Date().toISOString()
                });
              } else if(item.entity_type === 'routine') {
                const local = lsRoutineLoad(item.entity_id) || {};
                lsRoutineSave(item.entity_id, {
                  ...stripRoutineMeta(local),
                  _revision: data?.revision || local._revision || item.base_revision || null,
                  _updatedAt: data?.updated_at || new Date().toISOString()
                });
              }
              await db.delete('outbox', item.entity_key);
            }
          } catch(e) {
            if(!navigator.onLine) break;
            item.retries = (item.retries||0) + 1;
            if(item.retries >= 5) await db.delete('outbox', item.entity_key);
            else await db.put('outbox', item);
          }
        }
        metaSet('last_sync', new Date().toISOString());
      } catch(e) {
        metaSet('last_error', e.message?.slice(0,100));
        console.warn('[Outbox] flush error:', e.message);
      }
    };

    // â”€â”€â”€ WRITES REMOTOS vÃ­a RPC â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    // NOTA: las RPCs devuelven conflictos en data.status, NO en error.
    // error es null cuando la RPC ejecuta correctamente aunque retorne status:'conflict'.

    // Convierte bodyWeight string ES-AR ("75,5") a numeric para Supabase
    const bodyWeightToNumeric = (bw) => {
      if(!bw && bw !== 0) return null;
      const n = parseFloat(String(bw).replace(',', '.'));
      return isNaN(n) ? null : n;
    };

    const saveDayRemote = async (date, tracker, session, baseRevision) => {
      const nowIso = new Date().toISOString();
      const existing = lsDayLoad(date) || {};
      lsDaySave(date, {
        ...existing,
        ...tracker,
        _session: session||null,
        _revision: tracker?._revision || baseRevision || existing._revision || null,
        _updatedAt: nowIso,
        _dirty: true
      });
      try {
        const { data, error } = await supabase.rpc('save_daily_log', {
          p_date: date, p_tracker: tracker, p_session: session||null,
          p_base_revision: baseRevision||null, p_device_id: DEVICE_ID
        });
        if(error) throw new Error(error.message);
        if(data?.status === 'conflict') {
          metaSet('last_conflict', { type:'daily_log', entity:date, server:data.server, at:new Date().toISOString() });
          return { ok: false, queued: false, conflict: true, serverData: data.server };
        }
        const local = lsDayLoad(date) || {};
        lsDaySave(date, {
          ...local,
          _revision: data?.revision || local._revision || baseRevision || null,
          _updatedAt: data?.updated_at || new Date().toISOString(),
          _dirty: false
        });
        metaSet('last_sync', new Date().toISOString());
        return { ok: true, queued: false };
      } catch(e) {
        const isNet = !navigator.onLine || e.name==='TypeError' || e.message?.includes('fetch');
        if(isNet) {
          await enqueueOutboxOp({ entity_type:'daily_log', entity_id:date, payload:{tracker,session:session||null}, base_revision:baseRevision });
          return { ok: true, queued: true };
        }
        metaSet('last_error', e.message?.slice(0,100));
        return { ok: false, queued: false, error: e.message };
      }
    };

    const saveWeeklyRemote = async (weekKey, bodyWeight, dayMapping, baseRevision) => {
      const nowIso = new Date().toISOString();
      const existing = lsWeekLoad(weekKey) || {};
      lsWeekSave(weekKey, {
        ...existing,
        bodyWeight: bodyWeight||'',
        dayMapping: dayMapping||{},
        _revision: baseRevision || existing._revision || null,
        _updatedAt: nowIso
      });
      try {
        const bwNumeric = bodyWeightToNumeric(bodyWeight);
        const { data, error } = await supabase.rpc('save_weekly_config', {
          p_week_key: weekKey, p_body_weight: bwNumeric,
          p_day_mapping: dayMapping||{}, p_base_revision: baseRevision||null, p_device_id: DEVICE_ID
        });
        if(error) throw new Error(error.message);
        if(data?.status === 'conflict') {
          metaSet('last_conflict', { type:'weekly_config', entity:weekKey, server:data.server, at:new Date().toISOString() });
          return { ok: false, queued: false, conflict: true, serverData: data.server };
        }
        const local = lsWeekLoad(weekKey) || {};
        lsWeekSave(weekKey, {
          ...local,
          _revision: data?.revision || local._revision || baseRevision || null,
          _updatedAt: data?.updated_at || new Date().toISOString()
        });
        metaSet('last_sync', new Date().toISOString());
        return { ok: true, queued: false };
      } catch(e) {
        const isNet = !navigator.onLine || e.name==='TypeError' || e.message?.includes('fetch');
        if(isNet) {
          await enqueueOutboxOp({ entity_type:'weekly_config', entity_id:weekKey, payload:{body_weight:bodyWeightToNumeric(bodyWeight),day_mapping:dayMapping||{}}, base_revision:baseRevision });
          return { ok: true, queued: true };
        }
        metaSet('last_error', e.message?.slice(0,100));
        return { ok: false, queued: false, error: e.message };
      }
    };

    const saveRoutineRemote = async (routineId, routineData, baseRevision) => {
      const nowIso = new Date().toISOString();
      const existing = lsRoutineLoad(routineId) || {};
      const cleanRoutine = stripRoutineMeta(routineData);
      lsRoutineSave(routineId, {
        ...cleanRoutine,
        _revision: baseRevision || existing._revision || routineData?._revision || null,
        _updatedAt: nowIso
      });
      try {
        const { data, error } = await supabase.rpc('save_routine', {
          p_routine_id: routineId, p_data: cleanRoutine, p_base_revision: baseRevision||null, p_device_id: DEVICE_ID
        });
        if(error) throw new Error(error.message);
        if(data?.status === 'conflict') return { ok: false, queued: false, conflict: true };
        const local = lsRoutineLoad(routineId) || {};
        lsRoutineSave(routineId, {
          ...stripRoutineMeta(local),
          _revision: data?.revision || local._revision || baseRevision || null,
          _updatedAt: data?.updated_at || new Date().toISOString()
        });
        return { ok: true, queued: false };
      } catch(e) {
        const isNet = !navigator.onLine || e.name==='TypeError' || e.message?.includes('fetch');
        if(isNet) {
          await enqueueOutboxOp({ entity_type:'routine', entity_id:routineId, payload:cleanRoutine, base_revision:baseRevision });
          return { ok: true, queued: true };
        }
        return { ok: false, queued: false, error: e.message };
      }
    };

    // â”€â”€â”€ BOOTSTRAP vÃ­a RPC get_bootstrap_state â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    const bootstrapRemoteState = async () => {
      const eightWeeksAgo = addWeeks(getWeekKey(new Date()), -8);
      const { data, error } = await supabase.rpc('get_bootstrap_state', { p_from: eightWeeksAgo });
      if(error || !data) throw new Error(error?.message || 'Bootstrap vacÃ­o');
      return data;
    };

    // â”€â”€â”€ CARGA LOCAL â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    const loadLocalCaches = () => {
      const weeklyCache = {}, dailyCache = {}, routinesCache = {};
      lsAllWeekKeys().filter(k=>!isBeforeStart(k)&&isDateKey(k)).forEach(wk => {
        const d=lsWeekLoad(wk); if(d) weeklyCache[wk]=d;
      });
      lsAllDayKeys().filter(k=>!isBeforeStart(k)).forEach(dt => {
        const d=lsDayLoad(dt); if(d) dailyCache[dt]=d;
      });
      lsAllRoutineKeys().forEach(id => {
        const d=lsRoutineLoad(id); if(d) routinesCache[id]=d;
      });
      return { weeklyCache, dailyCache, routinesCache };
    };

    // â”€â”€â”€ buildAllWeeks: merges caches for UI (allWeeks compat) â”€â”€â”€
    const buildAllWeeks = (weeklyCache, dailyCache) => {
      const result = {};
      Object.entries(weeklyCache).forEach(([wkKey, wkData]) => {
        if(isBeforeStart(wkKey)||!isDateKey(wkKey)) return;
        result[wkKey] = hydrate({ dayMapping: wkData.dayMapping||{}, bodyWeight: wkData.bodyWeight||'' });
      });
      Object.entries(dailyCache).forEach(([date, dayData]) => {
        if(isBeforeStart(date)) return;
        const dateObj = new Date(date+'T12:00:00');
        const wkKey   = getWeekKey(dateObj);
        const dayIdx  = dateObj.getDay();
        if(!result[wkKey]) result[wkKey] = hydrate(newWeek(wkKey));
        const { _session, _updatedAt, _revision, _dirty, ...dayClean } = dayData || {};

    const applyBootstrapToState = (bootstrapData, prevWeeklyCache, prevDailyCache) => {
      const weeklyCache = { ...prevWeeklyCache };
      const dailyCache  = { ...prevDailyCache };
      const routinesCache = {};
      const conflicts = [];

      (bootstrapData.routines||[]).forEach(row => {
        const localRoutine = lsRoutineLoad(row.routine_id);
        const localTs = localRoutine?._updatedAt;
        if(localTs && row.updated_at && localTs > row.updated_at) {
          routinesCache[row.routine_id] = localRoutine;
          return;
        }
        const routinePayload = {
          ...stripRoutineMeta(row.data || {}),
          _revision: row.revision || null,
          _updatedAt: row.updated_at || ''
        };
        lsRoutineSave(row.routine_id, routinePayload);
        routinesCache[row.routine_id] = routinePayload;
      });

      (bootstrapData.weekly_configs||[]).forEach(row => {
        if(isBeforeStart(row.week_key)) return;
        const localWk = weeklyCache[row.week_key];
        const localTs = localWk?._updatedAt;
        if(localTs && row.updated_at && localTs > row.updated_at) return;
        const bwStr = (row.body_weight !== undefined && row.body_weight !== null)
          ? String(row.body_weight).replace('.', ',')
          : '';
        weeklyCache[row.week_key] = { dayMapping: row.day_mapping||{}, bodyWeight: bwStr, _revision: row.revision, _updatedAt: row.updated_at };
        lsWeekSave(row.week_key, weeklyCache[row.week_key]);
      });

      (bootstrapData.daily_logs||[]).forEach(row => {
        if(isBeforeStart(row.date)) return;
        const localDay = dailyCache[row.date];
        const localTs  = localDay?._updatedAt;
        if(localTs && row.updated_at && localTs > row.updated_at) {
          if(localDay?._dirty) conflicts.push({ date: row.date, local: localDay, remote: row });
          return;
        }
        let tracker = row.tracker || {};
        let sess    = row.session  || null;
        if(tracker.tracker) { // rescate formato viejo
          const dayIdx = new Date(row.date+'T12:00:00').getDay();
          tracker = tracker.tracker?.[dayIdx] || {};
          sess    = tracker.sessions?.[dayIdx] || null;
        }
        dailyCache[row.date] = { ...tracker, _session: sess, _revision: row.revision, _updatedAt: row.updated_at };
        lsDaySave(row.date, dailyCache[row.date]);
      });

      return { weeklyCache, dailyCache, routinesCache, conflicts };
    };

    const getFastStats = (t) => {
      if(!t.fasted || !t.fastStartTime) return {endStr:null, rollover:false, walkStr:null, isFasted:false};

      const [sH, sM] = t.fastStartTime.split(':').map(Number);
      const dur = pn(t.fastHours);

      if(isNaN(sH) || dur <= 0) return {endStr:null, rollover:false, walkStr:null, isFasted:false};

      const totalMinutos = sH * 60 + sM + (dur * 60);
      const finH = Math.floor(totalMinutos / 60) % 24;
      const finM = Math.round(totalMinutos % 60);
      const rollover = totalMinutos >= 1440;
      const baseStr = `${String(finH).padStart(2,'0')}:${String(finM).padStart(2,'0')}`;
      const endStr = rollover ? `${baseStr} (MaÃ±ana)` : baseStr;

      // Caminata en ayuno
      let walkStr = null, isFasted = false;
      if(t.walked && t.walkStartTime) {
        const [wH, wM] = t.walkStartTime.split(':').map(Number);
        if(!isNaN(wH)) {
          let diff = (wH * 60 + wM) - (sH * 60 + sM);
          if(diff < 0) diff += 1440;
          isFasted = diff <= (dur * 60);
          walkStr = isFasted
            ? `Caminata en ayuno (${fn(diff/60)} hs)`
            : `Fuera del ayuno (+${fn((diff - dur*60)/60)} hs)`;
        }

      return {endStr, rollover, walkStr, isFasted};

    const SmartCena = ({currentProt, tracker}) => {
      const [rec, setRec] = useState(null);
      const [open, setOpen] = useState(false);
      const meals = tracker?.meals || [];
      const totals = dayTotals(meals);
      const normalizeFoodHint = (s='') => String(s).normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
      const fiberEstimate = (meals || []).reduce((acc, meal) => acc + (meal?.items || []).reduce((sum, item) => {
        const text = normalizeFoodHint(`${item?.name || ''} ${item?.qty || ''}`);
        let next = sum;
        if(/avena|salvado|integral|legumbre|lenteja|garbanzo|poroto|verdura|brocoli|zanahoria|espinaca|banana|manzana|pera|papa|batata/.test(text)) next += 4;
        if(/fruta|ensalada|vegetal|verduras|frutos secos/.test(text)) next += 2;
        return next;
      }, 0), 0);
      const lastMealTime = (meals || [])
        .map(m => String(m?.lastBite || '').trim())
        .filter(Boolean)
        .sort()
        .slice(-1)[0] || '';
      const fastingAdvice = useMemo(() => {
        const proteinOk = totals.prot >= TARGETS.prot * 0.85;
        const caloriesOk = totals.cals >= TARGETS.kcal * 0.78;
        const fatOk = totals.fat >= 45;
        const fiberOk = fiberEstimate >= 18;
        const shouldFast = proteinOk && caloriesOk && (fatOk || fiberOk);
        const caution = !proteinOk || totals.cals < TARGETS.kcal * 0.65;
        let hungerWindow = 'Sin datos';
        if(lastMealTime) {
          const [h,m] = lastMealTime.split(':').map(Number);
          if(!Number.isNaN(h)) {
            const base = new Date();
            base.setHours(h, m || 0, 0, 0);
            const holdHours = 8.5
              + Math.min(2, totals.fat / 35)
              + Math.min(1.5, totals.prot / 90)
              + Math.min(1.5, fiberEstimate / 16)
              - (totals.cals < TARGETS.kcal * 0.7 ? 1.2 : 0);
            const start = new Date(base.getTime() + holdHours * 3600000);
            const end = new Date(start.getTime() + 90 * 60000);
            const fmt = dt => dt.toLocaleTimeString('es-AR', { hour:'2-digit', minute:'2-digit' });
            hungerWindow = `${fmt(start)}-${fmt(end)}`;
          }
        }
        return {
          shouldFast,
          caution,
          label: shouldFast
            ? 'Hoy sÃ­ conviene ayuno corto'
            : caution
              ? 'Hoy no conviene forzar ayuno'
              : 'Ayuno opcional y flexible',
          detail: shouldFast
            ? 'Buen cierre de energÃ­a/proteÃ­na para probar 12-14 h.'
            : caution
              ? 'Quedaste corto en energÃ­a o proteÃ­na; mejor cenar bien y no estirar de mÃ¡s.'
              : 'PodÃ©s hacer ayuno suave si maÃ±ana te sentÃ­s bien.',
          hungerWindow
        };
      }, [fiberEstimate, lastMealTime, totals.cals, totals.fat, totals.prot]);

      const calculate = () => {
        const missP = TARGETS.prot - currentProt;
        if(missP <= 0) { setRec('ok'); return; }
        const list = HOME_FOODS.map(f => {
          const qty    = f.unit === 'unidad'
            ? Math.ceil(missP / f.p)                       // unidades necesarias
            : Math.round(missP / (f.p / 100));             // gramos necesarios
          const kcal   = f.unit === 'unidad'
            ? qty * (f.p*4 + f.c*4 + f.f*9)
            : (qty/100) * (f.p*4 + f.c*4 + f.f*9);
          return { ...f, qty, kcal: Math.round(kcal) };
        });
        setRec(list);
        setOpen(true);
      };

      return html`
        <div class="glass-card" style="padding:12px;border-color:rgba(245,158,11,0.3);">
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <span style="font-size:12px;font-weight:700;color:#F59E0B;text-transform:uppercase;letter-spacing:0.06em;">
              ðŸ’¡ Asistente Nutricional
            </span>
            <button onClick=${calculate}
              style="padding:5px 12px;border-radius:8px;border:none;background:#F59E0B;color:#080D1A;font-size:12px;font-weight:700;font-family:'Barlow Condensed',sans-serif;cursor:pointer;">
              Recomendar
            </button>
          </div>
          ${rec === 'ok' && html`<p style="margin:8px 0 0;font-size:13px;color:#10B981;">âœ… Objetivo proteico alcanzado</p>`}
          ${rec && Array.isArray(rec) && open && html`
            <div style="margin-top:10px;display:flex;flex-direction:column;gap:6px;">
              <p style="margin:0;font-size:10px;text-transform:uppercase;color:#64748b;">Para cubrir ${Math.round(TARGETS.prot - currentProt)}g de proteÃ­na faltante:</p>
              ${rec.map(f => html`
                <div style="display:flex;justify-content:space-between;align-items:center;background:rgba(10,15,30,0.4);padding:6px 10px;border-radius:6px;border:1px solid #1E2D45;">
                  <span style="font-size:12px;color:#cbd5e1;">${f.name}</span>
                  <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#F59E0B;white-space:nowrap;">
                    ${f.qty}${f.unit==='unidad'?'u':'g'} Â· ${f.kcal}kcal
                  </span>
                </div>
              `)}
            </div>
          `}
          <div style="margin-top:10px;padding:10px;border-radius:8px;background:rgba(10,15,30,0.42);border:1px solid #1E2D45;">
            <p style="margin:0;font-size:10px;text-transform:uppercase;color:#64748b;">Ayuno nocturno</p>
            <p style="margin:6px 0 0;font-size:13px;font-weight:700;color:${fastingAdvice.shouldFast ? '#10B981' : (fastingAdvice.caution ? '#F59E0B' : '#CBD5E1')};">${fastingAdvice.label}</p>
            <p style="margin:4px 0 0;font-size:11px;color:#94A3B8;">${fastingAdvice.detail}</p>
            <p style="margin:6px 0 0;font-size:11px;color:#7DD3FC;">Hambre probable: ${fastingAdvice.hungerWindow}</p>
          </div>
        </div>
      `;
    };

    const NutritionReviewCard = ({currentDateKey, currentTracker, previousDateKey, previousTracker}) => {
      const [review, setReview] = useState({ today:null, previous:null, loadingToday:false, loadingPrevious:false, error:'' });
      const serializeMeals = (tracker) => JSON.stringify((tracker?.meals || []).map(meal => ({
        items: (meal?.items || []).map(item => ({
          name: item?.name || '',
          qty: item?.qty || '',
          cals: pn(item?.cals),
          prot: pn(item?.prot),
          carb: pn(item?.carb),
          fat: pn(item?.fat)
        }))
      })));
      const fetchReview = useCallback(async (dateKey, tracker, targetKey) => {
        if(!dateKey || !(tracker?.meals || []).some(m => (m.items || []).length > 0)) return;
        const cacheKey = `enzo_nutrition_review_${dateKey}`;
        const mealsFingerprint = serializeMeals(tracker);
        try {
          const cached = JSON.parse(localStorage.getItem(cacheKey) || 'null');
          if(cached?.fingerprint === mealsFingerprint && cached?.payload) {
            setReview(prev => ({ ...prev, [targetKey]: cached.payload }));
            return;
          }
        } catch(_) {}

        setReview(prev => ({ ...prev, [`loading${targetKey === 'today' ? 'Today' : 'Previous'}`]: true, error:'' }));
        try {
          const { res, data } = await fetchJsonWithTimeout('/.netlify/functions/daily-nutrition-review', {
            method:'POST',
            headers:{ 'Content-Type':'application/json' },
            body: JSON.stringify({
              date: dateKey,
              meals: tracker.meals || [],
              totals: dayTotals(tracker.meals || [])
            })
          });
          if(!res.ok) throw new Error(data?.error || 'No se pudo revisar la nutricion.');
          setReview(prev => ({ ...prev, [targetKey]: data }));
          try {
          safeLocalSet(cacheKey, { fingerprint: mealsFingerprint, payload: data });
          } catch(_) {}
        } catch(e) {
          setReview(prev => ({ ...prev, error: e.message || 'No se pudo revisar la nutricion.' }));
        } finally {
          setReview(prev => ({ ...prev, [`loading${targetKey === 'today' ? 'Today' : 'Previous'}`]: false }));
        }
      }, []);

      useEffect(() => {
        fetchReview(previousDateKey, previousTracker, 'previous');
      }, [fetchReview, previousDateKey, serializeMeals(previousTracker)]);

      useEffect(() => {
        const now = new Date();
        if(now.getHours() < 20) return;
        fetchReview(currentDateKey, currentTracker, 'today');
      }, [fetchReview, currentDateKey, serializeMeals(currentTracker)]);

      const renderNutrients = (nutrients) => {
        const entries = Object.entries(nutrients || {});
        if(entries.length === 0) return null;
        return html`
          <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;">
            ${entries.map(([key, status]) => html`
              <span style=${`padding:4px 7px;border-radius:999px;border:1px solid rgba(30,41,59,0.8);background:${status === 'low' ? 'rgba(245,158,11,0.12)' : status === 'high' ? 'rgba(239,68,68,0.12)' : 'rgba(16,185,129,0.12)'};color:${status === 'low' ? '#FBBF24' : status === 'high' ? '#FCA5A5' : '#86EFAC'};font-size:10px;font-weight:700;text-transform:uppercase;`}>
                ${key}: ${status}
              </span>
            `)}
          </div>
        `;
      };

      if(!review.previous && !review.today && !review.loadingPrevious && !review.loadingToday) return null;

      return html`
        <div class="glass-card" style="padding:12px;border-color:rgba(56,189,248,0.25);display:flex;flex-direction:column;gap:10px;">
          <div>
            <p style="margin:0;font-size:12px;font-weight:700;color:#38BDF8;text-transform:uppercase;letter-spacing:0.06em;">Micros y sugerencias</p>
            <p style="margin:4px 0 0;font-size:11px;color:#94A3B8;">Estimacion orientativa de fibra, minerales, sodio y cierre del dia.</p>
          </div>
          ${review.previous && html`
            <div style="padding:10px;border-radius:8px;background:rgba(10,15,30,0.42);border:1px solid #1E2D45;">
              <p style="margin:0;font-size:10px;text-transform:uppercase;color:#64748b;">Para hoy, segun ayer</p>
              <p style="margin:6px 0 0;font-size:13px;font-weight:700;color:#E2E8F0;">${review.previous.day_summary || 'Sin resumen'}</p>
              ${renderNutrients(review.previous.nutrients)}
              <div style="margin-top:8px;display:flex;flex-direction:column;gap:4px;">
                ${(review.previous.tomorrow_recommendations || []).slice(0,3).map(line => html`<p style="margin:0;font-size:11px;color:#CBD5E1;">â€¢ ${line}</p>`)}
              </div>
              ${review.previous.fat_advice && html`<p style="margin:8px 0 0;font-size:11px;color:#FBBF24;">${review.previous.fat_advice}</p>`}
            </div>
          `}
          ${(review.today || review.loadingToday) && html`
            <div style="padding:10px;border-radius:8px;background:rgba(10,15,30,0.42);border:1px solid #1E2D45;">
              <p style="margin:0;font-size:10px;text-transform:uppercase;color:#64748b;">Cierre del dia para maÃ±ana</p>
              <p style="margin:6px 0 0;font-size:13px;font-weight:700;color:#E2E8F0;">${review.loadingToday ? 'Analizando...' : (review.today?.day_summary || 'Sin resumen')}</p>
              ${renderNutrients(review.today?.nutrients)}
              <div style="margin-top:8px;display:flex;flex-direction:column;gap:4px;">
                ${review.loadingToday
                  ? html`<p style="margin:0;font-size:11px;color:#94A3B8;">Calculando recomendaciones...</p>`
                  : (review.today?.tomorrow_recommendations || []).slice(0,3).map(line => html`<p style="margin:0;font-size:11px;color:#CBD5E1;">â€¢ ${line}</p>`)}
              </div>
            </div>
          `}
          ${review.error && html`<p style="margin:0;font-size:11px;color:#FCA5A5;">${review.error}</p>`}
        </div>
      `;
    };

    // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
    //  NOTIFICACIONES â€” Panel de recordatorios
    // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
    const NOTIF_KEY = 'enzo_notifs_v1'; // legado â€” solo para migraciÃ³n inicial
    const defaultNotifs = [
      { id:'meal1',  label:'ðŸ½ Comida 1',         time:'12:00', enabled:false },
      { id:'meal2',  label:'ðŸ½ Comida 2',         time:'16:00', enabled:false },
      { id:'meal3',  label:'ðŸ½ Comida 3',         time:'21:00', enabled:false },
      { id:'gym',    label:'ðŸ’ª Ir al gym',        time:'18:00', enabled:false },
      { id:'sleep',  label:'ðŸ˜´ Dormir',           time:'23:30', enabled:false },
      { id:'meds',   label:'ðŸ’Š Roacuttan',        time:'14:00', enabled:false },
      { id:'meds2',  label:'ðŸ’Š MedicaciÃ³n noche', time:'23:30', enabled:false },
    ];

    // Carga notifs: v3 namespace â†’ legacy â†’ defaults
    const loadNotifsLocal = () => {
      const v3 = lsNotifLoad(DEVICE_ID);
      if(v3) return Array.isArray(v3) ? v3 : (v3.notifs || defaultNotifs);
      try { const s = localStorage.getItem(NOTIF_KEY); if(s) return JSON.parse(s); } catch(e) {}
      return defaultNotifs;
    };

    const NotifView = ({session}) => {
      const [notifs,    setNotifs]    = useState(() => loadNotifsLocal());
      const [perm,      setPerm]      = useState(typeof Notification!=='undefined'?Notification.permission:'denied');
      const [syncMsg,   setSyncMsg]   = useState('');
      const [swInfo,    setSwInfo]    = useState({ ready: false, controlling: false, authValid: false, schedCount: 0 });
      const [timers]    = useState({});
      const [backupBusy,setBackupBusy]= useState(false);
      const [backupMsg, setBackupMsg] = useState('');
      const [backupMeta,setBackupMeta]= useState(() => {
        const lastBackupAt = metaGet('last_backup_at');
        const hours = lastBackupAt ? Math.floor((Date.now() - new Date(lastBackupAt).getTime()) / 3600000) : null;
        return {
          lastBackupAt,
          hoursSince: hours,
          due: !lastBackupAt || hours >= 72
        };
      });
      const importInputRef = useRef(null);

      const refreshBackupMeta = useCallback(() => {
        const lastBackupAt = metaGet('last_backup_at');
        const hours = lastBackupAt ? Math.floor((Date.now() - new Date(lastBackupAt).getTime()) / 3600000) : null;
        setBackupMeta({
          lastBackupAt,
          hoursSince: hours,
          due: !lastBackupAt || hours >= 72
        });
      }, []);

      useEffect(() => {
        refreshBackupMeta();
        const onFocus = () => refreshBackupMeta();
        const onVisible = () => { if(document.visibilityState === 'visible') refreshBackupMeta(); };
        window.addEventListener('focus', onFocus);
        document.addEventListener('visibilitychange', onVisible);
        return () => {
          window.removeEventListener('focus', onFocus);
          document.removeEventListener('visibilitychange', onVisible);
        };
      }, [refreshBackupMeta]);

      // Obtener estado del SW al montar
      useEffect(() => {
        if(!('serviceWorker' in navigator)) return;
        navigator.serviceWorker.ready.then(reg => {
          const ctrl = navigator.serviceWorker.controller;
          if(ctrl) {
            const onMsg = (e) => {
              if(e.data?.type === 'SW_DEBUG_RESPONSE') {
                setSwInfo({
                  ready:       true,
                  controlling: true,
                  authValid:   e.data.authValid || false,
                  schedCount:  e.data.scheduledCount || 0,
                });
                navigator.serviceWorker.removeEventListener('message', onMsg);
              }
            };
            navigator.serviceWorker.addEventListener('message', onMsg);
            ctrl.postMessage({ type: 'SW_DEBUG_REQUEST' });
            setTimeout(() => navigator.serviceWorker.removeEventListener('message', onMsg), 3000);
          } else {
            setSwInfo({ ready: true, controlling: false, authValid: false, schedCount: 0 });
          }
        }).catch(() => {});
      }, []);

      const persistAndSync = async (n) => {
        setNotifs(n);
        const nowIso = new Date().toISOString();
        const notifPayload = { notifs: n, _updatedAt: nowIso };
        // 1. localStorage v3 por device_id
        lsNotifSave(DEVICE_ID, notifPayload);
        // 2. Sincronizar con Supabase (best-effort)
        try {
          const { error } = await supabase.rpc('save_notification_settings', {
            p_device_id:     DEVICE_ID,
            p_data:          notifPayload,
            p_base_revision: null
          });
          if(!error) setSyncMsg('âœ“ Guardado');
          else       setSyncMsg('âš  Sin sync remoto');
        } catch(e) { setSyncMsg('âš  Sin red'); }
        setTimeout(() => setSyncMsg(''), 2500);
        scheduleAll(n);
      };

      const requestPerm = async () => {
        if(typeof Notification === 'undefined') return;
        const p = await Notification.requestPermission();
        setPerm(p);
        if(p === 'granted') scheduleAll(notifs);
      };

      const scheduleAll = (list) => {
        if(typeof Notification === 'undefined' || Notification.permission !== 'granted') return;

        // Enviar al Service Worker (persiste aunque se cierre la pestaÃ±a)
        if('serviceWorker' in navigator) {
          navigator.serviceWorker.ready.then(reg => {
            if(reg.active) reg.active.postMessage({ type: 'SW_SET_SCHEDULE', notifs: list });
          }).catch(() => {});
        }

        // Fallback setTimeout (funciona si la pestaÃ±a estÃ¡ abierta)
        Object.values(timers).forEach(clearTimeout);
        const now = new Date();
        list.filter(n => n.enabled).forEach(n => {
          const [h, m] = n.time.split(':').map(Number);
          const target = new Date(now); target.setHours(h, m, 0, 0);
          if(target <= now) target.setDate(target.getDate() + 1);
          timers[n.id] = setTimeout(() => {
            if(Notification.permission !== 'granted') return;
            if('serviceWorker' in navigator) {
              navigator.serviceWorker.ready.then(reg => {
                if(reg?.showNotification) {
                  reg.showNotification('Enzo Training', {
                    body:   n.label,
                    icon:   './icon-192.png',
                    badge:  './icon-192.png',
                    tag:    `fallback-${n.id}-${Date.now()}`,
                    data:   { id: n.id, time: n.time }
                  }).catch(() => {});
                }
              }).catch(() => {});
            }
          }, target - now);
        });
      };

      const sendTestNotif = () => {
        if(Notification.permission !== 'granted') return;
        if('serviceWorker' in navigator) {
          navigator.serviceWorker.ready.then(reg => {
            if(reg.active) reg.active.postMessage({ type: 'SW_TEST_NOTIFICATION' });
          }).catch(() => {});
        }
      };

      const exportBackup = async () => {
        if(!session?.user?.id) return;
        setBackupBusy(true);
        setBackupMsg('');
        try {
          const [
            { data: tasksRows, error: tasksErr },
            { data: notesRows, error: notesErr },
            { data: recipeRows, error: recipeErr },
            { data: studyRows, error: studyErr },
            { data: bookRows, error: bookErr },
            { data: invRows, error: invErr },
            { data: routineRows, error: routineErr },
            { data: dailyRows, error: dailyErr },
            { data: weeklyRows, error: weeklyErr }
          ] = await Promise.all([
            supabase.from('tasks').select('*').eq('user_id', session.user.id).order('created_at', { ascending:false }),
            supabase.from('notes').select('*').eq('user_id', session.user.id).order('created_at', { ascending:false }),
            supabase.from('user_recipes').select('*').order('updated_at', { ascending:false }),
            supabase.from('study_plan').select('*').order('subject', { ascending:true }),
            supabase.from('book_notes').select('*').order('created_at', { ascending:false }),
            supabase.from('app_inventory').select('*').order('key', { ascending:true }),
            supabase.from('routines').select('*').order('routine_id', { ascending:true }),
            supabase.from('daily_logs_v2').select('*').order('date', { ascending:false }),
            supabase.from('weekly_configs_v2').select('*').order('week_key', { ascending:false })
          ]);
          const firstError = tasksErr || notesErr || recipeErr || studyErr || bookErr || invErr || routineErr || dailyErr || weeklyErr;
          if(firstError) throw firstError;

          const localRoutines = Object.fromEntries(lsAllRoutineKeys().map(id => [id, lsRoutineLoad(id)]).filter(([,v]) => !!v));
          const backup = {
            app: 'enzo-training',
            exported_at: new Date().toISOString(),
            device_id: DEVICE_ID,
            user_id: session.user.id,
            user_email: session.user.email || '',
            remote: {
              tasks: tasksRows || [],
              notes: notesRows || [],
              user_recipes: recipeRows || [],
              study_plan: studyRows || [],
              book_notes: bookRows || [],
              app_inventory: invRows || [],
              routines: routineRows || [],
              daily_logs_v2: dailyRows || [],
              weekly_configs_v2: weeklyRows || []
            },
            local: {
              notification_settings: lsNotifLoad(DEVICE_ID) || [],
              routines: localRoutines
            }
          };

          const blob = new Blob([JSON.stringify(backup, null, 2)], { type:'application/json;charset=utf-8' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `enzo-backup-${new Date().toISOString().slice(0,19).replace(/[:T]/g,'-')}.json`;
          document.body.appendChild(a);
          a.click();
          a.remove();
          setTimeout(() => URL.revokeObjectURL(url), 1000);
          metaSet('last_backup_at', new Date().toISOString());
          refreshBackupMeta();
          setBackupMsg('Backup exportado correctamente.');
        } catch(e) {
          setBackupMsg(e.message || 'No se pudo exportar el backup.');
        } finally {
          setBackupBusy(false);
          setTimeout(() => setBackupMsg(''), 3500);
        }
      };

      const importBackup = async (file) => {
        if(!file || !session?.user?.id) return;
        setBackupBusy(true);
        setBackupMsg('');
        try {
          const raw = await file.text();
          const parsed = JSON.parse(raw);
          if(parsed?.app !== 'enzo-training' || !parsed?.remote) throw new Error('El archivo no parece un backup valido de Enzo Training.');

      // Parsear "3 min", "1,5 min", "90 seg" â†’ segundos
      const parseRestStr = (str) => {
        const s = String(str).trim().toLowerCase();
        const numMatch = s.match(/[\d,\.]+/);
        if(!numMatch) return null;
        const num = pn(numMatch[0]);
        if(s.includes('seg') || s.includes('s)')) return Math.round(num);
        return Math.round(num * 60); // minutos por defecto
      };

      const updateSet = (ei,si,field,val) => upd(r=>{
        const exercises = r[selId].exercises.map((ex,i)=>i===ei ? {
          ...ex,
          sets: ex.sets.map((s,j)=>j===si ? (() => {
            const updated = {...s, [field]: val};
            // Bug 9 fix: sincronizar restSecs cuando cambia restStr
            if(field === 'restStr') {
              const secs = parseRestStr(val);
              if(secs !== null) updated.restSecs = secs;
            }
            // Y si cambia restSecs directamente, actualizar restStr
            if(field === 'restSecs') {
              const secs = parseInt(val);
              if(!isNaN(secs)) updated.restStr = secs >= 60
                ? `${(secs/60).toFixed(secs%60===0?0:1).replace('.',',')} min`
                : `${secs} seg`;
            }
            return updated;
          })() : s)
        } : ex);
        return {...r, [selId]: {...r[selId], exercises}};
      });

    //  PANEL HÃBITOS
