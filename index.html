            status,
            email_reminder_sent_at: status === 'pending' ? null : task.email_reminder_sent_at || null,
            updated_at: new Date().toISOString()
          };
          const { data, error } = await supabase.from('tasks')
            .update({
              ...basePatch
            })
            .eq('id', task.id)
            .eq('user_id', session.user.id)
            .select()
            .single();
          if(error) throw error;
          let spawnedTask = null;
          if(status === 'done' && (task.recurrence || 'none') !== 'none'){
            const nextDueAt = computeNextRecurringDueAt(task);
            const { data: nextTask, error: nextErr } = await supabase.from('tasks').insert({
              user_id: session.user.id,
              title: task.title,
              details: task.details || null,
              subtasks: normalizeSubtasks(task.subtasks || []),
              priority: task.priority || 'normal',
              category: task.category || 'personal',
              recurrence: task.recurrence || 'none',
              status: 'pending',
              auto_email_reminder: task.auto_email_reminder !== false,
              due_at: nextDueAt,
              email_reminder_sent_at: null
            }).select().single();
            if(nextErr) throw nextErr;
            spawnedTask = nextTask;
          }
          setTasks(prev => {
            const next = prev.map(t => t.id === task.id ? data : t);
            return spawnedTask ? [spawnedTask, ...next] : next;
          });
        } catch(e) {
          setError(e.message || 'No se pudo actualizar la tarea.');
        }
      };

      const startEditTask = (task) => {
        setEditingTaskId(task.id);
        setEditingTaskTitle(task.title || '');
        setEditingTaskDetails(task.details || '');
        setEditingTaskSubtasksText(subtasksToEditorText(task.subtasks || []));
        setEditingTaskDue(task.due_at ? String(task.due_at).slice(0,16) : '');
        setEditingTaskPriority(task.priority || 'normal');
        setEditingTaskCategory(task.category || 'personal');
        setEditingTaskAutoEmail(task.auto_email_reminder !== false);
        setEditingTaskRecurrence(task.recurrence || 'none');
      };

      const saveTaskEdit = async (task) => {
        if(!editingTaskTitle.trim()) return;
        setSaving(`edit-task-${task.id}`);
        setError('');
        try {
          const { data, error } = await supabase.from('tasks')
            .update({
              title: editingTaskTitle.trim(),
              details: editingTaskDetails.trim() || null,
              subtasks: editorTextToSubtasks(editingTaskSubtasksText),
              due_at: editingTaskDue || null,
              priority: editingTaskPriority,
              category: editingTaskCategory,
              recurrence: editingTaskRecurrence,
              auto_email_reminder: editingTaskAutoEmail,
              email_reminder_sent_at: null,
              updated_at: new Date().toISOString()
            })
            .eq('id', task.id)
            .eq('user_id', session.user.id)
            .select()
            .single();
          if(error) throw error;
          setTasks(prev => prev.map(t => t.id === task.id ? data : t));
          setEditingTaskId(null);
        } catch(e) {
          setError(e.message || 'No se pudo editar la tarea.');
        } finally {
          setSaving('');
        }
      };

      const deleteTask = async (task) => {
        try {
          const { error } = await supabase.from('tasks')
            .delete()
            .eq('id', task.id)
            .eq('user_id', session.user.id);
          if(error) throw error;
          setTasks(prev => prev.filter(t => t.id !== task.id));
        } catch(e) {
          setError(e.message || 'No se pudo borrar la tarea.');
        }
      };

      const toggleSubtask = async (task, subtaskIndex) => {
        try {
          const subtasks = normalizeSubtasks(task.subtasks || []).map((item, idx) => idx === subtaskIndex ? { ...item, done: !item.done } : item);
          const { data, error } = await supabase.from('tasks')
            .update({
              subtasks,
              updated_at: new Date().toISOString()
            })
            .eq('id', task.id)
            .eq('user_id', session.user.id)
            .select()
            .single();
          if(error) throw error;
          setTasks(prev => prev.map(t => t.id === task.id ? data : t));
        } catch(e) {
          setError(e.message || 'No se pudo actualizar la subtarea.');
        }
      };

      const togglePinNote = async (note) => {
        try {
          const { data, error } = await supabase.from('notes')
            .update({ pinned: !note.pinned, updated_at: new Date().toISOString() })
            .eq('id', note.id)
            .eq('user_id', session.user.id)
            .select()
            .single();
          if(error) throw error;
          setNotes(prev => prev.map(n => n.id === note.id ? data : n));
        } catch(e) {
          setError(e.message || 'No se pudo actualizar el pensamiento.');
        }
      };

      const persistAiThread = async (noteId, thread) => {
        const { error } = await supabase.from('notes')
          .update({
            ai_thread: thread,
            updated_at: new Date().toISOString()
          })
          .eq('id', noteId)
          .eq('user_id', session.user.id);
        if(error) throw error;
      };

      const persistAiDraft = async (noteId, draft) => {
        const { error } = await supabase.from('notes')
          .update({
            ai_draft: draft,
            updated_at: new Date().toISOString()
          })
          .eq('id', noteId)
          .eq('user_id', session.user.id);
        if(error) throw error;
      };

      const updateAiDraft = (noteId, value) => {
        setAiDrafts(prev => ({ ...prev, [noteId]: value }));
        clearTimeout(aiDraftTimersRef.current[noteId]);
        aiDraftTimersRef.current[noteId] = setTimeout(() => {
          persistAiDraft(noteId, value).catch(() => {});
        }, 700);
      };

      const startEditNote = (note) => {
        setEditingNoteId(note.id);
        setEditingNoteTitle(note.note_title || '');
        setEditingNoteContent(note.content || '');
        setEditingNoteKind(note.kind || 'idea');
        setEditingNoteKindLocked(false);
      };

      const saveNoteEdit = async (note) => {
        if(!editingNoteContent.trim()) return;
        setSaving(`edit-note-${note.id}`);
        setError('');
        try {
          const { data, error } = await supabase.from('notes')
            .update({
              note_title: editingNoteTitle.trim() || null,
              content: editingNoteContent.trim(),
              kind: editingNoteKind,
              updated_at: new Date().toISOString()
            })
            .eq('id', note.id)
            .eq('user_id', session.user.id)
            .select()
            .single();
          if(error) throw error;
          setNotes(prev => prev.map(n => n.id === note.id ? data : n));
          setEditingNoteId(null);
          setEditingNoteKindLocked(false);
        } catch(e) {
          setError(e.message || 'No se pudo editar el pensamiento.');
        } finally {
          setSaving('');
        }
      };

      const deleteNote = async (note) => {
        try {
          const { error } = await supabase.from('notes')
            .delete()
            .eq('id', note.id)
            .eq('user_id', session.user.id);
          if(error) throw error;
          setNotes(prev => prev.filter(n => n.id !== note.id));
          setAiReplies(prev => {
            const next = { ...prev };
            delete next[note.id];
            return next;
          });
          setAiDrafts(prev => {
            const next = { ...prev };
            delete next[note.id];
            return next;
          });
          clearTimeout(aiDraftTimersRef.current[note.id]);
          delete aiDraftTimersRef.current[note.id];
        } catch(e) {
          setError(e.message || 'No se pudo borrar el pensamiento.');
        }
      };

      const exportNote = (note) => {
        try {
          const title = noteDisplayTitle(note);
          const thread = aiReplies[note.id] || [];
          const lines = [
            `Titulo: ${title}`,
            `Categoria: ${noteKindMeta(note.kind || 'idea').label}`,
            `Fecha: ${formatTaskDate(note.created_at)}`,
            '',
            'Contenido:',
            String(note.content || '').trim(),
            ''
          ];
          if(thread.length){
            lines.push('Debate IA:', '');
            thread.forEach((item, idx) => {
              lines.push(`${idx + 1}. Pregunta: ${item.question}`);
              lines.push(`Respuesta: ${item.reply}`);
              lines.push('');
            });
          }
          const blob = new Blob([lines.join('\n')], { type:'text/plain;charset=utf-8' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          const safeName = title.toLowerCase().replace(/[^a-z0-9]+/gi, '-').replace(/^-+|-+$/g, '') || 'pensamiento';
          a.href = url;
          a.download = `${safeName}.txt`;
          document.body.appendChild(a);
          a.click();
          a.remove();
          setTimeout(() => URL.revokeObjectURL(url), 1000);
        } catch(e) {
          setError(e.message || 'No se pudo exportar el pensamiento.');
        }
      };

      const convertNoteToTask = async (note) => {
        setSaving(`convert-${note.id}`);
        setError('');
        try {
          const { data: taskRow, error: taskErr } = await supabase.from('tasks').insert({
            user_id: session.user.id,
            title: note.content.slice(0, 120),
            details: note.content,
            priority: 'normal',
            category: 'personal',
            status: 'pending'
          }).select().single();
          if(taskErr) throw taskErr;
          const { data: noteRow, error: noteErr } = await supabase.from('notes')
            .update({ kind: 'converted', updated_at: new Date().toISOString() })
            .eq('id', note.id)
            .eq('user_id', session.user.id)
            .select()
            .single();
          if(noteErr) throw noteErr;
          setTasks(prev => [taskRow, ...prev]);
          setNotes(prev => prev.map(n => n.id === note.id ? noteRow : n));
        } catch(e) {
          setError(e.message || 'No se pudo convertir la nota en tarea.');
        } finally {
          setSaving('');
        }
      };

      const calendarLinkForTask = (task) => {
        const start = task.due_at ? new Date(task.due_at) : new Date();
        const end = new Date(start.getTime() + (30 * 60000));
        const fmt = (d) => {
          const y = d.getUTCFullYear();
          const m = String(d.getUTCMonth()+1).padStart(2,'0');
          const day = String(d.getUTCDate()).padStart(2,'0');
          const h = String(d.getUTCHours()).padStart(2,'0');
          const min = String(d.getUTCMinutes()).padStart(2,'0');
          const s = String(d.getUTCSeconds()).padStart(2,'0');
          return `${y}${m}${day}T${h}${min}${s}Z`;
        };
        const text = encodeURIComponent(task.title);
        const details = encodeURIComponent(task.details || 'Recordatorio creado desde Enzo Training');
        return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${text}&details=${details}&dates=${fmt(start)}/${fmt(end)}`;
      };

      const sendTaskEmail = async (task) => {
        setSaving(`mail-${task.id}`);
        setError('');
        try {
          const { res, data } = await fetchJsonWithTimeout('/.netlify/functions/send-task-email', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              title: task.title,
              details: task.details || '',
              dueAt: task.due_at ? formatTaskDate(task.due_at) : '',
              priority: task.priority || 'normal'
            })
          });
          if(!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
          setError('Correo enviado correctamente.');
          setTimeout(() => setError(''), 2500);
        } catch(e) {
          setError(e.message || 'No se pudo enviar el correo.');
        } finally {
          setSaving('');
        }
      };

      const askThoughtAI = async (note) => {
        setAiLoadingNoteId(note.id);
        setError('');
        try {
          const currentQuestion = (aiDrafts[note.id] || '').trim();
          const { res, data } = await fetchJsonWithTimeout('/.netlify/functions/thought-chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              thought: note.content,
              question: currentQuestion || 'Quiero debatir esta idea. Analizala con argumentos a favor, en contra y una conclusion provisoria.'
            })
          });
          if(!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
          const nextThread = [
            ...(aiReplies[note.id] || []),
            {
              question: currentQuestion || 'Debate general',
              reply: data.reply || 'No hubo respuesta.'
            }
          ];
          setAiReplies(prev => ({ ...prev, [note.id]: nextThread }));
          try {
            await persistAiThread(note.id, nextThread);
          } catch(syncErr) {
            setAiNotice('Se guardo local, pero no se pudo sincronizar el debate.');
            setTimeout(() => setAiNotice(''), 3000);
          }
          setAiDrafts(prev => ({ ...prev, [note.id]: '' }));
          persistAiDraft(note.id, '').catch(() => {});
          setAiOpenNoteId(note.id);
        } catch(e) {
          setError(e.message || 'No se pudo consultar la IA.');
        } finally {
          setAiLoadingNoteId(null);
        }
      };

      const summarizeThoughtDebate = async (note) => {
        setAiLoadingNoteId(note.id);
        setError('');
        try {
          const thread = aiReplies[note.id] || [];
          if(thread.length === 0) throw new Error('Todavia no hay debate para resumir.');
          const historyText = thread.map((item, idx) => `${idx + 1}. Pregunta: ${item.question}\nRespuesta: ${item.reply}`).join('\n\n');
          const { res, data } = await fetchJsonWithTimeout('/.netlify/functions/thought-chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              thought: note.content,
              question: `Resumi este debate en 5 puntos concretos, una conclusion breve y una siguiente pregunta util.\n\n${historyText}`
            })
          });
          if(!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
          const nextThread = [
            ...thread,
            {
              question: 'Resumen del debate',
              reply: data.reply || 'No hubo resumen.'
            }
          ];
          setAiReplies(prev => ({ ...prev, [note.id]: nextThread }));
          try {
            await persistAiThread(note.id, nextThread);
          } catch(_) {}
          setAiOpenNoteId(note.id);
        } catch(e) {
          setError(e.message || 'No se pudo resumir el debate.');
        } finally {
          setAiLoadingNoteId(null);
        }
      };

      const removeAiReply = async (note, idxToRemove) => {
        try {
          const currentThread = aiReplies[note.id] || [];
          const nextThread = currentThread.filter((_, idx) => idx !== idxToRemove);
          setAiReplies(prev => ({ ...prev, [note.id]: nextThread }));
          await persistAiThread(note.id, nextThread);
        } catch(e) {
          setError(e.message || 'No se pudo borrar ese bloque del debate.');
        }
      };

      const openInGemini = async (note) => {
        const thread = aiReplies[note.id] || [];
        const draft = (aiDrafts[note.id] || '').trim();
        const prompt = [
          'Quiero seguir este debate en Gemini.',
          '',
          `Pensamiento original: ${note.content}`,
          '',
          ...(thread.length ? ['Historial del debate:', '', ...thread.flatMap((item, idx) => [
            `${idx + 1}. Usuario: ${item.question}`,
            `Gemini: ${item.reply}`,
            ''
          ])] : []),
          `Nueva consigna: ${draft || 'Segui cuestionando esta idea y llevandola a una conclusion mas fuerte.'}`
        ].join('\n').trim();

        try {
          if(navigator.clipboard?.writeText) {
            await navigator.clipboard.writeText(prompt);
          }
          setAiNotice('Contexto copiado. Gemini abierto.');
          setTimeout(() => setAiNotice(''), 3000);
        } catch(_) {
          setAiNotice('No se pudo copiar, pero igual abrimos Gemini.');
          setTimeout(() => setAiNotice(''), 3000);
        }

        window.open('https://gemini.google.com/app', '_blank', 'noopener,noreferrer');
      };

      const searchNeedle = taskSearch.trim().toLowerCase();
      const filteredTasks = tasks.filter(task => {
        const text = `${task.title || ''} ${task.details || ''}`.toLowerCase();
        if(searchNeedle && !text.includes(searchNeedle)) return false;
        if(priorityFilter !== 'all' && (task.priority || 'normal') !== priorityFilter) return false;
        if(statusFilter !== 'all' && task.status !== statusFilter) return false;
        if(categoryFilter !== 'all' && (task.category || 'personal') !== categoryFilter) return false;
        return true;
      });
      const filteredNotes = notes.filter(note => {
        if(note.kind === 'converted') return false;
        if(noteKindFilter !== 'all' && (note.kind || 'idea') !== noteKindFilter) return false;
        if(!searchNeedle) return true;
        return `${String(note.note_title || '')} ${String(note.content || '')}`.toLowerCase().includes(searchNeedle);
      });
      const archivedTasks = filteredTasks.filter(t => t.status === 'archived');
      const pendingTasks = filteredTasks.filter(t => t.status !== 'done' && t.status !== 'archived');
      const doneTasks = filteredTasks.filter(t => t.status === 'done');
      const activeNotes = filteredNotes;
      const now = new Date();
      const endOfToday = new Date(now); endOfToday.setHours(23,59,59,999);
      const endOfTomorrow = new Date(now); endOfTomorrow.setDate(now.getDate() + 1); endOfTomorrow.setHours(23,59,59,999);
      const endOfWeek = new Date(now);
      endOfWeek.setDate(now.getDate() + (7 - now.getDay()));
      endOfWeek.setHours(23,59,59,999);
      const groupedPending = {
        today: pendingTasks.filter(t => t.due_at && new Date(t.due_at) <= endOfToday),
        tomorrow: pendingTasks.filter(t => t.due_at && new Date(t.due_at) > endOfToday && new Date(t.due_at) <= endOfTomorrow),
        week: pendingTasks.filter(t => t.due_at && new Date(t.due_at) > endOfTomorrow && new Date(t.due_at) <= endOfWeek),
        later: pendingTasks.filter(t => t.due_at && new Date(t.due_at) > endOfWeek),
        someday: pendingTasks.filter(t => !t.due_at)
      };
      const todayFocus = tasks.filter(t => t.status !== 'done' && t.status !== 'archived' && t.due_at && new Date(t.due_at) <= endOfToday);
      const urgentCount = tasks.filter(t => t.status !== 'done' && t.status !== 'archived' && (t.priority || 'normal') === 'high').length;
      const byCategory = CATEGORY_OPTIONS.map(cat => ({
        ...cat,
        count: tasks.filter(t => t.status !== 'done' && t.status !== 'archived' && (t.category || 'personal') === cat.value).length
      }));

      useEffect(() => {
        const runTaskReminderCheck = () => {
          const pending = tasks.filter(t => t.status !== 'done' && t.status !== 'archived' && t.due_at);
          if(pending.length === 0) return;
          const now = Date.now();
          const alerts = loadTaskAlerts();
          const dueSoon = pending
            .map(task => ({ task, dueMs: new Date(task.due_at).getTime() }))
            .filter(item => !Number.isNaN(item.dueMs))
            .sort((a,b) => a.dueMs - b.dueMs)
            .filter(item => item.dueMs <= (now + 15 * 60000));
          if(dueSoon.length === 0) return;
          const unseen = dueSoon.filter(item => !alerts[`${item.task.id}:${item.task.due_at}`]);
          if(unseen.length === 0) return;
          unseen.forEach(item => {
            alerts[`${item.task.id}:${item.task.due_at}`] = new Date().toISOString();
          });
          saveTaskAlerts(alerts);
          const candidate = unseen[0];
          const diffMin = Math.round((candidate.dueMs - now) / 60000);
          const timing = diffMin <= 0 ? 'ya vencio' : diffMin === 1 ? 'vence en 1 minuto' : `vence en ${diffMin} minutos`;
          const extra = unseen.length > 1 ? ` Hay ${unseen.length - 1} mas cerca.` : '';
          const message = `Tarea: ${candidate.task.title} - ${timing}.${extra}`;
          setTaskNotice(message);
          setTimeout(() => setTaskNotice(''), 6000);
          if(typeof Notification !== 'undefined' && Notification.permission === 'granted' && 'serviceWorker' in navigator) {
            navigator.serviceWorker.ready.then(reg => {
              if(reg?.showNotification) {
                reg.showNotification('Tarea cercana', {
                  body: message,
                  icon: './icon-192.png',
                  badge: './icon-192.png',
                  tag: `task-${candidate.task.id}`,
                  requireInteraction: false
                });
              }
            }).catch(() => {});
          }
        };
        runTaskReminderCheck();
        const timer = setInterval(runTaskReminderCheck, 60000);
        return () => clearInterval(timer);
      }, [tasks]);

      return html`
        <div style="display:flex;flex-direction:column;gap:12px;">
          <${Card}>
            <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px;">
              <div>
                <p style="margin:0;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#6366F1;">Tareas y pensamientos</p>
                <p style="margin:4px 0 0;font-size:12px;color:#64748b;">Anota rapido, ordena despues y manda recordatorios al calendario o mail.</p>
              </div>
              <button class="btn-icon" style="background:#162035;border:1px solid #1E2D45;" onClick=${loadData}>
                <${ISync} s=${16}/>
              </button>
            </div>
            ${taskNotice && html`<div style="margin-bottom:10px;padding:8px 10px;border-radius:8px;background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.25);color:#FCD34D;font-size:12px;">${taskNotice}</div>`}
            ${aiNotice && html`<div style="margin-bottom:10px;padding:8px 10px;border-radius:8px;background:rgba(56,189,248,0.08);border:1px solid rgba(56,189,248,0.25);color:#7DD3FC;font-size:12px;">${aiNotice}</div>`}
            ${error && html`<div style="margin-bottom:10px;padding:8px 10px;border-radius:8px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);color:#FCA5A5;font-size:12px;">${error}</div>`}
            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;text-align:center;">
              ${[
                { label:'Pendientes', val: pendingTasks.length, color:'#10B981' },
                { label:'Hechas', val: doneTasks.length, color:'#6366F1' },
                { label:'Ideas', val: activeNotes.length, color:'#F59E0B' }
              ].map(item => html`
                <div style="padding:10px;border-radius:10px;background:rgba(10,15,30,0.45);border:1px solid #1E2D45;">
                  <p style="margin:0;font-size:9px;color:#64748b;text-transform:uppercase;">${item.label}</p>
                  <p style=${`margin:4px 0 0;font-size:18px;font-weight:700;font-family:'JetBrains Mono',monospace;color:${item.color};`}>${item.val}</p>
                </div>
              `)}
            </div>
            <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:12px;">
            <${DashboardStatCard} label="Vencen hoy" value=${todayFocus.length} color="#EF4444" />
            <${DashboardStatCard} label="Alta prioridad" value=${urgentCount} color="#F59E0B" />
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;">
            ${byCategory.map(cat => html`<${DashboardTagChip} label=${`${cat.label}: ${cat.count}`} color=${cat.color} />`)}
          </div>
            <div style="display:flex;flex-direction:column;gap:8px;margin-top:12px;">
              <input class="inp" placeholder="Buscar tarea o pensamiento..."
                value=${taskSearch} onInput=${e=>setTaskSearch(e.target.value)} />
              <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;">
                <select class="inp" value=${priorityFilter} onChange=${e=>setPriorityFilter(e.target.value)}>
                  <option value="all">Todas las prioridades</option>
                  <option value="high">Alta</option>
                  <option value="normal">Normal</option>
                  <option value="low">Baja</option>

    // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
    //  APP PRINCIPAL
    // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
    const App = () => {
      // â”€â”€ Auth state
      const [session,     setSession]     = useState(null);
      const [authLoading, setAuthLoading] = useState(true);
      const [outboxCount, setOutboxCount] = useState(0);
      const [syncLog,     setSyncLog]     = useState({ lastSync: null, lastError: null });
      const showDebug = new URLSearchParams(window.location.search).get('debug') === '1';

      // Listen for auth changes
      useEffect(()=>{
        supabase.auth.getSession().then(({ data }) => {
          setSession(data.session);
          setAuthLoading(false);
        });
        const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, sess) => {
          setSession(sess);
          setAuthLoading(false);
        });
        return () => subscription.unsubscribe();
      }, []);

      // Show login if not authenticated
      if(authLoading) return html`
        <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#080D1A;">
          <span class="spin" style="display:inline-block;width:28px;height:28px;border:3px solid rgba(16,185,129,0.3);border-top-color:#10B981;border-radius:50%;"></span>
        </div>`;
      if(!session) return html`<${LoginView}/>`;

      const handleLogout = () => supabase.auth.signOut();
      const [view, setView] = useState(()=>{
        // Leer ?view=X de la URL para que los shortcuts del manifest funcionen
        const p = new URLSearchParams(window.location.search).get('view');
        return (p && ['today','week','progress','tasks','recipes','notif','routines'].includes(p)) ? p : 'today';
      });
      const [chartsReady, setChartsReady] = useState(()=>!!window.Recharts);

      // Lazy load Recharts al abrir una tab con grÃ¡ficos
      const navigateTo = (tab) => {
        setView(tab);
        if(!chartsReady && (tab === 'week' || tab === 'progress')) {
          window._loadRecharts && window._loadRecharts().then(()=>{
            window._RC = window.Recharts || {};
            setChartsReady(true);
          }).catch(()=>{});
        }
      };

      useEffect(()=>{
        const initView = new URLSearchParams(window.location.search).get('view');
        if(initView === 'week' || initView === 'progress') {
          window._loadRecharts && window._loadRecharts().then(()=>{
            window._RC = window.Recharts || {};
            setChartsReady(true);
          }).catch(()=>{});
        }
      },[]);
      const [routineData, setRoutineData] = useState(()=>loadRoutines());
      const [currentWk, setCurrentWk] = useState(()=>getWeekKey(new Date()));
      const [activeDay, setActiveDay] = useState(()=>String(new Date().getDay()));
      const activeDayRef = useRef(activeDay);
      useEffect(()=>{ activeDayRef.current = activeDay; }, [activeDay]);
      const [allWeeks, setAllWeeks] = useState({});
      const [syncSaveStatus, setSyncSaveStatus] = useState('idle');
      const [hasUnsaved, setHasUnsaved] = useState(false);
      const [syncLoadStatus, setSyncLoadStatus] = useState('idle');
      const [syncLoadMsg,    setSyncLoadMsg]    = useState('');
      const [timerLeft, setTimerLeft] = useState(0);
      const [timerActive, setTimerActive] = useState(false);
      const timerRef = useRef(null);
      const [todaySectionOpen, setTodaySectionOpen] = useState({
        dashboard: true,
        habits: true,
        nutrition: false,
        training: true
      });

      useEffect(() => {
        if(metaGet('training_plan_version') === TRAINING_PLAN_VERSION) return;
        metaSet('training_plan_version', TRAINING_PLAN_VERSION);
        setRoutineData(trainingPlanRoutines);
        saveRoutines(trainingPlanRoutines).catch(()=>{});
        setAllWeeks(prev => {
          const next = { ...prev };
          Object.keys(next).forEach(wkKey => {
            if(!isDateKey(wkKey) || wkKey < TRAINING_PLAN_EFFECTIVE_WEEK) return;
            const hydrated = hydrate(next[wkKey] || newWeek(wkKey));
            const nextMapping = buildPlanDayMapping(getPlanMode(hydrated), wkKey);
            next[wkKey] = { ...hydrated, dayMapping: { ...hydrated.dayMapping, ...nextMapping }, sessions: {} };
          });
          if(!next[TRAINING_PLAN_EFFECTIVE_WEEK]) {
            next[TRAINING_PLAN_EFFECTIVE_WEEK] = newWeek(TRAINING_PLAN_EFFECTIVE_WEEK);
          }
          return next;
        });
      }, []);
      const prevTimerLeftRef = useRef(0);
      // Audio silencioso â€” necesario para que MediaSession funcione en background (Android)
      const audioRef = useRef(typeof Audio !== 'undefined'
        ? new Audio('data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAgD4AAAB9AAACABAAZGF0YQAAAAA=')
        : null
      );
      const [moduleAlerts, setModuleAlerts] = useState({ study:0, health:false, books:false, recipes:0, notif:false });
      const toggleTodaySection = (key) => {
        setTodaySectionOpen(prev => ({ ...prev, [key]: !prev[key] }));
      };

      const refreshModuleAlerts = useCallback(async () => {
        try {
          const [
            { data: invRows, error: invErr },
            { data: studyRows, error: studyErr },
            { data: recipeRows, error: recipeErr }
          ] = await Promise.all([
            supabase.from('app_inventory').select('key,data').in('key', ['meds_stock', 'reading_progress']),
            supabase.from('study_plan').select('subject,topics'),
            supabase.from('user_recipes').select('stock_qty,low_stock_threshold')
          ]);
          if(invErr) throw invErr;
          if(studyErr) throw studyErr;
          if(recipeErr) throw recipeErr;

          const inventory = Object.fromEntries((invRows || []).map(row => [row.key, row.data || {}]));
          const meds = { ...MEDS_STOCK_DEFAULT, ...(inventory.meds_stock || {}) };
          const book = { ...BOOK_DEFAULT, ...(inventory.reading_progress || {}) };
          const studyPending = (studyRows || [])
            .flatMap(row => Array.isArray(row.topics) ? row.topics : [])
            .filter(topic => !topic?.done).length;
          const recipesLow = (recipeRows || []).filter(row => {
            const qty = pn(row.stock_qty);
            const threshold = pn(row.low_stock_threshold);
            return qty > 0 && threshold > 0 && qty <= threshold;
          }).length;

          const lastBackupAt = metaGet('last_backup_at');
          const lastBackupMs = lastBackupAt ? new Date(lastBackupAt).getTime() : 0;
          const backupDue = !lastBackupMs || Math.floor((Date.now() - lastBackupMs) / 3600000) >= 72;

          setModuleAlerts({
            study: studyPending,
            health: pn(meds.roaccutan) <= 2 || pn(meds.minoxidil_finasteride) <= 2,
            books: pn(book.current_page) > 0 && pn(book.current_page) < pn(book.total_pages),
            recipes: recipesLow,
            notif: backupDue
          });
        } catch(_) {}
      }, []);

      // â”€â”€ AUTO-SYNC AL INICIO (v3)
      useEffect(()=>{
        // 0. Migrar localStorage legacy (enzo_v2_ â†’ enzo_v3_*) â€” idempotente
        migrateLegacyLocalStorage();

        // 1. Carga local instantÃ¡nea â€” local-first, sin esperar red
        const { weeklyCache, dailyCache, routinesCache } = loadLocalCaches();
        const initWk = currentWk >= START_WEEK ? currentWk : START_WEEK;
        if(!weeklyCache[initWk]) weeklyCache[initWk] = { dayMapping: {}, bodyWeight: '' };

        const localAllWeeks = buildAllWeeks(weeklyCache, dailyCache);
        if(!localAllWeeks[initWk]) localAllWeeks[initWk] = newWeek(initWk);
        setAllWeeks(localAllWeeks);

        // Rutinas locales
        const localRoutines = Object.fromEntries(
          Object.entries(routinesCache).map(([id, d]) => [id, d])
        );
        if(Object.keys(localRoutines).length > 0) setRoutineData(prev => ({ ...prev, ...localRoutines }));

        // 2. Bootstrap remoto en background (solo si hay sesiÃ³n)
        supabase.auth.getSession().then(async ({ data: { session } }) => {
          if(!session) return;

          // claim_legacy_rows: migra filas viejas de Supabase al nuevo esquema (idempotente)
          supabase.rpc('claim_legacy_rows').then(()=>{}).catch(()=>{});

          try {
            const bootstrapData = await bootstrapRemoteState();
            const { weeklyCache: wc2, dailyCache: dc2, routinesCache: rc2, conflicts } =
              applyBootstrapToState(bootstrapData, weeklyCache, dailyCache);

            setAllWeeks(buildAllWeeks(wc2, dc2));
            bootstrapAppliedRef.current = true; // suppress auto-persist for this setState

            if(Object.keys(rc2).length > 0) setRoutineData(prev => ({ ...prev, ...rc2 }));

            // Cargar notification_settings del bootstrap para este device
            const remoteNotifSettings = (bootstrapData.notification_settings||[]).find(n => n.device_id === DEVICE_ID);
            if(remoteNotifSettings?.data?.notifs) {
              const localNotifs = lsNotifLoad(DEVICE_ID);
              const localTs  = localNotifs?._updatedAt || null;
              const remoteTs = remoteNotifSettings.updated_at;
              // Remoto gana si es mÃ¡s nuevo o no hay local
              if(!localTs || (remoteTs && remoteTs > localTs)) {
                lsNotifSave(DEVICE_ID, {
                  ...(remoteNotifSettings.data || {}),
                  _updatedAt: remoteNotifSettings.data?._updatedAt || remoteNotifSettings.updated_at || new Date().toISOString()
                });
              }
            }

            if(conflicts.length > 0) {
              console.warn('[Bootstrap] Conflictos detectados:', conflicts.length);
              metaSet('last_conflict', { count: conflicts.length, items: conflicts.map(c=>c.date), at: new Date().toISOString() });
              setSyncLoadMsg(`âš  ${conflicts.length} conflicto(s) â€” ver debug`);
              setSyncLoadStatus('error');
              setTimeout(()=>{ setSyncLoadStatus('idle'); setSyncLoadMsg(''); }, 6000);
            } else {
              setSyncLog(prev => ({ ...prev, lastSync: new Date().toLocaleTimeString('es-AR') }));
            }
          } catch(e) {
            console.warn('[Bootstrap] error:', e.message);
            metaSet('last_error', e.message?.slice(0,100));
            setSyncLog(prev => ({ ...prev, lastError: e.message?.slice(0,60) }));
          }
        });

        // 3. Flush outbox al arrancar y cuando vuelve la red
        flushOutbox().catch(()=>{});
        window.addEventListener('online', flushOutbox);

        // 6. SuscripciÃ³n Realtime â€” actualiza automÃ¡ticamente desde cualquier dispositivo
        const channel = supabase.channel('enzo-sync')
          .on('postgres_changes', { event: '*', schema: 'public', table: 'daily_logs' }, (payload) => {
            const row = payload.new;
            if(!row?.date || isBeforeStart(row.date) || row.last_device_id === DEVICE_ID) return;
            const dateObj = new Date(row.date + 'T12:00:00');
            const wkKey   = getWeekKey(dateObj);
            const dayIdx  = dateObj.getDay();
            setAllWeeks(prev => {
              // Conflict resolution: local gana si es mÃ¡s nuevo
              const localTs  = prev[wkKey]?.tracker?.[dayIdx]?._updatedAt;
              if(localTs && row.updated_at && localTs > row.updated_at) return prev;
              const next = { ...prev };
              if(!next[wkKey]) next[wkKey] = hydrate(newWeek(wkKey));
              const tracker = row.tracker || {};
              const sess    = row.session  || null;
              if(sess) next[wkKey] = { ...next[wkKey], sessions: { ...next[wkKey].sessions, [dayIdx]: sess } };
              next[wkKey] = { ...next[wkKey], tracker: { ...next[wkKey].tracker, [dayIdx]: { ...newDay(), ...tracker, meals: Array.isArray(tracker?.meals) ? tracker.meals : newDay().meals } } };
              lsDaySave(row.date, { ...tracker, _session: sess, _revision: row.revision, _updatedAt: row.updated_at });
              return next;
            });
          })
          .on('postgres_changes', { event: '*', schema: 'public', table: 'weekly_configs' }, (payload) => {
            const row = payload.new;
            if(!row?.week_key || row.last_device_id === DEVICE_ID) return;
            if(isBeforeStart(row.week_key)) return;
            setAllWeeks(prev => {
              const next = { ...prev };
              const existing = prev[row.week_key] || newWeek(row.week_key);
              const bwStr = (row.body_weight !== undefined && row.body_weight !== null)
                ? String(row.body_weight).replace('.', ',') : existing.bodyWeight;
              const newWkData = {
                ...existing,
                dayMapping: row.day_mapping || existing.dayMapping,
                bodyWeight: bwStr,
                _revision:  row.revision,
                _updatedAt: row.updated_at,
              };
              next[row.week_key] = newWkData;
              lsWeekSave(row.week_key, newWkData);
              return next;
            });
          })
          .on('postgres_changes', { event: '*', schema: 'public', table: 'routines' }, (payload) => {
            const row = payload.new;
            if(!row?.routine_id || row.last_device_id === DEVICE_ID) return;
            // Routine updated from another device â€” apply to local state
            const localRoutine = lsRoutineLoad(row.routine_id);
            const localTs = localRoutine?._updatedAt;
            if(localTs && row.updated_at && localTs > row.updated_at) return;
            const routinePayload = { ...stripRoutineMeta(row.data || {}), _revision: row.revision, _updatedAt: row.updated_at };
            lsRoutineSave(row.routine_id, routinePayload);
            setRoutineData(prev => ({ ...prev, [row.routine_id]: routinePayload }));
          })
          .subscribe();

        // 7. Mensajes del Service Worker
        const onSwMessage = (event) => {
          if(event.data?.type === 'MEDS_DONE') {
            const medId  = event.data.id;
            const medMap = { meds:'roacuttan', meds2:'dinner_combo' };
            const medKey = medMap[medId];
            if(medKey) {
              const baseDate = medKey === 'dinner_combo'
                ? new Date(`${getDinnerLogicalDateKey(new Date())}T12:00:00`)
                : new Date();
              const todayWk  = getWeekKey(baseDate);
              const todayIdx = String(baseDate.getDay());
              const dateKey  = getDayDate(todayWk, parseInt(todayIdx));

              // Actualizar UI inmediatamente (optimista)
              setAllWeeks(prev => {
            const wk  = prev[todayWk] || newWeek(todayWk);
                const tr  = { ...wk.tracker };
                const updatedDay = medKey === 'dinner_combo'
                  ? { ...tr[todayIdx], meds: { ...(tr[todayIdx]?.meds||{}), finasteride: true, minoxidil: true } }
                  : { ...tr[todayIdx], meds: { ...(tr[todayIdx]?.meds||{}), [medKey]: true } };
                tr[todayIdx] = updatedDay;
                lsDaySave(dateKey, { ...updatedDay, _updatedAt: new Date().toISOString() });
                return { ...prev, [todayWk]: { ...wk, tracker: tr } };
              });

              const patchPromise = medKey === 'dinner_combo'
                ? Promise.all([
                    supabase.rpc('patch_med_status', { p_date: dateKey, p_med: 'finasteride', p_val: true, p_device_id: DEVICE_ID }),
                    supabase.rpc('patch_med_status', { p_date: dateKey, p_med: 'minoxidil', p_val: true, p_device_id: DEVICE_ID })
                  ])
                : supabase.rpc('patch_med_status', {
                    p_date:      dateKey,
                    p_med:       medKey,
                    p_val:       true,
                    p_device_id: DEVICE_ID
                  }).then(result => [result]);
              patchPromise.then((results) => {
                const firstError = results.find(r => r?.error)?.error;
                if(firstError) {
                  console.warn('[MEDS_DONE] patch_med_status fallÃ³, encolando:', firstError.message);
                  // Si falla por red, encolar en outbox
                  const wk = allWeeks[todayWk] || newWeek(todayWk);
                  const dayData = wk.tracker?.[todayIdx];
                  if(dayData) {
                    enqueueOutboxOp({
