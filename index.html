          <//>

          <!-- ADHERENCIA MACROS -->
          <${Card}>
            <p style="margin:0 0 12px;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;font-weight:700;color:#F59E0B;">🎯 Adherencia Nutricional</p>
            <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;">
              ${[['cals','Kcal','#F59E0B'],['prot','Prot','#10B981'],['carb','Carb','#6366F1'],['fat','Grasa','#EF4444']].map(([k,l,c]) => html`
                <div style="background:rgba(10,15,30,0.6);border:1px solid ${c}33;border-radius:10px;padding:8px;text-align:center;">
                  <p style="margin:0 0 2px;font-size:10px;text-transform:uppercase;color:${c};">${l}</p>
                  <p style="margin:0;font-size:15px;font-weight:700;font-family:'JetBrains Mono',monospace;color:white;">${fn(wm[k])}${k!=='cals'?'g':''}</p>
                  <p style="margin:1px 0 0;font-size:9px;color:#475569;">
                    ${k==='carb' ? `obj: ${fn(carbsTarget)}g/día` : k==='cals' ? `obj: ${fn(TARGETS.kcal)}` : k==='prot' ? `obj: ${TARGETS.prot}g` : `obj: ${TARGETS.fat}g`}
                  </p>
                  <p style="margin:1px 0 0;font-size:10px;color:${macroAdh[k]>=90?'#10B981':macroAdh[k]>=70?'#F59E0B':'#EF4444'};">${macroAdh[k]}%</p>
                </div>
              `)}
            </div>
            ${BarChart && html`
              <div style="height:130px;">
                <${ResponsiveContainer} width="100%" height="100%">
                  <${BarChart} data=${macByDay} margin=${{top:0,right:0,left:-20,bottom:0}}>
                    <${CartesianGrid} strokeDasharray="3 3" stroke="#1E2D45"/>
                    <${XAxis} dataKey="name" tick=${{fill:'#64748b',fontSize:10}} axisLine=${false} tickLine=${false}/>
                    <${YAxis} tick=${{fill:'#64748b',fontSize:9}} axisLine=${false} tickLine=${false}/>
                    <${Tooltip} contentStyle=${tooltipStyle}/>
                    <${Bar} dataKey="prot" name="Prot (g)" stackId="a" fill="#10B981"/>
                    <${Bar} dataKey="carb" name="Carb (g)" stackId="a" fill="#6366F1"/>
                    <${Bar} dataKey="fat" name="Grasa (g)" stackId="a" fill="#EF4444" radius=${[4,4,0,0]}/>
                  <//>
                <//>
              </div>
            `}
          <//>

          <!-- SUPLEMENTOS -->
          <${Card}>
            <p style="margin:0 0 12px;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;font-weight:700;color:#EF4444;">💊 Adherencia Suplementos</p>
            <div style="display:flex;flex-direction:column;gap:8px;">
              ${medAdherence.map(({name,pct}) => html`
                <div>
                  <div style="display:flex;justify-content:space-between;margin-bottom:3px;">
                    <span style="font-size:12px;color:#cbd5e1;">${name}</span>
                    <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:${pct>=85?'#10B981':pct>=50?'#F59E0B':'#EF4444'};">${pct}%</span>
                  </div>
                  <div style="width:100%;height:5px;background:#1E2D45;border-radius:3px;overflow:hidden;">
                    <div style="width:${pct}%;height:100%;background:${pct>=85?'#10B981':pct>=50?'#F59E0B':'#EF4444'};border-radius:3px;transition:width 0.5s;"></div>
                  </div>
                </div>
              `)}
            </div>
          <//>

          <!-- VOLUMEN MUSCULAR con zonas MEV/MAV/MRV -->
          <${Card}>
            <p style="margin:0 0 4px;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;font-weight:700;color:#6366F1;display:flex;align-items:center;gap:6px;">
              <${ITarget} s=${14}/>Series Efectivas — Zonas de Volumen
            </p>
            <div style="display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap;">
              ${[['MEV','mín','#EF4444',4],['MAV','óptimo','#10B981',10],['MRV','máx','#F59E0B',20]].map(([z,l,c,v])=>html`
                <div style="display:flex;align-items:center;gap:4px;">
                  <div style="width:16px;height:2px;background:${c};border-radius:1px;"></div>
                  <span style="font-size:10px;color:#64748b;">${z} ${l} (~${v})</span>
                </div>
              `)}
            </div>
            ${BarChart && html`
              <div style="height:220px;">
                <${ResponsiveContainer} width="100%" height="100%">
                  <${BarChart}
                    data=${Object.entries(vol).map(([m,v])=>({name:m.slice(0,4), dir:v.direct, ind:v.indirect}))}
                    margin=${{top:5,right:5,left:-25,bottom:0}}>
                    <${CartesianGrid} strokeDasharray="3 3" stroke="#1E2D45" vertical=${false}/>
                    <${XAxis} dataKey="name" tick=${{fill:'#64748b',fontSize:8}} axisLine=${false} tickLine=${false}/>
                    <${YAxis} tick=${{fill:'#64748b',fontSize:8}} axisLine=${false} tickLine=${false} domain=${[0,'auto']}/>
                    <${Tooltip} contentStyle=${tooltipStyle}
                      formatter=${(v,n)=>[v+' series', n==='dir'?'Directas':'Indirectas']}/>
                    <${Bar} dataKey="dir" name="dir" stackId="a" fill="#10B981" radius=${[0,0,0,0]}/>
                    <${Bar} dataKey="ind" name="ind" stackId="a" fill="#6366F1" radius=${[3,3,0,0]}/>
                    ${ReferenceLine && html`<${ReferenceLine} y=${4}  stroke="#EF4444" strokeDasharray="4 3" strokeWidth=${1.5} label=${{value:'MEV',fill:'#EF4444',fontSize:8,position:'insideTopRight'}}/>`}
                    ${ReferenceLine && html`<${ReferenceLine} y=${10} stroke="#10B981" strokeDasharray="4 3" strokeWidth=${1.5} label=${{value:'MAV',fill:'#10B981',fontSize:8,position:'insideTopRight'}}/>`}
                    ${ReferenceLine && html`<${ReferenceLine} y=${20} stroke="#F59E0B" strokeDasharray="4 3" strokeWidth=${1.5} label=${{value:'MRV',fill:'#F59E0B',fontSize:8,position:'insideTopRight'}}/>`}
                  <//>
                <//>
              </div>
            `}
            ${!BarChart && html`
              <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;">
                ${Object.entries(vol).map(([m,v]) => html`
                  <div style="background:rgba(10,15,30,0.6);border:1px solid #1E2D45;border-radius:10px;padding:10px;">
                    <p style="margin:0 0 6px;font-size:12px;font-weight:600;color:white;">${m}</p>
                    <div style="display:flex;justify-content:space-around;">
                      <div style="text-align:center;"><p style="margin:0;font-size:9px;color:#10B981;">Dir</p><p style="margin:0;font-size:18px;font-weight:700;font-family:'JetBrains Mono',monospace;color:#10B981;">${v.direct}</p></div>
                      <div style="text-align:center;"><p style="margin:0;font-size:9px;color:#F59E0B;">Ind</p><p style="margin:0;font-size:18px;font-weight:700;font-family:'JetBrains Mono',monospace;color:#F59E0B;">${v.indirect}</p></div>

        </div>

    // ═══════════════════════════════════════════════════
    //  PROGRESO
    // ═══════════════════════════════════════════════════
    const ProgressView = ({allWeeks, onMount}) => {
      const { LineChart, Line, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer } = getRC();
      const [selEx,      setSelEx]      = useState('');
      const [loadingAll, setLoadingAll] = useState(false);
      const [filterYear, setFilterYear] = useState('');
      const [filterMonth,setFilterMonth]= useState('');

      // Carga el historial completo la primera vez que se abre la tab
      useEffect(()=>{
        if(onMount) { setLoadingAll(true); onMount().finally(()=>setLoadingAll(false)); }
      },[]);

      // Años disponibles en el historial
      const availableYears = useMemo(()=>{
        const ys = new Set(Object.keys(allWeeks).filter(wk=>!isBeforeStart(wk)).map(wk=>wk.slice(0,4)));
        return Array.from(ys).sort().reverse();
      },[allWeeks]);

      // Semanas filtradas por año/mes
      const filteredWeeks = useMemo(()=>
        Object.entries(allWeeks)
          .filter(([wk])=> !isBeforeStart(wk))
          .filter(([wk])=> !filterYear   || wk.startsWith(filterYear))
          .filter(([wk])=> !filterMonth  || wk.slice(5,7) === filterMonth)
          .sort(([a],[b])=>a.localeCompare(b))
      ,[allWeeks, filterYear, filterMonth]);

      const filteredWeeksObj = useMemo(()=>Object.fromEntries(filteredWeeks),[filteredWeeks]);

      // Historial de peso corporal
      const weightHistory = useMemo(()=>
        Object.entries(allWeeks)
          .filter(([wk])=> !isBeforeStart(wk) && allWeeks[wk]?.bodyWeight)
          .sort(([a],[b])=>a.localeCompare(b))
          .map(([wk,w])=>({ week: formatWeekLabel(wk).slice(0,6), kg: parseFloat(w.bodyWeight)||0 }))
      ,[allWeeks]);

      // Exportar PROGRESO como imagen PNG
      const exportImage = async () => {
        const el = document.getElementById('progress-export-area');
        if(!el) return;
        try {
          await window._loadHtml2Canvas();
          const canvas = await window.html2canvas(el, {
            backgroundColor: '#080D1A',
            scale: 2,
            useCORS: true,
            logging: false
          });
          const a = document.createElement('a');
          a.href = canvas.toDataURL('image/png');
          a.download = `enzo-progreso-${new Date().toISOString().split('T')[0]}.png`;
          a.click();
        } catch(e) {
          console.warn('[Export]', e.message);
          window.print(); // fallback si html2canvas falla
        }
      };

      const allExercises = useMemo(()=>{const s=new Set();Object.values(filteredWeeksObj).forEach(w=>Object.values(w.sessions||{}).forEach(ss=>ss&&ss.forEach(ex=>s.add(ex.name))));return Array.from(s).sort();},[filteredWeeksObj]);
      const exHistory = useMemo(()=>{
        if(!selEx) return [];
        const pts=[];
        Object.entries(filteredWeeksObj)
          .sort(([a],[b])=>a.localeCompare(b))
          .forEach(([wk,w])=>Object.values(w.sessions||{}).forEach(ss=>ss&&ss.forEach(ex=>{
            if(ex.name===selEx) ex.sets.filter(s=>s.completed).forEach((set,si)=>{
              const wt=pn(set.weight);
              if(wt>0) pts.push({
                week: formatWeekLabel(wk).slice(0,6),
                weight: wt,
                rpe: set.rpe ? parseInt(set.rpe) : null,
                set: si+1
              });
            });
          })));
        return pts;
      },[selEx, filteredWeeksObj]);

      const macHistory = useMemo(()=>
        Object.entries(filteredWeeksObj)
          .sort(([a],[b])=>a.localeCompare(b))
          .map(([wk,w])=>{
            let cals=0,prot=0;
            Object.values(w.tracker||{}).forEach(d=>{ const t=dayTotals(d.meals||[]); cals+=t.cals; prot+=t.prot; });
            return{week:formatWeekLabel(wk).slice(0,6),cals,prot};
          })
      ,[filteredWeeksObj]);

      // PRs: máximo de TODO el historial (no filtrado — son records históricos)
      const personalRecords = useMemo(()=>{
        const prs = {};
        Object.values(allWeeks).forEach(w=>
          Object.values(w.sessions||{}).forEach(ss=>ss&&ss.forEach(ex=>{
            ex.sets.filter(s=>s.completed).forEach(set=>{
              const wt = pn(set.weight);
              if(wt > 0 && (!prs[ex.name] || wt > prs[ex.name])) prs[ex.name] = wt;
            });
          }))
        );
        return Object.entries(prs).sort(([,a],[,b])=>b-a);
      },[allWeeks]);
      const tooltipStyle = {background:'#0F1729',border:'1px solid #1E2D45',borderRadius:'8px',fontFamily:'JetBrains Mono,monospace',fontSize:'11px'};

      if(Object.keys(allWeeks).length===0) return html`
        <${Card}>
          <div style="text-align:center;padding:32px 0;">
            <p style="font-size:36px;margin:0 0 8px;">📊</p>
            <p style="color:#94a3b8;margin:0;">Todavía no hay datos históricos.</p>
            <p style="color:#64748b;font-size:12px;margin:4px 0 0;">Completá entrenamientos en varias semanas para ver progresión.</p>
          </div>
        <//>
      `;

      return html`
        <div id="progress-export-area" class="fade-up" style="display:flex;flex-direction:column;gap:12px;">
          ${loadingAll && html`
            <div style="display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.2);">
              <span class="spin" style="display:inline-block;width:14px;height:14px;border:2px solid rgba(99,102,241,0.3);border-top-color:#6366F1;border-radius:50%;flex-shrink:0;"></span>
              <span style="font-size:12px;color:#6366F1;font-family:'JetBrains Mono',monospace;">Cargando historial completo...</span>
            </div>
          `}
          <${Card}>
            <!-- D. Filtro por Año/Mes -->
            <div style="display:flex;gap:6px;margin-bottom:12px;">
              <select class="inp" style="flex:1;font-size:12px;padding:6px 8px;"
                value=${filterYear} onChange=${e=>{ setFilterYear(e.target.value); setFilterMonth(''); }}>
                <option value="">Todos los años</option>
                ${availableYears.map(y=>html`<option value=${y}>${y}</option>`)}
              </select>
              <select class="inp" style="flex:1;font-size:12px;padding:6px 8px;"
                value=${filterMonth} onChange=${e=>setFilterMonth(e.target.value)}
                disabled=${!filterYear}>
                <option value="">Todos los meses</option>
                ${['01','02','03','04','05','06','07','08','09','10','11','12'].map((m,i)=>html`
                  <option value=${m}>${['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][i]}</option>
                `)}
              </select>
              ${(filterYear||filterMonth) && html`
                <button onClick=${()=>{ setFilterYear(''); setFilterMonth(''); }}
                  style="padding:6px 10px;border-radius:8px;border:1px solid #1E2D45;background:rgba(239,68,68,0.1);color:#EF4444;font-size:11px;cursor:pointer;white-space:nowrap;">
                  ✕ Reset
                </button>
              `}
            </div>
            <p style="margin:0 0 12px;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;font-weight:700;color:#10B981;">Progresión de Peso por Ejercicio</p>
            <select class="inp" style="margin-bottom:12px;" value=${selEx} onChange=${e=>setSelEx(e.target.value)}>
              <option value="">Seleccionar ejercicio...</option>
              ${allExercises.map(e=>html`<option>${e}</option>`)}
            </select>
            ${selEx && exHistory.length>0 && LineChart && html`
              <div style="height:200px;">
                <${ResponsiveContainer} width="100%" height="100%">
                  <${LineChart} data=${exHistory} margin=${{top:5,right:5,left:-20,bottom:0}}>
                    <${CartesianGrid} strokeDasharray="3 3" stroke="#1E2D45"/>
                    <${XAxis} dataKey="week" tick=${{fill:'#64748b',fontSize:9}} axisLine=${false} tickLine=${false}/>
                    <${YAxis} yAxisId="w" tick=${{fill:'#64748b',fontSize:9}} axisLine=${false} tickLine=${false} unit="kg"/>
                    <${YAxis} yAxisId="r" orientation="right" domain=${[1,10]} tick=${{fill:'#F59E0B',fontSize:9}} axisLine=${false} tickLine=${false}/>
                    <${Tooltip} contentStyle=${tooltipStyle} formatter=${(v,n)=>[n==='RPE'?v:v+'kg',n]}/>
                    <${Line} yAxisId="w" type="monotone" dataKey="weight" name="Peso" stroke="#10B981" strokeWidth=${2} dot=${{fill:'#10B981',r:3}}/>
                    <${Line} yAxisId="r" type="monotone" dataKey="rpe" name="RPE" stroke="#F59E0B" strokeWidth=${1.5} strokeDasharray="4 3" dot=${{fill:'#F59E0B',r:2}} connectNulls/>
                  <//>
                <//>
              </div>
              <div style="display:flex;gap:12px;margin-top:6px;justify-content:center;">
                <div style="display:flex;align-items:center;gap:4px;"><div style="width:12px;height:2px;background:#10B981;border-radius:1px;"></div><span style="font-size:10px;color:#64748b;">Peso (kg)</span></div>
                <div style="display:flex;align-items:center;gap:4px;"><div style="width:12px;height:2px;background:#F59E0B;border-radius:1px;border-style:dashed;"></div><span style="font-size:10px;color:#64748b;">RPE (fatiga)</span></div>
              </div>
            `}
            ${selEx && exHistory.length===0 && html`<p style="color:#64748b;font-size:13px;text-align:center;padding:20px 0;">Sin datos registrados aún para este ejercicio.</p>`}
          <//>

          <!-- RÉCORDS PERSONALES -->
          ${personalRecords.length > 0 && html`
            <${Card}>
              <p style="margin:0 0 12px;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;font-weight:700;color:#F59E0B;">🏆 Récords Personales</p>
              <div style="display:flex;flex-direction:column;gap:6px;">
                ${personalRecords.map(([ex, pr], i) => html`
                  <div style="display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:7px;background:${i===0?'rgba(245,158,11,0.08)':'rgba(10,15,30,0.4)'};border:1px solid ${i===0?'rgba(245,158,11,0.3)':'#1E2D45'};">
                    <div style="display:flex;align-items:center;gap:8px;min-width:0;">
                      <span style="font-size:12px;flex-shrink:0;">${i===0?'🥇':i===1?'🥈':i===2?'🥉':'  '}</span>
                      <span style="font-size:12px;color:#cbd5e1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${ex}</span>
                    </div>
                    <span style="font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:${i===0?'#F59E0B':'#94a3b8'};flex-shrink:0;margin-left:8px;">${pr}kg</span>
                  </div>
                `)}
              </div>
            <//>
          `}

          ${macHistory.length>1 && BarChart && html`
            <${Card}>
              <p style="margin:0 0 12px;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;font-weight:700;color:#F59E0B;">Calorías por Semana</p>
              <div style="height:160px;">
                <${ResponsiveContainer} width="100%" height="100%">
                  <${BarChart} data=${macHistory} margin=${{top:5,right:5,left:-20,bottom:0}}>
                    <${CartesianGrid} strokeDasharray="3 3" stroke="#1E2D45"/>
                    <${XAxis} dataKey="week" tick=${{fill:'#64748b',fontSize:9}} axisLine=${false} tickLine=${false}/>
                    <${YAxis} tick=${{fill:'#64748b',fontSize:9}} axisLine=${false} tickLine=${false}/>
                    <${Tooltip} contentStyle=${tooltipStyle}/>
                    <${Bar} dataKey="cals" name="Kcal" fill="#F59E0B" radius=${[4,4,0,0]}/>
                  <//>
                <//>
              </div>
            <//>
          `}

          <!-- PESO CORPORAL -->
          ${weightHistory.length > 0 && LineChart && html`
            <${Card}>
              <p style="margin:0 0 12px;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;font-weight:700;color:#38BDF8;">⚖️ Evolución de Peso Corporal</p>
              <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
                <div>
                  <span style="font-size:10px;color:#64748b;">Inicio: </span>
                  <span style="font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:white;">${weightHistory[0]?.kg}kg</span>
                </div>
                <div>
                  <span style="font-size:10px;color:#64748b;">Actual: </span>
                  <span style="font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:${pn(weightHistory.at(-1)?.kg) < pn(weightHistory[0]?.kg) ? '#10B981':'#F59E0B'};">
                    ${weightHistory.at(-1)?.kg}kg
                    ${weightHistory.length>1 ? ` (${(pn(weightHistory.at(-1)?.kg)-pn(weightHistory[0]?.kg)>0?'+':'')}${(pn(weightHistory.at(-1)?.kg)-pn(weightHistory[0]?.kg)).toFixed(1)}kg)` : ''}
                  </span>
                </div>
              </div>
              <div style="height:160px;">
                <${ResponsiveContainer} width="100%" height="100%">
                  <${LineChart} data=${weightHistory} margin=${{top:5,right:5,left:-20,bottom:0}}>
                    <${CartesianGrid} strokeDasharray="3 3" stroke="#1E2D45"/>
                    <${XAxis} dataKey="week" tick=${{fill:'#64748b',fontSize:9}} axisLine=${false} tickLine=${false}/>
                    <${YAxis} tick=${{fill:'#64748b',fontSize:9}} axisLine=${false} tickLine=${false} unit="kg" domain=${['auto','auto']}/>
                    <${Tooltip} contentStyle=${tooltipStyle} formatter=${v=>[v+'kg','Peso']}/>
                    <${Line} type="monotone" dataKey="kg" name="Peso" stroke="#38BDF8" strokeWidth=${2} dot=${{fill:'#38BDF8',r:4}} connectNulls/>
                  <//>
                <//>
              </div>
            <//>
          `}

          <!-- EXPORTAR -->
          <${Card}>
            <p style="margin:0 0 10px;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;font-weight:700;color:#64748b;">📤 Exportar</p>
            <button onClick=${exportImage}
              style="width:100%;padding:10px;border-radius:8px;border:1px solid rgba(99,102,241,0.3);background:rgba(99,102,241,0.1);color:#818CF8;font-size:13px;font-weight:700;font-family:'Barlow Condensed',sans-serif;cursor:pointer;letter-spacing:0.05em;">
              📸 Capturar progreso como imagen
            </button>
            <p style="margin:6px 0 0;font-size:10px;color:#374151;text-align:center;">
              Usá Ctrl+P o la captura de pantalla del celular para guardar
            </p>
          <//>

        </div>
      `;
    };

    // ═══════════════════════════════════════════════════
    //  FLOATING TIMER
    // ═══════════════════════════════════════════════════
    const FloatingTimer = ({left, active, onToggle, onReset}) => {
      if(left===0 && !active) return null;
      const urgent = left<=10 && active;
      return html`
        <div style="position:fixed;bottom:88px;right:16px;z-index:50;display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:16px;background:rgba(8,13,26,0.97);border:1px solid #6366F1;box-shadow:0 0 20px rgba(99,102,241,0.25);">
          <div style="width:48px;height:48px;border-radius:12px;background:#162035;border:1px solid #6366F1;display:flex;align-items:center;justify-content:center;">
            <span class=${urgent?'timer-urgent':''} style=${`font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;color:${urgent?'#EF4444':'#6366F1'};`}>${ft(left)}</span>
          </div>
          <div style="display:flex;gap:6px;">
            <button class="btn-icon" style="background:#1E2D45;" onClick=${onToggle}>${active ? html`<${IPause} s=${16}/>` : html`<${IPlay} s=${16}/>`}</button>
            <button class="btn-icon" style="background:#1E2D45;" onClick=${onReset}><${IReset} s=${16} c="text-red"/></button>
          </div>
        </div>
      `;
    };

    // ═══════════════════════════════════════════════════
    //  LOGIN VIEW — Magic Link
    // ═══════════════════════════════════════════════════
    const formatTaskDate = (value) => {
      if(!value) return 'Sin fecha';
      try {
        return new Date(value).toLocaleString('es-AR', {
          day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit'
        });
      } catch(e) { return value; }
    };

    const priorityColor = (priority) => ({
      high: '#EF4444',
      normal: '#F59E0B',
      low: '#10B981'
    }[priority] || '#94A3B8');
    const CATEGORY_OPTIONS = [
      { value:'personal', label:'Personal', color:'#6366F1' },
      { value:'estudio', label:'Estudio', color:'#10B981' },
      { value:'salud', label:'Salud', color:'#F59E0B' },
      { value:'trabajo', label:'Trabajo', color:'#EF4444' }
    ];
    const categoryMeta = (value) => CATEGORY_OPTIONS.find(c => c.value === value) || CATEGORY_OPTIONS[0];
    const AI_THREADS_KEY = 'enzo_ai_thought_threads_v1';

    const loadThoughtThreads = () => {
      try { return JSON.parse(localStorage.getItem(AI_THREADS_KEY) || '{}') || {}; }
      catch(_) { return {}; }
    };
    const saveThoughtThreads = (threads) => {
      try { localStorage.setItem(AI_THREADS_KEY, JSON.stringify(threads || {})); } catch(_) {}
    };
    const AI_DRAFTS_KEY = 'enzo_ai_thought_drafts_v1';
    const loadThoughtDrafts = () => {
      try { return JSON.parse(localStorage.getItem(AI_DRAFTS_KEY) || '{}') || {}; }
      catch(_) { return {}; }
    };
    const saveThoughtDrafts = (drafts) => {
      try { localStorage.setItem(AI_DRAFTS_KEY, JSON.stringify(drafts || {})); } catch(_) {}
    };
    const SWEETS_STOCK_KEY = 'enzo_sweets_sauces_stock_v1';

    const SWEETS_STOCK_DEFAULT = {
      damasco: '',
      durazno: '',
      ciruela: '',
      pera: '',
      alcayota: '',
      tomate_triturado: '',
      tomate_entero: '',
      otro_dulce_nombre: '',
      otro_dulce_stock: ''
    };
    const SWEETS_SOLD_DEFAULT = {
      damasco: '',
      durazno: '',
      ciruela: '',
      pera: '',
      alcayota: '',
      tomate_triturado: '',
      tomate_entero: '',
      otro_dulce_stock: ''
    };

    const RecipesView = ({session}) => {
      const [rows, setRows] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState('');
      const [search, setSearch] = useState('');
      const [typeFilter, setTypeFilter] = useState('all');
      const [editingId, setEditingId] = useState(null);
      const [saving, setSaving] = useState(false);
      const [sweetsStock, setSweetsStock] = useState(SWEETS_STOCK_DEFAULT);
      const [sweetsLoading, setSweetsLoading] = useState(true);
      const [sweetsSaving, setSweetsSaving] = useState(false);
      const [sweetsMsg, setSweetsMsg] = useState('');
      const [recipesOpen, setRecipesOpen] = useState(true);
      const [sweetsOpen, setSweetsOpen] = useState(false);
      const [soldOpen, setSoldOpen] = useState(false);
      const [soldDraft, setSoldDraft] = useState(SWEETS_SOLD_DEFAULT);
      const [form, setForm] = useState({
        recipe_name: '',
        aliases: '',
        base_qty: '1',
        base_unit: 'porcion',
        stock_qty: '',
        stock_unit: '',
        low_stock_threshold: '',
        cals: '',
        prot: '',
        carb: '',
        fat: '',
        ingredients: '',
        notes: ''
      });

      const loadRecipes = useCallback(async () => {
        setLoading(true);
        setError('');
        try {
          const { data, error } = await supabase
            .from('user_recipes')
            .select('id, recipe_name, aliases, base_qty, base_unit, stock_qty, stock_unit, low_stock_threshold, macros, ingredients, notes, updated_at')
            .order('updated_at', { ascending: false });
          if(error) throw error;
          setRows(data || []);
        } catch(e) {
          setError(e.message || 'No se pudieron cargar las recetas.');
        } finally {
          setLoading(false);
        }
      }, []);

      useEffect(() => { loadRecipes(); }, [loadRecipes]);

      const loadSweetsStock = useCallback(async () => {
        setSweetsLoading(true);
        setSweetsMsg('');
        try {
          const local = JSON.parse(localStorage.getItem(SWEETS_STOCK_KEY) || 'null');
          const { data, error } = await supabase
            .from('app_inventory')
            .select('data')
            .eq('key', 'sweets_sauces_stock')
            .maybeSingle();
          if(error) {
            setSweetsStock({ ...SWEETS_STOCK_DEFAULT, ...(local || {}) });
            setSweetsMsg('Stock local cargado. El guardado remoto está restringido por permisos.');
            return;
          }
          const merged = { ...SWEETS_STOCK_DEFAULT, ...(local || {}), ...(data?.data || {}) };
          setSweetsStock(merged);
          try { localStorage.setItem(SWEETS_STOCK_KEY, JSON.stringify(merged)); } catch(_) {}
        } catch(e) {
          try {
            const local = JSON.parse(localStorage.getItem(SWEETS_STOCK_KEY) || 'null');
            setSweetsStock({ ...SWEETS_STOCK_DEFAULT, ...(local || {}) });
            setSweetsMsg('Stock local cargado.');
          } catch(_) {
            setSweetsMsg(e.message || 'No se pudo cargar el stock de dulces y salsas.');
          }
        } finally {
          setSweetsLoading(false);
        }
      }, []);

      useEffect(() => { loadSweetsStock(); }, [loadSweetsStock]);

      const resetForm = () => {
        setEditingId(null);
        setForm({
          recipe_name: '',
          aliases: '',
          base_qty: '1',
          base_unit: 'porcion',
          stock_qty: '',
          stock_unit: '',
          low_stock_threshold: '',
          cals: '',
          prot: '',
          carb: '',
          fat: '',
          ingredients: '',
          notes: ''
        });
      };

      const hydrateForm = (recipe) => {
        setEditingId(recipe.id);
        setForm({
          recipe_name: recipe.recipe_name || '',
          aliases: Array.isArray(recipe.aliases) ? recipe.aliases.join(', ') : '',
          base_qty: String(recipe.base_qty ?? 1),
          base_unit: recipe.base_unit || 'porcion',
          stock_qty: recipe.stock_qty == null ? '' : String(recipe.stock_qty),
          stock_unit: recipe.stock_unit || '',
          low_stock_threshold: recipe.low_stock_threshold == null ? '' : String(recipe.low_stock_threshold),
          cals: String(Math.round(parseFloat(recipe.macros?.cals) || 0)),
          prot: String(Math.round(parseFloat(recipe.macros?.prot) || 0)),
          carb: String(Math.round(parseFloat(recipe.macros?.carb) || 0)),
          fat: String(Math.round(parseFloat(recipe.macros?.fat) || 0)),
          ingredients: Array.isArray(recipe.ingredients)
            ? recipe.ingredients.map(it => `${it.qty || '1 porcion'} | ${it.name || 'Ingrediente'}`).join('\n')
            : '',
          notes: recipe.notes || ''
        });
      };

      const saveRecipe = async () => {
        if(!form.recipe_name.trim()) return;
        setSaving(true);
        setError('');
        try {
          const payload = {
            recipe_name: form.recipe_name.trim(),
            aliases: form.aliases.split(',').map(v => v.trim()).filter(Boolean),
            base_qty: parseFloat(String(form.base_qty).replace(',', '.')) || 1,
            base_unit: form.base_unit.trim() || 'porcion',
            stock_qty: form.stock_qty === '' ? null : (parseFloat(String(form.stock_qty).replace(',', '.')) || 0),
            stock_unit: form.stock_unit.trim() || null,
            low_stock_threshold: form.low_stock_threshold === '' ? null : (parseFloat(String(form.low_stock_threshold).replace(',', '.')) || 0),
            macros: {
              cals: Math.max(0, Math.round(parseFloat(form.cals) || 0)),
              prot: Math.max(0, Math.round(parseFloat(form.prot) || 0)),
              carb: Math.max(0, Math.round(parseFloat(form.carb) || 0)),
              fat: Math.max(0, Math.round(parseFloat(form.fat) || 0))
            },
            ingredients: form.ingredients
              .split('\n')
              .map(line => line.trim())
              .filter(Boolean)
              .map(line => {
                const [qtyPart, ...nameParts] = line.split('|');
                return {
                  qty: (qtyPart || '').trim() || '1 porcion',
                  name: nameParts.join('|').trim() || qtyPart.trim() || 'Ingrediente'
                };
              }),
            notes: form.notes.trim() || null,
            updated_at: new Date().toISOString()
          };

          if(editingId) {
            const { data, error } = await supabase.from('user_recipes')
              .update(payload)
              .eq('id', editingId)
              .select()
              .single();
            if(error) throw error;
            setRows(prev => prev.map(r => r.id === editingId ? data : r));
          } else {
            const { data, error } = await supabase.from('user_recipes')
              .insert(payload)
              .select()
              .single();
            if(error) throw error;
            setRows(prev => [data, ...prev]);
          }
          resetForm();
        } catch(e) {
          setError(e.message || 'No se pudo guardar.');
        } finally {
          setSaving(false);
        }
      };

      const updateSweetsField = (key, value) => {
        setSweetsStock(prev => ({ ...prev, [key]: value }));
      };
      const updateSoldField = (key, value) => {
        setSoldDraft(prev => ({ ...prev, [key]: value }));
      };
      const persistSweetsPayload = async (payload, okMsg) => {
        try { localStorage.setItem(SWEETS_STOCK_KEY, JSON.stringify(payload)); } catch(_) {}
        const { error } = await supabase
          .from('app_inventory')
          .upsert({
            key: 'sweets_sauces_stock',
            data: payload,
            updated_at: new Date().toISOString()
          }, { onConflict: 'key' });
        if(error) {
          setSweetsMsg(`${okMsg} Guardado local porque el remoto está restringido por permisos.`);
        } else {
          setSweetsMsg(okMsg);
        }
        setTimeout(() => setSweetsMsg(''), 2500);
      };

      const saveSweetsStock = async () => {
        setSweetsSaving(true);
        setSweetsMsg('');
        try {
          const payload = { ...SWEETS_STOCK_DEFAULT, ...sweetsStock };
          try { localStorage.setItem(SWEETS_STOCK_KEY, JSON.stringify(payload)); } catch(_) {}
          const { error } = await supabase
            .from('app_inventory')
            .upsert({
              key: 'sweets_sauces_stock',
              data: payload,
              updated_at: new Date().toISOString()
            }, { onConflict: 'key' });
          if(error) {
            setSweetsMsg('Stock guardado en este dispositivo. El guardado remoto está restringido por permisos.');
          } else {
            setSweetsMsg('Stock de dulces y salsas guardado.');
          }
          setTimeout(() => setSweetsMsg(''), 2500);
        } catch(e) {
          setSweetsMsg('Stock guardado en este dispositivo.');
        } finally {
          setSweetsSaving(false);
        }
      };

      const registerSoldSweets = async () => {
        setSweetsSaving(true);
        setSweetsMsg('');
        try {
          const next = { ...sweetsStock };
          ['damasco','durazno','ciruela','pera','alcayota','tomate_triturado','tomate_entero'].forEach((key) => {
            const sold = parseFloat(String(soldDraft[key] || '').replace(',', '.')) || 0;
            const current = parseFloat(String(sweetsStock[key] || '').replace(',', '.')) || 0;
            next[key] = String(Math.max(0, current - sold));
          });
          const otherSold = parseFloat(String(soldDraft.otro_dulce_stock || '').replace(',', '.')) || 0;
          const otherCurrent = parseFloat(String(sweetsStock.otro_dulce_stock || '').replace(',', '.')) || 0;
          next.otro_dulce_stock = String(Math.max(0, otherCurrent - otherSold));
          setSweetsStock(next);
          try { localStorage.setItem(SWEETS_STOCK_KEY, JSON.stringify({ ...SWEETS_STOCK_DEFAULT, ...next })); } catch(_) {}
          setSweetsMsg('Venta descontada del stock.');
          setTimeout(() => setSweetsMsg(''), 2500);
          setSoldDraft(SWEETS_SOLD_DEFAULT);
          setSoldOpen(false);
        } catch(e) {
          setSweetsMsg('No se pudo descontar la venta.');
        } finally {
          setSweetsSaving(false);
        }
      };

      const deleteRecipe = async (id) => {
        try {
          const { error } = await supabase.from('user_recipes').delete().eq('id', id);
          if(error) throw error;
          setRows(prev => prev.filter(r => r.id !== id));
          if(editingId === id) resetForm();
        } catch(e) {
          setError(e.message || 'No se pudo borrar.');
        }
      };

      const classifyRecipe = (recipe) =>
        Array.isArray(recipe.ingredients) && recipe.ingredients.length > 0 ? 'receta' : 'ingrediente';

      const filtered = rows.filter(recipe => {
        const kind = classifyRecipe(recipe);
        const hay = `${recipe.recipe_name || ''} ${(recipe.notes || '')}`.toLowerCase();
        if(typeFilter !== 'all' && kind !== typeFilter) return false;
        if(search.trim() && !hay.includes(search.trim().toLowerCase())) return false;
        return true;
      });

      return html`
        <div style="display:flex;flex-direction:column;gap:12px;">
          <${SectionAccordion}
            icon=${html`<span style="width:10px;height:10px;border-radius:999px;background:#10B981;display:inline-block;"></span>`}
            title="Recetas e ingredientes"
            isOpen=${recipesOpen}
            onToggle=${()=>setRecipesOpen(v=>!v)}
          >
            <div style="display:flex;flex-direction:column;gap:12px;">
              <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;">
                <p style="margin:0;font-size:12px;color:#64748b;">Carga comidas o ingredientes con macros conocidos. Si escribis ese nombre en una comida, la app lo usa antes que Gemini.</p>
                <button class="btn-icon" style="background:#162035;border:1px solid #1E2D45;" onClick=${loadRecipes}>
                  <${ISync} s=${16}/>
                </button>
              </div>
              ${error && html`<div style="padding:8px 10px;border-radius:8px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);color:#FCA5A5;font-size:12px;">${error}</div>`}
              <div style="display:flex;flex-direction:column;gap:8px;">
                <input class="inp" value=${form.recipe_name} onInput=${e=>setForm(prev => ({ ...prev, recipe_name:e.target.value }))} placeholder="Nombre: arroz con pollo casero, avena, banana..." />
                <p style="margin:0;font-size:11px;color:#94A3B8;">Nombre: como lo vas a escribir despues en la comida. Puede ser singular o plural.</p>
                <input class="inp" value=${form.aliases} onInput=${e=>setForm(prev => ({ ...prev, aliases:e.target.value }))} placeholder="Alias separados por coma (opcional)" />
                <p style="margin:0;font-size:11px;color:#94A3B8;">Alias: variantes que tambien queres que reconozca, por ejemplo huevo, huevos o maple de huevos.</p>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
                  <input class="inp" value=${form.base_qty} onInput=${e=>setForm(prev => ({ ...prev, base_qty:e.target.value }))} placeholder="Cantidad base" />
                  <input class="inp" value=${form.base_unit} onInput=${e=>setForm(prev => ({
                    ...prev,
                    base_unit:e.target.value,
                    stock_unit: (!prev.stock_unit || prev.stock_unit === prev.base_unit) ? e.target.value : prev.stock_unit
                  }))} placeholder="Unidad base (g, porcion, unidad...)" />
                </div>
                <p style="margin:0;font-size:11px;color:#94A3B8;">Cantidad base + unidad base: la porcion sobre la que cargas los macros. Ejemplo: 1 unidad, 100 g, 1 porcion.</p>
                <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;">
                  <input class="inp" value=${form.stock_qty} onInput=${e=>setForm(prev => ({ ...prev, stock_qty:e.target.value }))} placeholder="Stock actual" />
                  <input class="inp" value=${form.stock_unit} onInput=${e=>setForm(prev => ({ ...prev, stock_unit:e.target.value }))} placeholder="Unidad stock" />
                  <input class="inp" value=${form.low_stock_threshold} onInput=${e=>setForm(prev => ({ ...prev, low_stock_threshold:e.target.value }))} placeholder="Minimo de reposicion" />
                </div>
                <p style="margin:0;font-size:11px;color:#94A3B8;">Stock actual: cuanto te queda en casa ahora mismo. Unidad stock: en que lo medis para descontar, por ejemplo g, porcion o unidad.</p>
                <p style="margin:0;font-size:11px;color:#94A3B8;">Minimo de reposicion: cuando el stock llegue a ese valor, la app te va a marcar que conviene reponer.</p>
                <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;">
                  <input class="inp" value=${form.cals} onInput=${e=>setForm(prev => ({ ...prev, cals:e.target.value }))} placeholder="Kcal" />
                  <input class="inp" value=${form.prot} onInput=${e=>setForm(prev => ({ ...prev, prot:e.target.value }))} placeholder="P" />
                  <input class="inp" value=${form.carb} onInput=${e=>setForm(prev => ({ ...prev, carb:e.target.value }))} placeholder="C" />
                  <input class="inp" value=${form.fat} onInput=${e=>setForm(prev => ({ ...prev, fat:e.target.value }))} placeholder="G" />
                </div>
                <p style="margin:0;font-size:11px;color:#94A3B8;">Macros: los valores conocidos para esa cantidad base.</p>
                <textarea value=${form.ingredients} onInput=${e=>setForm(prev => ({ ...prev, ingredients:e.target.value }))} placeholder="Ingredientes, una linea por item. Formato: cantidad | nombre" style="width:100%;background:#0F1729;border:1px solid #1E2D45;border-radius:8px;padding:10px;font-size:12px;color:#cbd5e1;font-family:'Barlow',sans-serif;resize:vertical;min-height:88px;"></textarea>
                <p style="margin:0;font-size:11px;color:#94A3B8;">Ingredientes: util si es una receta compuesta. Si es un ingrediente simple, lo podes dejar vacio.</p>
                <textarea value=${form.notes} onInput=${e=>setForm(prev => ({ ...prev, notes:e.target.value }))} placeholder="Nota opcional" style="width:100%;background:#0F1729;border:1px solid #1E2D45;border-radius:8px;padding:10px;font-size:12px;color:#cbd5e1;font-family:'Barlow',sans-serif;resize:vertical;min-height:64px;"></textarea>
                <p style="margin:0;font-size:11px;color:#94A3B8;">Nota: aclaraciones tuyas, por ejemplo marca, cocido/crudo o donde lo compras.</p>
                <div style="display:flex;gap:6px;flex-wrap:wrap;">
                  <button onClick=${saveRecipe} style="padding:8px 12px;border-radius:8px;border:none;background:#10B981;color:#041018;font-size:12px;font-weight:800;font-family:'Barlow Condensed',sans-serif;cursor:pointer;letter-spacing:0.06em;">
                    ${saving ? 'GUARDANDO...' : (editingId ? 'GUARDAR CAMBIOS' : 'AGREGAR A LA BIBLIOTECA')}
                  </button>
                  ${editingId && html`
                    <button onClick=${resetForm} style="padding:8px 12px;border-radius:8px;border:1px solid rgba(100,116,139,0.35);background:rgba(100,116,139,0.12);color:#CBD5E1;font-size:12px;font-weight:700;font-family:'Barlow Condensed',sans-serif;cursor:pointer;letter-spacing:0.05em;">
                      CANCELAR
                    </button>
                  `}
                </div>
              </div>

              <${Card}>
                <div style="display:flex;flex-direction:column;gap:8px;">
                  <input class="inp" value=${search} onInput=${e=>setSearch(e.target.value)} placeholder="Buscar por nombre..." />
                  <select class="inp" value=${typeFilter} onChange=${e=>setTypeFilter(e.target.value)}>
                    <option value="all">Todo</option>
                    <option value="ingrediente">Ingredientes</option>
                    <option value="receta">Recetas</option>
                  </select>
                </div>
              <//>

              <${Card}>
                <p style="margin:0 0 10px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#94A3B8;">Biblioteca</p>
                ${loading ? html`<p style="margin:0;color:#64748b;font-size:12px;">Cargando...</p>` : filtered.length === 0 ? html`<p style="margin:0;color:#64748b;font-size:12px;">Todavia no hay elementos cargados.</p>` : html`
                  <div style="display:flex;flex-direction:column;gap:8px;">

    const StudyView = ({session}) => {
      const [rows, setRows] = useState([]);

      const [expanded, setExpanded] = useState({});

      const [savingMap, setSavingMap] = useState({});

      const setSaving = (subject, val) => setSavingMap(prev => ({ ...prev, [subject]: val }));

      const loadStudy = useCallback(async () => {
        setLoading(true);
        setError('');
        try {
          const { data: existing, error: fetchErr } = await supabase
            .from('study_plan')
            .select('id, subject, topics, updated_at')
            .order('subject', { ascending: true });
          if(fetchErr) throw fetchErr;

          const present = new Set((existing || []).map(r => r.subject));
          const missing = STUDY_SUBJECT_SEEDS.filter(s => !present.has(s.subject));
          if(missing.length) {
            const { error: insertErr } = await supabase
              .from('study_plan')
              .insert(missing.map(item => ({
                subject: item.subject,
                topics: item.topics,
                updated_at: new Date().toISOString()
              })));
            if(insertErr && !String(insertErr.message || '').toLowerCase().includes('duplicate')) throw insertErr;
          }

          const { data: refreshed, error: refetchErr } = await supabase
            .from('study_plan')
            .select('id, subject, topics, updated_at')
            .order('subject', { ascending: true });
          if(refetchErr) throw refetchErr;

          setRows(refreshed || []);
          setExpanded(prev => {
            const next = { ...prev };
            (refreshed || []).forEach(r => { if(next[r.subject] == null) next[r.subject] = true; });
            return next;
          });
        } catch(e) {
          setError(e.message || 'No se pudo cargar estudio.');
        } finally {
          setLoading(false);
        }
      }, []);

      useEffect(() => { loadStudy(); }, [loadStudy]);

      const saveSubjectTopics = async (row, nextTopics) => {
        setSaving(row.subject, true);
        setError('');
        try {
          const { data, error } = await supabase
            .from('study_plan')
            .update({ topics: nextTopics, updated_at: new Date().toISOString() })
            .eq('id', row.id)
            .select()
            .single();
          if(error) throw error;
          setRows(prev => prev.map(r => r.id === row.id ? data : r));
        } catch(e) {
          setError(e.message || 'No se pudo guardar el tema.');
        } finally {
          setSaving(row.subject, false);
        }
      };

      const toggleTopic = async (row, idx) => {
        const current = Array.isArray(row.topics) ? row.topics : [];
        const nextTopics = current.map((topic, i) => i === idx ? { ...topic, done: !topic.done } : topic);
        setRows(prev => prev.map(r => r.id === row.id ? { ...r, topics: nextTopics } : r));
        await saveSubjectTopics(row, nextTopics);
      };

      const addTopic = async (row) => {
        const draft = String(drafts[row.subject] || '').trim();
        if(!draft) return;
        const current = Array.isArray(row.topics) ? row.topics : [];
        const nextTopics = [...current, { name: draft, done: false }];
        setRows(prev => prev.map(r => r.id === row.id ? { ...r, topics: nextTopics } : r));
        setDrafts(prev => ({ ...prev, [row.subject]: '' }));
        await saveSubjectTopics(row, nextTopics);
      };

      const removeTopic = async (row, idx) => {
        const current = Array.isArray(row.topics) ? row.topics : [];
        const nextTopics = current.filter((_, i) => i !== idx);
        setRows(prev => prev.map(r => r.id === row.id ? { ...r, topics: nextTopics } : r));
        await saveSubjectTopics(row, nextTopics);
      };

      const sendTopicToTasks = async (row, topic) => {
        setError('');
        setNotice('');
        try {
          const payload = {
            title: `${row.subject}: ${topic.name}`,
            details: `Tema de estudio pendiente de ${row.subject}`,
            priority: 'normal',
            status: 'pending',
            category: 'estudio'
          };
          const { error } = await supabase.from('tasks').insert(payload);
          if(error) throw error;
          setNotice(`Tema enviado a TAREAS: ${topic.name}`);
          setTimeout(() => setNotice(''), 2500);
        } catch(e) {
          setError(e.message || 'No se pudo pasar el tema a tareas.');
        }
      };

      const totalSubjects = rows.length;
      const totalTopics = rows.reduce((acc, row) => acc + (Array.isArray(row.topics) ? row.topics.length : 0), 0);
      const completedTopics = rows.reduce((acc, row) => acc + (Array.isArray(row.topics) ? row.topics.filter(t => !!t.done).length : 0), 0);
      const pendingTopics = Math.max(0, totalTopics - completedTopics);
      const completionPct = totalTopics ? Math.round((completedTopics / totalTopics) * 100) : 0;

      return html`
        <div class="fade-up" style="display:flex;flex-direction:column;gap:12px;">
          <${Card}>
            <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px;">
              <div>
                <p style="margin:0;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#10B981;">Plan de estudio</p>
                <p style="margin:4px 0 0;font-size:12px;color:#64748b;">Materias UTN con temas y progreso. Todo queda guardado en study_plan.</p>
              </div>
              <button class="btn-icon" style="background:#162035;border:1px solid #1E2D45;" onClick=${loadStudy}>
                <${ISync} s=${16}/>
              </button>
            </div>
            ${notice && html`<div style="margin-bottom:10px;padding:8px 10px;border-radius:8px;background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.25);color:#86EFAC;font-size:12px;">${notice}</div>`}
            ${error && html`<div style="margin-bottom:10px;padding:8px 10px;border-radius:8px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);color:#FCA5A5;font-size:12px;">${error}</div>`}
            ${loading ? html`
              <p style="margin:0;color:#94A3B8;font-size:12px;">Cargando materias...</p>
            ` : html`
              <div style="display:flex;flex-direction:column;gap:10px;">
                <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;">
                  ${[
                    ['Materias', totalSubjects, '#10B981'],
                    ['Pendientes', pendingTopics, '#F59E0B'],
                    ['Hechos', completedTopics, '#6366F1'],
                    ['Avance', `${completionPct}%`, '#38BDF8']
                  ].map(([label, value, color]) => html`
                    <div style=${`background:rgba(15,23,41,0.75);border:1px solid ${color}33;border-radius:10px;padding:10px;text-align:center;`}>
                      <p style="margin:0 0 4px;font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:#64748b;">${label}</p>
                      <p style=${`margin:0;font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;color:${color};`}>${value}</p>
                    </div>
                  `)}
                </div>
                ${rows.map(row => {
                  const topics = Array.isArray(row.topics) ? row.topics : [];
                  const done = topics.filter(t => !!t.done).length;
                  const pct = topics.length ? Math.round((done / topics.length) * 100) : 0;
                  return html`
                    <div style="border-radius:12px;border:1px solid #1E2D45;background:rgba(15,23,41,0.7);overflow:hidden;">
                      <button onClick=${()=>setExpanded(prev => ({ ...prev, [row.subject]: !prev[row.subject] }))} style="width:100%;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 14px;background:transparent;border:none;color:#E2E8F0;cursor:pointer;">
                        <div style="flex:1;text-align:left;">
                          <div style="display:flex;justify-content:space-between;gap:8px;align-items:center;margin-bottom:6px;">
                            <p style="margin:0;font-size:14px;font-weight:700;color:#E2E8F0;">${row.subject}</p>
                            <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:${pct===100?'#10B981':pct>0?'#F59E0B':'#64748b'};">${done}/${topics.length} · ${pct}%</span>
                          </div>
                          <div style="height:7px;border-radius:999px;background:#0F1729;border:1px solid #1E2D45;overflow:hidden;">
                            <div style=${`height:100%;width:${pct}%;background:${pct===100?'#10B981':'linear-gradient(90deg,#10B981,#6366F1)'};transition:width 0.2s;`}></div>
                          </div>
                        </div>
                        <${IChevD} s=${18} c=${`chev ${expanded[row.subject]?'open':''}`}/>
                      </button>
                      ${expanded[row.subject] && html`
                        <div style="padding:0 14px 14px;display:flex;flex-direction:column;gap:8px;border-top:1px solid #1E2D45;">
                          <div style="padding-top:10px;display:flex;flex-direction:column;gap:6px;">
                            ${topics.length === 0 ? html`
                              <p style="margin:0;color:#64748b;font-size:12px;">Todavia no hay temas cargados.</p>
                            ` : topics.map((topic, idx) => html`
                              <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;background:rgba(8,13,26,0.5);padding:8px 10px;border-radius:8px;border:1px solid #1E2D45;">
                                <label style="display:flex;align-items:center;gap:10px;flex:1;cursor:pointer;">
                                  <input type="checkbox" checked=${!!topic.done} onChange=${()=>toggleTopic(row, idx)} />
                                  <span style=${`font-size:13px;color:${topic.done?'#64748b':'#E2E8F0'};text-decoration:${topic.done?'line-through':'none'};`}>${topic.name}</span>
                                </label>
                                <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;">
                                  ${!topic.done && html`
                                    <button onClick=${()=>sendTopicToTasks(row, topic)} style="padding:4px 8px;border-radius:6px;border:1px solid rgba(16,185,129,0.3);background:rgba(16,185,129,0.12);color:#86EFAC;font-size:10px;font-weight:700;font-family:'Barlow Condensed',sans-serif;cursor:pointer;letter-spacing:0.05em;">
                                      PASAR A TAREA
                                    </button>
                                  `}
                                  <button onClick=${()=>removeTopic(row, idx)} style="padding:4px 8px;border-radius:6px;border:1px solid rgba(239,68,68,0.3);background:rgba(239,68,68,0.12);color:#FCA5A5;font-size:10px;font-weight:700;font-family:'Barlow Condensed',sans-serif;cursor:pointer;letter-spacing:0.05em;">
                                    BORRAR
                                  </button>
                                </div>
                              </div>
                            `)}
                          </div>
                          <div style="display:flex;gap:8px;align-items:center;">
                            <input class="inp" style="flex:1;" value=${drafts[row.subject] || ''} onInput=${e=>setDrafts(prev => ({ ...prev, [row.subject]: e.target.value }))} placeholder="Agregar tema nuevo..." />
                            <button onClick=${()=>addTopic(row)} style="padding:8px 12px;border-radius:8px;border:none;background:#10B981;color:#041018;font-size:12px;font-weight:800;font-family:'Barlow Condensed',sans-serif;cursor:pointer;letter-spacing:0.05em;">
                              ${savingMap[row.subject] ? 'GUARDANDO...' : 'AGREGAR'}
                            </button>
                          </div>
                        </div>
                      `}
                    </div>
                  `;
                })}
              </div>
            `}
          <//>
        </div>
      `;

    const BOOK_DEFAULT = {
      title: 'El Duelo',
      author: 'Gabriel Rolon',
      current_page: 122,
      total_pages: 450
    };

    const MEDS_STOCK_DEFAULT = {
      roaccutan: 10,
      minoxidil_finasteride: 5,
      last_taken_at: '',
      history: []
    };

    const BooksView = ({session}) => {
      const [book, setBook] = useState(BOOK_DEFAULT);
      const [notes, setNotes] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState('');
      const [notice, setNotice] = useState('');
      const [saving, setSaving] = useState(false);
      const [noteDraft, setNoteDraft] = useState('');
      const [chatDraft, setChatDraft] = useState('');
      const [chatLoading, setChatLoading] = useState(false);
      const [pomodoroActive, setPomodoroActive] = useState(false);
      const [pomodoroLeft, setPomodoroLeft] = useState(25 * 60);

      const loadBooks = useCallback(async () => {
        setLoading(true);
        setError('');
        try {
          const [{ data: invRow, error: invErr }, { data: noteRows, error: notesErr }] = await Promise.all([
            supabase.from('app_inventory').select('data').eq('key', 'reading_progress').maybeSingle(),
            supabase.from('book_notes').select('id, book_title, current_page, question, answer, kind, created_at').order('created_at', { ascending:false }).limit(20)
          ]);
          if(invErr) throw invErr;
          if(notesErr) throw notesErr;
          setBook({ ...BOOK_DEFAULT, ...(invRow?.data || {}) });
          setNotes(noteRows || []);
        } catch(e) {
          setError(e.message || 'No se pudo cargar Libros.');
        } finally {
          setLoading(false);
        }
      }, []);

      useEffect(() => { loadBooks(); }, [loadBooks]);

      useEffect(() => {
        if(!pomodoroActive) return;
        const id = setInterval(() => {
          setPomodoroLeft(prev => {
            if(prev <= 1) {
              clearInterval(id);
              setPomodoroActive(false);
              setNotice('Pomodoro de lectura terminado.');
              setTimeout(() => setNotice(''), 2500);
              return 0;
            }
            return prev - 1;
          });
        }, 1000);
        return () => clearInterval(id);
      }, [pomodoroActive]);

      const saveBook = async (nextBook) => {
        setSaving(true);
        setError('');
        try {
          const payload = {
            ...nextBook,
            current_page: Math.max(0, parseInt(nextBook.current_page || 0, 10) || 0),
            total_pages: Math.max(1, parseInt(nextBook.total_pages || 1, 10) || 1)
          };
          const { error } = await supabase
            .from('app_inventory')
            .upsert({
              key: 'reading_progress',
              data: payload,
              updated_at: new Date().toISOString()
            }, { onConflict: 'key' });
          if(error) throw error;
          setBook(payload);
          setNotice('Progreso de lectura guardado.');
          setTimeout(() => setNotice(''), 2500);
        } catch(e) {
          setError(e.message || 'No se pudo guardar el progreso del libro.');
        } finally {
          setSaving(false);
        }
      };

      const addBookNote = async () => {

    const HealthView = ({session}) => {

      const loadHealth = useCallback(async () => {
        setLoading(true);
        setError('');
        try {
          const local = JSON.parse(localStorage.getItem(MEDS_STOCK_KEY) || 'null');
          const { data, error } = await supabase
            .from('app_inventory')
            .select('data')
            .eq('key', 'meds_stock')
            .maybeSingle();
          if(error) {
            setStock({ ...MEDS_STOCK_DEFAULT, ...(local || {}) });
          } else {
            const merged = { ...MEDS_STOCK_DEFAULT, ...(local || {}), ...(data?.data || {}) };
            setStock(merged);
            try { localStorage.setItem(MEDS_STOCK_KEY, JSON.stringify(merged)); } catch(_) {}
          }
        } catch(e) {
          try {
            const local = JSON.parse(localStorage.getItem(MEDS_STOCK_KEY) || 'null');
            setStock({ ...MEDS_STOCK_DEFAULT, ...(local || {}) });
          } catch(_) {
            setError(e.message || 'No se pudo cargar SALUD.');
          }
        } finally {
          setLoading(false);
        }
      }, []);

      useEffect(() => { loadHealth(); }, [loadHealth]);

      const persistHealth = async (payload, okMsg='Salud guardada.') => {
        setSaving(true);
        setError('');
        try {
          try { localStorage.setItem(MEDS_STOCK_KEY, JSON.stringify(payload)); } catch(_) {}
          const { error } = await supabase
            .from('app_inventory')
            .upsert({
              key: 'meds_stock',
              data: payload,
              updated_at: new Date().toISOString()
            }, { onConflict: 'key' });
          setStock(payload);
          if(error) {
            setNotice(`${okMsg} Guardado local porque el remoto esta restringido.`);
          } else {
            setNotice(okMsg);
          }
          setTimeout(() => setNotice(''), 2500);
        } catch(e) {
          setError(e.message || 'No se pudo guardar SALUD.');
        } finally {
          setSaving(false);
        }
      };

      const updateField = (key, value) => {
        setStock(prev => ({ ...prev, [key]: value }));
      };

      const registerDailyTake = async () => {
        const now = new Date();
        const next = {
          ...stock,
          roaccutan: Math.max(0, (parseInt(stock.roaccutan || 0, 10) || 0) - 1),
          minoxidil_finasteride: Math.max(0, (parseInt(stock.minoxidil_finasteride || 0, 10) || 0) - 1),
          last_taken_at: now.toISOString(),
          history: [{
            at: now.toISOString(),
            type: 'daily_combo',
            roaccutan: 1,
            minoxidil_finasteride: 1
          }, ...(Array.isArray(stock.history) ? stock.history : [])].slice(0, 30)
        };
        await persistHealth(next, 'Toma diaria registrada.');
      };

      const adjustStock = async (field, delta) => {
        const current = parseInt(stock[field] || 0, 10) || 0;
        const nextVal = Math.max(0, current + delta);
        const next = {
          ...stock,
          [field]: nextVal,
          history: [{
            at: new Date().toISOString(),
            type: delta > 0 ? 'restock' : 'manual_adjust',
            field,
            delta
          }, ...(Array.isArray(stock.history) ? stock.history : [])].slice(0, 30)
        };
        await persistHealth(next, delta > 0 ? 'Stock repuesto.' : 'Stock ajustado.');
      };

      const roaccutanCount = parseInt(stock.roaccutan || 0, 10) || 0;
      const minoxCount = parseInt(stock.minoxidil_finasteride || 0, 10) || 0;
      const low = roaccutanCount <= 2 || minoxCount <= 2;

      return html`

                    <div style="padding:12px;border-radius:10px;background:rgba(15,23,41,0.75);border:1px solid ${count <= 2 ? 'rgba(239,68,68,0.3)' : '#1E2D45'};">

                        <button onClick=${()=>adjustStock(key, +10)} style="padding:6px 10px;border-radius:8px;border:1px solid rgba(16,185,129,0.3);background:rgba(16,185,129,0.12);color:#86EFAC;font-size:11px;font-weight:700;font-family:'Barlow Condensed',sans-serif;cursor:pointer;">+ Blindex</button>
                      </div>

                <div style="padding:12px;border-radius:10px;background:rgba(15,23,41,0.75);border:1px solid #1E2D45;">
                  <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:8px;">
                    <p style="margin:0;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#10B981;">Toma diaria</p>
                    <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#94A3B8;">${stock.last_taken_at ? new Date(stock.last_taken_at).toLocaleString('es-AR') : 'Sin registro'}</span>
                  </div>
                  <p style="margin:0 0 10px;font-size:12px;color:#64748b;">Este boton descuenta 1 unidad de Roaccutan y 1 de Minoxidil/Finasteride, y guarda la hora exacta.</p>
                  <button onClick=${registerDailyTake} style="padding:8px 12px;border-radius:8px;border:none;background:#10B981;color:#041018;font-size:12px;font-weight:800;font-family:'Barlow Condensed',sans-serif;cursor:pointer;letter-spacing:0.05em;">

                  <div style="display:flex;flex-direction:column;gap:8px;">
