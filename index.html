    const getYesterdayFast = (allWeeks, currentWk, activeDay) => {
      try {
        const todayStr = getDayDate(currentWk, parseInt(activeDay));
        const todayDt = new Date(todayStr + 'T12:00:00');
        const prevDt = new Date(todayDt); prevDt.setDate(todayDt.getDate() - 1);

        const prevWk = getWeekKey(prevDt);
        const prevDayIdx = prevDt.getDay();
        const prevTracker = allWeeks[prevWk]?.tracker?.[prevDayIdx];

        if(prevTracker && prevTracker.fasted && prevTracker.fastStartTime && prevTracker.fastHours) {
          const [sH, sM] = prevTracker.fastStartTime.split(':').map(Number);
          const dur = pn(prevTracker.fastHours);
          if(!isNaN(sH) && dur > 0) {
            const startDateTime = new Date(prevDt);
            startDateTime.setHours(sH, sM, 0, 0);
            const endDateTime = new Date(startDateTime.getTime() + (dur * 3600000));

            const todayStart = new Date(todayDt); todayStart.setHours(0,0,0,0);
            if(endDateTime > todayStart) {
               const finH = String(endDateTime.getHours()).padStart(2,'0');
               const finM = String(endDateTime.getMinutes()).padStart(2,'0');
               return `⏳ Ayuno de ayer en curso: finaliza a las ${finH}:${finM}`;
            }
          }
        }
      } catch(e) {}
      return null;
    };

    const getRelativeDaySnapshot = (allWeeks, currentWk, activeDay, offsetDays) => {
      try {
        const baseDate = new Date(getDayDate(currentWk, parseInt(activeDay, 10)) + 'T12:00:00');
        baseDate.setDate(baseDate.getDate() + offsetDays);
        const wkKey = getWeekKey(baseDate);
        const dayIdx = String(baseDate.getDay());
        const tracker = allWeeks[wkKey]?.tracker?.[dayIdx] || null;
        return {
          dateKey: getDayDate(wkKey, parseInt(dayIdx, 10)),
          tracker
        };
      } catch(_) {
        return { dateKey:'', tracker:null };
      }
    };

    const HabitsPanel = ({tracker:t, yesterdayFastMsg, onChange, onMed, onMeal, onAddItem, onRemoveItem, onReplaceItem}) => {
      const [open,setOpen] = useState(true);
      const [aiLoading, setAiLoading] = useState([false,false,false]);
      const [aiError,   setAiError]   = useState(['','','']);
      const [recipeSaving, setRecipeSaving] = useState([false,false,false]);
      const [recipeMsg, setRecipeMsg] = useState(['','','']);
      const [savedRecipes, setSavedRecipes] = useState([]);
      const [recipesLoading, setRecipesLoading] = useState(true);
      const [recipesError, setRecipesError] = useState('');
      const [editingRecipeId, setEditingRecipeId] = useState(null);
      const [editingRecipeName, setEditingRecipeName] = useState('');
      const [editingRecipeBaseQty, setEditingRecipeBaseQty] = useState('1');
      const [editingRecipeBaseUnit, setEditingRecipeBaseUnit] = useState('porcion');
      const [editingRecipeCals, setEditingRecipeCals] = useState('0');
      const [editingRecipeProt, setEditingRecipeProt] = useState('0');
      const [editingRecipeCarb, setEditingRecipeCarb] = useState('0');
      const [editingRecipeFat, setEditingRecipeFat] = useState('0');
      const [editingRecipeIngredients, setEditingRecipeIngredients] = useState('');
      const [editingRecipeNotes, setEditingRecipeNotes] = useState('');
      const [editingRecipeSaving, setEditingRecipeSaving] = useState(false);
      const [stockBusyKey, setStockBusyKey] = useState('');
      const [editingMealItem, setEditingMealItem] = useState({ mealIndex:-1, itemIndex:-1 });
      const recipesRef = useRef(null);

      const fs = getFastStats(t);

      // Totales diarios calculados desde items
      const macros = dayTotals(t.meals);

      const normalizeRecipeText = (s='') =>
        String(s)
          .normalize('NFD')
          .replace(/[\u0300-\u036f]/g, '')
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, ' ')
          .trim()
          .replace(/\s+/g, ' ');

      const parseLeadingRecipeAmount = (text='') => {
        const raw = String(text || '').trim().toLowerCase();
        if(!raw) return null;

        let match = raw.match(/^(\d+)\s*\/\s*(\d+)(?:\s+(.*))?$/);
        if(match) {
          const numerator = parseFloat(match[1]);
          const denominator = parseFloat(match[2]);
          return {
            value: denominator ? numerator / denominator : 0,
            rest: String(match[3] || '').trim(),
            label: `${match[1]}/${match[2]}`
          };
        }

        match = raw.match(/^(media|medio)(?:\s+(.*))?$/);
        if(match) {
          return { value: 0.5, rest: String(match[2] || '').trim(), label: match[1] };
        }

        match = raw.match(/^(una|un|1)\s+y\s+media(?:\s+(.*))?$/);
        if(match) {
          return { value: 1.5, rest: String(match[2] || '').trim(), label: String(match[0] || '').trim() };
        }

        match = raw.match(/^(\d+(?:[.,]\d+)?)(?:\s+y\s+media)?(?:\s+(.*))?$/);
        if(match) {
          const base = parseFloat(String(match[1]).replace(',', '.'));
          const hasHalf = /\s+y\s+media(?:\s|$)/.test(raw);
          return {
            value: base + (hasHalf ? 0.5 : 0),
            rest: String(match[2] || '').trim(),
            label: hasHalf ? `${match[1]} y media` : String(match[1])
          };
        }

        return null;
      };

      const parseRecipeAmount = (text='') => {
        const raw = String(text || '').toLowerCase().trim();
        const lead = parseLeadingRecipeAmount(raw);
        const amountPart = lead ? raw.slice(0, raw.length - lead.rest.length).trim() : raw;
        const m = amountPart.match(/(\d+(?:[.,]\d+)?|\d+\s*\/\s*\d+|media|medio|una\s+y\s+media|un\s+y\s+media|1\s+y\s+media)\s*(kg|g|gramos?|porciones?|porcion|u|unidades?)/);
        if(!m) return null;
        const parsed = parseLeadingRecipeAmount(`${m[1]} x`) || { value: parseFloat(String(m[1]).replace(',', '.')) || 0 };
        return {
          value: parsed.value,
          unit: m[2]
        };
      };

      const parseRecipeCountNoun = (text='') => {
        const parsed = parseLeadingRecipeAmount(text);
        if(!parsed || !(parsed.value > 0) || !parsed.rest) return null;
        return {
          value: parsed.value,
          noun: normalizeRecipeText(parsed.rest || ''),
          label: parsed.label || '',
          rawRest: String(parsed.rest || '').trim()
        };
      };

      const stripRecipeAmount = (text='') => {
        const parsed = parseLeadingRecipeAmount(text);
        if(parsed?.rest) return normalizeRecipeText(parsed.rest);
        return normalizeRecipeText(String(text).replace(/(\d+(?:[.,]\d+)?|\d+\s*\/\s*\d+|media|medio|una\s+y\s+media|un\s+y\s+media|1\s+y\s+media)\s*(kg|g|gramos?|porciones?|porcion|u|unidades?)/ig, ' '));
      };

      const singularizeWord = (word='') => {
        const w = String(word || '').trim();
        if(!w) return '';
        if(w.endsWith('es') && w.length > 4) return w.slice(0, -2);
        if(w.endsWith('s') && w.length > 3) return w.slice(0, -1);
        return w;
      };

      const normalizeRecipeKey = (text='') =>
        normalizeRecipeText(text)
          .split(' ')
          .filter(Boolean)
          .map(singularizeWord)
          .join(' ');

      const unitToGrams = (value, unit) => {
        const u = String(unit||'').toLowerCase();
        if(u === 'kg') return value * 1000;
        if(u === 'g' || u === 'gramo' || u === 'gramos') return value;
        return null;
      };

      const unitToPortions = (value, unit) => {
        const u = String(unit||'').toLowerCase();
        if(u === 'porcion' || u === 'porciones') return value;
        return null;
      };

      const formatRecipeQty = (value, unit) => {
        const n = Number(value);
        const rounded = Math.round(n * 100) / 100;
        let clean = '';
        if(Number.isInteger(rounded)) {
          clean = String(rounded);
        } else {
          const whole = Math.trunc(rounded);
          const fraction = Math.abs(rounded - whole);
          if(Math.abs(fraction - 0.5) < 0.01) {
            clean = whole === 0 ? '1/2' : `${whole} 1/2`;
          } else {
            clean = String(rounded).replace('.', ',');
          }
        }
        return `${clean} ${unit}`.trim();
      };

      const normalizeStockUnit = (unit='') => {
        const u = normalizeRecipeText(unit);
        if(!u) return '';
        if(['g','gramo','gramos'].includes(u)) return 'g';
        if(u === 'kg') return 'kg';
        if(['porcion','porciones'].includes(u)) return 'porcion';
        if(['unidad','unidades','u'].includes(u)) return 'unidad';
        return u;
      };

      const scaleRecipeMacros = (recipe, factor) => {
        const macrosBase = recipe.macros || {};
        return {
          cals: Math.round((parseFloat(macrosBase.cals) || 0) * factor),
          prot: Math.round((parseFloat(macrosBase.prot) || 0) * factor),
          carb: Math.round((parseFloat(macrosBase.carb) || 0) * factor),
          fat:  Math.round((parseFloat(macrosBase.fat)  || 0) * factor)
        };
      };

      const getRecipeUsageFactor = (recipe, item) => {
        const baseQty = parseFloat(recipe?.base_qty) || 1;
        const baseUnit = normalizeStockUnit(recipe?.base_unit || '');
        const stockUnit = normalizeStockUnit(recipe?.stock_unit || '');
        const delta = parseFloat(item?.stock_delta);
        const deltaUnit = normalizeStockUnit(item?.stock_delta_unit || item?.stock_unit || '');

        if(delta > 0 && deltaUnit) {
          const deltaGrams = unitToGrams(delta, deltaUnit);
          const baseGrams = unitToGrams(baseQty, baseUnit);
          if(deltaGrams && baseGrams) return deltaGrams / baseGrams;

          const deltaPortions = unitToPortions(delta, deltaUnit);
          const basePortions = unitToPortions(baseQty, baseUnit);
          if(deltaPortions && basePortions) return deltaPortions / basePortions;

          if(deltaUnit === 'unidad' && (baseUnit === 'unidad' || stockUnit === 'unidad')) {
            return delta / baseQty;
          }
          if(deltaUnit === 'porcion' && baseUnit === 'porcion') {
            return delta / baseQty;
          }
        }

        const baseCals = parseFloat(recipe?.macros?.cals) || 0;
        const itemCals = parseFloat(item?.cals) || 0;
        if(baseCals > 0 && itemCals > 0) return itemCals / baseCals;
        return 1;
      };

      const rebuildMealItemFromRecipe = (recipe, item) => {
        const factor = getRecipeUsageFactor(recipe, item);
        const nextMacros = scaleRecipeMacros(recipe, factor);
        return {
          ...item,
          name: recipe.recipe_name || item.name,
          recipe_name: recipe.recipe_name || item.recipe_name,
          nota: recipe.notes || item.nota || 'Receta guardada',
          stock_qty: recipe.stock_qty,
          stock_unit: recipe.stock_unit || '',
          low_stock_threshold: recipe.low_stock_threshold,
          ...nextMacros
        };
      };

      const mealItemUsesRecipe = (recipe, item) => {
        if(!recipe || !item) return false;
        if(item.recipe_id && recipe.id && item.recipe_id === recipe.id) return true;
        const recipeKeys = [recipe.recipe_name, ...((Array.isArray(recipe.aliases) ? recipe.aliases : []))]
          .filter(Boolean)
          .map(normalizeRecipeKey);
        const itemKeys = [item.recipe_name, item.name]
          .filter(Boolean)
          .map(normalizeRecipeKey);
        return itemKeys.some(key => key && recipeKeys.includes(key));
      };

      const findRecipeMatch = (recipes, inputText) => {
        const raw = String(inputText || '').trim();
        const normalizedFull = normalizeRecipeText(raw);
        const normalizedNameOnly = stripRecipeAmount(raw);
        const normalizedFullKey = normalizeRecipeKey(raw);
        const normalizedNameKey = normalizeRecipeKey(normalizedNameOnly);
        const parsedAmount = parseRecipeAmount(raw);
        const parsedCountNoun = parseRecipeCountNoun(raw);
        const parsedCountNounKey = parsedCountNoun ? normalizeRecipeKey(parsedCountNoun.noun) : '';
        const exactMatches = [];
        const fuzzyMatches = [];

        for(const recipe of (recipes || [])) {
          const rawNames = [recipe.recipe_name, ...((Array.isArray(recipe.aliases) ? recipe.aliases : []))].filter(Boolean);
          const names = [recipe.recipe_name, ...((Array.isArray(recipe.aliases) ? recipe.aliases : []))]
            .filter(Boolean)
            .map(normalizeRecipeText);
          const keys = [recipe.recipe_name, ...((Array.isArray(recipe.aliases) ? recipe.aliases : []))]
            .filter(Boolean)
            .map(normalizeRecipeKey);
          const exact =
            names.includes(normalizedFull) ||
            names.includes(normalizedNameOnly) ||
            keys.includes(normalizedFullKey) ||
            keys.includes(normalizedNameKey) ||
            (parsedCountNounKey && keys.includes(parsedCountNounKey));

          const fuzzy =
            !exact &&
            (
              keys.some(k => k && (normalizedFullKey.includes(k) || k.includes(normalizedFullKey) || normalizedNameKey.includes(k) || k.includes(normalizedNameKey))) ||
              (parsedCountNounKey && keys.some(k => k && (parsedCountNounKey.includes(k) || k.includes(parsedCountNounKey))))
            );

          if(!exact && !fuzzy) continue;

          let factor = 1;
          let qty = formatRecipeQty(recipe.base_qty || 1, recipe.base_unit || 'porcion');
          let stockDelta = parseFloat(recipe.base_qty) || 1;
          let stockDeltaUnit = normalizeStockUnit(recipe.base_unit || 'porcion');

          if(parsedAmount?.value > 0) {
            const baseQty = parseFloat(recipe.base_qty) || 1;
            const inputGrams = unitToGrams(parsedAmount.value, parsedAmount.unit);
            const baseGrams = unitToGrams(baseQty, recipe.base_unit);
            const inputPortions = unitToPortions(parsedAmount.value, parsedAmount.unit);
            const basePortions = unitToPortions(baseQty, recipe.base_unit);

            if(inputGrams && baseGrams) {
              factor = inputGrams / baseGrams;
              qty = `${formatRecipeQty(parsedAmount.value, parsedAmount.unit)} (${recipe.base_unit})`;
              stockDelta = parsedAmount.value;
              stockDeltaUnit = normalizeStockUnit(parsedAmount.unit);
            } else if(inputPortions && basePortions) {
              factor = inputPortions / basePortions;
              qty = `${formatRecipeQty(parsedAmount.value, parsedAmount.unit)} (${recipe.base_unit})`;
              stockDelta = parsedAmount.value;
              stockDeltaUnit = normalizeStockUnit(parsedAmount.unit);
            }
          } else if(
            parsedCountNoun?.value > 0 &&
            (
              normalizeStockUnit(recipe.base_unit || '') === 'unidad' ||
              normalizeStockUnit(recipe.stock_unit || '') === 'unidad' ||
              normalizeStockUnit(recipe.base_unit || '') === 'porcion'
            )
          ) {
            const baseQty = parseFloat(recipe.base_qty) || 1;
            factor = parsedCountNoun.value / baseQty;
            const baseUnitNormalized = normalizeStockUnit(recipe.base_unit || '');
            const humanPrefix = String(parsedCountNoun.label || '').trim();
            const exactRawMatch = rawNames.find(name => normalizeRecipeKey(name) === parsedCountNounKey) || recipe.recipe_name;
            const pluralRawMatch = rawNames.find(name => normalizeRecipeKey(name) === parsedCountNounKey && /s\b/i.test(String(name).trim())) || exactRawMatch;
            const humanNoun = String(parsedCountNoun.value > 1 ? pluralRawMatch : recipe.recipe_name || parsedCountNoun.rawRest || '').trim();
            qty = humanPrefix && humanNoun
              ? `${humanPrefix} ${humanNoun}`.trim()
              : formatRecipeQty(parsedCountNoun.value, baseUnitNormalized === 'porcion'
                  ? (parsedCountNoun.value === 1 ? 'porcion' : 'porciones')
                  : (parsedCountNoun.value === 1 ? 'unidad' : 'unidades'));
            stockDelta = parsedCountNoun.value;
            stockDeltaUnit = baseUnitNormalized === 'porcion' ? 'porcion' : 'unidad';
          }

          const result = {
            name: recipe.recipe_name,
            qty,
            nota: recipe.notes || 'Receta guardada',
            recipe_id: recipe.id,
            recipe_name: recipe.recipe_name,
            stock_qty: recipe.stock_qty,
            stock_unit: recipe.stock_unit || '',
            low_stock_threshold: recipe.low_stock_threshold,
            stock_delta: stockDelta,
            stock_delta_unit: stockDeltaUnit,
            ...scaleRecipeMacros(recipe, factor)
          };
          if(exact) exactMatches.push(result);
          else fuzzyMatches.push(result);
        }

        if(exactMatches.length === 1) return { kind:'exact', item: exactMatches[0] };
        if(exactMatches.length > 1) return { kind:'ambiguous', options: exactMatches.slice(0,3) };
        if(fuzzyMatches.length === 1) return { kind:'fuzzy', item: fuzzyMatches[0] };
        if(fuzzyMatches.length > 1) return { kind:'ambiguous', options: fuzzyMatches.slice(0,3) };
        return null;
      };

      const getRecipes = async () => {
        if(recipesRef.current) return recipesRef.current;
        const { data, error } = await supabase
          .from('user_recipes')
          .select('id, recipe_name, aliases, base_qty, base_unit, stock_qty, stock_unit, low_stock_threshold, macros, ingredients, notes')
          .order('updated_at', { ascending: false });
        if(error) throw error;
        recipesRef.current = data || [];
        return recipesRef.current;
      };

      useEffect(() => {
        let cancelled = false;
        const refreshRecipes = () => {
          setRecipesLoading(true);
          setRecipesError('');
          recipesRef.current = null;
          getRecipes()
            .then((rows) => {
              if(cancelled) return;
              setSavedRecipes(rows || []);
            })
            .catch((e) => {
              if(cancelled) return;
              setRecipesError(e.message || 'No se pudieron cargar las recetas.');
            })
            .finally(() => {
              if(cancelled) return;
              setRecipesLoading(false);
            });
        };
        refreshRecipes();
        const onFocus = () => refreshRecipes();
        const onVisible = () => { if(document.visibilityState === 'visible') refreshRecipes(); };
        window.addEventListener('focus', onFocus);
        document.addEventListener('visibilitychange', onVisible);
        return () => {
          cancelled = true;
          window.removeEventListener('focus', onFocus);
          document.removeEventListener('visibilitychange', onVisible);
        };
      }, []);

      const pushRecipeSuggestionIntoDraft = (mealIndex, recipeName, recipeAliases=[]) => {
        const current = String(t.meals?.[mealIndex]?.aiDraft || '').trim();
        const currentNormalized = normalizeFoodText(current);
        const recipeNormalized = normalizeFoodText(recipeName);
        let next = recipeName;
        const parsedPrefix = parseLeadingRecipeAmount(current);
        const parsedPrefixNumber = parsedPrefix?.value ?? null;
        const aliasList = [recipeName, ...(Array.isArray(recipeAliases) ? recipeAliases : [])].filter(Boolean);
        const pluralFriendlyName = (() => {
          if(!(parsedPrefixNumber > 1)) return recipeName;
          const pluralAlias = aliasList.find(name => /s$/i.test(String(name).trim())) || recipeName;
          return pluralAlias;
        })();

        if(current) {
          const amountPrefixMatch = current.match(/^(\s*(?:\d+(?:[.,]\d+)?|\d+\s*\/\s*\d+|media|medio|una\s+y\s+media|un\s+y\s+media|1\s+y\s+media)\s*(?:kg|g|gramos?|porciones?|porcion|u|unidades?)?\s*)(.*)$/i);
          if(amountPrefixMatch) {
            const prefix = String(amountPrefixMatch[1] || '').trim();
            const tail = String(amountPrefixMatch[2] || '').trim();
            if(prefix && (!tail || recipeNormalized.includes(normalizeFoodText(tail)) || normalizeFoodText(tail).includes(recipeNormalized) || normalizeFoodText(tail).length >= 2)) {
              next = `${prefix} ${pluralFriendlyName}`.trim();
            } else {
              next = `${current}, ${recipeName}`;
            }
          } else if(recipeNormalized.includes(currentNormalized) || currentNormalized.includes(recipeNormalized) || currentNormalized.length >= 2) {
            next = pluralFriendlyName;
          } else {
            next = `${current}, ${recipeName}`;
          }
        }
        onMeal(mealIndex, 'aiDraft', next);
      };

      const clearMealDraft = (mealIndex) => {
        onMeal(mealIndex, 'aiDraft', '');
        setAiError(prev => { const n=[...prev]; n[mealIndex]=''; return n; });
        setRecipeMsg(prev => { const n=[...prev]; n[mealIndex]=''; return n; });
        if(editingMealItem.mealIndex === mealIndex) {
          setEditingMealItem({ mealIndex:-1, itemIndex:-1 });
        }
      };

      const startEditMealItem = (mealIndex, itemIndex, item) => {
        const draft = `${String(item?.qty || '').trim()} ${String(item?.name || '').trim()}`.trim();
        onMeal(mealIndex, 'aiDraft', draft);
        setEditingMealItem({ mealIndex, itemIndex });
        setAiError(prev => { const n=[...prev]; n[mealIndex]=''; return n; });
      };

      const splitMealDraftParts = (text='') => {
        const raw = String(text || '').trim();
        if(!raw) return [];
        const normalized = raw.replace(/\s+/g, ' ').trim();
        const parts = normalized
          .split(/\s+(?:y|e)\s+|,/i)
          .map(part => part.trim())
          .filter(Boolean);
        if(parts.length <= 1) return [normalized];

        const looksIndependent = (part) => {
          const p = String(part || '').trim().toLowerCase();
          return !!(
            parseRecipeAmount(p) ||
            parseRecipeCountNoun(p) ||
            /^\d/.test(p) ||
            /^(media|medio|una y media|un y medio|1\/2)\b/.test(p)
          );
        };

        return parts.every(looksIndependent) ? parts : [normalized];
      };

      const analyzeSingleMealEntry = async (mealIndex, text) => {
        try {
          const recipes = await getRecipes();
          const recipeSearch = findRecipeMatch(recipes, text);
          if(recipeSearch?.kind === 'ambiguous') {
            const optionsText = recipeSearch.options.map(op => op.name).join(', ');
            const useLibrary = window.confirm(`Encontre varias opciones en tu biblioteca: ${optionsText}. ¿Querés usar la biblioteca en vez de calcularlo por internet?`);
            if(!useLibrary) throw new Error('__USE_INTERNET__');
          }

          const recipeHit = recipeSearch?.item || (recipeSearch?.options ? recipeSearch.options[0] : null);
          if(recipeHit) {
            const shouldUseLibrary = recipeSearch?.kind === 'exact'
              ? true
              : window.confirm(`Encontre "${recipeHit.name}" en tu biblioteca. ¿Querés usar ese valor guardado en vez de calcularlo por internet?`);
            if(!shouldUseLibrary) throw new Error('__USE_INTERNET__');

            if(editingMealItem.mealIndex === mealIndex && editingMealItem.itemIndex >= 0) {
              onReplaceItem(mealIndex, editingMealItem.itemIndex, recipeHit);
              setEditingMealItem({ mealIndex:-1, itemIndex:-1 });
            } else {
              onAddItem(mealIndex, recipeHit);
            }
            if(recipeHit.stock_unit && recipeHit.stock_delta_unit && normalizeStockUnit(recipeHit.stock_unit) === normalizeStockUnit(recipeHit.stock_delta_unit)) {
              await discountItemStock(mealIndex, recipeHit);
            }
            return;
          }
        } catch(recipeErr) {
          if(recipeErr?.message !== '__USE_INTERNET__') {
            console.warn('[RECIPES]', recipeErr.message);
          }
        }

        const res = await fetch('/.netlify/functions/get-macros', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ meal: text })
        });
        const data = await res.json().catch(() => ({}));
        if(!res.ok) throw new Error(data.error || `HTTP ${res.status}`);

        const nextItem = {
          name: data.name || text,
          qty:  data.qty  || '1 porción',
          cals: Math.round(parseFloat(data.cals)||0),
          prot: Math.round(parseFloat(data.prot)||0),
          carb: Math.round(parseFloat(data.carb)||0),
          fat:  Math.round(parseFloat(data.fat) ||0),
          nota: data.nota || ''
        };
        if(editingMealItem.mealIndex === mealIndex && editingMealItem.itemIndex >= 0) {
          onReplaceItem(mealIndex, editingMealItem.itemIndex, nextItem);
          setEditingMealItem({ mealIndex:-1, itemIndex:-1 });
        } else {
          onAddItem(mealIndex, nextItem);
        }
      };

      // analyzeMeal: llama a la IA y agrega el resultado como item a la leyenda
      const analyzeMeal = async (mealIndex) => {
        const text = String(t.meals?.[mealIndex]?.aiDraft || '').trim();
        if(!text) return;

        setAiLoading(prev => { const n=[...prev]; n[mealIndex]=true; return n; });
        setAiError(prev   => { const n=[...prev]; n[mealIndex]='';   return n; });

        try {
          const parts = splitMealDraftParts(text);
          if(parts.length > 1) {
            for(const part of parts) {
              await analyzeSingleMealEntry(mealIndex, part);
            }
            onMeal(mealIndex, 'aiDraft', '');
            return;
          }
          try {
            const recipes = await getRecipes();
            const recipeSearch = findRecipeMatch(recipes, text);
            if(recipeSearch?.kind === 'ambiguous') {
              const optionsText = recipeSearch.options.map(op => op.name).join(', ');
              const useLibrary = window.confirm(`Encontre varias opciones en tu biblioteca: ${optionsText}. ¿Querés usar la biblioteca en vez de calcularlo por internet?`);
              if(!useLibrary) throw new Error('__USE_INTERNET__');
            }

            const recipeHit = recipeSearch?.item || (recipeSearch?.options ? recipeSearch.options[0] : null);
            if(recipeHit) {
              const shouldUseLibrary = recipeSearch?.kind === 'exact'
                ? true
                : window.confirm(`Encontre "${recipeHit.name}" en tu biblioteca. ¿Querés usar ese valor guardado en vez de calcularlo por internet?`);
              if(!shouldUseLibrary) throw new Error('__USE_INTERNET__');

              if(editingMealItem.mealIndex === mealIndex && editingMealItem.itemIndex >= 0) {
                onReplaceItem(mealIndex, editingMealItem.itemIndex, recipeHit);
                setEditingMealItem({ mealIndex:-1, itemIndex:-1 });
              } else {
                onAddItem(mealIndex, recipeHit);
              }
              onMeal(mealIndex, 'aiDraft', '');
              if(recipeHit.stock_unit && recipeHit.stock_delta_unit && normalizeStockUnit(recipeHit.stock_unit) === normalizeStockUnit(recipeHit.stock_delta_unit)) {
                await discountItemStock(mealIndex, recipeHit);
              }
              return;
            }
          } catch(recipeErr) {
            if(recipeErr?.message !== '__USE_INTERNET__') {
              console.warn('[RECIPES]', recipeErr.message);
            }
          }

          const res = await fetch('/.netlify/functions/get-macros', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ meal: text })
          });
          const data = await res.json().catch(() => ({}));
          if(!res.ok) throw new Error(data.error || `HTTP ${res.status}`);

          const nextItem = {
            name: data.name || text,
            qty:  data.qty  || '1 porción',
            cals: Math.round(parseFloat(data.cals)||0),
            prot: Math.round(parseFloat(data.prot)||0),
            carb: Math.round(parseFloat(data.carb)||0),
            fat:  Math.round(parseFloat(data.fat) ||0),
            nota: data.nota || ''
          };
          if(editingMealItem.mealIndex === mealIndex && editingMealItem.itemIndex >= 0) {
            onReplaceItem(mealIndex, editingMealItem.itemIndex, nextItem);
            setEditingMealItem({ mealIndex:-1, itemIndex:-1 });
          } else {
            onAddItem(mealIndex, nextItem);
          }

          onMeal(mealIndex, 'aiDraft', '');
        } catch(e) {
          console.error('[IA]', e);
          setAiError(prev => { const n=[...prev]; n[mealIndex]=e.message||'Error'; return n; });
        } finally {
          setAiLoading(prev => { const n=[...prev]; n[mealIndex]=false; return n; });
        }
      };

      const saveMealAsRecipe = async (mealIndex) => {
        const meal = t.meals?.[mealIndex];
        const items = meal?.items || [];
        if(items.length === 0) return;

        const recipeName = window.prompt('Nombre de la receta:', `Comida ${mealIndex + 1} casera`);
        if(!recipeName || !recipeName.trim()) return;

        setRecipeSaving(prev => { const n=[...prev]; n[mealIndex]=true; return n; });
        setRecipeMsg(prev => { const n=[...prev]; n[mealIndex]=''; return n; });

        try {
          const totals = mealTotals(meal);
          const payload = {
            recipe_name: recipeName.trim(),
            aliases: [],
            base_qty: 1,
            base_unit: 'porcion',
            macros: {
              cals: Math.round(totals.cals || 0),
              prot: Math.round(totals.prot || 0),
              carb: Math.round(totals.carb || 0),
              fat: Math.round(totals.fat || 0)
            },
            ingredients: items.map(item => ({
              name: item.name || 'Ingrediente',
              qty: item.qty || '1 porcion'
            })),
            notes: 'Guardada desde una comida del diario',
            updated_at: new Date().toISOString()
          };

          const { error } = await supabase.from('user_recipes').insert(payload);
          if(error) {
            if(String(error.message || '').toLowerCase().includes('duplicate') || String(error.code || '') === '23505') {
              throw new Error('Ya existe una receta con ese nombre.');
            }
            throw error;
          }

          recipesRef.current = null;
          const refreshed = await getRecipes();
          setSavedRecipes(refreshed || []);
          setRecipeMsg(prev => { const n=[...prev]; n[mealIndex]='Receta guardada.'; return n; });
          setTimeout(() => {
            setRecipeMsg(prev => { const n=[...prev]; n[mealIndex]=''; return n; });
          }, 2500);
        } catch(e) {
          setRecipeMsg(prev => { const n=[...prev]; n[mealIndex]=e.message || 'No se pudo guardar la receta.'; return n; });
        } finally {
          setRecipeSaving(prev => { const n=[...prev]; n[mealIndex]=false; return n; });
        }
      };

      const discountItemStock = async (mealIndex, item) => {
        if(!item?.recipe_id) return;

        const stockKey = `${mealIndex}:${item.recipe_id}`;
        const recipeName = item.recipe_name || item.name || 'Ingrediente';
        const stockUnit = normalizeStockUnit(item.stock_unit || '');
        const deltaUnit = normalizeStockUnit(item.stock_delta_unit || '');
        const delta = parseFloat(item.stock_delta);

        if(!stockUnit) {
          setRecipeMsg(prev => { const n=[...prev]; n[mealIndex]='Ese item no tiene stock configurado.'; return n; });
          return;
        }
        if(!(delta > 0)) {
          setRecipeMsg(prev => { const n=[...prev]; n[mealIndex]='No pude calcular cuanto descontar.'; return n; });
          return;
        }
        if(stockUnit !== deltaUnit) {
          setRecipeMsg(prev => { const n=[...prev]; n[mealIndex]=`La unidad de stock de ${recipeName} no coincide (${item.stock_unit || '-'} vs ${item.stock_delta_unit || '-'}).`; return n; });
          return;
        }

        setStockBusyKey(stockKey);
        setRecipeMsg(prev => { const n=[...prev]; n[mealIndex]=''; return n; });

        try {
          const currentRecipe = (savedRecipes || []).find(r => r.id === item.recipe_id)
            || (await getRecipes()).find(r => r.id === item.recipe_id);

          if(!currentRecipe) throw new Error('No encontre la receta para descontar stock.');
          if(currentRecipe.stock_qty == null || currentRecipe.stock_qty === '') throw new Error('Ese item no tiene stock configurado.');

          const nextQty = Math.max(0, (parseFloat(currentRecipe.stock_qty) || 0) - delta);
          const { data, error } = await supabase
            .from('user_recipes')
            .update({ stock_qty: nextQty, updated_at: new Date().toISOString() })
            .eq('id', item.recipe_id)
            .select('id, recipe_name, aliases, base_qty, base_unit, stock_qty, stock_unit, low_stock_threshold, macros, ingredients, notes')
            .single();
          if(error) throw error;

          recipesRef.current = (recipesRef.current || []).map(r => r.id === item.recipe_id ? data : r);
          setSavedRecipes(prev => prev.map(r => r.id === item.recipe_id ? data : r));
          setRecipeMsg(prev => {
            const n=[...prev];
            n[mealIndex]=`Stock descontado: -${formatRecipeQty(delta, item.stock_delta_unit || item.stock_unit || '')}.`;
            return n;
          });
          setTimeout(() => {
            setRecipeMsg(prev => {
              const n=[...prev];
              if(String(n[mealIndex] || '').startsWith('Stock descontado')) n[mealIndex]='';
              return n;
            });
          }, 2500);
        } catch(e) {
          setRecipeMsg(prev => { const n=[...prev]; n[mealIndex]=e.message || 'No se pudo descontar stock.'; return n; });
        } finally {
          setStockBusyKey('');
        }
      };

      const deleteRecipe = async (recipe) => {
        try {
          const { error } = await supabase.from('user_recipes').delete().eq('id', recipe.id);
          if(error) throw error;
          recipesRef.current = null;
          setSavedRecipes(prev => prev.filter(r => r.id !== recipe.id));
        } catch(e) {
          setRecipesError(e.message || 'No se pudo borrar la receta.');
          setTimeout(() => setRecipesError(''), 3000);
        }
      };

      const startEditRecipe = (recipe) => {
        setEditingRecipeId(recipe.id);
        setEditingRecipeName(recipe.recipe_name || '');
        setEditingRecipeBaseQty(String(recipe.base_qty ?? 1));
        setEditingRecipeBaseUnit(recipe.base_unit || 'porcion');
        setEditingRecipeCals(String(Math.round(parseFloat(recipe.macros?.cals) || 0)));
        setEditingRecipeProt(String(Math.round(parseFloat(recipe.macros?.prot) || 0)));
        setEditingRecipeCarb(String(Math.round(parseFloat(recipe.macros?.carb) || 0)));
        setEditingRecipeFat(String(Math.round(parseFloat(recipe.macros?.fat) || 0)));
        setEditingRecipeIngredients(
          Array.isArray(recipe.ingredients)
            ? recipe.ingredients.map(it => `${it.qty || '1 porcion'} | ${it.name || 'Ingrediente'}`).join('\n')
            : ''
        );
        setEditingRecipeNotes(recipe.notes || '');
      };

      const cancelEditRecipe = () => {
        setEditingRecipeId(null);
        setEditingRecipeName('');
        setEditingRecipeBaseQty('1');
        setEditingRecipeBaseUnit('porcion');
        setEditingRecipeCals('0');
        setEditingRecipeProt('0');
        setEditingRecipeCarb('0');
        setEditingRecipeFat('0');
        setEditingRecipeIngredients('');
        setEditingRecipeNotes('');
      };

      const saveRecipeEdit = async (recipeId) => {
        if(!editingRecipeName.trim()) return;
        setEditingRecipeSaving(true);
        setRecipesError('');
        try {
          const ingredients = editingRecipeIngredients
            .split('\n')
            .map(line => line.trim())
            .filter(Boolean)
            .map(line => {
              const [qtyPart, ...nameParts] = line.split('|');
              return {
                qty: (qtyPart || '').trim() || '1 porcion',
                name: nameParts.join('|').trim() || qtyPart.trim() || 'Ingrediente'
              };
            });

          const payload = {
            recipe_name: editingRecipeName.trim(),
            base_qty: parseFloat(String(editingRecipeBaseQty).replace(',', '.')) || 1,
            base_unit: editingRecipeBaseUnit.trim() || 'porcion',
            macros: {
              cals: Math.max(0, Math.round(parseFloat(editingRecipeCals) || 0)),
              prot: Math.max(0, Math.round(parseFloat(editingRecipeProt) || 0)),
              carb: Math.max(0, Math.round(parseFloat(editingRecipeCarb) || 0)),
              fat: Math.max(0, Math.round(parseFloat(editingRecipeFat) || 0))
            },
            ingredients,
            notes: editingRecipeNotes.trim() || null,
            updated_at: new Date().toISOString()
          };

          const { data, error } = await supabase.from('user_recipes')
            .update(payload)
            .eq('id', recipeId)
            .select()
            .single();
          if(error) throw error;

          recipesRef.current = null;
          setSavedRecipes(prev => prev.map(r => r.id === recipeId ? data : r));
          recalculateMealsUsingRecipe(data);
          cancelEditRecipe();
        } catch(e) {
          setRecipesError(e.message || 'No se pudo editar la receta.');
          setTimeout(() => setRecipesError(''), 3000);

          setEditingRecipeSaving(false);

      return html`

    const GymPanel = ({session, tracker:t, onSetComplete, onInput, onHabit, onApplyOverload, onCompleteSession, onResetSessionChecks}) => {
      const [open,setOpen] = useState(true);
      if(!session||session.length===0) return null;
      const safeT = { gymStartTime:'', gymEndTime:'', ...t };
      const totalSets = session.reduce((acc, ex) => acc + (ex.sets?.length || 0), 0);
      const completedSets = session.reduce((acc, ex) => acc + ex.sets.filter(s => s.completed).length, 0);
      const completedExercises = session.filter(ex => ex.sets.length > 0 && ex.sets.every(s => s.completed)).length;
      const progressPct = totalSets > 0 ? Math.round((completedSets / totalSets) * 100) : 0;

      // Detecta ejercicios donde se superaron las reps objetivo en al menos 1 serie
      const overloadCandidates = session.filter(ex =>
        ex.sets.some(s => s.completed && parseInt(s.reps) > parseInt(s.idealReps||s.reps))
      );

      return html`
        <${SectionAccordion} icon=${html`<${IDumb} s=${18}/>`} title="Rutina Gimnasio" isOpen=${open} onToggle=${()=>setOpen(!open)}>
          <!-- Horarios sesión -->
          <div style="display:flex;flex-wrap:wrap;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;background:rgba(10,15,30,0.5);border:1px solid #1E2D45;margin-bottom:12px;">
            <${IClock} s=${16} c=""/>
            <span style="font-size:13px;color:#94a3b8;">Sesión:</span>
            <div style="display:flex;gap:12px;flex-wrap:wrap;">
              ${[['gymStartTime','Inicio'],['gymEndTime','Fin']].map(([k,l]) => html`
                <div style="display:flex;align-items:center;gap:6px;">
                  <label style="font-size:10px;text-transform:uppercase;color:#64748b;">${l}</label>
                  <input type="time" value=${safeT[k]||''} onInput=${e=>onHabit(k,e.target.value)} class="inp-sm"/>
                </div>
              `)}
            </div>
          </div>

          <div style="display:flex;flex-direction:column;gap:10px;padding:10px 12px;border-radius:10px;background:rgba(10,15,30,0.5);border:1px solid #1E2D45;margin-bottom:12px;">
            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;">
              ${[
                { label:'Series', value:`${completedSets}/${totalSets}`, color:'#10B981' },
                { label:'Ejercicios', value:`${completedExercises}/${session.length}`, color:'#6366F1' },
                { label:'Progreso', value:`${progressPct}%`, color:'#F59E0B' }
              ].map(stat => html`
                <div style="padding:8px;border-radius:8px;background:#0F1729;border:1px solid #1E2D45;text-align:center;">
                  <p style="margin:0;font-size:9px;text-transform:uppercase;color:#64748b;">${stat.label}</p>
                  <p style="margin:2px 0 0;font-size:15px;font-weight:700;font-family:'JetBrains Mono',monospace;color:${stat.color};">${stat.value}</p>
                </div>
              `)}
            </div>
            <div style="height:8px;border-radius:999px;background:#0F1729;border:1px solid #1E2D45;overflow:hidden;">
              <div style=${`width:${progressPct}%;height:100%;background:linear-gradient(90deg,#10B981,#6366F1);transition:width 0.3s ease;`}></div>
            </div>
            <div style="display:flex;flex-wrap:wrap;gap:8px;">
              <button onClick=${()=>onCompleteSession&&onCompleteSession()}
                style="padding:7px 12px;border-radius:8px;border:1px solid rgba(16,185,129,0.35);background:rgba(16,185,129,0.12);color:#86EFAC;font-size:11px;font-weight:800;font-family:'Barlow Condensed',sans-serif;cursor:pointer;letter-spacing:0.05em;">

          <!-- Sobrecarga progresiva -->

    // ═══════════════════════════════════════════════════

    const WeekSummary = ({weekData, weekKey}) => {
      const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, ReferenceLine } = getRC();
      const sessions = weekData?.sessions || {};
      const tracker  = weekData?.tracker  || {};
      const weeklyGymGoal = getPlanMode(weekData) === '5' ? 5 : 4;
      const canRenderBarCharts = !!(BarChart && Bar && XAxis && YAxis && CartesianGrid && Tooltip && ResponsiveContainer);
      const canRenderVolumeChart = canRenderBarCharts && ReferenceLine;

      // ── Métricas base
      const totalSteps = Object.values(tracker).reduce((a,d)=>a+(d?.walked&&d?.steps?pn(d.steps):0),0);
      const totalWater = Object.values(tracker).reduce((a,d)=>a+(d?.water||0),0);

      const macByDay = DAYS.map(d=>{
        const t=tracker[d.key]||newDay();
        const tot = dayTotals(t.meals);
        return{name:d.abbr, cals:tot.cals, prot:tot.prot, carb:tot.carb, fat:tot.fat};
      });
      const wm = macByDay.reduce((a,d)=>({cals:a.cals+d.cals,prot:a.prot+d.prot,carb:a.carb+d.carb,fat:a.fat+d.fat}),{cals:0,prot:0,carb:0,fat:0});

      // ── Sueño
      const sleepDays = Object.values(tracker).filter(d=>d?.sleepHours&&pn(d.sleepHours)>0);
      const sleepAvg  = sleepDays.length ? (sleepDays.reduce((a,d)=>a+pn(d.sleepHours),0)/sleepDays.length) : 0;
      const sleepColor = sleepAvg>=8?'#10B981':sleepAvg>=7?'#6366F1':sleepAvg>=6?'#F59E0B':'#EF4444';

      // ── Suplementos — % de adherencia (días tomados / 7)
      const medNames = ['roacuttan','finasteride','minoxidil','creatine','magnesium'];
      const medAdherence = medNames.map(m=>({
        name: m==='creatine'?'Creatina':m==='magnesium'?'Magnesio':m.charAt(0).toUpperCase()+m.slice(1),
        pct: Math.round(Object.values(tracker).filter(d=>d?.meds?.[m]).length / 7 * 100)
      }));

      // ── Días de entrenamiento
      const trainingDays = Object.values(getRoutineAssignments(weekData)).filter(v=>v!=='').length;

      // ── Volumen muscular
      const canonicalMuscles = Array.from(new Set(MUSCLES.map(m => canonicalMuscleName(m)).filter(Boolean)));
      const vol = {}; canonicalMuscles.forEach(m=>vol[m]={direct:0,indirect:0});
      Object.values(sessions).forEach(s=>s&&s.forEach(ex=>{
        const done=ex.sets.filter(s=>s.completed).length;
        const muscles = resolveMuscleInfo(ex.name);
        if(done>0 && muscles){
          muscles.direct.forEach(m=>{
            const key = canonicalMuscleName(m);
            if(vol[key]) vol[key].direct += done;
          });
          muscles.indirect.forEach(m=>{
            const key = canonicalMuscleName(m);
            if(vol[key]) vol[key].indirect += done;
          });
        }
      }));
      const volumeScaleMax = Math.max(20, ...Object.values(vol).map(v => (v.direct + v.indirect)), 0);
      const volumeData = Object.entries(vol).map(([m,v])=>({
        name:m.slice(0,4),
        fullName:m,
        dir:v.direct,
        ind:v.indirect,
        total:v.direct + v.indirect,
        dirPct: volumeScaleMax > 0 ? (v.direct / volumeScaleMax) * 100 : 0,
        indPct: volumeScaleMax > 0 ? (v.indirect / volumeScaleMax) * 100 : 0
      }));
      const hasVolumeData = volumeData.some(row => row.total > 0);

      const tooltipStyle = {background:'#0F1729',border:'1px solid #1E2D45',borderRadius:'8px',fontFamily:'JetBrains Mono,monospace',fontSize:'11px'};

      // ── Macros Elásticos: carbos objetivo se ajusta según la grasa real consumida
      // C_objetivo = (2000 - 660 - (G_real × 9)) / 4   |  Proteína fija: 165g = 660 kcal
      // Bug 10 fix: usar grasa promedio diaria (no el total semanal) en fórmula diaria
      const fatDailyAvg   = wm.fat / 7;
      const carbsTarget     = Math.max(0, Math.round((TARGETS.kcal - (TARGETS.prot * 4) - (fatDailyAvg * 9)) / 4));
      const carbsTargetWeekly = carbsTarget * 7;

      // ── Adherencia a macros con carbos elásticos
      const macroAdh = {
        prot: Math.min(100, Math.round(wm.prot  / (TARGETS.prot*7)      * 100)),
        carb: Math.min(100, Math.round(wm.carb  / (carbsTargetWeekly||1) * 100)),
        fat:  Math.min(100, Math.round(wm.fat   / (TARGETS.fat*7)        * 100)),
        kcal: Math.min(100, Math.round(wm.cals  / (TARGETS.kcal*7)       * 100)),
      };

      const exportWeekMetrics = () => {
        try {
          const payload = {
            app: 'enzo-training-week',
            exported_at: new Date().toISOString(),
            week_key: weekKey || '',
            summary: {
              training_days: trainingDays,
              weekly_gym_goal: weeklyGymGoal,
              total_steps: totalSteps,
              total_water_ml: totalWater,
              sleep_avg: Number(sleepAvg.toFixed(2)),
              macros_week: wm,
              macro_adherence: macroAdh,
              med_adherence: medAdherence,
              volume: volumeData
            }
          };
          const blob = new Blob([JSON.stringify(payload, null, 2)], { type:'application/json;charset=utf-8' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `semana-${String(weekKey || 'actual')}.json`;
          document.body.appendChild(a);
          a.click();
          a.remove();
          setTimeout(() => URL.revokeObjectURL(url), 1000);
        } catch(_) {}
      };

      return html`
        <div class="fade-up" style="display:flex;flex-direction:column;gap:12px;">

          <!-- RESUMEN RÁPIDO -->
          <${Card}>
            <p style="margin:0 0 12px;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;font-weight:700;color:#10B981;">📋 Resumen Semanal</p>
            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;">
              ${[
                {icon:'💪',label:'Dias gym',value:trainingDays,unit:`/${weeklyGymGoal}`,color:'#6366F1'},
                {icon:'🚶',label:'Pasos',value:fn(totalSteps),unit:'',color:'#10B981'},
                {icon:'💧',label:'Agua',value:(totalWater/1000).toFixed(1),unit:'L',color:'#38BDF8'},
              ].map(({icon,label,value,unit,color})=>html`
                <div style="background:rgba(10,15,30,0.6);border:1px solid #1E2D45;border-radius:10px;padding:10px;text-align:center;">
                  <p style="margin:0 0 2px;font-size:16px;">${icon}</p>
                  <p style="margin:0;font-size:10px;text-transform:uppercase;color:#64748b;">${label}</p>
                  <p style="margin:0;font-size:16px;font-weight:700;font-family:'JetBrains Mono',monospace;color:${color};">${value}${unit}</p>
                </div>
              `)}
            </div>
          <//>

          <!-- SUEÑO -->
          <${Card}>
            <p style="margin:0 0 12px;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;font-weight:700;color:#6366F1;">😴 Calidad de Sueño</p>
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;">
              <div style="flex:1;">
                <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
                  <span style="font-size:11px;color:#64748b;">Promedio semanal</span>
                  <span style="font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:${sleepColor};">${sleepAvg.toFixed(1)} hs</span>
                </div>
                <div style="width:100%;height:8px;background:#1E2D45;border-radius:4px;overflow:hidden;">
                  <div style="width:${Math.min(sleepAvg/9*100,100)}%;height:100%;background:${sleepColor};border-radius:4px;transition:width 0.5s;"></div>
                </div>
              </div>
            </div>
            <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;">
              ${DAYS.map(d=>{
                const t=tracker[d.key];
                const h=t?.sleepHours?pn(t.sleepHours):0;
                const c=h>=8?'#10B981':h>=7?'#6366F1':h>=6?'#F59E0B':h>0?'#EF4444':'#1E2D45';
                return html`
                  <div style="text-align:center;">
                    <div style="height:32px;background:${c};border-radius:4px;opacity:${h>0?1:0.3};display:flex;align-items:center;justify-content:center;">
                      <span style="font-size:9px;font-family:'JetBrains Mono',monospace;color:${h>0?'#080D1A':'#374151'};">${h>0?h.toFixed(0):''}</span>
                    </div>
                    <span style="font-size:9px;color:#475569;">${d.abbr}</span>
                  </div>
                `;
              })}
            </div>
          <//>

          <!-- ADHERENCIA MACROS -->
          <${Card}>
            <p style="margin:0 0 12px;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;font-weight:700;color:#F59E0B;">🎯 Adherencia Nutricional</p>
            <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;">
              ${[['cals','Kcal','#F59E0B'],['prot','Prot','#10B981'],['carb','Carb','#6366F1'],['fat','Grasa','#EF4444']].map(([k,l,c]) => html`
                <div style="background:rgba(10,15,30,0.6);border:1px solid ${c}33;border-radius:10px;padding:8px;text-align:center;">
                  <p style="margin:0 0 2px;font-size:10px;text-transform:uppercase;color:${c};">${l}</p>
                  <p style="margin:0;font-size:15px;font-weight:700;font-family:'JetBrains Mono',monospace;color:white;">${fn(wm[k])}${k!=='cals'?'g':''}</p>
                  <p style="margin:1px 0 0;font-size:9px;color:#475569;">
                    ${k==='carb' ? `obj: ${fn(carbsTarget)}g/día` : k==='cals' ? `obj: ${fn(TARGETS.kcal)}` : k==='prot' ? `obj: ${TARGETS.prot}g` : `obj: ${TARGETS.fat}g`}
                  </p>
                  <p style="margin:1px 0 0;font-size:10px;color:${macroAdh[k]>=90?'#10B981':macroAdh[k]>=70?'#F59E0B':'#EF4444'};">${macroAdh[k]}%</p>
                </div>
              `)}
            </div>
            ${canRenderBarCharts && html`
              <div style="height:130px;">
                <${ResponsiveContainer} width="100%" height="100%">
                  <${BarChart} data=${macByDay} margin=${{top:0,right:0,left:-20,bottom:0}}>

                    <${XAxis} dataKey="name" tick=${{fill:'#64748b',fontSize:10}} axisLine=${false} tickLine=${false}/>

                    <${Tooltip} contentStyle=${tooltipStyle}/>
                    <${Bar} dataKey="prot" name="Prot (g)" stackId="a" fill="#10B981"/>
                    <${Bar} dataKey="carb" name="Carb (g)" stackId="a" fill="#6366F1"/>
                    <${Bar} dataKey="fat" name="Grasa (g)" stackId="a" fill="#EF4444" radius=${[4,4,0,0]}/>
                  <//>
                <//>
              </div>
            `}
          <//>

          <!-- SUPLEMENTOS -->
          <${Card}>
            <p style="margin:0 0 12px;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;font-weight:700;color:#EF4444;">💊 Adherencia Suplementos</p>
            <div style="display:flex;flex-direction:column;gap:8px;">
              ${medAdherence.map(({name,pct}) => html`
                <div>
                  <div style="display:flex;justify-content:space-between;margin-bottom:3px;">
                    <span style="font-size:12px;color:#cbd5e1;">${name}</span>
                    <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:${pct>=85?'#10B981':pct>=50?'#F59E0B':'#EF4444'};">${pct}%</span>
                  </div>
                  <div style="width:100%;height:5px;background:#1E2D45;border-radius:3px;overflow:hidden;">
                    <div style="width:${pct}%;height:100%;background:${pct>=85?'#10B981':pct>=50?'#F59E0B':'#EF4444'};border-radius:3px;transition:width 0.5s;"></div>
                  </div>
                </div>
              `)}
            </div>
          <//>

          <!-- VOLUMEN MUSCULAR con zonas MEV/MAV/MRV -->
          <${Card}>
            <p style="margin:0 0 4px;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;font-weight:700;color:#6366F1;display:flex;align-items:center;gap:6px;">
              <${ITarget} s=${14}/>Series Efectivas — Zonas de Volumen
            </p>
            <div style="display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap;">
              ${[['MEV','mín','#EF4444',4],['MAV','óptimo','#10B981',10],['MRV','máx','#F59E0B',20]].map(([z,l,c,v])=>html`
                <div style="display:flex;align-items:center;gap:4px;">
                  <div style="width:16px;height:2px;background:${c};border-radius:1px;"></div>

                </div>

            </div>
            ${!hasVolumeData && html`
              ${!hasVolumeData && html`
                <div style="margin-bottom:10px;padding:10px;border-radius:8px;background:rgba(99,102,241,0.08);border:1px solid rgba(99,102,241,0.22);">
                  <p style="margin:0;font-size:12px;color:#C7D2FE;">Todavia no hay series efectivas registradas esta semana. Marca series como completadas en GIMNASIO para ver el volumen por musculo.</p>
                </div>
              `}
            `}
            ${hasVolumeData && html`
              <div style="display:flex;flex-direction:column;gap:8px;">
                ${volumeData.filter(row => row.total > 0).sort((a,b) => b.total - a.total).map(row => html`
                  <div style="padding:10px;border-radius:10px;background:rgba(10,15,30,0.6);border:1px solid #1E2D45;">
                    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px;">
                      <p style="margin:0;font-size:12px;font-weight:600;color:white;">${row.fullName}</p>
                      <span style="font-family:'JetBrains Mono',monospace;font-size:12px;color:#E2E8F0;">${row.total} series</span>
                    </div>
                    <div style="height:12px;border-radius:999px;background:#0F1729;border:1px solid #1E2D45;overflow:hidden;display:flex;">
                      <div style=${`width:${row.dirPct}%;background:#10B981;min-width:${row.dir > 0 ? '6px' : '0'};`}></div>
                      <div style=${`width:${row.indPct}%;background:#6366F1;min-width:${row.ind > 0 ? '6px' : '0'};`}></div>

    // ═══════════════════════════════════════════════════
    const ProgressView = ({allWeeks, onMount}) => {
      const { LineChart, Line, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, ReferenceLine } = getRC();
      const [selEx,      setSelEx]      = useState('');
      const [loadingAll, setLoadingAll] = useState(false);
      const [filterYear, setFilterYear] = useState('');
      const [filterMonth,setFilterMonth]= useState('');
      const weeklyGymGoal = 4;
      const weeklyCaloriesTarget = TARGETS.kcal * weeklyGymGoal;
      const canRenderLineChart = !!(LineChart && Line && XAxis && YAxis && CartesianGrid && Tooltip && ResponsiveContainer);
      const canRenderBarChart = !!(BarChart && Bar && XAxis && YAxis && CartesianGrid && Tooltip && ResponsiveContainer);

      // Carga el historial completo la primera vez que se abre la tab
      useEffect(()=>{
        if(onMount) { setLoadingAll(true); onMount().finally(()=>setLoadingAll(false)); }
      },[]);

      useEffect(() => {
        if(!onMount) return;
        const rerun = () => { setLoadingAll(true); onMount().finally(()=>setLoadingAll(false)); };
        const onFocus = () => rerun();
        const onVisible = () => { if(document.visibilityState === 'visible') rerun(); };
        window.addEventListener('focus', onFocus);
        document.addEventListener('visibilitychange', onVisible);
        return () => {
          window.removeEventListener('focus', onFocus);
          document.removeEventListener('visibilitychange', onVisible);
        };
      }, [onMount]);

      // Años disponibles en el historial
      const availableYears = useMemo(()=>{
        const ys = new Set(Object.keys(allWeeks).filter(wk=>!isBeforeStart(wk)).map(wk=>wk.slice(0,4)));
        return Array.from(ys).sort().reverse();
      },[allWeeks]);

      // Semanas filtradas por año/mes
      const filteredWeeks = useMemo(()=>
        Object.entries(allWeeks)
          .filter(([wk])=> !isBeforeStart(wk))
          .filter(([wk])=> !filterYear   || wk.startsWith(filterYear))
          .filter(([wk])=> !filterMonth  || wk.slice(5,7) === filterMonth)
          .sort(([a],[b])=>a.localeCompare(b))
      ,[allWeeks, filterYear, filterMonth]);

      const filteredWeeksObj = useMemo(()=>Object.fromEntries(filteredWeeks),[filteredWeeks]);

      // Historial de peso corporal
      const weightHistory = useMemo(()=>
        Object.entries(allWeeks)
          .filter(([wk])=> !isBeforeStart(wk) && allWeeks[wk]?.bodyWeight)
          .sort(([a],[b])=>a.localeCompare(b))
          .map(([wk,w])=>({ week: formatWeekLabel(wk).slice(0,6), kg: parseFloat(w.bodyWeight)||0 }))
      ,[allWeeks]);

      // Exportar PROGRESO como imagen PNG
      const exportImage = async () => {
        const el = document.getElementById('progress-export-area');
        if(!el) return;
        try {
          await window._loadHtml2Canvas();
          const canvas = await window.html2canvas(el, {
            backgroundColor: '#080D1A',
            scale: 2,
            useCORS: true,
            logging: false
          });
          const a = document.createElement('a');
          a.href = canvas.toDataURL('image/png');
          a.download = `enzo-progreso-${new Date().toISOString().split('T')[0]}.png`;
          a.click();
        } catch(e) {
          console.warn('[Export]', e.message);
          window.print(); // fallback si html2canvas falla
        }
      };

      const allExercises = useMemo(()=>{const s=new Set();Object.values(filteredWeeksObj).forEach(w=>Object.values(w.sessions||{}).forEach(ss=>ss&&ss.forEach(ex=>s.add(ex.name))));return Array.from(s).sort();},[filteredWeeksObj]);
      const exHistory = useMemo(()=>{
        if(!selEx) return [];
        const pts=[];
        Object.entries(filteredWeeksObj)
          .sort(([a],[b])=>a.localeCompare(b))
          .forEach(([wk,w])=>Object.values(w.sessions||{}).forEach(ss=>ss&&ss.forEach(ex=>{
            if(ex.name===selEx) ex.sets.filter(s=>s.completed).forEach((set,si)=>{
              const wt=pn(set.weight);
              if(wt>0) pts.push({
                week: formatWeekLabel(wk).slice(0,6),
                weight: wt,
                rpe: set.rpe ? parseInt(set.rpe) : null,
                set: si+1
              });
            });
          })));
        return pts;
      },[selEx, filteredWeeksObj]);

      const macHistory = useMemo(()=>
        Object.entries(filteredWeeksObj)
          .sort(([a],[b])=>a.localeCompare(b))
          .map(([wk,w])=>{
            let cals=0,prot=0;
            Object.values(w.tracker||{}).forEach(d=>{ const t=dayTotals(d.meals||[]); cals+=t.cals; prot+=t.prot; });
            return{week:formatWeekLabel(wk).slice(0,6),cals,prot};
          })
      ,[filteredWeeksObj]);
      const caloriesScaleMax = Math.max(weeklyCaloriesTarget, ...macHistory.map(row => row.cals || 0), 1);
      const caloriesBars = macHistory.map(row => ({
        ...row,
        pct: caloriesScaleMax > 0 ? (row.cals / caloriesScaleMax) * 100 : 0
      }));
      const exerciseScaleMax = Math.max(...exHistory.map(row => row.weight || 0), 1);
      const exerciseRows = exHistory.map(row => ({ ...row, pct: exerciseScaleMax > 0 ? (row.weight / exerciseScaleMax) * 100 : 0 }));
      const weightScaleMax = Math.max(...weightHistory.map(row => row.kg || 0), 1);
      const weightScaleMin = Math.min(...weightHistory.map(row => row.kg || 0), weightScaleMax);
      const weightRange = Math.max(1, weightScaleMax - weightScaleMin);
      const weightRows = weightHistory.map(row => ({ ...row, pct: ((row.kg - weightScaleMin) / weightRange) * 100 }));

      // PRs: máximo de TODO el historial (no filtrado — son records históricos)
      const personalRecords = useMemo(()=>{
        const prs = {};
        Object.values(allWeeks).forEach(w=>
          Object.values(w.sessions||{}).forEach(ss=>ss&&ss.forEach(ex=>{
            ex.sets.filter(s=>s.completed).forEach(set=>{
              const wt = pn(set.weight);
              if(wt > 0 && (!prs[ex.name] || wt > prs[ex.name])) prs[ex.name] = wt;
            });
          }))
        );
        return Object.entries(prs).sort(([,a],[,b])=>b-a);
      },[allWeeks]);
      const tooltipStyle = {background:'#0F1729',border:'1px solid #1E2D45',borderRadius:'8px',fontFamily:'JetBrains Mono,monospace',fontSize:'11px'};

      const exportProgressData = () => {
        try {
          const payload = {
            app: 'enzo-training-progress',
            exported_at: new Date().toISOString(),
            filters: { year: filterYear || null, month: filterMonth || null, exercise: selEx || null },
            weekly_calories_target: weeklyCaloriesTarget,
            weight_history: weightHistory,
            exercise_history: exHistory,
            calories_history: macHistory,
            personal_records: personalRecords
          };
          const blob = new Blob([JSON.stringify(payload, null, 2)], { type:'application/json;charset=utf-8' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `progreso-${new Date().toISOString().slice(0,19).replace(/[:T]/g,'-')}.json`;
          document.body.appendChild(a);
          a.click();
          a.remove();
          setTimeout(() => URL.revokeObjectURL(url), 1000);
        } catch(e) {
          console.warn('[ProgressExportData]', e.message || e);
        }
      };

      if(Object.keys(allWeeks).length===0) return html`
        <${Card}>
          <div style="text-align:center;padding:32px 0;">
            <p style="font-size:36px;margin:0 0 8px;">📊</p>
            <p style="color:#94a3b8;margin:0;">Todavía no hay datos históricos.</p>
            <p style="color:#64748b;font-size:12px;margin:4px 0 0;">Completá entrenamientos en varias semanas para ver progresión.</p>
          </div>
        <//>
      `;

      return html`
        <div id="progress-export-area" class="fade-up" style="display:flex;flex-direction:column;gap:12px;">
          ${loadingAll && html`
            <div style="display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.2);">
              <span class="spin" style="display:inline-block;width:14px;height:14px;border:2px solid rgba(99,102,241,0.3);border-top-color:#6366F1;border-radius:50%;flex-shrink:0;"></span>
              <span style="font-size:12px;color:#6366F1;font-family:'JetBrains Mono',monospace;">Cargando historial completo...</span>
            </div>
          `}
          <${Card}>
            <!-- D. Filtro por Año/Mes -->
            <div style="display:flex;gap:6px;margin-bottom:12px;">
              <select class="inp" style="flex:1;font-size:12px;padding:6px 8px;"
                value=${filterYear} onChange=${e=>{ setFilterYear(e.target.value); setFilterMonth(''); }}>
                <option value="">Todos los años</option>
                ${availableYears.map(y=>html`<option value=${y}>${y}</option>`)}
              </select>
              <select class="inp" style="flex:1;font-size:12px;padding:6px 8px;"
                value=${filterMonth} onChange=${e=>setFilterMonth(e.target.value)}
                disabled=${!filterYear}>
                <option value="">Todos los meses</option>
                ${['01','02','03','04','05','06','07','08','09','10','11','12'].map((m,i)=>html`
                  <option value=${m}>${['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][i]}</option>
                `)}
              </select>
              ${(filterYear||filterMonth) && html`
                <button onClick=${()=>{ setFilterYear(''); setFilterMonth(''); }}
                  style="padding:6px 10px;border-radius:8px;border:1px solid #1E2D45;background:rgba(239,68,68,0.1);color:#EF4444;font-size:11px;cursor:pointer;white-space:nowrap;">
                  Reset

            </div>
            <div style="display:flex;gap:8px;justify-content:flex-end;margin-bottom:12px;flex-wrap:wrap;">
              <button onClick=${exportProgressData} style="padding:6px 10px;border-radius:8px;border:1px solid rgba(56,189,248,0.3);background:rgba(56,189,248,0.12);color:#7DD3FC;font-size:11px;font-weight:800;font-family:'Barlow Condensed',sans-serif;cursor:pointer;letter-spacing:0.05em;">
                EXPORTAR DATOS
              </button>
              <button onClick=${exportImage} style="padding:6px 10px;border-radius:8px;border:1px solid rgba(99,102,241,0.3);background:rgba(99,102,241,0.12);color:#A5B4FC;font-size:11px;font-weight:800;font-family:'Barlow Condensed',sans-serif;cursor:pointer;letter-spacing:0.05em;">
                EXPORTAR IMAGEN
              </button>
            </div>
            <p style="margin:0 0 12px;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;font-weight:700;color:#10B981;">Progresion de Peso por Ejercicio</p>
            <select class="inp" style="margin-bottom:12px;" value=${selEx} onChange=${e=>setSelEx(e.target.value)}>
              <option value="">Seleccionar ejercicio...</option>
              ${allExercises.map(e=>html`<option>${e}</option>`)}
            </select>
            ${selEx && exHistory.length>0 && html`
              <div style="display:flex;flex-direction:column;gap:8px;">
                ${exerciseRows.map(row => html`
                  <div style="padding:10px;border-radius:10px;background:rgba(10,15,30,0.6);border:1px solid #1E2D45;">
                    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px;">
                      <span style="font-size:11px;color:#CBD5E1;font-weight:700;">${row.week} - serie ${row.set}</span>

                    <div style="height:10px;border-radius:999px;background:#0F1729;border:1px solid #1E2D45;overflow:hidden;">
                      <div style=${`width:${row.pct}%;height:100%;background:#10B981;min-width:${row.weight > 0 ? '6px' : '0'};`}></div>

                      <span>RPE: <span style="color:#F59E0B;font-family:'JetBrains Mono',monospace;">${row.rpe ?? '-'}</span></span>
                      <span>Max: <span style="color:#10B981;font-family:'JetBrains Mono',monospace;">${exerciseScaleMax} kg</span></span>
                    </div>
                  </div>
                `)}
