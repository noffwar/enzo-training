[build]
  # Directorio donde estan el index.html, sw.js y el manifest
  publish = "."
  # Directorio donde Claude y vos guardaron las funciones
  functions = "netlify/functions"

[build.environment]
  # Forzamos Node 20 para soporte nativo de fetch y ES Modules
  NODE_VERSION = "20"

[functions]
  # Usamos esbuild para una compilacion mas rapida y moderna
  node_bundler = "esbuild"
  included_files = ["netlify/functions/**"]

[functions."send-task-reminders"]
  schedule = "*/15 * * * *"

[[redirects]]
  # Manejo de rutas para Single Page Application (SPA)
  # Evita errores 404 al recargar la pagina en Netlify
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  # Cabeceras de seguridad recomendadas
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "same-origin"
